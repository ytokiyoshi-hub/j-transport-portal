};

// ── 日次実績入力（罫線濃色化） ─────────────────────────────────────────────
const DailyInputPage = ({ accent }) => {
  const drivers = driversLive();
  const [scClients, setScClients] = React.useState(null);
  const [scDrivers, setScDrivers] = React.useState(null);
  const [extraClients] = useLocalStorage("jt_extra_clients", []);
  const [clientDriverOverrides] = useLocalStorage("jt_client_driver_overrides", {});
  const clientSrc = scClients ?? (extraClients.length ? [...clients, ...extraClients] : clients);
  const driverSrc = scDrivers ?? drivers;

  const [selClient, setSelClient] = React.useState(clientSrc[0]);
  const [monthYear, setMonthYear] = React.useState(REF_MONTH);
  const [entries, setEntries] = React.useState({});
  const [saved, setSaved] = React.useState(false);
  const [cycleOverrides] = useLocalStorage("jt_cycle_overrides", {});
  // 日次編集を localStorage に保持 → 収支管理など他ページに反映する
  const [dailyEdits, setDailyEdits] = useLocalStorage("jt_daily_edits", {});
  const [focusedCell, setFocusedCell] = React.useState(null);
  const [confirmClear, setConfirmClear] = React.useState(false);
  const inputRefs = React.useRef({});

  React.useEffect(() => {
    if (!window.sb) return;
    (async () => {
      const [{ data: cs }, { data: rates }, { data: cds }, { data: ds }] = await Promise.all([
        window.sb.from("jt_clients").select("*").order("id"),
        window.sb.from("jt_client_rates").select("*").order("sort_order"),
        window.sb.from("jt_client_drivers").select("*"),
        window.sb.from("jt_drivers").select("*").order("id"),
      ]);
      if (cs && rates && cds && ds) {
        const transformed = cs.map(c => ({
          id: c.id, name: c.name, area: c.area, billing: c.billing,
          billingCycle: c.billing_cycle, monthlyVol: c.monthly_vol || {},
          contact: c.contact, status: c.status,
          rates: rates.filter(r => r.client_id === c.id).map(r => ({
            label: r.label, sell: Number(r.sell), pay: Number(r.pay),
          })),
          drivers: cds.filter(cd => cd.client_id === c.id).map(cd => cd.driver_id),
        }));
        // 旧Supabaseマスタで実データ定数を上書きしない（収支・ダッシュと同一データ源に統一）
        void transformed; void ds;
        console.log("[Supabase] master fetch ignored; using embedded real data + dailyActuals");
      } else {
        console.warn("[Supabase] fetch failed, using hardcoded fallback");
      }
    })();
  }, []);

  React.useEffect(() => {
    if (scClients) {
      const updated = scClients.find(c => c.id === selClient?.id) || {};
      if (updated) setSelClient(updated);
    }
  }, [scClients]);

  const clientList = clientSrc.filter(c => c.billing !== "スポット");
  // 当月の billing period に実績があるドライバーを優先表示。実績ゼロは selClient.drivers から取る。
  // 当月実績ありドライバーがあれば、それだけを表示（左端の不要な空列を削る）。
  const _mYrParts = monthYear.split("-").map(Number);
  const _bsTmp = (() => {
    const [yr, mo] = _mYrParts;
    const cyc = (cycleOverrides && cycleOverrides[selClient?.id]) || selClient?.billingCycle || "翌月末締め";
    const cm = /翌月(\d+)日締め/.exec(cyc);
    if (cm) { const cd=parseInt(cm[1]); const prev=new Date(yr,mo-2,cd+1); const end=new Date(yr,mo-1,cd); return [prev,end]; }
    return [new Date(yr,mo-1,1), new Date(yr,mo,0)];
  })();
  const _bsStr = `${_bsTmp[0].getFullYear()}-${String(_bsTmp[0].getMonth()+1).padStart(2,"0")}-${String(_bsTmp[0].getDate()).padStart(2,"0")}`;
  const _beStr = `${_bsTmp[1].getFullYear()}-${String(_bsTmp[1].getMonth()+1).padStart(2,"0")}-${String(_bsTmp[1].getDate()).padStart(2,"0")}`;
  const _activeIds = new Set();
  if (typeof dailyActuals !== "undefined" && dailyActuals[selClient?.id]) {
    Object.entries(dailyActuals[selClient.id]).forEach(([d, day]) => {
      if (d < _bsStr || d > _beStr) return;
      Object.entries(day).forEach(([did, drv]) => {
        if (Object.values(drv).some(v => Number(v) > 0)) _activeIds.add(did);
      });
    });
  }
  // 担当から外れたドライバーが live 編集(jt_daily_edits)で当期間に入力したデータも列に出す
  // （これを拾わないと日次画面の月次合計が収支管理/ダッシュボードの集計より過少になる）
  if (dailyEdits && dailyEdits[selClient?.id]) {
    Object.entries(dailyEdits[selClient.id]).forEach(([d, day]) => {
      if (d < _bsStr || d > _beStr) return;
      Object.entries(day).forEach(([did, drv]) => {
        if (Object.values(drv).some(v => Number(v) > 0)) _activeIds.add(did);
      });
    });
  }
  const _selDrivers = (clientDriverOverrides && clientDriverOverrides[selClient?.id]) || selClient.drivers || [];
  const _allCandidates = driverSrc.filter(d => _selDrivers.includes(d.id) || (typeof dailyActuals!=="undefined" && dailyActuals[selClient.id] && Object.values(dailyActuals[selClient.id]).some(day=>day[d.id])) || (dailyEdits[selClient.id] && Object.entries(dailyEdits[selClient.id]).some(([dt,day])=> dt>=_bsStr && dt<=_beStr && day[d.id] && Object.values(day[d.id]).some(v=>Number(v)>0))));
  // 担当ドライバーは常に全員を列表示する（1人入力したら他が消えるバグ防止）。
  // 担当未設定の荷主（追加直後の新規荷主など）は全ドライバーを入力対象にフォールバック。
  const assignedDrivers = _allCandidates.length ? _allCandidates : driverSrc;
  const rates = effectiveClient(selClient).rates.filter(r => r.sell > 0 || r.pay > 0);
  const nD = assignedDrivers.length;
  const nR = rates.length;
  const nCols = nD * nR;

  const [yr, mo] = monthYear.split("-").map(Number);
  const _cycle = (cycleOverrides && cycleOverrides[selClient?.id]) || selClient?.billingCycle || "翌月末締め";
  const _cm = /翌月(\d+)日締め/.exec(_cycle);
  const _cutoff = _cm ? parseInt(_cm[1]) : null;
  const _fmtD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  let _bStart, _bEnd;
  if (_cutoff && _cutoff < 28) {
    _bStart = new Date(yr, mo-2, _cutoff+1);
    _bEnd = new Date(yr, mo-1, _cutoff);
  } else {
    _bStart = new Date(yr, mo-1, 1);
    _bEnd = new Date(yr, mo, 0);
  }
  const bStartStr = _fmtD(_bStart), bEndStr = _fmtD(_bEnd);
  const daysInMonth = Math.round((_bEnd - _bStart)/86400000) + 1;
  const dayRows = Array.from({length: daysInMonth}, (_, i) => {
    const date = new Date(_bStart); date.setDate(date.getDate()+i);
    const dow = date.getDay();
    return {
      d: date.getDate(),
      dateStr: _fmtD(date),
      dayName: ["日","月","火","水","木","金","土"][dow],
      dow, isWeekend: dow===0||dow===6, isSun: dow===0,
    };
  });

  const getVal = (dateStr, dId, rLabel) => entries[dateStr]?.[dId]?.[rLabel] ?? "";
  const saveTimers = React.useRef({});
  const setVal = (dateStr, dId, rLabel, v) => {
    setEntries(p => ({ ...p, [dateStr]: { ...(p[dateStr]||{}), [dId]: { ...((p[dateStr]||{})[dId]||{}), [rLabel]: v } } }));
    // localStorage の "jt_daily_edits" にも保存 → 収支管理・ダッシュボード等の他ページで即時反映
    setDailyEdits(prev => {
      const cid = selClient?.id;
      if (!cid) return prev;
      const next = { ...prev };
      next[cid] = { ...(next[cid] || {}) };
      next[cid][dateStr] = { ...(next[cid][dateStr] || {}) };
      next[cid][dateStr][dId] = { ...(next[cid][dateStr][dId] || {}) };
      next[cid][dateStr][dId][rLabel] = v;
      return next;
    });
    setSaved(false);
    const key = `${dateStr}|${dId}|${rLabel}`;
    if (saveTimers.current[key]) clearTimeout(saveTimers.current[key]);
    saveTimers.current[key] = setTimeout(async () => {
      delete saveTimers.current[key];
      if (!window.sb || !selClient?.id) return;
      const numV = v === "" ? null : Number(v);
      let error;
      if (numV === null || isNaN(numV)) {
        ({ error } = await window.sb.from("jt_daily_entries").delete()
          .eq("entry_date", dateStr).eq("client_id", selClient.id)
          .eq("driver_id", dId).eq("rate_label", rLabel));
      } else {
        // FK(jt_daily_entries.driver_id → jt_drivers.id)を満たすため、未登録ドライバーは先に追加（既存は変更しない）
        const _drv = driverSrc.find(d => d.id === dId);
        if (_drv) { try { await window.sb.from("jt_drivers").upsert({ id:_drv.id, name:_drv.name, type:_drv.type, area:_drv.area, status:"稼働中" }, { onConflict:"id", ignoreDuplicates:true }); } catch(e){} }
        ({ error } = await window.sb.from("jt_daily_entries").upsert({
          entry_date: dateStr, client_id: selClient.id,
          driver_id: dId, rate_label: rLabel, value: numV,
        }, { onConflict: "entry_date,client_id,driver_id,rate_label" }));
      }
      if (error) {
        setSaved(false);
        showToast("Supabaseへの保存に失敗しました（端末には保存済み）", "error");
        return;
      }
      if (Object.keys(saveTimers.current).length === 0) setSaved(true);
    }, 400);
  };

  // 月・荷主切替時に実績をロード（埋め込みdailyActuals → localStorage edits で上書き → Supabaseで上書き）
  React.useEffect(() => {
    let ignore = false; // 月/荷主を高速切替した際、古いフェッチ応答が先祖返りするのを防ぐ
    const start = bStartStr;
    const end = bEndStr;
    const next = {};
    const da = (typeof dailyActuals !== "undefined" && dailyActuals[selClient?.id]) || {};
    Object.keys(da).forEach(ds => {
      if (ds < start || ds > end) return;
      next[ds] = {};
      Object.keys(da[ds]).forEach(did => {
        next[ds][did] = {};
        Object.keys(da[ds][did]).forEach(lbl => { next[ds][did][lbl] = String(da[ds][did][lbl]); });
      });
    });
    // 同 client の localStorage edits を重ねる（ユーザー手入力が消えないように）
    const editsForClient = (dailyEdits && dailyEdits[selClient?.id]) || {};
    Object.keys(editsForClient).forEach(ds => {
      if (ds < start || ds > end) return;
      if (!next[ds]) next[ds] = {};
      Object.keys(editsForClient[ds]).forEach(did => {
        if (!next[ds][did]) next[ds][did] = {};
        Object.keys(editsForClient[ds][did]).forEach(lbl => {
          next[ds][did][lbl] = String(editsForClient[ds][did][lbl]);
        });
      });
    });
    setEntries(next);
    setSaved(true);
    if (window.sb && selClient?.id) {
      (async () => {
        const { data, error } = await window.sb.from("jt_daily_entries")
          .select("*").eq("client_id", selClient.id)
          .gte("entry_date", start).lte("entry_date", end);
        if (ignore) return; // 切替後に到着した古い応答は破棄（先祖返り防止）
        if (error || !data || !data.length) return;
        setEntries(prev => {
          const m = JSON.parse(JSON.stringify(prev));
          data.forEach(r => {
            // Guard: do not overwrite if there's a pending save timer for this cell (unsaved user input)
            const key = `${r.entry_date}|${r.driver_id}|${r.rate_label}`;
            if (saveTimers.current[key]) return; // Skip this cell, keep user's pending value
            if (!m[r.entry_date]) m[r.entry_date] = {};
            if (!m[r.entry_date][r.driver_id]) m[r.entry_date][r.driver_id] = {};
            m[r.entry_date][r.driver_id][r.rate_label] = String(r.value);
          });
          return m;
        });
      })();
    }
    return () => { ignore = true; };
  }, [selClient?.id, monthYear]);

  const dayTotals = dayRows.map(day => {
    let sell=0, pay=0;
    assignedDrivers.forEach(d => rates.forEach(r => {
      const v = Number(getVal(day.dateStr, d.id, r.label))||0;
      sell += v*r.sell; pay += v*r.pay;
    }));
    return { sell, pay, profit: sell-pay };
  });
  const _dailySum = dayTotals.reduce((a,t)=>({sell:a.sell+t.sell,pay:a.pay+t.pay,profit:a.profit+t.profit}),{sell:0,pay:0,profit:0});
  // 月次サマリー: 日次入力があればそれを正とする（ユーザー編集を即時反映）。無ければ monthlyHistory にフォールバック。
  const _mhVal = (typeof monthlyHistory!=="undefined" && selClient && monthlyHistory[selClient.id] && monthlyHistory[selClient.id][monthYear]) || null;
  const _hasDaily = _dailySum.sell > 0 || _dailySum.pay > 0;
  const monthTotals = _hasDaily
    ? _dailySum
    : (_mhVal ? { sell:_mhVal.s, pay:_mhVal.p, profit:_mhVal.s-_mhVal.p } : _dailySum);
  const colTotals = assignedDrivers.flatMap((d) =>
    rates.map((r) => ({
      vol:  dayRows.reduce((s,day)=>s+(Number(getVal(day.dateStr,d.id,r.label))||0),0),
      sell: dayRows.reduce((s,day)=>s+(Number(getVal(day.dateStr,d.id,r.label))||0)*r.sell,0),
    }))
  );
  // 入力進捗は「状態」列の✓(rowFilled)と判定基準を一致させる:
  // 平日かつ全セル(担当ドライバー×単価)が空欄でない日をカウント(0でも入力済みとみなす)。
  // 旧実装は dayTotals[i].sell>0 だったため「✓なのに進捗に入らない」(全0入力/売単価0の日)不整合があった。
  const inputDays = dayRows.filter(d=>!d.isWeekend && assignedDrivers.every(dr=>rates.every(r=>getVal(d.dateStr,dr.id,r.label)!==""))).length;
  const workdays  = dayRows.filter(d=>!d.isWeekend).length;

  // ── 今日・目標 ──
  const now0 = new Date();
  const currentMonthYear = `${now0.getFullYear()}-${String(now0.getMonth()+1).padStart(2,"0")}`;
  const isCurrentMonth = monthYear === currentMonthYear;
  const todayD = now0.getDate();
  const todayStr = `${monthYear}-${String(todayD).padStart(2,"0")}`;
  const todayDayRow = isCurrentMonth ? dayRows.find(r=>r.d===todayD) : null;
  const dayNames7 = ["日","月","火","水","木","金","土"];
  const todayLabel = isCurrentMonth ? `${now0.getMonth()+1}月${todayD}日（${dayNames7[now0.getDay()]}）` : "";
  const dailyTargets = rates.reduce((obj,r)=>{
    const mVol = selClient.monthlyVol[r.label]||0;
    obj[r.label] = workdays>0&&mVol>0 ? Math.round(mVol/workdays) : 0;
    return obj;
  },{});
  const todayCompletedCount = isCurrentMonth
    ? assignedDrivers.filter(d=>rates.every(r=>getVal(todayStr,d.id,r.label)!=="")).length : 0;
  const todayComplete = isCurrentMonth && todayDayRow && !todayDayRow.isWeekend
    && todayCompletedCount===assignedDrivers.length;

  const focusCell = (d, c) => {
    if (c<0){c=nCols-1;d--;} if(c>=nCols){c=0;d++;}
    if(d<0||d>=daysInMonth) return;
    const next = inputRefs.current[`${d}-${c}`];
    if (!next) return;
    // 次セルの value を確実に state と同期させてから focus（ブラウザ autofill による「数字が下の行に入る」現象を防ぐ）
    try { next.value = next.value; } catch {}
    next.focus();
    // テキスト全選択（次回入力が上書きされ、前のセルの値が残らない）
    try { next.select && next.select(); } catch {}
  };
  const handleKeyDown = (e, di, ci) => {
    // IME 変換中（半角/全角ONの日本語入力で数字確定 Enter 等）は処理しない。
    // この Enter は IME 確定用で、移動 Enter とは別物。e.isComposing / keyCode 229 / e.nativeEvent.isComposing を全てチェック。
    if (e.isComposing || e.keyCode === 229 || (e.nativeEvent && e.nativeEvent.isComposing)) return;
    if(e.key==='Enter'||e.key==='ArrowDown'){
      e.preventDefault(); e.stopPropagation();
      focusCell(di+1,ci);
    }
    else if(e.key==='ArrowUp'){e.preventDefault(); e.stopPropagation(); focusCell(di-1,ci);}
    else if(e.key==='ArrowLeft'){e.preventDefault(); e.stopPropagation(); if(ci>0)focusCell(di,ci-1);}
    else if(e.key==='ArrowRight'){e.preventDefault(); e.stopPropagation(); if(ci<nCols-1)focusCell(di,ci+1);}
    else if(e.key==='Tab'){e.preventDefault(); e.stopPropagation(); focusCell(di,ci+(e.shiftKey?-1:1));}
  };

  // 今日のクイック入力パネル用の十字キー＆Enter移動
  const todayRefs = React.useRef({});
  const focusTodayCell = (di, ri) => {
    todayRefs.current[`${di}-${ri}`]?.focus();
  };
  const handleTodayKeyDown = (e, di, ri) => {
    const nD = assignedDrivers.length, nR = rates.length;
    if(e.key==='Enter'||e.key==='ArrowDown'){
      e.preventDefault();
      if(ri<nR-1) focusTodayCell(di, ri+1);
      else if(di<nD-1) focusTodayCell(di+1, 0);
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      if(ri>0) focusTodayCell(di, ri-1);
      else if(di>0) focusTodayCell(di-1, nR-1);
    } else if(e.key==='ArrowLeft'){
      e.preventDefault();
      if(di>0) focusTodayCell(di-1, ri);
    } else if(e.key==='ArrowRight'){
      e.preventDefault();
      if(di<nD-1) focusTodayCell(di+1, ri);
    } else if(e.key==='Tab'){
      e.preventDefault();
      const next = ri + (e.shiftKey?-1:1);
      if(next>=0 && next<nR) focusTodayCell(di, next);
      else if(e.shiftKey && di>0) focusTodayCell(di-1, nR-1);
      else if(!e.shiftKey && di<nD-1) focusTodayCell(di+1, 0);
    }
  };

  React.useEffect(() => {
    const h = e => {
      if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();if(Object.keys(saveTimers.current).length===0)setSaved(true);}
      if(e.altKey&&/^Digit[1-9]$/.test(e.code||'')){
        e.preventDefault();
        const idx=Number(e.code.slice(5))-1;
        if(idx<clientList.length){setSelClient(clientList[idx]);setEntries({});setSaved(false);}
      }
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  }, [clientList]);

  React.useEffect(() => {
    // 左上セルの自動フォーカスは行わない（ユーザーが選んだ時のみフォーカス）
    if (isCurrentMonth) {
      setTimeout(() => {
        const todayEl = document.querySelector('[data-today="true"]');
        if (!todayEl) return;
        // scrollIntoView はテーブルの内側スクロールコンテナを含む全ての祖先をスクロールする
        // （block:"center" で sticky ヘッダーに行が隠れない）
        todayEl.scrollIntoView({ block:"center", behavior:"smooth" });
      }, 300);
    }
  }, [selClient, monthYear]);

  const handleCSV = () => {
    const rHeaders = assignedDrivers.flatMap(d=>rates.map(r=>`${d.name}:${r.label}`));
    const header = ["日付","曜日",...rHeaders,"売上合計","支払合計","粗利"];
    const rows = dayRows.map((day,i)=>{
      const vals = assignedDrivers.flatMap(d=>rates.map(r=>getVal(day.dateStr,d.id,r.label)||0));
      const {sell,pay,profit}=dayTotals[i];
      return [day.dateStr,day.dayName,...vals,sell,pay,profit];
    });
    const footRow = ["月次合計","",...colTotals.map(c=>c.vol),monthTotals.sell,monthTotals.pay,monthTotals.profit];
    const csv = [header,...rows,footRow].map(r=>r.map(csvEscape).join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,﻿"+encodeURIComponent(csv);
    a.download=`実績_${selClient.name}_${monthYear}.csv`;
    a.click();
  };

  return (
    <div>
      <div style={{ marginBottom:8 }}>
      {/* ヘッダー */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, gap:12, flexWrap:"wrap" }}>
        <div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>財務・請求管理</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"var(--jt-text)" }}>日次実績入力</div>
          <div style={{ fontSize:12, color:"var(--jt-text-sub)", marginTop:2 }}>月次一覧・スプレッドシート形式</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, color:"var(--jt-text-mute)", flexShrink:0 }}>対象月</span>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            <button onClick={()=>{ if(isNaN(yr)||isNaN(mo)){ setMonthYear(REF_MONTH); return; } const d=new Date(yr,mo-2,1); setMonthYear(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }}
              style={{ padding:"7px 10px", border:"none", borderRadius:6, background:"var(--jt-base)", color:"var(--jt-text-sub)", fontWeight:600, cursor:"pointer", fontSize:13, boxShadow:"var(--jt-raised-sm)" }}>‹</button>
            <input type="month" value={monthYear} onChange={e=>{ if(/^\d{4}-\d{2}$/.test(e.target.value)) setMonthYear(e.target.value); }}
              style={{ padding:"7px 12px", border:"none", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none", background:"var(--jt-base)", boxShadow:"var(--jt-inset)" }}
              onFocus={e=>e.target.style.borderColor=accent} onBlur={e=>e.target.style.borderColor="#DEDAE5"}/>
            <button onClick={()=>{ if(isNaN(yr)||isNaN(mo)){ setMonthYear(REF_MONTH); return; } const d=new Date(yr,mo,1); setMonthYear(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }}
              style={{ padding:"7px 10px", border:"none", borderRadius:6, background:"var(--jt-base)", color:"var(--jt-text-sub)", fontWeight:600, cursor:"pointer", fontSize:13, boxShadow:"var(--jt-raised-sm)" }}>›</button>
          </div>
        </div>
      </div>

      {/* 操作バー（荷主） */}
      <div style={{ marginBottom:8 }}>
        <label style={{ fontSize:11, color:"var(--jt-text-mute)", display:"block", marginBottom:4 }}>荷主</label>
        <div style={{ position:"relative", display:"inline-block" }}>
          <select
            value={selClient.id}
            onChange={(e)=>{
              const c = clientList.find(x=>x.id===e.target.value) || {};
              if(c){ setSelClient(c); setEntries({}); setSaved(false); }
            }}
            style={{
              appearance:"none", WebkitAppearance:"none", MozAppearance:"none",
              padding:"8px 36px 8px 14px", minWidth:260,
              border:"none", borderRadius:8, background:"var(--jt-base)",
              color:"var(--jt-text)", fontSize:13.5, fontWeight:600,
              fontFamily:"inherit", cursor:"pointer", outline:"none",
              boxShadow:"var(--jt-inset)",
            }}>
            {clientList.map((c,i)=>(
              <option key={c.id} value={c.id}>{(i+1).toString().padStart(2,"0")}. {c.name}（{c.id}）</option>
            ))}
          </select>
          <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:accent, fontSize:10 }}>▼</span>
        </div>
      </div>

      {/* 月次KPI */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:8 }}>
        {[
          { l:"月次売上（速報）", v:monthTotals.sell>0?fmt(monthTotals.sell):"—", c:accent },
          { l:"月次支払",         v:monthTotals.pay>0?fmt(monthTotals.pay):"—",   c:"#C39A52" },
          { l:"月次粗利",         v:(monthTotals.sell>0||monthTotals.pay>0)?fmt(monthTotals.profit):"—", c:monthTotals.profit<0?"#B05A60":"#6E9E78" },
          { l:"入力進捗",         v:`${inputDays} / ${workdays}日`, c:"#645F6E",
            sub: inputDays===workdays&&workdays>0?"✓ 入力完了":`残 ${workdays-inputDays}日` },
        ].map(({l,v,c,sub})=>(
          <Card key={l} style={{ padding:"8px 14px" }}>
            <div style={{ fontSize:11, color:"var(--jt-text-mute)", marginBottom:2 }}>{l}</div>
            <div style={{ fontSize:16, fontWeight:700, color:c }}>{v}</div>
            {sub && <div style={{ fontSize:10, color:inputDays===workdays&&workdays>0?"#6E9E78":"#A09AAB", marginTop:2 }}>{sub}</div>}
          </Card>
        ))}
      </div>

      </div>
      {/* 月次テーブル — 独立スクロール領域内で thead を sticky 化 */}
      <Card flush>
        <div style={{ maxHeight:"calc(100vh - 320px)", overflow:"auto", position:"relative" }}>
          <style>{`
            .jt-daily-tbl { border-collapse: separate; border-spacing: 0; border: 1px solid #DEDAE5; }
            .jt-daily-tbl tfoot tr:first-child td { border-top: 1px solid #C9C0D6; }
            .jt-daily-tbl td, .jt-daily-tbl th {
              border-bottom: 1px solid #DEDAE5;
              border-right: 1px solid #DEDAE5;
              vertical-align: middle;
            }
            .jt-daily-tbl thead th { border-bottom: 1px solid #DEDAE5; }
            .jt-daily-tbl tbody tr { height: 32px; }
            .jt-daily-tbl tbody td { line-height: 1.2; box-sizing: border-box; overflow: hidden; }
            .jt-daily-tbl tbody td input { display: block; vertical-align: middle; }
            .jt-daily-tbl tbody tr.jt-weekend > td { background: var(--jt-base); }
          `}</style>
          <table className="jt-daily-tbl" style={{ borderCollapse:"separate", borderSpacing:0, fontSize:12, whiteSpace:"nowrap", tableLayout:"fixed" }}>
            <colgroup>
              <col style={{ width:96 }} />
              {assignedDrivers.map(d => rates.map((r,ri)=><col key={d.id+'-'+ri} style={{ width:84 }} />))}
              <col style={{ width:84 }} />
              <col style={{ width:84 }} />
              <col style={{ width:84 }} />
              <col style={{ width:48 }} />
            </colgroup>
            <thead style={{ position:"sticky", top:0, zIndex:10 }}>
              <tr style={{ background:"var(--jt-base)" }}>
                <th style={{ padding:"7px 12px", textAlign:"center", color:"var(--jt-text)", fontWeight:700, fontSize:12, minWidth:96, width:96, position:"sticky", left:0, top:0, background:"var(--jt-base)", zIndex:13 }}>日付</th>
                {assignedDrivers.map((d,dri)=>(
                  <th key={d.id} colSpan={nR}
                    style={{ padding:"7px 12px", textAlign:"center", overflow:"hidden", borderRight:"1px solid #C9C0D6", background:focusedCell?.dri===dri?accent+"0e":"var(--jt-base)", position:"sticky", top:0, zIndex:11 }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:5, flexWrap:"wrap", rowGap:2 }}>
                      <Avatar name={d.name} size={18} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                      <span style={{ fontWeight:700, fontSize:12, whiteSpace:"normal", wordBreak:"break-word", minWidth:0 }}>{d.name}</span>
                      <StatusBadge label={d.type}/>
                    </div>
                  </th>
                ))}
                <th colSpan={3} style={{ padding:"7px 12px", textAlign:"center", color:"var(--jt-text-sub)", fontWeight:600, fontSize:11, background:"var(--jt-base)", position:"sticky", top:0, zIndex:11 }}>日次合計</th>
                <th style={{ padding:"7px 8px", textAlign:"center", color:"var(--jt-text)", fontWeight:700, fontSize:12, minWidth:40, background:"var(--jt-base)", position:"sticky", top:0, zIndex:11 }}>状態</th>
              </tr>
              <tr style={{ background:"var(--jt-base)" }}>
                <th style={{ padding:"4px 8px", textAlign:"center", color:"var(--jt-text-mute)", fontWeight:500, fontSize:10, position:"sticky", left:0, top:32, background:"var(--jt-base)", zIndex:12 }}>&nbsp;</th>
                {assignedDrivers.map((d,dri)=>
                  rates.map((r,ri)=>{
                    const ci=dri*nR+ri;
                    const active=focusedCell?.ci===ci;
                    return (
                      <th key={`${dri}-${ri}`}
                        style={{ padding:"4px 8px", textAlign:"center", color:active?accent:"var(--jt-text-sub)", fontWeight:600, fontSize:10.5,
                          background:active?accent+"0e":"var(--jt-base)", position:"sticky", top:32, zIndex:11, minWidth:84, width:84, borderRight: ri===nR-1?"1px solid #C9C0D6":"1px solid #DEDAE5" }}>
                        <div style={{ fontWeight:600 }}>{r.label}</div>
                      </th>
                    );
                  })
                )}
                {["売上","支払","粗利"].map((h,i)=>(
                  <th key={h} style={{ padding:"4px 10px", textAlign:"right", color:"var(--jt-text-sub)", fontWeight:600, fontSize:10.5, minWidth:76, background:"var(--jt-base)", position:"sticky", top:32, zIndex:11 }}>{h}</th>
                ))}
                <th style={{ padding:"4px 8px", background:"var(--jt-base)", position:"sticky", top:32, zIndex:11 }}>&nbsp;</th>
              </tr>
            </thead>
            <tbody>
              {dayRows.map((day,di)=>{
                const dt = dayTotals[di];
                const isActiveRow = focusedCell?.di===di;
                const isToday = day.dateStr===todayStr&&isCurrentMonth;
                // 選択中/TODAY行は不透明色にする（半透明だと sticky の日付列が横スクロールで透ける）
                const rowBg = isActiveRow?"#E2DCEA":isToday?"#E8E4ED":day.isWeekend?"#EDEBF1":"var(--jt-base)";
                const rowFilled = !day.isWeekend&&assignedDrivers.every(d=>rates.every(r=>getVal(day.dateStr,d.id,r.label)!==""));
                const rowPartial = !rowFilled&&!day.isWeekend&&assignedDrivers.some(d=>rates.some(r=>getVal(day.dateStr,d.id,r.label)!==""));
                return (
                  <tr key={di} data-today={isToday?"true":"false"} className={day.isWeekend?"jt-weekend":""} style={{ borderBottom:"1px solid #DEDAE5", background:rowBg }}>
                    <td style={{ padding:"0 12px", borderRight:"1px solid #DEDAE5", fontWeight:500, position:"sticky", left:0, background:rowBg, zIndex:1, minWidth:96, width:96, whiteSpace:"nowrap",
                      borderLeft:isActiveRow?`3px solid ${accent}`:isToday?`3px solid ${accent}80`:"3px solid transparent" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4, whiteSpace:"nowrap" }}>
                        <span style={{ fontSize:13, fontWeight:700, color:day.isSun?"#B05A60":day.dow===6?"#7E6593":"#393443", display:"inline-block", width:18, textAlign:"right" }}>{day.d}</span>
                        <span style={{ fontSize:10.5, color:day.isSun?"#B05A60":day.dow===6?"#7E6593":"#A09AAB", flexShrink:0 }}>（{day.dayName}）</span>
                        {isToday&&<span style={{ fontSize:9, fontWeight:700, background:accent, color:"#fff", padding:"1px 5px", borderRadius:3, flexShrink:0, marginLeft:2 }}>TODAY</span>}
                      </div>
                    </td>
                    {assignedDrivers.map((d,dri)=>
                      rates.map((r,ri)=>{
                        const ci=dri*nR+ri;
                        const isActive=isActiveRow&&focusedCell?.ci===ci;
                        const val=getVal(day.dateStr,d.id,r.label);
                        const numVal=Number(val);
                        const dt2=dailyTargets[r.label];
                        const isAnomaly=!day.isWeekend&&val!==""&&(numVal===0||(dt2>0&&numVal>dt2*3));
                        return (
                          <td key={ci} style={{ padding:0, textAlign:"center", borderRight: ri===nR-1?"1px solid #C9C0D6":"1px solid #DEDAE5" }}>
                            <input
                              ref={el=>inputRefs.current[`${di}-${ci}`]=el}
                              type="number" min="0"
                              inputMode="numeric"
                              lang="en"
                              name={`cell-${selClient.id}-${di}-${ci}`}
                              autoComplete="off" autoCorrect="off" spellCheck="false"
                              data-1p-ignore="true" data-lpignore="true" data-form-type="other"
                              placeholder={day.isWeekend?"—":""}
                              title={isAnomaly?(numVal===0?"0件？ 空欄にしてください":"通常より大幅に多い件数です"):""}
                              value={val}
                              onChange={e=>setVal(day.dateStr,d.id,r.label,e.target.value)}
                              onFocus={(e)=>{ setFocusedCell({di,ci,dri}); try{e.target.select && e.target.select();}catch{} }}
                              onBlur={()=>setFocusedCell(null)}
                              onCompositionStart={e=>{ e.target.dataset.composing='1'; }}
                              onCompositionEnd={e=>{ delete e.target.dataset.composing; }}
                              onKeyDown={e=>{ if(e.currentTarget.dataset.composing) return; handleKeyDown(e,di,ci); }}
                              style={{
                                width:"100%", boxSizing:"border-box", padding:"6px 8px",
                                border:"none", borderRadius:0, fontSize:13, textAlign:"center",
                                fontFamily:"inherit", outline:"none",
                                background:isAnomaly?"#FBE9E7":isActive?accent+"1f":"transparent",
                                boxShadow:isActive?`inset 0 0 0 2px ${accent}`:"none",
                                fontWeight:isActive?700:400,
                                color:day.isWeekend?"#A09AAB":isAnomaly?"#B05A60":"inherit",
                                transition:"background .1s, box-shadow .1s",
                              }}
                            />
                          </td>
                        );
                      })
                    )}
                    <td style={{ padding:"4px 10px", textAlign:"right", fontWeight:600, color:dt.sell>0?accent:"#DEDAE5", borderLeft:"1px solid #C9C0D6", borderRight:"1px solid #DEDAE5", fontSize:12 }}>
                      {dt.sell>0?fmt(dt.sell):"—"}
                    </td>
                    <td style={{ padding:"4px 10px", textAlign:"right", fontSize:12, color:dt.pay>0?"#393443":"#DEDAE5", borderRight:"1px solid #DEDAE5" }}>
                      {dt.pay>0?fmt(dt.pay):"—"}
                    </td>
                    <td style={{ padding:"4px 10px", textAlign:"right", fontWeight:600, color:(dt.sell>0||dt.pay>0)?(dt.profit<0?"#B05A60":"#6E9E78"):"#DEDAE5", fontSize:12 }}>
                      {(dt.sell>0||dt.pay>0)?fmt(dt.profit):"—"}
                    </td>
                    <td style={{ padding:"4px 8px", textAlign:"center", borderLeft:"1px solid #DEDAE5", fontSize:13 }}>
                      {rowFilled?<span style={{ color:"#6E9E78", fontWeight:700 }}>✓</span>
                       :rowPartial?<span style={{ color:"#C39A52" }}>…</span>:null}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ background:"var(--jt-base)", borderTop:"1px solid #C9C0D6" }}>
                <td style={{ padding:"8px 12px", fontWeight:700, fontSize:12, color:"var(--jt-text)", borderRight:"1px solid var(--jt-line)", position:"sticky", left:0, background:"var(--jt-base)" }}>月次合計</td>
                {colTotals.map((col,ci)=>{
                  const dri=Math.floor(ci/nR), ri=ci%nR;
                  return (
                    <td key={ci} style={{ padding:"7px 6px", textAlign:"center", fontWeight:700, color:col.vol>0?"var(--jt-text)":"var(--jt-text-mute)", fontSize:13, borderLeft:ri===0&&dri>0?"1px solid var(--jt-line)":"none" }}>
                      {col.vol>0?col.vol:"—"}
                    </td>
                  );
                })}
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.sell>0?accent:"var(--jt-text-mute)", borderLeft:"1px solid #C9C0D6" }}>{monthTotals.sell>0?fmt(monthTotals.sell):"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.pay>0?"var(--jt-text)":"var(--jt-text-mute)" }}>{monthTotals.pay>0?fmt(monthTotals.pay):"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:(monthTotals.sell>0||monthTotals.pay>0)?(monthTotals.profit<0?"var(--jt-alert)":"#6E9E78"):"var(--jt-text-mute)" }}>{(monthTotals.sell>0||monthTotals.pay>0)?fmt(monthTotals.profit):"—"}</td>
                <td style={{ borderLeft:"1px solid #DEDAE5" }}/>
              </tr>
              <tr style={{ background:"var(--jt-base)", borderTop:"1px solid var(--jt-line)" }}>
                <td style={{ padding:"6px 12px", fontSize:10, color:"var(--jt-text-mute)", borderRight:"1px solid var(--jt-line)", position:"sticky", left:0, background:"var(--jt-base)" }}>ドライバー別売上</td>
                {colTotals.map((col,ci)=>{
                  const dri=Math.floor(ci/nR), ri=ci%nR;
                  return (
                    <td key={ci} style={{ padding:"5px 6px", textAlign:"center", fontSize:10, color:"var(--jt-text-sub)", borderLeft:ri===0&&dri>0?"1px solid var(--jt-line)":"none" }}>
                      {col.sell>0?fmt(col.sell):""}
                    </td>
                  );
                })}
                <td colSpan={3} style={{ borderLeft:"1px solid #C9C0D6" }}/>
                <td style={{ borderLeft:"1px solid #DEDAE5" }}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </Card>

      {/* アクションボタン */}
      <div style={{ display:"flex", gap:10, marginTop:12 }}>
        <div
          style={{ flex:2, padding:"12px", background:"var(--jt-base)", color:saved?"#6E9E78":"#8C6A2E", border:"none", borderRadius:7, fontWeight:600, fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", gap:8, boxShadow:"var(--jt-raised-sm)" }}>
          {saved
            ? <><Ic name="check" size={16} color="#6E9E78" strokeWidth={2.5}/> 自動保存済み（Supabase）</>
            : <><span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:"#C39A52" }}/> 保存中…</>
          }
        </div>
        <button onClick={handleCSV}
          style={{ flex:1, padding:"12px 16px", border:"none", background:"var(--jt-base)", color:"var(--jt-text-sub)", borderRadius:7, fontWeight:600, fontSize:13, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>
          CSVエクスポート
        </button>
        {confirmClear ? (
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <span style={{ fontSize:12, color:"var(--jt-alert)" }}>クリアしますか？</span>
            <button onClick={async ()=>{
              // 保留中の自動保存タイマーをキャンセル（クリア直後にSupabaseへ再upsertされるのを防ぐ）
              Object.values(saveTimers.current).forEach(clearTimeout);
              saveTimers.current = {};
              // localStorage(jt_daily_edits) から当該荷主×当月（締め期間）分を削除
              setDailyEdits(prev => {
                const cid = selClient?.id;
                if (!cid || !prev[cid]) return prev;
                const next = { ...prev };
                const cur = { ...next[cid] };
                Object.keys(cur).forEach(ds => { if (ds >= bStartStr && ds <= bEndStr) delete cur[ds]; });
                if (Object.keys(cur).length) next[cid] = cur; else delete next[cid];
                return next;
              });
              setEntries({});
              setConfirmClear(false);
              // Supabase(jt_daily_entries) の該当行も削除
              if (window.sb && selClient?.id) {
                const { error } = await window.sb.from("jt_daily_entries").delete()
                  .eq("client_id", selClient.id)
                  .gte("entry_date", bStartStr).lte("entry_date", bEndStr);
                if (error) { setSaved(false); showToast("Supabaseのクリアに失敗しました（画面・端末のみクリア）", "error"); return; }
              }
              setSaved(true);
              showToast("当月の入力をクリアしました");
            }}
              style={{ padding:"10px 14px", background:"var(--jt-alert)", color:"#fff", border:"none", borderRadius:7, fontWeight:600, fontSize:12, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>確認</button>
            <button onClick={()=>setConfirmClear(false)}
              style={{ padding:"10px 14px", border:"none", background:"var(--jt-base)", color:"var(--jt-text-sub)", borderRadius:7, fontWeight:600, fontSize:12, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>キャンセル</button>
          </div>
        ) : (
          <button onClick={()=>setConfirmClear(true)}
            style={{ padding:"12px 16px", border:"none", background:"var(--jt-base)", color:"var(--jt-alert)", borderRadius:7, fontWeight:600, fontSize:13, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>
            クリア
          </button>
        )}
      </div>
    </div>
  );
};

const Dashboard = ({ accent, setPage }) => {
  const drivers = driversLive();
  // 担当荷主は client側の実効担当（jt_client_driver_overrides）から導出（DriversPage/DispatchPageと一致・追加ドライバーや担当変更に追従）
  const driverClientsLive = (did) => allClientsLive().filter(c => driversOfClient(c).includes(did)).map(c => c.name);
  // 「自動更新」表示の通り、時計を30秒ごとに更新する
  const [now, setNow] = React.useState(() => new Date());
  React.useEffect(() => { const t = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(t); }, []);
  const days = ["日","月","火","水","木","金","土"];
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
  const timeStr = now.toTimeString().slice(0,5);
  // 日次入力の編集を反映するために live aggregation を行う
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  const liveAgg = monthAgg(REF_MONTH, dailyEdits);
  const totalSell   = liveAgg.sell;
  const totalPay    = liveAgg.pay;
  const totalProfit = liveAgg.profit;
  const monthlyActuals = allClientsLive().map(c => {
    const h = cm(c.id, REF_MONTH, dailyEdits);
    return { clientId: c.id, name: c.name, sell: h.s, pay: h.p, profit: h.s - h.p };
  });
  // 表示用フォールバック（今月実績がなければ最新確定月）
  const monthlyDisplay = totalSell > 0 ? monthlyActuals : allClientsLive().map(c => {
    const h = cm(c.id, LATEST_DATA_MONTH, dailyEdits);
    return { clientId: c.id, name: c.name, sell: h.s, pay: h.p, profit: h.s - h.p };
  });
  const margin = totalSell>0?(totalProfit/totalSell*100).toFixed(1):0;
  // バー幅の分母は「表示中の月」の合計（フォールバック表示時は totalSell=0 のため 0除算になる）
  const dispTotalSell = monthlyDisplay.reduce((s,r)=>s+r.sell,0);

  // 本日の運行状況：車両ステータス（車両管理）＋本日の日次実績（dailyActuals + jt_daily_edits）から実算出
  const vehicleMaster = vehiclesLive();
  const _pad2 = (n)=>String(n).padStart(2,"0");
  const TODAY_STR = `${now.getFullYear()}-${_pad2(now.getMonth()+1)}-${_pad2(now.getDate())}`;
  const activeVeh = vehicleMaster.filter(v=>v.status==="稼働中").length;
  const maintVeh  = vehicleMaster.filter(v=>v.status==="整備中").length;
  const todayOps = (()=>{
    let haikan=0, modori=0; const byDriver={};
    allClientsLive().forEach(c=>{
      const base=(typeof dailyActuals!=="undefined" && dailyActuals[c.id] && dailyActuals[c.id][TODAY_STR])||{};
      const ed=(dailyEdits[c.id] && dailyEdits[c.id][TODAY_STR])||{};
      const merged={}; [base,ed].forEach(src=>Object.entries(src).forEach(([drv,cats])=>{ merged[drv]={...(merged[drv]||{}),...cats}; }));
      Object.entries(merged).forEach(([drv,cats])=>Object.entries(cats).forEach(([cat,n])=>{
        const v=Number(n)||0; if(!v) return;
        byDriver[drv]=byDriver[drv]||{cnt:0,modori:0,clients:new Set()};
        if(cat.indexOf("持戻")>=0){ modori+=v; byDriver[drv].modori+=v; }
        else { haikan+=v; byDriver[drv].cnt+=v; }
        byDriver[drv].clients.add(c.name);
      }));
    });
    return { haikan, modori, byDriver };
  })();
  const todayDriverRows = Object.entries(todayOps.byDriver).map(([drv,x])=>{
    const d=drivers.find(dr=>dr.id===drv)||{}; return { id:drv, name:d.name||drv, clients:[...x.clients].join("・")||"—", cnt:x.cnt, modori:x.modori };
  }).filter(r=>r.cnt>0||r.modori>0).sort((a,b)=>b.cnt-a.cnt);

  // 請求管理（jt_issued）で発行済にした請求書は「未請求」から、入金消込（jt_paid）済みは「未請求」「入金遅延」から除外（実効ステータスを請求管理と揃える）
  const [issuedArr] = useLocalStorage("jt_issued", []);
  const [paidArr] = useLocalStorage("jt_paid", []);
  const pendingList = invoices.filter(i=>i.status==="未請求" && !issuedArr.includes(i.id) && !paidArr.includes(i.id));
  // 金額は請求管理の subtotalFor と同じく日次実績（dailyActuals+dailyEdits）優先で算出し、KPIを両画面で一致させる
  const _invAmount = (i) => {
    const c = allClientsLive().find(x => x.name === i.client);
    const mk = (i.period && /^\d{4}-\d{2}/.test(i.period)) ? i.period.slice(0,7) : LATEST_DATA_MONTH;
    const live = c ? computeLiveSum(c.id, mk, dailyEdits) : null;
    return (live && live.s > 0) ? live.s : i.amount;
  };
  const pendingInv = pendingList.reduce((s,i)=>s+_invAmount(i),0);
  const delayedList = invoices.filter(i=>i.status==="遅延" && !paidArr.includes(i.id));
  const delayedInv = delayedList.reduce((s,i)=>s+_invAmount(i),0);
  // 入金遅延カードのサブ文言は実際の遅延請求（荷主名＋対象月）から動的生成する（ハードコード排除）
  const _delayedHead = delayedList[0];
  const _delayedMo = _delayedHead && /^\d{4}-\d{2}/.test(_delayedHead.period||"") ? Number(_delayedHead.period.slice(5,7)) : null;
  const delayedSub = delayedList.length>0
    ? `${_delayedHead.client}${_delayedMo?` ${_delayedMo}月分`:""}${delayedList.length>1?` 他${delayedList.length-1}件`:""} → 請求管理`
    : "遅延なし → 請求管理";

  // お知らせ既読状態・追加投稿（AnnouncePage / ヘッダーのベルと localStorage を共有）
  const [announceReadIds] = useLocalStorage("jt_announce_read_ids", announces.filter(a=>!a.unread).map(a=>a.id));
  const [extraAnnounces] = useLocalStorage("jt_extra_announces", []);
  const dashAnnounces = [...extraAnnounces, ...announces];

  // 承認待ちカード: 実申請（jt_applications・ApplyPageと共有）のみ。「確認」で承認済みへ更新（固定デモ行は撤去＝実態反映）
  const [apps, setApps] = useLocalStorage("jt_applications", []);
  const _refMonthNum = Number(REF_MONTH.split("-")[1]);
  const pendingApprovals = [
    ...apps.filter(a=>a.status==="承認待ち").map(a=>{ const p=(a.date||"").split("-"); return { id:a.id, name:a.applicant||TWEAK_DEFAULTS.userName, type:a.type, date:p.length===3?`${Number(p[1])}/${Number(p[2])}`:a.date, urgent:false, isApp:true }; }),
  ];

  return (

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>

          <div style={{ fontSize:12, color:"#645F6E", marginBottom:3 }}>{dateStr}</div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>概況</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"#393443" }}>経営ダッシュボード</div>
          <div style={{ fontSize:11.5, color:"#645F6E", marginTop:3 }}>業務の全体把握・通知ボード ／ 経営判断は <span style={{ color:accent, fontWeight:600, cursor:"pointer", textDecoration:"underline" }} onClick={()=>setPage("pl")}>収支管理</span> へ</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:28, fontWeight:300, letterSpacing:2, color:"#393443" }}>{timeStr}</div>
          <div style={{ fontSize:11, color:"#645F6E" }}>自動更新</div>

      {/* 財務KPI */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:14 }}>
        {[
          { l:`今月売上（${REF_MONTH_LABEL}）`, v:fmt(totalSell),   sub:totalSell>0?"全11荷主合算 → 詳細は収支管理":`実績未入力。最新確定: ${LATEST_MONTH_LABEL} → 収支管理`, c:accent,    pg:"pl" },
          { l:`今月粗利（${REF_MONTH_LABEL}）`, v:fmt(totalProfit), sub:totalSell>0?`粗利率 ${margin}% → 収支管理`:"— → 収支管理",   c:"#6E9E78", pg:"pl" },

          { l:"入金遅延",         v:fmt(delayedInv),  sub:delayedSub,   c:"#B05A60", pg:"invoice" },

          <Card key={l} style={{ padding:"16px 18px", cursor:"pointer" }} onClick={()=>setPage(pg)}

            <div style={{ fontSize:11, color:"#A09AAB", marginBottom:6 }}>{l}</div>
            <div style={{ fontSize:26, fontWeight:700, letterSpacing:"-0.01em", color:c, lineHeight:1 }}>{v}</div>
            <div style={{ fontSize:11.5, color:"#645F6E", marginTop:5 }}>{sub}</div>
          </Card>
        ))}
      </div>

      {/* 経営グラフ行（実データ・テーマ連動）: 売上推移 ＋ 荷主別粗利ランキング */}
      <div style={{ display:"grid", gridTemplateColumns:"1.5fr 1fr", gap:14, marginBottom:14 }}>
        <Card>
          <SH title="月次売上推移（直近12ヶ月）" action="収支詳細→" onAction={()=>setPage("pl")}/>
          <div style={{ padding:"4px 16px 16px" }}><SalesTrendChart dailyEdits={dailyEdits}/></div>
        </Card>
        <Card>
          <SH title={`荷主別 粗利貢献（${totalSell>0?REF_MONTH_LABEL:"最新確定 "+LATEST_MONTH_LABEL}）`} action="収支詳細→" onAction={()=>setPage("pl")}/>
          <div style={{ padding:"4px 16px 16px" }}><ClientProfitChart dailyEdits={dailyEdits}/></div>
        </Card>
      </div>

      {/* Row 2 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, marginBottom:14 }}>

        {/* 荷主別売上 */}

          <SH title={`荷主別 今月売上（${totalSell>0?REF_MONTH_LABEL:"最新確定 "+LATEST_MONTH_LABEL+" を表示"}）`} action="収支詳細→" onAction={()=>setPage("pl")}/>
          <div style={{ padding:"12px 20px" }}>
            {[...monthlyDisplay].filter(r=>r.sell>0).sort((a,b)=>b.sell-a.sell).map((r,i)=>{
              const rate = r.sell>0?(r.profit/r.sell*100).toFixed(0):0;
              return (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, fontSize:13 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                      <span style={{ fontWeight:500 }}>{r.name}</span>
                      <span style={{ fontWeight:700 }}>{fmt(r.sell)}</span>
                    </div>
                    <div style={{ height:3, background:"var(--jt-base)", borderRadius:2 }}>
                      <div style={{ width: dispTotalSell>0 ? `${(r.sell/dispTotalSell)*100}%` : 0, height:"100%", background:accent+"80", borderRadius:2 }}/>
                    </div>
                  </div>
                  <span style={{ fontSize:11, color: Number(rate)>=30?"#6E9E78":Number(rate)>=20?accent:"#C39A52", fontWeight:600, marginLeft:8, width:32, textAlign:"right" }}>{rate}%</span>
                </div>
              );
            })}
          </div>
        </Card>

        {/* お知らせ */}
        <Card>
          <SH title="お知らせ" action="すべて→" onAction={()=>setPage("announce")}/>
          <div style={{ padding:"6px 0" }}>
            {dashAnnounces.map(a=>{
              const unread = !announceReadIds.includes(a.id);
              return (
              <div key={a.id} style={{ display:"flex", gap:8, padding:"9px 20px", cursor:"pointer" }}
                onClick={()=>setPage("announce")}
                onMouseEnter={e=>e.currentTarget.style.background="var(--jt-base)"}

                  <div style={{ fontSize:13, fontWeight:unread?600:400, color:unread?"#393443":"#645F6E", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{a.title}</div>
                  <div style={{ fontSize:11, color:"#645F6E", marginTop:2, display:"flex", gap:6 }}>
                    <span>{a.date}</span><StatusBadge label={a.cat}/>
                  </div>
                </div>
              </div>

        {/* クイックアクセス */}
        <Card>
          <SH title="クイックアクセス"/>
          <div style={{ padding:"8px 0" }}>
            {[
              { id:"pl",          icon:"chart",    label:"収支管理",           sub:"月次P&L・粗利率" },
              { id:"invoice",     icon:"invoice",  label:"請求管理",           sub:"未請求・督促" },
              { id:"driverfinance",icon:"money",   label:"ドライバー別収支",    sub:"支払・按分計算" },
              { id:"daily",       icon:"edit",     label:"日次実績入力",        sub:"Excel代替入力" },
              { id:"ratemaster",  icon:"tag",      label:"単価マスタ",          sub:"売単価・支払単価" },
              { id:"clients",     icon:"building", label:"案件管理",           sub:"荷主・案件一覧" },
              { id:"drivers",     icon:"users",    label:"ドライバー管理",      sub:"自社・協力会社" },
              { id:"faq",         icon:"question", label:"FAQ",               sub:"よくある質問" },
            ].map((item,i)=>(
              <button key={i} onClick={()=>setPage(item.id)}

                onMouseEnter={e=>e.currentTarget.style.background="#EFEDF3"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>

                  <Ic name={item.icon} size={14} color={accent}/>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:600, fontSize:13 }}>{item.label}</div>
                  <div style={{ fontSize:11, color:"#645F6E" }}>{item.sub}</div>
                </div>
                <Ic name="chevronR" size={12} color="#DEDAE5"/>
              </button>
            ))}
          </div>
        </Card>
      </div>

      {/* Row 3: 本日の運行状況 + 承認待ち */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 360px", gap:14, marginBottom:14 }}>
        <Card>
          <SH title="本日の運行状況" action="車両管理→" onAction={()=>setPage("vehicles")}/>
          <div style={{ padding:"0 20px 16px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:16 }}>
              {[
                { l:"稼働車両", v:activeVeh, c:"#6E9E78" },
                { l:"整備中",   v:maintVeh,  c:"#C39A52" },
                { l:"本日 配完", v:todayOps.haikan, c:accent },
                { l:"本日 持戻", v:todayOps.modori, c:"#B05A60" },
              ].map(s=>(
                <div key={s.l} style={{ background:"var(--jt-base)", borderRadius:8, padding:"12px", textAlign:"center", boxShadow:"var(--jt-inset)" }}>
                  <div style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.01em", color:s.c }}>{s.v}</div>
                  <div style={{ fontSize:11, color:s.c, fontWeight:500, marginTop:2 }}>{s.l}</div>
                </div>
              ))}
            </div>
            {todayDriverRows.length===0 ? (
              <div style={{ padding:"18px 0", textAlign:"center", fontSize:12, color:"var(--jt-text-mute)" }}>本日（{TODAY_STR}）の運行データはまだありません</div>
            ) : todayDriverRows.map((r,i)=>(
              <div key={r.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"9px 0", borderBottom:i<todayDriverRows.length-1?"1px solid #DEDAE5":"none" }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>{r.name}<span style={{ fontSize:11, color:"#A09AAB", fontWeight:400, marginLeft:6 }}>{r.clients}</span></div>
                </div>
                {r.modori>0 && <span style={{ padding:"2px 7px", borderRadius:4, fontSize:11, fontWeight:600, background:"#F3E6E3", color:"#B05A60", flexShrink:0 }}>持戻 {r.modori}</span>}
                <span style={{ fontSize:13, fontWeight:700, flexShrink:0 }}>{r.cnt}<span style={{ fontSize:11, color:"#A09AAB", fontWeight:400 }}> 件</span></span>
              </div>
            ))}
          </div>
        </Card>

        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <Card>
            <SH title="承認待ち" action="申請→" onAction={()=>setPage("apply")}/>
            <div style={{ padding:"4px 0 8px" }}>
              {pendingApprovals.length===0 && (
                <div style={{ padding:"14px 20px", fontSize:12, color:"#A09AAB", textAlign:"center" }}>承認待ちの申請はありません</div>
              )}
              {pendingApprovals.map((a,i)=>(
                <div key={a.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 20px", borderBottom:i<pendingApprovals.length-1?"1px solid #DEDAE5":"none" }}>
                  <Avatar name={a.name} size={26} bg="#EDEBF1" color="#645F6E"/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
                      {a.name}
                      {a.urgent && <span style={{ fontSize:9, fontWeight:700, background:"#fee2e2", color:"#B05A60", padding:"1px 5px", borderRadius:3 }}>至急</span>}
                    </div>
                    <div style={{ fontSize:11, color:"#A09AAB" }}>{a.type} · {a.date}</div>
                  </div>
                  <button onClick={()=>{
                    setApps(s=>s.map(x=>x.id===a.id?{...x,status:"承認済み"}:x));
                    showToast(a.name+" の「"+a.type+"」を承認しました");
                  }} style={{ padding:"5px 10px", border:"none", borderRadius:13, background:"var(--jt-base)", color:"var(--jt-accent)", fontSize:11, fontWeight:600, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>確認</button>
                </div>
              ))}
            </div>
          </Card>

          <Card>
            <SH title="今月のアクション" />
            <div style={{ padding:"8px 20px 16px" }}>
              {[
                { done:true,  label:`${_refMonthNum}月分請求書 発行（ASKUL）` },
                { done:true,  label:`${_refMonthNum}月分請求書 発行（Bloomee）` },
                { done:false, label:`${_refMonthNum}月分請求書 発行（タイヤ配送）` },
                { done:false, label:"ドライバー支払明細 作成" },
                { done:false, label:"月次収支レポート 提出" },
              ].map((t,i)=>(
                <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"7px 0", borderBottom:i<4?"1px solid #DEDAE5":"none" }}>
                  <div style={{ width:18, height:18, borderRadius:4, border:`1.5px solid ${t.done?"var(--jt-accent)":"var(--jt-line-dk)"}`, background:t.done?"var(--jt-accent)":"var(--jt-base)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    {t.done && <Ic name="check" size={11} color="#fff" strokeWidth={3}/>}
                  </div>
                  <span style={{ fontSize:12.5, color:t.done?"#645F6E":"#393443", textDecoration:t.done?"line-through":"none" }}>{t.label}</span>
                </div>
              ))}
            </div>
          </Card>
        </div>
      </div>

      {/* Row 4: ドライバー支払サマリー */}
      <Card>
        <SH title={`ドライバー別 支払サマリー（${totalSell>0?"今月速報":"最新確定 "+LATEST_MONTH_LABEL+" を表示"}）`} action="詳細→" onAction={()=>setPage("driverfinance")}/>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"var(--jt-accent-lt)", borderBottom:"1px solid #DEDAE5" }}>
              {["ドライバー","雇用形態","担当荷主","売上","支払(税抜)","粗利貢献","ステータス"].map(h=>(
                <th key={h} style={{ padding:"8px 14px", textAlign:"left", color:"#645F6E", fontWeight:500, fontSize:11.5, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {drivers.map((d,i)=>{
              const stmt = buildDriverStatement(d, dailyEdits, displayMonthForPay(dailyEdits));
              const sellD = stmt.totalSell, payD = stmt.totalPay;
              return (
                <tr key={i} style={{ borderBottom:"1px solid #DEDAE5" }}>
                  <td style={{ padding:"10px 14px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                      <Avatar name={d.name} size={26} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                      <span style={{ fontWeight:600 }}>{d.name}</span>
                    </div>
                  </td>
                  <td style={{ padding:"10px 14px" }}><StatusBadge label={d.type}/></td>
                  <td style={{ padding:"10px 14px", fontSize:12, color:"#645F6E" }}>{d.clients.slice(0,2).join(", ")}{d.clients.length>2?` 他${d.clients.length-2}社`:""}  </td>
                  <td style={{ padding:"10px 14px", fontWeight:600, color:accent }}>{sellD>0?fmt(sellD):"—"}</td>
                  <td style={{ padding:"10px 14px", fontWeight:600 }}>{payD>0?fmt(payD):"—"}</td>
                  <td style={{ padding:"10px 14px", color:"#6E9E78", fontWeight:600 }}>{sellD>0?fmt(sellD-payD):"—"}</td>
                  <td style={{ padding:"10px 14px" }}>
                    {sellD>0
                      ? <span style={{ padding:"2px 8px", borderRadius:4, fontSize:11.5, fontWeight:600, background:"#F2EBDC", color:"#8C6A2E" }}>未払</span>
                      : <span style={{ padding:"2px 8px", borderRadius:13, fontSize:11.5, fontWeight:600, background:"var(--jt-base)", color:"var(--jt-text-sub)" }}>実績なし</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

// ── その他のページ（簡易） ─────────────────────────────────────────────────
const AnnouncePage = ({ accent }) => {
  const [filter, setFilter] = React.useState("すべて");
  const [readIds, setReadIds] = useLocalStorage("jt_announce_read_ids", announces.filter(a=>!a.unread).map(a=>a.id));
  const [openId, setOpenId] = React.useState(null);
  const [showForm, setShowForm] = React.useState(false);
  const [newPost, setNewPost] = React.useState({ title:"", cat:"運行", body:"" });
  const [extraPosts, setExtraPosts] = useLocalStorage("jt_extra_announces", []);
  const cats = ["すべて","重要","請求","運行","支払","人事","規程"];
  // 新規投稿(extraPosts)を先頭に表示 → 「明日は全員休み」など即時周知すべき投稿が埋もれない
  const allAnnounces = [...extraPosts, ...announces];
  const list = filter==="すべて" ? allAnnounces : allAnnounces.filter(a=>a.cat===filter);
  const unreadCount = allAnnounces.filter(a=>!readIds.includes(a.id)).length;

  const toggleOpen = (id) => {
    setOpenId(openId===id ? null : id);
    setReadIds(p => p.includes(id) ? p : [...p, id]);
  };

  const submitPost = () => {
    if (!newPost.title.trim()) return;
    const now = new Date();
    const mm = String(now.getMonth()+1).padStart(2,"0");
    const dd = String(now.getDate()).padStart(2,"0");
    const id = Date.now();
    setExtraPosts(p=>[{ id, title:newPost.title, cat:newPost.cat, body:newPost.body, date:`${mm}/${dd}` }, ...p]);
    // 投稿者本人には既読扱いにする（既読管理は readIds ベースのため id を追加）
    setReadIds(p=>p.includes(id) ? p : [...p, id]);
    setNewPost({ title:"", cat:"運行", body:"" });
    setShowForm(false);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div>
            <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>概況</div>
            <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"#393443" }}>お知らせ</div>
          </div>
          {unreadCount>0 && <span style={{ background:"var(--jt-accent)", color:"#fff", borderRadius:99, fontSize:11, padding:"2px 8px", fontWeight:700 }}>未読 {unreadCount}</span>}
        </div>
        <button onClick={()=>setShowForm(!showForm)}
          style={{ padding:"7px 16px", background:showForm?"var(--jt-base)":"var(--jt-accent-grad)", color:showForm?"var(--jt-text-sub)":"#fff", border:"none", borderRadius:13, fontSize:13, fontWeight:showForm?600:700, display:"flex", alignItems:"center", gap:6, boxShadow:showForm?"none":"var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)" }}>
          <Ic name="plus" size={13} color={showForm?"#5C5766":"#fff"}/>{showForm?"キャンセル":"新規投稿"}
        </button>
      </div>

      {showForm && (
        <Card style={{ padding:20, marginBottom:20, border:`1.5px solid ${accent}30` }}>
          <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>新規お知らせ投稿</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:12, marginBottom:12 }}>
            <input value={newPost.title} onChange={e=>setNewPost(p=>({...p,title:e.target.value}))} placeholder="タイトル"
              style={{ padding:"8px 12px", border:"none", background:"var(--jt-base)", boxShadow:"var(--jt-inset-sm)", borderRadius:13, fontSize:13, fontFamily:"inherit", outline:"none" }}/>
            <select value={newPost.cat} onChange={e=>setNewPost(p=>({...p,cat:e.target.value}))}
              style={{ padding:"8px 12px", border:"none", background:"var(--jt-base)", boxShadow:"var(--jt-inset-sm)", borderRadius:13, fontSize:13, fontFamily:"inherit", outline:"none" }}>
              {["重要","請求","運行","支払","人事","規程"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <textarea value={newPost.body} onChange={e=>setNewPost(p=>({...p,body:e.target.value}))} placeholder="本文（任意）"
            style={{ width:"100%", padding:"8px 12px", border:"none", background:"var(--jt-base)", boxShadow:"var(--jt-inset-sm)", borderRadius:13, fontSize:13, fontFamily:"inherit", resize:"vertical", minHeight:80, outline:"none", marginBottom:12 }}/>
          <button onClick={submitPost}
            style={{ padding:"8px 20px", background:"var(--jt-accent-grad)", color:"#fff", border:"none", borderRadius:13, fontSize:13, fontWeight:700, boxShadow:"var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)" }}>投稿する</button>
        </Card>
      )}

      <div style={{ display:"flex", gap:6, marginBottom:18 }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)}
            style={{ padding:"5px 14px", borderRadius:20, border:"none", background:"var(--jt-base)", color:filter===c?"var(--jt-accent)":"var(--jt-text-sub)", fontSize:13, fontWeight:filter===c?600:400, boxShadow:filter===c?"var(--jt-inset)":"var(--jt-raised-sm)" }}>{c}</button>
        ))}
      </div>

      <Card>
        {list.map((a,i)=>{
          const isRead = readIds.includes(a.id);
          const isOpen = openId === a.id;
          return (
            <div key={a.id} style={{ borderBottom:i<list.length-1?"1px solid var(--jt-line)":"none" }}>
              <div onClick={()=>toggleOpen(a.id)}
                style={{ display:"flex", gap:14, padding:"16px 20px", cursor:"pointer", borderLeft:isRead?"3px solid transparent":"3px solid var(--jt-accent)", background:isOpen?"var(--jt-base)":"transparent", transition:"background .1s" }}
                onMouseEnter={e=>{ if(!isOpen) e.currentTarget.style.background="var(--jt-base)"; }}
                onMouseLeave={e=>{ if(!isOpen) e.currentTarget.style.background="transparent"; }}>
                <div style={{ flex:1 }}>

                </div>
              )}
            </div>
          );
        })}
      </Card>
    </div>
  );
};

  ]);

    { name:"中村 七郎",  done:6, total:6 },
    { name:"小林 八郎",  done:4, total:6 },
    { name:"加藤 九郎",  done:5, total:6 },
    { name:"吉田 十郎",  done:6, total:6 },
  ];

  const alcoholHistory = [
    { date:"04/30（水）", results:"10/10名 異常なし" },
    { date:"04/29（火）", results:"9/9名 異常なし（田中ドライバー休日）" },
    { date:"04/28（月）", results:"10/10名 異常なし" },
    { date:"04/25（金）", results:"10/10名 異常なし" },
    { date:"04/24（木）", results:"10/10名 異常なし" },
  ];

  const submitIncident = () => {
    if (!incident.driver || !incident.detail) return;
    setIncidents(p=>[{ id:Date.now(), ...incident, resolved:false }, ...p]);
    setSubmittedIncident(true);
    setTimeout(()=>{ setSubmittedIncident(false); setShowIncidentForm(false); setIncident({ date: todayLocal(), driver:"", type:"ヒヤリハット", detail:"", location:"" }); }, 2000);
  };

  // 今月ヒヤリハットKPI: 当月(REF_MONTH)基準。当月0件時は最新記録月へフォールバックし月名を表示
  const _incMonth = incidents.some(i=>i.date.startsWith(REF_MONTH)) ? REF_MONTH : (incidents.map(i=>i.date.slice(0,7)).sort().pop() || REF_MONTH);
  const _incCount = incidents.filter(i=>i.date.startsWith(_incMonth)).length;
  const _incPrev = (()=>{ const d = new Date(+_incMonth.slice(0,4), +_incMonth.slice(5,7)-2, 1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; })();
  const _incDiff = _incCount - incidents.filter(i=>i.date.startsWith(_incPrev)).length;
  // 連続無事故日数: 当日(実機日付)起点、物損事故・人身事故の記録でリセット。今月ヒヤリハットと時間基準を統一
  const _safetyToday = (()=>{ const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); })();
  const _accTs = incidents.filter(i=>i.type==="物損事故"||i.type==="人身事故").map(i=>new Date(i.date+"T00:00:00").getTime()).filter(t=>!isNaN(t));
  const _lastAccTs = _accTs.length ? Math.max(..._accTs) : (_safetyToday - 45*86400000); /* 事故記録が無い場合の既定=45日 */
  const noAccidentDays = Math.max(0, Math.floor((_safetyToday - _lastAccTs) / 86400000));

  return (
    <div>
      <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>荷主・人員管理</div>

      {/* KPIカード */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:20 }}>
        {[

                      </div>

          </Card>
        </div>
      ))}
    </div>
  );
};
