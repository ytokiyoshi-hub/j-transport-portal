                          <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:700 }}>{yen(m.subtotal)}</td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>

                <div className="jt-invoice-footer" style={{ marginTop:24, paddingTop:14, borderTop:"1px solid #94a3b8", fontSize:11.5 }}>

                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
};

// ── 荷主管理 ───────────────────────────────────────────────────────────────
const ClientPage = ({ accent, setPage }) => {
  const [sel, setSel] = React.useState(null);
  const [search, setSearch] = React.useState("");
  const [extraClients] = useLocalStorage("jt_extra_clients", []);
  // 締め日（請求サイクル）編集。単価マスタと同じ jt_cycle_overrides を共用
  const [cycleOverrides, setCycleOverrides] = useLocalStorage("jt_cycle_overrides", {});
  const cycleFor = (c) => (c && cycleOverrides[c.id]) || (c && c.billingCycle) || "—";
  // 上位荷主マスタ & 紐付けマップ
  const [parents] = useLocalStorage("jt_parent_clients", []);
  const [parentMap, setParentMap] = useLocalStorage("jt_client_parent_map", {});
  const assignParent = (clientId, parentId) => {
    const next = { ...parentMap };
    if (!parentId) delete next[clientId];
    else next[clientId] = parentId;
    setParentMap(next);
  };
  const list = [...clients, ...extraClients].filter(c=>c.name.includes(search)||c.area.includes(search));

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700 }}>荷主管理</div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>全{list.length}社（自社{clients.length}＋追加{extraClients.length}）</div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ position:"relative", display:"flex", alignItems:"center" }}>
            <div style={{ position:"absolute", left:10, pointerEvents:"none" }}><Ic name="search" size={13} color="#9ca3af"/></div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="荷主・エリア検索"
              style={{ paddingLeft:32, paddingRight:12, height:34, borderRadius:6, border:"1.5px solid #e5e7eb", fontSize:13, fontFamily:"inherit", outline:"none", width:200 }}/>
          </div>
          <button onClick={()=>setPage("ratemaster")} style={{ padding:"7px 14px", border:`1.5px solid ${accent}`, background:"#fff", color:accent, borderRadius:6, fontSize:13, fontWeight:600, cursor:"pointer" }}>単価マスタ</button>
          <button onClick={()=>{ try { sessionStorage.setItem("jt_open_add_client","1"); } catch(e){} setPage("ratemaster"); }}
            style={{ padding:"7px 16px", background:accent, color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
            <span style={{ fontSize:15, lineHeight:1 }}>＋</span> 新規荷主追加
          </button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns: sel?"1fr 360px":"1fr", gap:16 }}>
        <Card>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>
                {["荷主","上位荷主","エリア","請求体系","担当ドライバー","今月売上","今月粗利","状態"].map(h=>(
                  <th key={h} style={{ padding:"9px 14px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {list.map((c,i)=>{
                const act = monthlyDisplay.find(r=>r.name===c.name) || {};
                const parentId = parentMap[c.id];
                const parentObj = parentId ? parents.find(p=>p.id===parentId) : null;
                return (
                  <tr key={i} onClick={()=>setSel(sel?.id===c.id?null:c)}
                    style={{ borderBottom:"1px solid #94a3b8", cursor:"pointer", background:sel?.id===c.id?"#f0f9ff":"transparent", transition:"background .1s" }}>
                    <td style={{ padding:"12px 14px", fontWeight:700 }}>{c.name}</td>
                    <td style={{ padding:"12px 14px" }} onClick={e=>e.stopPropagation()}>
                      <select value={parentId || ""} onChange={e=>assignParent(c.id, e.target.value)}
                        style={{ padding:"3px 6px", border:`1px solid ${parentObj ? accent+"40" : "#fcd34d"}`, borderRadius:3, fontSize:11, background: parentObj ? accent+"08" : "#fffbeb", color:parentObj?accent:"#92400e", fontWeight:parentObj?600:500, maxWidth:160, cursor:"pointer" }}>
                        <option value="">— 未設定 —</option>
                        {parents.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                      </select>
                    </td>
                    <td style={{ padding:"12px 14px", color:"#6b7280", fontSize:12 }}>{c.area}</td>
                    <td style={{ padding:"12px 14px" }}><StatusBadge label={c.billing.replace("（2区分）","").replace("（3区分）","")}/></td>
                    <td style={{ padding:"12px 14px" }}>
                      <div style={{ display:"flex", gap:4 }}>
                        {c.drivers.slice(0,3).map(did => {
                          const d = drivers.find(dr=>dr.id===did) || {};
                          return d ? <div key={did} style={{ width:24, height:24, borderRadius:"50%", background:d.type==="自社"?"#dbeafe":"#ede9fe", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:d.type==="自社"?"#1e40af":"#5b21b6" }}>{d.name[0]}</div> : null;
                        })}
                        {c.drivers.length > 3 && <div style={{ width:24, height:24, borderRadius:"50%", background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#64748b" }}>+{c.drivers.length-3}</div>}
                      </div>
                    </td>

                <option value="">— 未設定 —</option>
                {parents.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              {parents.length === 0 && (
                <div style={{ fontSize:11, color:"#92400e", marginTop:6 }}>
                  ⚠ 上位荷主が未登録です。先に <button onClick={()=>setPage("parentclients")} style={{ background:"none", border:"none", color:accent, textDecoration:"underline", cursor:"pointer", padding:0, fontSize:11, fontWeight:600 }}>上位荷主管理</button> で登録してください。
                </div>

              {parentMap[sel.id] && (() => {
                const p = parents.find(x=>x.id===parentMap[sel.id]);
                if (!p) return null;
                return (
                  <div style={{ fontSize:11, color:"#6b7280", marginTop:6 }}>
                    {p.contact && <div>👤 {p.contact}</div>}
                    {p.tel && <div>📞 {p.tel}</div>}

                );

            </div>

            {/* 締め日（請求サイクル） */}
            <div style={{ background:"#f8fafc", borderRadius:6, padding:12, marginBottom:14, border:"1px solid #e5e7eb" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#6b7280", marginBottom:6 }}>締め日（請求サイクル）</div>
              <select value={cycleFor(sel)} onChange={e=>setCycleOverrides({ ...cycleOverrides, [sel.id]: e.target.value })}
                style={{ width:"100%", padding:"7px 10px", border:`1.5px solid ${accent}60`, borderRadius:5, fontSize:13, background:"#fff", color:"#374151", fontWeight:600, cursor:"pointer" }}>
                {(CYCLE_OPTIONS.includes(cycleFor(sel)) ? CYCLE_OPTIONS : [cycleFor(sel), ...CYCLE_OPTIONS]).map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <div style={{ fontSize:11, color:"#9ca3af", marginTop:6 }}>請求対象期間の計算に使われます（単価マスタと共通）</div>
            </div>

            <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:8 }}>単価一覧</div>
            {sel.rates.map((r,ri)=>(
              <div key={ri} style={{ display:"flex", justifyContent:"space-between", fontSize:13, padding:"7px 0", borderBottom:"1px solid #94a3b8" }}>
                <span style={{ color:"#374151" }}>{r.label}</span>
                <div style={{ textAlign:"right" }}>
                  <span style={{ fontWeight:700, color:accent }}>{r.sell>0?fmt(r.sell):"要確認"}</span>
                  <span style={{ color:"#9ca3af", fontSize:11, marginLeft:6 }}>→ 支払{r.pay>0?fmt(r.pay):"—"}</span>
                </div>
              </div>
            ))}
            {(() => {
              const act = monthlyDisplay.find(r=>r.name===sel.name) || {};
              if (!(act.sell>0)) return null;
              return (
                <div style={{ marginTop:16, background:"#f8fafc", borderRadius:6, padding:14 }}>
                  <div style={{ fontSize:11, color:"#9ca3af", marginBottom:8 }}>今月実績</div>
                  {[["売上",fmt(act.sell),accent],["支払",fmt(act.pay),"#374151"],["粗利",fmt(act.profit)+" ("+(act.sell>0?(act.profit/act.sell*100).toFixed(1):0)+"%)","#16a34a"]].map(([l,v,c])=>(
                    <div key={l} style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:5 }}>
                      <span style={{ color:"#6b7280" }}>{l}</span>
                      <span style={{ fontWeight:600, color:c }}>{v}</span>
                    </div>
                  ))}
                </div>
              );
            })()}
            <div style={{ marginTop:14, display:"flex", gap:8 }}>
              <button onClick={()=>setPage("invoice")} style={{ flex:1, padding:"9px", background:accent, color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:13 }}>請求書作成</button>
              <button onClick={()=>setPage("ratemaster")} style={{ flex:1, padding:"9px", border:"1px solid #94a3b8", background:"#fff", color:"#374151", borderRadius:6, fontSize:13 }}>単価編集</button>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
};

// ── 日次実績入力（罫線濃色化） ─────────────────────────────────────────────
const DailyInputPage = ({ accent }) => {
  const [scClients, setScClients] = React.useState(null);
  const [scDrivers, setScDrivers] = React.useState(null);
  const [extraClients] = useLocalStorage("jt_extra_clients", []);
  const [clientDriverOverrides] = useLocalStorage("jt_client_driver_overrides", {});
  const clientSrc = scClients ?? (extraClients.length ? [...clients, ...extraClients] : clients);
  const driverSrc = scDrivers ?? drivers;

  const [selClient, setSelClient] = React.useState(clientSrc[0]);
  const [monthYear, setMonthYear] = React.useState(REF_MONTH);
  const [entries, setEntries] = React.useState({});
  const [saved, setSaved] = React.useState(false);
  const [cycleOverrides] = useLocalStorage("jt_cycle_overrides", {});
  // 日次編集を localStorage に保持 → 収支管理など他ページに反映する
  const [dailyEdits, setDailyEdits] = useLocalStorage("jt_daily_edits", {});
  const [focusedCell, setFocusedCell] = React.useState(null);
  const [confirmClear, setConfirmClear] = React.useState(false);
  const inputRefs = React.useRef({});

  React.useEffect(() => {
    (async () => {
      const [{ data: cs }, { data: rates }, { data: cds }, { data: ds }] = await Promise.all([
        window.sb.from("jt_clients").select("*").order("id"),
        window.sb.from("jt_client_rates").select("*").order("sort_order"),
        window.sb.from("jt_client_drivers").select("*"),
        window.sb.from("jt_drivers").select("*").order("id"),
      ]);
      if (cs && rates && cds && ds) {
        const transformed = cs.map(c => ({
          id: c.id, name: c.name, area: c.area, billing: c.billing,
          billingCycle: c.billing_cycle, monthlyVol: c.monthly_vol || {},
          contact: c.contact, status: c.status,
          rates: rates.filter(r => r.client_id === c.id).map(r => ({
            label: r.label, sell: Number(r.sell), pay: Number(r.pay),
          })),
          drivers: cds.filter(cd => cd.client_id === c.id).map(cd => cd.driver_id),
        }));
        // 旧Supabaseマスタで実データ定数を上書きしない（収支・ダッシュと同一データ源に統一）
        void transformed; void ds;
        console.log("[Supabase] master fetch ignored; using embedded real data + dailyActuals");
      } else {
        console.warn("[Supabase] fetch failed, using hardcoded fallback");
      }
    })();
  }, []);

  React.useEffect(() => {
    if (scClients) {
      const updated = scClients.find(c => c.id === selClient?.id) || {};
      if (updated) setSelClient(updated);
    }
  }, [scClients]);

  const clientList = clientSrc.filter(c => c.billing !== "スポット");
  // 当月の billing period に実績があるドライバーを優先表示。実績ゼロは selClient.drivers から取る。
  // 当月実績ありドライバーがあれば、それだけを表示（左端の不要な空列を削る）。
  const _mYrParts = monthYear.split("-").map(Number);
  const _bsTmp = (() => {
    const [yr, mo] = _mYrParts;
    const cyc = (cycleOverrides && cycleOverrides[selClient?.id]) || selClient?.billingCycle || "翌月末締め";
    const cm = /翌月(\d+)日締め/.exec(cyc);
    if (cm) { const cd=parseInt(cm[1]); const prev=new Date(yr,mo-2,cd+1); const end=new Date(yr,mo-1,cd); return [prev,end]; }
    return [new Date(yr,mo-1,1), new Date(yr,mo,0)];
  })();
  const _bsStr = `${_bsTmp[0].getFullYear()}-${String(_bsTmp[0].getMonth()+1).padStart(2,"0")}-${String(_bsTmp[0].getDate()).padStart(2,"0")}`;
  const _beStr = `${_bsTmp[1].getFullYear()}-${String(_bsTmp[1].getMonth()+1).padStart(2,"0")}-${String(_bsTmp[1].getDate()).padStart(2,"0")}`;
  const _activeIds = new Set();
  if (typeof dailyActuals !== "undefined" && dailyActuals[selClient?.id]) {
    Object.entries(dailyActuals[selClient.id]).forEach(([d, day]) => {
      if (d < _bsStr || d > _beStr) return;
      Object.entries(day).forEach(([did, drv]) => {
        if (Object.values(drv).some(v => Number(v) > 0)) _activeIds.add(did);
      });
    });
  }
  const _selDrivers = (clientDriverOverrides && clientDriverOverrides[selClient?.id]) || selClient.drivers || [];
  const _allCandidates = driverSrc.filter(d => _selDrivers.includes(d.id) || (typeof dailyActuals!=="undefined" && dailyActuals[selClient.id] && Object.values(dailyActuals[selClient.id]).some(day=>day[d.id])));
  // 担当ドライバー未設定の荷主（追加直後の新規荷主など）は全ドライバーを入力対象にフォールバック
  const assignedDrivers = _activeIds.size > 0
    ? _allCandidates.filter(d => _activeIds.has(d.id))
    : (_allCandidates.length ? _allCandidates : driverSrc);
  const rates = effectiveClient(selClient).rates.filter(r => r.sell > 0 || r.pay > 0);
  const nD = assignedDrivers.length;
  const nR = rates.length;
  const nCols = nD * nR;

  const [yr, mo] = monthYear.split("-").map(Number);
  const _cycle = (cycleOverrides && cycleOverrides[selClient?.id]) || selClient?.billingCycle || "翌月末締め";
  const _cm = /翌月(\d+)日締め/.exec(_cycle);
  const _cutoff = _cm ? parseInt(_cm[1]) : null;
  const _fmtD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  let _bStart, _bEnd;
  if (_cutoff && _cutoff < 28) {
    _bStart = new Date(yr, mo-2, _cutoff+1);
    _bEnd = new Date(yr, mo-1, _cutoff);
  } else {
    _bStart = new Date(yr, mo-1, 1);
    _bEnd = new Date(yr, mo, 0);
  }
  const bStartStr = _fmtD(_bStart), bEndStr = _fmtD(_bEnd);
  const daysInMonth = Math.round((_bEnd - _bStart)/86400000) + 1;
  const dayRows = Array.from({length: daysInMonth}, (_, i) => {
    const date = new Date(_bStart); date.setDate(date.getDate()+i);
    const dow = date.getDay();
    return {
      d: date.getDate(),
      dateStr: _fmtD(date),
      dayName: ["日","月","火","水","木","金","土"][dow],
      dow, isWeekend: dow===0||dow===6, isSun: dow===0,
    };
  });

  const getVal = (dateStr, dId, rLabel) => entries[dateStr]?.[dId]?.[rLabel] ?? "";
  const saveTimers = React.useRef({});
  const setVal = (dateStr, dId, rLabel, v) => {
    setEntries(p => ({ ...p, [dateStr]: { ...(p[dateStr]||{}), [dId]: { ...((p[dateStr]||{})[dId]||{}), [rLabel]: v } } }));
    // localStorage の "jt_daily_edits" にも保存 → 収支管理・ダッシュボード等の他ページで即時反映
    setDailyEdits(prev => {
      const cid = selClient?.id;
      if (!cid) return prev;
      const next = { ...prev };
      next[cid] = { ...(next[cid] || {}) };
      next[cid][dateStr] = { ...(next[cid][dateStr] || {}) };
      next[cid][dateStr][dId] = { ...(next[cid][dateStr][dId] || {}) };
      next[cid][dateStr][dId][rLabel] = v;
      return next;
    });
    setSaved(false);
    const key = `${dateStr}|${dId}|${rLabel}`;
    if (saveTimers.current[key]) clearTimeout(saveTimers.current[key]);
    saveTimers.current[key] = setTimeout(async () => {
      delete saveTimers.current[key];
      if (!window.sb || !selClient?.id) return;
      const numV = v === "" ? null : Number(v);
      if (numV === null || isNaN(numV)) {
        await window.sb.from("jt_daily_entries").delete()
          .eq("entry_date", dateStr).eq("client_id", selClient.id)
          .eq("driver_id", dId).eq("rate_label", rLabel);
      } else {
        await window.sb.from("jt_daily_entries").upsert({
          entry_date: dateStr, client_id: selClient.id,
          driver_id: dId, rate_label: rLabel, value: numV,
        }, { onConflict: "entry_date,client_id,driver_id,rate_label" });
      }
      setSaved(true);
    }, 400);
  };

  // 月・荷主切替時に実績をロード（埋め込みdailyActuals → localStorage edits で上書き → Supabaseで上書き）
  React.useEffect(() => {
    const start = bStartStr;
    const end = bEndStr;
    const next = {};
    const da = (typeof dailyActuals !== "undefined" && dailyActuals[selClient?.id]) || {};
    Object.keys(da).forEach(ds => {
      if (ds < start || ds > end) return;
      next[ds] = {};
      Object.keys(da[ds]).forEach(did => {
        next[ds][did] = {};
        Object.keys(da[ds][did]).forEach(lbl => { next[ds][did][lbl] = String(da[ds][did][lbl]); });
      });
    });
    // 同 client の localStorage edits を重ねる（ユーザー手入力が消えないように）
    const editsForClient = (dailyEdits && dailyEdits[selClient?.id]) || {};
    Object.keys(editsForClient).forEach(ds => {
      if (ds < start || ds > end) return;
      if (!next[ds]) next[ds] = {};
      Object.keys(editsForClient[ds]).forEach(did => {
        if (!next[ds][did]) next[ds][did] = {};
        Object.keys(editsForClient[ds][did]).forEach(lbl => {
          next[ds][did][lbl] = String(editsForClient[ds][did][lbl]);
        });
      });
    });
    setEntries(next);
    setSaved(true);
    if (window.sb && selClient?.id) {
      (async () => {
        const { data, error } = await window.sb.from("jt_daily_entries")
          .select("*").eq("client_id", selClient.id)
          .gte("entry_date", start).lte("entry_date", end);
        if (error || !data || !data.length) return;
        setEntries(prev => {
          const m = JSON.parse(JSON.stringify(prev));
          data.forEach(r => {
            if (!m[r.entry_date]) m[r.entry_date] = {};
            if (!m[r.entry_date][r.driver_id]) m[r.entry_date][r.driver_id] = {};
            m[r.entry_date][r.driver_id][r.rate_label] = String(r.value);
          });
          return m;
        });
      })();
    }
  }, [selClient?.id, monthYear]);

  const dayTotals = dayRows.map(day => {
    let sell=0, pay=0;
    assignedDrivers.forEach(d => rates.forEach(r => {
      const v = Number(getVal(day.dateStr, d.id, r.label))||0;
      sell += v*r.sell; pay += v*r.pay;
    }));
    return { sell, pay, profit: sell-pay };
  });
  const _dailySum = dayTotals.reduce((a,t)=>({sell:a.sell+t.sell,pay:a.pay+t.pay,profit:a.profit+t.profit}),{sell:0,pay:0,profit:0});
  // 月次サマリー: 日次入力があればそれを正とする（ユーザー編集を即時反映）。無ければ monthlyHistory にフォールバック。
  const _mhVal = (typeof monthlyHistory!=="undefined" && selClient && monthlyHistory[selClient.id] && monthlyHistory[selClient.id][monthYear]) || null;
  const _hasDaily = _dailySum.sell > 0 || _dailySum.pay > 0;
  const monthTotals = _hasDaily
    ? _dailySum
    : (_mhVal ? { sell:_mhVal.s, pay:_mhVal.p, profit:_mhVal.s-_mhVal.p } : _dailySum);
  const colTotals = assignedDrivers.flatMap((d) =>
    rates.map((r) => ({
      vol:  dayRows.reduce((s,day)=>s+(Number(getVal(day.dateStr,d.id,r.label))||0),0),
      sell: dayRows.reduce((s,day)=>s+(Number(getVal(day.dateStr,d.id,r.label))||0)*r.sell,0),
    }))
  );
  const inputDays = dayRows.filter((_,i)=>dayTotals[i].sell>0).length;
  const workdays  = dayRows.filter(d=>!d.isWeekend).length;

  // ── 今日・目標 ──
  const now0 = new Date();
  const currentMonthYear = `${now0.getFullYear()}-${String(now0.getMonth()+1).padStart(2,"0")}`;
  const isCurrentMonth = monthYear === currentMonthYear;
  const todayD = now0.getDate();
  const todayStr = `${monthYear}-${String(todayD).padStart(2,"0")}`;
  const todayDayRow = isCurrentMonth ? dayRows.find(r=>r.d===todayD) : null;
  const dayNames7 = ["日","月","火","水","木","金","土"];
  const todayLabel = isCurrentMonth ? `${now0.getMonth()+1}月${todayD}日（${dayNames7[now0.getDay()]}）` : "";
  const dailyTargets = rates.reduce((obj,r)=>{
    const mVol = selClient.monthlyVol[r.label]||0;
    obj[r.label] = workdays>0&&mVol>0 ? Math.round(mVol/workdays) : 0;
    return obj;
  },{});
  const todayCompletedCount = isCurrentMonth
    ? assignedDrivers.filter(d=>rates.every(r=>getVal(todayStr,d.id,r.label)!=="")).length : 0;
  const todayComplete = isCurrentMonth && todayDayRow && !todayDayRow.isWeekend
    && todayCompletedCount===assignedDrivers.length;

  const focusCell = (d, c) => {
    if (c<0){c=nCols-1;d--;} if(c>=nCols){c=0;d++;}
    if(d<0||d>=daysInMonth) return;
    const next = inputRefs.current[`${d}-${c}`];
    if (!next) return;
    // 次セルの value を確実に state と同期させてから focus（ブラウザ autofill による「数字が下の行に入る」現象を防ぐ）
    try { next.value = next.value; } catch {}
    next.focus();
    // テキスト全選択（次回入力が上書きされ、前のセルの値が残らない）
    try { next.select && next.select(); } catch {}
  };
  const handleKeyDown = (e, di, ci) => {
    // IME 変換中（半角/全角ONの日本語入力で数字確定 Enter 等）は処理しない。
    // この Enter は IME 確定用で、移動 Enter とは別物。e.isComposing / keyCode 229 / e.nativeEvent.isComposing を全てチェック。
    if (e.isComposing || e.keyCode === 229 || (e.nativeEvent && e.nativeEvent.isComposing)) return;
    if(e.key==='Enter'||e.key==='ArrowDown'){
      e.preventDefault(); e.stopPropagation();
      focusCell(di+1,ci);
    }
    else if(e.key==='ArrowUp'){e.preventDefault(); e.stopPropagation(); focusCell(di-1,ci);}
    else if(e.key==='ArrowLeft'){e.preventDefault(); e.stopPropagation(); if(ci>0)focusCell(di,ci-1);}
    else if(e.key==='ArrowRight'){e.preventDefault(); e.stopPropagation(); if(ci<nCols-1)focusCell(di,ci+1);}
    else if(e.key==='Tab'){e.preventDefault(); e.stopPropagation(); focusCell(di,ci+(e.shiftKey?-1:1));}
  };

  // 今日のクイック入力パネル用の十字キー＆Enter移動
  const todayRefs = React.useRef({});
  const focusTodayCell = (di, ri) => {
    todayRefs.current[`${di}-${ri}`]?.focus();
  };
  const handleTodayKeyDown = (e, di, ri) => {
    const nD = assignedDrivers.length, nR = rates.length;
    if(e.key==='Enter'||e.key==='ArrowDown'){
      e.preventDefault();
      if(ri<nR-1) focusTodayCell(di, ri+1);
      else if(di<nD-1) focusTodayCell(di+1, 0);
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      if(ri>0) focusTodayCell(di, ri-1);
      else if(di>0) focusTodayCell(di-1, nR-1);
    } else if(e.key==='ArrowLeft'){
      e.preventDefault();
      if(di>0) focusTodayCell(di-1, ri);
    } else if(e.key==='ArrowRight'){
      e.preventDefault();
      if(di<nD-1) focusTodayCell(di+1, ri);
    } else if(e.key==='Tab'){
      e.preventDefault();
      const next = ri + (e.shiftKey?-1:1);
      if(next>=0 && next<nR) focusTodayCell(di, next);
      else if(e.shiftKey && di>0) focusTodayCell(di-1, nR-1);
      else if(!e.shiftKey && di<nD-1) focusTodayCell(di+1, 0);
    }
  };

  React.useEffect(() => {
    const h = e => {
      if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();setSaved(true);}
      if(e.altKey&&e.key>='1'&&e.key<='9'){
        const idx=Number(e.key)-1;
        if(idx<clientList.length){setSelClient(clientList[idx]);setEntries({});setSaved(false);}
      }
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  }, [clientList]);

  const stickyHeaderRef = React.useRef(null);
  React.useEffect(() => {
    // 左上セルの自動フォーカスは行わない（ユーザーが選んだ時のみフォーカス）
    if (isCurrentMonth) {
      setTimeout(() => {
        const todayEl = document.querySelector('[data-today="true"]');
        if (!todayEl) return;
        const stickyH = stickyHeaderRef.current?.offsetHeight || 0;
        const rect = todayEl.getBoundingClientRect();
        const scroller = document.scrollingElement || document.documentElement;
        scroller.scrollTo({ top: scroller.scrollTop + rect.top - stickyH - 20, behavior:"smooth" });
      }, 300);
    }
  }, [selClient, monthYear]);

  const handleCSV = () => {
    const rHeaders = assignedDrivers.flatMap(d=>rates.map(r=>`${d.name}:${r.label}`));
    const header = ["日付","曜日",...rHeaders,"売上合計","支払合計","粗利"];
    const rows = dayRows.map((day,i)=>{
      const vals = assignedDrivers.flatMap(d=>rates.map(r=>getVal(day.dateStr,d.id,r.label)||0));
      const {sell,pay,profit}=dayTotals[i];
      return [day.dateStr,day.dayName,...vals,sell,pay,profit];
    });
    const footRow = ["月次合計","",...colTotals.map(c=>c.vol),monthTotals.sell,monthTotals.pay,monthTotals.profit];
    const csv = [header,...rows,footRow].map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,﻿"+encodeURIComponent(csv);
    a.download=`実績_${selClient.name}_${monthYear}.csv`;
    a.click();
  };

  return (
    <div>
      <div ref={stickyHeaderRef} style={{ marginBottom:8 }}>
      {/* ヘッダー */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, gap:12, flexWrap:"wrap" }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700 }}>日次実績入力</div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>月次一覧・スプレッドシート形式</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, color:"#9ca3af", flexShrink:0 }}>対象月</span>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            <button onClick={()=>{ const d=new Date(yr,mo-2,1); setMonthYear(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }}
              style={{ padding:"7px 10px", border:"1.5px solid #e5e7eb", borderRadius:6, background:"#fff", cursor:"pointer", fontSize:13 }}>‹</button>
            <input type="month" value={monthYear} onChange={e=>setMonthYear(e.target.value)}
              style={{ padding:"7px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none" }}
              onFocus={e=>e.target.style.borderColor=accent} onBlur={e=>e.target.style.borderColor="#e5e7eb"}/>
            <button onClick={()=>{ const d=new Date(yr,mo,1); setMonthYear(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }}
              style={{ padding:"7px 10px", border:"1.5px solid #e5e7eb", borderRadius:6, background:"#fff", cursor:"pointer", fontSize:13 }}>›</button>
          </div>
        </div>
      </div>

      {/* 操作バー（荷主） */}
      <div style={{ marginBottom:8 }}>
        <label style={{ fontSize:11, color:"#9ca3af", display:"block", marginBottom:4 }}>荷主</label>
        <div style={{ position:"relative", display:"inline-block" }}>
          <select
            value={selClient.id}
            onChange={(e)=>{
              const c = clientList.find(x=>x.id===e.target.value) || {};
              if(c){ setSelClient(c); setEntries({}); setSaved(false); }
            }}
            style={{
              appearance:"none", WebkitAppearance:"none", MozAppearance:"none",
              padding:"8px 36px 8px 14px", minWidth:260,
              border:`1.5px solid ${accent}`, borderRadius:8, background:"#fff",
              color:"#111827", fontSize:13.5, fontWeight:600,
              fontFamily:"inherit", cursor:"pointer", outline:"none",
              boxShadow:`0 2px 8px -2px ${accent}33`,
            }}>
            {clientList.map((c,i)=>(
              <option key={c.id} value={c.id}>{(i+1).toString().padStart(2,"0")}. {c.name}（{c.id}）</option>
            ))}
          </select>
          <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:accent, fontSize:10 }}>▼</span>
        </div>
      </div>

      {/* 月次KPI */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:8 }}>
        {[
          { l:"月次売上（速報）", v:monthTotals.sell>0?fmt(monthTotals.sell):"—", c:accent },
          { l:"月次支払",         v:monthTotals.pay>0?fmt(monthTotals.pay):"—",   c:"#d97706" },
          { l:"月次粗利",         v:monthTotals.profit>0?fmt(monthTotals.profit):"—", c:"#16a34a" },
          { l:"入力進捗",         v:`${inputDays} / ${workdays}日`, c:"#374151",
            sub: inputDays===workdays&&workdays>0?"✓ 入力完了":`残 ${workdays-inputDays}日` },
        ].map(({l,v,c,sub})=>(
          <Card key={l} style={{ padding:"8px 14px" }}>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:2 }}>{l}</div>
            <div style={{ fontSize:16, fontWeight:700, color:c }}>{v}</div>
            {sub && <div style={{ fontSize:10, color:inputDays===workdays&&workdays>0?"#16a34a":"#9ca3af", marginTop:2 }}>{sub}</div>}
          </Card>
        ))}
      </div>

      </div>
      {/* 月次テーブル — 独立スクロール領域内で thead を sticky 化 */}
      <Card>
        <div style={{ maxHeight:"calc(100vh - 320px)", overflow:"auto", position:"relative" }}>
          <style>{`
            .jt-daily-tbl { border-collapse: collapse; border: 1px solid #94a3b8; }
            .jt-daily-tbl td, .jt-daily-tbl th {
              border-bottom: 1px solid #94a3b8;
              border-right: 1px solid #94a3b8;
              vertical-align: middle;
            }
            .jt-daily-tbl thead th { border-bottom: 1px solid #94a3b8; }
            .jt-daily-tbl tbody tr { height: 32px; }
            .jt-daily-tbl tbody td { line-height: 1.2; box-sizing: border-box; overflow: hidden; }
            .jt-daily-tbl tbody td input { display: block; vertical-align: middle; }
            .jt-daily-tbl tbody tr.jt-weekend > td { background: #f8fafc; }
          `}</style>
          <table className="jt-daily-tbl" style={{ borderCollapse:"collapse", fontSize:12, whiteSpace:"nowrap", tableLayout:"fixed" }}>
            <colgroup>
              <col style={{ width:96 }} />
              {assignedDrivers.map(d => rates.map((r,ri)=><col key={d.id+'-'+ri} style={{ width:72 }} />))}
              <col style={{ width:84 }} />
              <col style={{ width:84 }} />
              <col style={{ width:84 }} />
              <col style={{ width:48 }} />
            </colgroup>
            <thead style={{ position:"sticky", top:0, zIndex:10 }}>
              <tr style={{ background:"#f9fafb" }}>
                <th style={{ padding:"7px 12px", textAlign:"center", color:"#374151", fontWeight:700, fontSize:12, minWidth:96, width:96, position:"sticky", left:0, top:0, background:"#f9fafb", zIndex:13 }}>日付</th>
                {assignedDrivers.map((d,dri)=>(
                  <th key={d.id} colSpan={nR}
                    style={{ padding:"7px 12px", textAlign:"center", background:focusedCell?.dri===dri?accent+"0e":"#f9fafb", position:"sticky", top:0, zIndex:11 }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:5 }}>
                      <Avatar name={d.name} size={18} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                      <span style={{ fontWeight:700, fontSize:12 }}>{d.name}</span>
                      <StatusBadge label={d.type}/>
                    </div>
                  </th>
                ))}
                <th colSpan={3} style={{ padding:"7px 12px", textAlign:"center", color:"#6b7280", fontWeight:600, fontSize:11, background:"#f9fafb", position:"sticky", top:0, zIndex:11 }}>日次合計</th>
                <th style={{ padding:"7px 8px", textAlign:"center", color:"#374151", fontWeight:700, fontSize:12, minWidth:40, background:"#f9fafb", position:"sticky", top:0, zIndex:11 }}>状態</th>
              </tr>
              <tr style={{ background:"#f9fafb" }}>
                <th style={{ padding:"4px 8px", textAlign:"center", color:"#9ca3af", fontWeight:500, fontSize:10, position:"sticky", left:0, background:"#f9fafb", zIndex:12 }}>&nbsp;</th>
                {assignedDrivers.map((d,dri)=>
                  rates.map((r,ri)=>{
                    const ci=dri*nR+ri;
                    const active=focusedCell?.ci===ci;
                    return (
                      <th key={`${dri}-${ri}`}
                        style={{ padding:"4px 8px", textAlign:"center", color:active?accent:"#6b7280", fontWeight:600, fontSize:10.5,
                          background:active?accent+"0e":"#f9fafb", position:"sticky", top:32, zIndex:11, minWidth:72, width:72 }}>
                        <div style={{ fontWeight:600 }}>{r.label}</div>
                      </th>
                    );
                  })
                )}
                {["売上","支払","粗利"].map((h,i)=>(
                  <th key={h} style={{ padding:"4px 10px", textAlign:"right", color:"#6b7280", fontWeight:600, fontSize:10.5, minWidth:76, background:"#f9fafb", position:"sticky", top:32, zIndex:11 }}>{h}</th>
                ))}
                <th style={{ padding:"4px 8px", background:"#f9fafb", position:"sticky", top:32, zIndex:11 }}>&nbsp;</th>
              </tr>
            </thead>
            <tbody>
              {dayRows.map((day,di)=>{
                const dt = dayTotals[di];
                const isActiveRow = focusedCell?.di===di;
                const isToday = day.dateStr===todayStr&&isCurrentMonth;
                const rowBg = isActiveRow?accent+"08":isToday?accent+"06":day.isWeekend?"#f9fafb":"#fff";
                const rowFilled = !day.isWeekend&&assignedDrivers.every(d=>rates.every(r=>getVal(day.dateStr,d.id,r.label)!==""));
                const rowPartial = !rowFilled&&!day.isWeekend&&assignedDrivers.some(d=>rates.some(r=>getVal(day.dateStr,d.id,r.label)!==""));
                return (
                  <tr key={di} data-today={isToday?"true":"false"} className={day.isWeekend?"jt-weekend":""} style={{ borderBottom:"1px solid #94a3b8", background:rowBg }}>
                    <td style={{ padding:"0 12px", borderRight:"1px solid #94a3b8", fontWeight:500, position:"sticky", left:0, background:rowBg, zIndex:1, minWidth:96, width:96, whiteSpace:"nowrap",
                      borderLeft:isActiveRow?`3px solid ${accent}`:isToday?`3px solid ${accent}80`:"3px solid transparent" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4, whiteSpace:"nowrap" }}>
                        <span style={{ fontSize:13, fontWeight:700, color:day.isSun?"#dc2626":day.dow===6?"#2563eb":"#111827", display:"inline-block", width:18, textAlign:"right" }}>{day.d}</span>
                        <span style={{ fontSize:10.5, color:day.isSun?"#dc2626":day.dow===6?"#2563eb":"#9ca3af", flexShrink:0 }}>（{day.dayName}）</span>
                        {isToday&&<span style={{ fontSize:9, fontWeight:700, background:accent, color:"#fff", padding:"1px 5px", borderRadius:3, flexShrink:0, marginLeft:2 }}>TODAY</span>}
                      </div>
                    </td>
                    {assignedDrivers.map((d,dri)=>
                      rates.map((r,ri)=>{
                        const ci=dri*nR+ri;
                        const isActive=isActiveRow&&focusedCell?.ci===ci;
                        const val=getVal(day.dateStr,d.id,r.label);
                        const numVal=Number(val);
                        const dt2=dailyTargets[r.label];
                        const isAnomaly=!day.isWeekend&&val!==""&&(numVal===0||(dt2>0&&numVal>dt2*3));
                        return (
                          <td key={ci} style={{ padding:0, textAlign:"center", borderRight: ri===nR-1?"2px solid #475569":"1px solid #94a3b8" }}>
                            <input
                              ref={el=>inputRefs.current[`${di}-${ci}`]=el}
                              type="number" min="0"
                              inputMode="numeric"
                              lang="en"
                              name={`cell-${selClient.id}-${di}-${ci}`}
                              autoComplete="off" autoCorrect="off" spellCheck="false"
                              data-1p-ignore="true" data-lpignore="true" data-form-type="other"
                              placeholder={day.isWeekend?"—":""}
                              title={isAnomaly?(numVal===0?"0件？ 空欄にしてください":"通常より大幅に多い件数です"):""}
                              value={val}
                              onChange={e=>setVal(day.dateStr,d.id,r.label,e.target.value)}
                              onFocus={(e)=>{ setFocusedCell({di,ci,dri}); try{e.target.select && e.target.select();}catch{} }}
                              onBlur={()=>setFocusedCell(null)}
                              onCompositionStart={e=>{ e.target.dataset.composing='1'; }}
                              onCompositionEnd={e=>{ delete e.target.dataset.composing; }}
                              onKeyDown={e=>{ if(e.currentTarget.dataset.composing) return; handleKeyDown(e,di,ci); }}
                              style={{
                                width:"100%", boxSizing:"border-box", padding:"6px 8px",
                                border:"none", borderRadius:0, fontSize:13, textAlign:"center",
                                fontFamily:"inherit", outline:"none",
                                background:isAnomaly?"#fee2e2":isActive?accent+"1f":"transparent",
                                boxShadow:isActive?`inset 0 0 0 2px ${accent}`:"none",
                                fontWeight:isActive?700:400,
                                color:day.isWeekend?"#cbd5e1":isAnomaly?"#b91c1c":"inherit",
                                transition:"background .1s, box-shadow .1s",
                              }}
                            />
                          </td>
                        );
                      })
                    )}
                    <td style={{ padding:"4px 10px", textAlign:"right", fontWeight:600, color:dt.sell>0?accent:"#e5e7eb", borderLeft:"2px solid #64748b", borderRight:"1px solid #94a3b8", fontSize:12 }}>
                      {dt.sell>0?fmt(dt.sell):"—"}
                    </td>
                    <td style={{ padding:"4px 10px", textAlign:"right", fontSize:12, color:dt.pay>0?"#374151":"#e5e7eb", borderRight:"1px solid #94a3b8" }}>
                      {dt.pay>0?fmt(dt.pay):"—"}
                    </td>
                    <td style={{ padding:"4px 10px", textAlign:"right", fontWeight:600, color:dt.profit>0?"#16a34a":"#e5e7eb", fontSize:12 }}>
                      {dt.profit>0?fmt(dt.profit):"—"}
                    </td>
                    <td style={{ padding:"4px 8px", textAlign:"center", borderLeft:"1px solid #94a3b8", fontSize:13 }}>
                      {rowFilled?<span style={{ color:"#16a34a", fontWeight:700 }}>✓</span>
                       :rowPartial?<span style={{ color:"#d97706" }}>…</span>:null}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ background:"#f9fafb", borderTop:"2px solid #64748b" }}>
                <td style={{ padding:"8px 12px", fontWeight:700, fontSize:12, borderRight:"1px solid #94a3b8", position:"sticky", left:0, background:"#f9fafb" }}>月次合計</td>
                {colTotals.map((col,ci)=>{
                  const dri=Math.floor(ci/nR), ri=ci%nR;
                  return (
                    <td key={ci} style={{ padding:"7px 6px", textAlign:"center", fontWeight:700, color:col.vol>0?"#111827":"#9ca3af", fontSize:13, borderLeft:ri===0&&dri>0?"1px solid #94a3b8":"none" }}>
                      {col.vol>0?col.vol:"—"}
                    </td>
                  );
                })}
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.sell>0?accent:"#9ca3af", borderLeft:"2px solid #64748b" }}>{monthTotals.sell>0?fmt(monthTotals.sell):"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.pay>0?"#374151":"#9ca3af" }}>{monthTotals.pay>0?fmt(monthTotals.pay):"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.profit>0?"#16a34a":"#9ca3af" }}>{monthTotals.profit>0?fmt(monthTotals.profit):"—"}</td>
                <td style={{ borderLeft:"1px solid #94a3b8" }}/>
              </tr>
              <tr style={{ background:"#fafbff", borderTop:"1px solid #94a3b8" }}>
                <td style={{ padding:"6px 12px", fontSize:10, color:"#9ca3af", borderRight:"1px solid #94a3b8", position:"sticky", left:0, background:"#fafbff" }}>ドライバー別売上</td>
                {colTotals.map((col,ci)=>{
                  const dri=Math.floor(ci/nR), ri=ci%nR;
                  return (
                    <td key={ci} style={{ padding:"5px 6px", textAlign:"center", fontSize:10, color:"#6b7280", borderLeft:ri===0&&dri>0?"1px solid #94a3b8":"none" }}>
                      {col.sell>0?fmt(col.sell):""}
                    </td>
                  );
                })}
                <td colSpan={3} style={{ borderLeft:"2px solid #64748b" }}/>
                <td style={{ borderLeft:"1px solid #94a3b8" }}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </Card>

      {/* アクションボタン */}
      <div style={{ display:"flex", gap:10, marginTop:12 }}>
        <div
          style={{ flex:2, padding:"12px", background:saved?"#f0fdf4":"#fffbeb", color:saved?"#15803d":"#b45309", border:`1.5px solid ${saved?"#bbf7d0":"#fde68a"}`, borderRadius:7, fontWeight:600, fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          {saved
            ? <><Ic name="check" size={16} color="#15803d" strokeWidth={2.5}/> 自動保存済み（Supabase）</>
            : <><span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:"#f59e0b" }}/> 保存中…</>
          }
        </div>
        <button onClick={handleCSV}
          style={{ flex:1, padding:"12px 16px", border:"1.5px solid #e5e7eb", background:"#fff", color:"#374151", borderRadius:7, fontWeight:600, fontSize:13, cursor:"pointer" }}>
          CSVエクスポート
        </button>
        {confirmClear ? (
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <span style={{ fontSize:12, color:"#dc2626" }}>クリアしますか？</span>
            <button onClick={()=>{ setEntries({}); setSaved(false); setConfirmClear(false); }}
              style={{ padding:"10px 14px", background:"#dc2626", color:"#fff", border:"none", borderRadius:7, fontWeight:600, fontSize:12, cursor:"pointer" }}>確認</button>
            <button onClick={()=>setConfirmClear(false)}
              style={{ padding:"10px 14px", border:"1.5px solid #e5e7eb", background:"#fff", color:"#374151", borderRadius:7, fontSize:12, cursor:"pointer" }}>キャンセル</button>
          </div>
        ) : (
          <button onClick={()=>setConfirmClear(true)}
            style={{ padding:"12px 16px", border:"1.5px solid #fee2e2", background:"#fff", color:"#dc2626", borderRadius:7, fontWeight:600, fontSize:13, cursor:"pointer" }}>
            クリア
          </button>
        )}
      </div>
    </div>
  );
};

// ── ダッシュボード ─────────────────────────────────────────────────────────
const Dashboard = ({ accent, setPage }) => {
  const now = new Date();
  const days = ["日","月","火","水","木","金","土"];
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
  const timeStr = now.toTimeString().slice(0,5);
  // 日次入力の編集を反映するために live aggregation を行う
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  const liveAgg = monthAgg(REF_MONTH, dailyEdits);
  const totalSell   = liveAgg.sell;
  const totalPay    = liveAgg.pay;
  const totalProfit = liveAgg.profit;
  const monthlyActuals = allClientsLive().map(c => {
    const h = cm(c.id, REF_MONTH, dailyEdits);
    return { clientId: c.id, name: c.name, sell: h.s, pay: h.p, profit: h.s - h.p };
  });
  // 表示用フォールバック（今月実績がなければ最新確定月）
  const monthlyDisplay = totalSell > 0 ? monthlyActuals : allClientsLive().map(c => {
    const h = cm(c.id, LATEST_DATA_MONTH, dailyEdits);
    return { clientId: c.id, name: c.name, sell: h.s, pay: h.p, profit: h.s - h.p };
  });
  const margin = totalSell>0?(totalProfit/totalSell*100).toFixed(1):0;

  const pendingInv = invoices.filter(i=>i.status==="未請求").reduce((s,i)=>s+i.amount,0);
  const delayedInv = invoices.filter(i=>i.status==="遅延").reduce((s,i)=>s+i.amount,0);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:12, color:"#9ca3af", marginBottom:3 }}>{dateStr}</div>
          <div style={{ fontSize:20, fontWeight:700 }}>経営ダッシュボード</div>
          <div style={{ fontSize:11.5, color:"#9ca3af", marginTop:3 }}>業務の全体把握・通知ボード ／ 経営判断は <span style={{ color:accent, fontWeight:600, cursor:"pointer", textDecoration:"underline" }} onClick={()=>setPage("pl")}>収支管理</span> へ</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:28, fontWeight:300, letterSpacing:2, color:"#111827" }}>{timeStr}</div>
          <div style={{ fontSize:11, color:"#9ca3af" }}>自動更新</div>
        </div>
      </div>

      {/* 財務KPI */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:14 }}>
        {[
          { l:`今月売上（${REF_MONTH_LABEL}）`, v:fmt(totalSell),   sub:totalSell>0?"全11荷主合算 → 詳細は収支管理":`実績未入力。最新確定: ${LATEST_MONTH_LABEL} → 収支管理`, c:accent,    pg:"pl" },
          { l:`今月粗利（${REF_MONTH_LABEL}）`, v:fmt(totalProfit), sub:totalSell>0?`粗利率 ${margin}% → 収支管理`:"— → 収支管理",   c:"#16a34a", pg:"pl" },
          { l:"未請求（発行前）", v:fmt(pendingInv),  sub:`${invoices.filter(i=>i.status==="未請求").length}件 → 請求管理`,  c:"#64748b", pg:"invoice" },
          { l:"入金遅延",         v:fmt(delayedInv),  sub:"タイヤ配送 3月分 → 請求管理",   c:"#dc2626", pg:"invoice" },
        ].map(({ l,v,sub,c,pg })=>(
          <Card key={l} style={{ padding:"16px 18px", cursor:"pointer" }} onClick={()=>setPage(pg)}
            onMouseEnter={e=>e.currentTarget.style.borderColor=c}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#e8eaed"}>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6 }}>{l}</div>
            <div style={{ fontSize:22, fontWeight:700, color:c, lineHeight:1 }}>{v}</div>
            <div style={{ fontSize:11.5, color:"#9ca3af", marginTop:5 }}>{sub}</div>
          </Card>
        ))}
      </div>

      {/* Row 2 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, marginBottom:14 }}>

        {/* 荷主別売上 */}
        <Card>
          <SH title={`荷主別 今月売上（${totalSell>0?REF_MONTH_LABEL:"最新確定 "+LATEST_MONTH_LABEL+" を表示"}）`} action="収支詳細→" onAction={()=>setPage("pl")}/>

const AnnouncePage = ({ accent }) => {
  const [filter, setFilter] = React.useState("すべて");
  const [readIds, setReadIds] = useLocalStorage("jt_announce_read_ids", announces.filter(a=>!a.unread).map(a=>a.id));
  const [openId, setOpenId] = React.useState(null);
  const [showForm, setShowForm] = React.useState(false);
  const [newPost, setNewPost] = React.useState({ title:"", cat:"運行", body:"" });
  const [extraPosts, setExtraPosts] = useLocalStorage("jt_extra_announces", []);
  const cats = ["すべて","重要","請求","運行","支払","人事","規程"];
  // 新規投稿(extraPosts)を先頭に表示 → 「明日は全員休み」など即時周知すべき投稿が埋もれない
  const allAnnounces = [...extraPosts, ...announces];
  const list = filter==="すべて" ? allAnnounces : allAnnounces.filter(a=>a.cat===filter);
  const unreadCount = allAnnounces.filter(a=>!readIds.includes(a.id)).length;

  const toggleOpen = (id) => {
    setOpenId(openId===id ? null : id);
    setReadIds(p => p.includes(id) ? p : [...p, id]);
  };

  const submitPost = () => {
    if (!newPost.title.trim()) return;
    const now = new Date();
    const mm = String(now.getMonth()+1).padStart(2,"0");
    const dd = String(now.getDate()).padStart(2,"0");
    setExtraPosts(p=>[{ id: Date.now(), title:newPost.title, cat:newPost.cat, body:newPost.body, date:`${mm}/${dd}`, unread:false }, ...p]);
    setNewPost({ title:"", cat:"運行", body:"" });
    setShowForm(false);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ fontSize:20, fontWeight:700 }}>お知らせ</div>
          {unreadCount>0 && <span style={{ background:"#dc2626", color:"#fff", borderRadius:99, fontSize:11, padding:"2px 8px", fontWeight:700 }}>未読 {unreadCount}</span>}
        </div>
        <button onClick={()=>setShowForm(!showForm)}
          style={{ padding:"7px 16px", background:showForm?"#f3f4f6":accent, color:showForm?"#374151":"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
          <Ic name="plus" size={13} color={showForm?"#374151":"#fff"}/>{showForm?"キャンセル":"新規投稿"}
        </button>
      </div>

      {showForm && (
        <Card style={{ padding:20, marginBottom:20, border:`1.5px solid ${accent}30` }}>
          <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>新規お知らせ投稿</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:12, marginBottom:12 }}>
            <input value={newPost.title} onChange={e=>setNewPost(p=>({...p,title:e.target.value}))} placeholder="タイトル"
              style={{ padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none" }}/>
            <select value={newPost.cat} onChange={e=>setNewPost(p=>({...p,cat:e.target.value}))}
              style={{ padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none", background:"#fff" }}>
              {["重要","請求","運行","支払","人事","規程"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <textarea value={newPost.body} onChange={e=>setNewPost(p=>({...p,body:e.target.value}))} placeholder="本文（任意）"
            style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", resize:"vertical", minHeight:80, outline:"none", marginBottom:12 }}/>
          <button onClick={submitPost}
            style={{ padding:"8px 20px", background:accent, color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600 }}>投稿する</button>
        </Card>
      )}

      <div style={{ display:"flex", gap:6, marginBottom:18 }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)}
            style={{ padding:"5px 14px", borderRadius:4, border:`1.5px solid ${filter===c?accent:"#e5e7eb"}`, background:filter===c?accent:"#fff", color:filter===c?"#fff":"#374151", fontSize:13, fontWeight:filter===c?600:400 }}>{c}</button>
        ))}
      </div>

      <Card>
        {list.map((a,i)=>{
          const isRead = readIds.includes(a.id);
          const isOpen = openId === a.id;
          return (
            <div key={a.id} style={{ borderBottom:i<list.length-1?"1px solid #94a3b8":"none" }}>
              <div onClick={()=>toggleOpen(a.id)}
                style={{ display:"flex", gap:14, padding:"16px 20px", cursor:"pointer", borderLeft:isRead?"3px solid transparent":`3px solid ${accent}`, background:isOpen?accent+"07":"transparent", transition:"background .1s" }}
                onMouseEnter={e=>{ if(!isOpen) e.currentTarget.style.background="#f9fafb"; }}
                onMouseLeave={e=>{ if(!isOpen) e.currentTarget.style.background="transparent"; }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", gap:8, marginBottom:5, alignItems:"center" }}>
                    <StatusBadge label={a.cat}/>
                    {!isRead && <span style={{ fontSize:11, background:accent, color:"#fff", padding:"1px 7px", borderRadius:3, fontWeight:600 }}>未読</span>}
                  </div>
                  <div style={{ fontSize:14, fontWeight:isRead?500:700, color:isRead?"#374151":"#111827" }}>{a.title}</div>
                  <div style={{ fontSize:11.5, color:"#9ca3af", marginTop:4 }}>{a.date}</div>
                </div>
                <div style={{ transform:isOpen?"rotate(90deg)":"none", transition:"transform .2s", alignSelf:"center" }}>
                  <Ic name="chevronR" size={14} color="#d1d5db"/>
                </div>
              </div>
              {isOpen && a.body && (
                <div style={{ padding:"12px 20px 20px 23px", background:"#fafbfc", borderTop:"1px solid #94a3b8" }}>
                  <div style={{ fontSize:13.5, color:"#374151", lineHeight:1.9, whiteSpace:"pre-wrap" }}>{a.body}</div>
                </div>
              )}
            </div>
          );
        })}
      </Card>
    </div>
  );
};

            <div style={{ fontSize:12, color:"#9ca3af", marginBottom:8 }}>荷主別 支払内訳（実数）</div>
            {selSummary.clientRows.length === 0 ? (
              <div style={{ fontSize:12.5, color:"#9ca3af", padding:"6px 0" }}>当月の運行実績なし</div>

              <button onClick={()=>setSel(null)}
                style={{ padding:"9px 14px", border:"1px solid #94a3b8", background:"#fff", color:"#374151", borderRadius:6, fontSize:13 }}>閉じる</button>
            </div>
          </Card>
        )}
      </div>

      {/* 支払明細書モーダル（その場で発行・ドライバー別収支と同一） */}
      <DriverSlipModal driver={slipDriver} accent={accent} onClose={()=>setSlipDriver(null)} />
    </div>
  );
};
