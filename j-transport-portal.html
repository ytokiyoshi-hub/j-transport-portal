const TodoPage = ({ accent }) => {
  const [todos, setTodos] = useLocalStorage("jt_todos", []);
  const [draft, setDraft] = React.useState({ title:"", priority:"中", due:"", assignee:"", note:"" });
  const [filter, setFilter] = React.useState("active"); // active | all | done
  const [editingId, setEditingId] = React.useState(null);
  const [editDraft, setEditDraft] = React.useState(null);

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const add = () => {
    if (!draft.title.trim()) return;
    const now = Date.now();
    setTodos(prev => [{
      id: now, title: draft.title.trim(), priority: draft.priority,
      due: draft.due || null, assignee: draft.assignee.trim() || null,
      note: draft.note.trim() || "", done: false, createdAt: now,
    }, ...prev]);
    setDraft({ title:"", priority:"中", due:"", assignee:"", note:"" });
  };

  const toggle = (id) => setTodos(prev => prev.map(t => t.id===id ? { ...t, done: !t.done, doneAt: t.done?null:Date.now() } : t));
  const remove = (id) => { if (confirm("このタスクを削除しますか？")) setTodos(prev => prev.filter(t => t.id!==id)); };
  const startEdit = (t) => { setEditingId(t.id); setEditDraft({...t}); };
  const saveEdit = () => {
    if (!editDraft.title?.trim()) return;
    setTodos(prev => prev.map(t => t.id===editingId ? { ...editDraft, title: editDraft.title.trim() } : t));
    setEditingId(null); setEditDraft(null);
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft(null); };

  const list = todos.filter(t => filter==="all" ? true : filter==="done" ? t.done : !t.done);
  // 優先度→期日順にソート
  const priOrder = { "高":0, "中":1, "低":2 };
  const sorted = [...list].sort((a,b) => {
    if (a.done !== b.done) return a.done?1:-1;
    const pd = priOrder[a.priority] - priOrder[b.priority];
    if (pd) return pd;
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1; if (b.due) return 1;
    return b.createdAt - a.createdAt;
  });

  const stats = {
    total: todos.length,
    active: todos.filter(t=>!t.done).length,
    overdue: todos.filter(t=>!t.done && t.due && t.due < todayStr).length,
    today: todos.filter(t=>!t.done && t.due === todayStr).length,
    done: todos.filter(t=>t.done).length,
  };

  const priColor = (p) => p==="高"?"#dc2626":p==="中"?"#d97706":"#64748b";
  const dueColor = (due, done) => {
    if (!due || done) return "#64748b";
    if (due < todayStr) return "#dc2626";
    if (due === todayStr) return "#d97706";
    return "#16a34a";
  };
  const dueLabel = (due) => {
    if (!due) return "—";
    const d = new Date(due+"T00:00:00");
    const diff = Math.round((d - new Date(todayStr+"T00:00:00"))/86400000);
    const mm = d.getMonth()+1, dd = d.getDate();
    if (diff === 0) return `今日 (${mm}/${dd})`;
    if (diff === 1) return `明日 (${mm}/${dd})`;
    if (diff === -1) return `昨日 (${mm}/${dd})`;
    if (diff < 0) return `${-diff}日前 (${mm}/${dd})`;
    if (diff <= 7) return `${diff}日後 (${mm}/${dd})`;
    return `${mm}/${dd}`;
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700 }}>ToDoリスト</div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>未完了 {stats.active}件{stats.overdue>0?` / 期限切れ ${stats.overdue}件`:""}{stats.today>0?` / 本日締切 ${stats.today}件`:""}</div>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          {[{k:"active",l:`未完了 ${stats.active}`},{k:"done",l:`完了 ${stats.done}`},{k:"all",l:`すべて ${stats.total}`}].map(({k,l})=>(
            <button key={k} onClick={()=>setFilter(k)}
              style={{ padding:"6px 14px", borderRadius:6, border:`1.5px solid ${filter===k?accent:"#e5e7eb"}`, background:filter===k?accent:"#fff", color:filter===k?"#fff":"#374151", fontSize:13, fontWeight:filter===k?600:400, cursor:"pointer" }}>{l}</button>
          ))}
        </div>
      </div>

      {/* 新規追加フォーム */}
      <Card style={{ padding:16, marginBottom:16 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#6b7280", marginBottom:10 }}>新規タスク追加</div>
        <div style={{ display:"grid", gridTemplateColumns:"2fr 100px 140px 140px auto", gap:8, alignItems:"center", marginBottom:8 }}>
          <input value={draft.title} onChange={e=>setDraft(p=>({...p,title:e.target.value}))}
            onKeyDown={e=>{ if (e.key==='Enter' && !e.isComposing && !e.nativeEvent?.isComposing) add(); }}
            placeholder="タスク内容（必須）"
            style={{ padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, outline:"none" }}/>
          <select value={draft.priority} onChange={e=>setDraft(p=>({...p,priority:e.target.value}))}
            style={{ padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, background:"#fff" }}>
            {["高","中","低"].map(p=><option key={p} value={p}>{p}</option>)}
          </select>
          <input type="date" value={draft.due} onChange={e=>setDraft(p=>({...p,due:e.target.value}))}
            style={{ padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13 }}/>
          <input value={draft.assignee} onChange={e=>setDraft(p=>({...p,assignee:e.target.value}))}
            placeholder="担当者（任意）"
            style={{ padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, outline:"none" }}/>
          <button onClick={add} disabled={!draft.title.trim()}
            style={{ padding:"8px 18px", background:draft.title.trim()?accent:"#cbd5e1", color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600, cursor:draft.title.trim()?"pointer":"not-allowed", whiteSpace:"nowrap" }}>+ 追加</button>
        </div>
        <textarea value={draft.note} onChange={e=>setDraft(p=>({...p,note:e.target.value}))} placeholder="メモ（任意）"
          style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, resize:"vertical", minHeight:50, outline:"none", fontFamily:"inherit", boxSizing:"border-box" }}/>
      </Card>

      {/* リスト */}
      <Card>
        {sorted.length === 0 ? (
          <div style={{ padding:40, textAlign:"center", color:"#9ca3af", fontSize:13 }}>
            {filter==="active"?"未完了のタスクはありません 🎉":filter==="done"?"完了したタスクはありません":"タスクがありません"}
          </div>
        ) : (
          <div>
            {sorted.map((t, i) => {
              const isEditing = editingId === t.id;
              return (
                <div key={t.id} style={{ borderBottom: i<sorted.length-1?"1px solid #e5e7eb":"none", padding:"12px 16px", display:"flex", alignItems:"flex-start", gap:12, background:t.done?"#fafafa":"#fff" }}>
                  <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)}
                    style={{ marginTop:3, width:18, height:18, accentColor:accent, cursor:"pointer" }}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    {isEditing ? (
                      <div>
                        <input value={editDraft.title} onChange={e=>setEditDraft(p=>({...p,title:e.target.value}))}
                          style={{ width:"100%", padding:"6px 10px", border:"1.5px solid "+accent, borderRadius:4, fontSize:14, fontWeight:600, marginBottom:6, boxSizing:"border-box" }}/>
                        <div style={{ display:"grid", gridTemplateColumns:"100px 140px 140px", gap:6, marginBottom:6 }}>
                          <select value={editDraft.priority} onChange={e=>setEditDraft(p=>({...p,priority:e.target.value}))}
                            style={{ padding:"4px 8px", border:"1px solid #e5e7eb", borderRadius:4, fontSize:12 }}>
                            {["高","中","低"].map(p=><option key={p} value={p}>{p}</option>)}
                          </select>
                          <input type="date" value={editDraft.due||""} onChange={e=>setEditDraft(p=>({...p,due:e.target.value||null}))}
                            style={{ padding:"4px 8px", border:"1px solid #e5e7eb", borderRadius:4, fontSize:12 }}/>
                          <input value={editDraft.assignee||""} onChange={e=>setEditDraft(p=>({...p,assignee:e.target.value||null}))}
                            placeholder="担当者" style={{ padding:"4px 8px", border:"1px solid #e5e7eb", borderRadius:4, fontSize:12 }}/>
                        </div>
                        <textarea value={editDraft.note||""} onChange={e=>setEditDraft(p=>({...p,note:e.target.value}))}
                          placeholder="メモ" style={{ width:"100%", padding:"6px 10px", border:"1px solid #e5e7eb", borderRadius:4, fontSize:12, resize:"vertical", minHeight:40, fontFamily:"inherit", boxSizing:"border-box", marginBottom:6 }}/>
                        <div style={{ display:"flex", gap:6 }}>
                          <button onClick={saveEdit} style={{ padding:"5px 14px", background:accent, color:"#fff", border:"none", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer" }}>保存</button>
                          <button onClick={cancelEdit} style={{ padding:"5px 14px", background:"#fff", color:"#374151", border:"1px solid #e5e7eb", borderRadius:4, fontSize:12, cursor:"pointer" }}>キャンセル</button>
                        </div>
                      </div>
                    ) : (
                      <div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:t.note?4:0 }}>
                          <span style={{ fontSize:14, fontWeight:600, color:t.done?"#9ca3af":"#1a1f2e", textDecoration:t.done?"line-through":"none" }}>{t.title}</span>
                          <span style={{ fontSize:10, fontWeight:700, color:"#fff", background:priColor(t.priority), padding:"2px 6px", borderRadius:3 }}>優先{t.priority}</span>
                          {t.due && <span style={{ fontSize:11, fontWeight:600, color:dueColor(t.due, t.done) }}>📅 {dueLabel(t.due)}</span>}
                          {t.assignee && <span style={{ fontSize:11, color:"#6b7280" }}>👤 {t.assignee}</span>}
                        </div>
                        {t.note && <div style={{ fontSize:12, color:"#6b7280", whiteSpace:"pre-wrap" }}>{t.note}</div>}
                      </div>
                    )}
                  </div>
                  {!isEditing && (
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={()=>startEdit(t)} title="編集"
                        style={{ padding:"4px 10px", background:"#fff", color:"#6b7280", border:"1px solid #e5e7eb", borderRadius:4, fontSize:11, cursor:"pointer" }}>編集</button>
                      <button onClick={()=>remove(t.id)} title="削除"
                        style={{ padding:"4px 10px", background:"#fff", color:"#dc2626", border:"1px solid #fecaca", borderRadius:4, fontSize:11, cursor:"pointer" }}>削除</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
};

// ── ParentClientsPage（上位荷主管理）─────────────────────────────────────
// 上位荷主 = ASKUL等の上にいる発注元/元請け/親会社。下位荷主(現clients)を束ねて管理する。
// データ: jt_parent_clients = [{id, name, contact, tel, address, email, note, createdAt}]
// 紐付け: jt_client_parent_map = {clientId: parentId}
const ParentClientsPage = ({ accent }) => {
  const [parents, setParents] = useLocalStorage("jt_parent_clients", []);
  const [parentMap, setParentMap] = useLocalStorage("jt_client_parent_map", {});
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  const [showForm, setShowForm] = React.useState(false);
  const [draft, setDraft] = React.useState({ name:"", contact:"", tel:"", address:"", email:"", note:"" });
  const [editingId, setEditingId] = React.useState(null);
  const [sel, setSel] = React.useState(null);

  // 各上位荷主に紐付く下位荷主の一覧と当月集計
  const refMonth = REF_MONTH;
  const parentSummaries = parents.map(p => {
    const childIds = Object.keys(parentMap).filter(cid => parentMap[cid] === p.id);
    let sell=0, pay=0;
    const children = childIds.map(cid => {
      const c = clients.find(x => x.id === cid);
      if (!c) return null;
      const v = cm(cid, refMonth, dailyEdits);
      sell += v.s; pay += v.p;
      return { id: cid, name: c.name, sell: v.s, pay: v.p };
    }).filter(Boolean);
    return { ...p, children, totalSell: sell, totalPay: pay, totalProfit: sell-pay };
  });

  const submit = () => {
    if (!draft.name.trim()) return;
    if (editingId) {
      setParents(prev => prev.map(p => p.id===editingId ? { ...p, ...draft, name: draft.name.trim() } : p));
    } else {
      const id = "PC-" + String(Date.now()).slice(-8);
      setParents(prev => [...prev, { id, ...draft, name: draft.name.trim(), createdAt: Date.now() }]);
    }
    setDraft({ name:"", contact:"", tel:"", address:"", email:"", note:"" });
    setShowForm(false); setEditingId(null);
  };
  const startEdit = (p) => {
    setEditingId(p.id);
    setDraft({ name:p.name, contact:p.contact||"", tel:p.tel||"", address:p.address||"", email:p.email||"", note:p.note||"" });
    setShowForm(true);
  };
  const remove = (id) => {
    if (!confirm("この上位荷主を削除しますか？\n紐付いている荷主は「未設定」に戻ります。")) return;
    setParents(prev => prev.filter(p => p.id !== id));
    const nextMap = { ...parentMap };
    Object.keys(nextMap).forEach(cid => { if (nextMap[cid] === id) delete nextMap[cid]; });
    setParentMap(nextMap);
    if (sel?.id === id) setSel(null);
  };
  const assignChild = (clientId, parentId) => {
    const next = { ...parentMap };
    if (parentId === "") delete next[clientId];
    else next[clientId] = parentId;
    setParentMap(next);
  };

  const unassignedClients = clients.filter(c => !parentMap[c.id]);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700 }}>上位荷主管理</div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>発注元・元請け・親会社など、現在の荷主の上位にあたる取引先を登録</div>
        </div>
        <button onClick={()=>{ setShowForm(!showForm); setEditingId(null); setDraft({ name:"", contact:"", tel:"", address:"", email:"", note:"" }); }}
          style={{ padding:"7px 16px", background:showForm?"#f3f4f6":accent, color:showForm?"#374151":"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600, cursor:"pointer" }}>
          {showForm?"キャンセル":"+ 新規上位荷主を登録"}
        </button>
      </div>

      {showForm && (
        <Card style={{ padding:20, marginBottom:20, border:`1.5px solid ${accent}30` }}>
          <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>{editingId?"上位荷主を編集":"新規上位荷主登録"}</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:10 }}>
            <div>
              <div style={{ fontSize:11, color:"#6b7280", marginBottom:4, fontWeight:600 }}>会社名・組織名（必須）</div>
              <input value={draft.name} onChange={e=>setDraft(p=>({...p,name:e.target.value}))} placeholder="例：○○ロジスティクス株式会社"
                style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, boxSizing:"border-box" }}/>
            </div>
            <div>
              <div style={{ fontSize:11, color:"#6b7280", marginBottom:4, fontWeight:600 }}>担当者</div>
              <input value={draft.contact} onChange={e=>setDraft(p=>({...p,contact:e.target.value}))} placeholder="例：田中 太郎"
                style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, boxSizing:"border-box" }}/>
            </div>
            <div>
              <div style={{ fontSize:11, color:"#6b7280", marginBottom:4, fontWeight:600 }}>電話番号</div>
              <input value={draft.tel} onChange={e=>setDraft(p=>({...p,tel:e.target.value}))} placeholder="例：03-1234-5678"
                style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, boxSizing:"border-box" }}/>
            </div>
            <div>
              <div style={{ fontSize:11, color:"#6b7280", marginBottom:4, fontWeight:600 }}>メールアドレス</div>
              <input value={draft.email} onChange={e=>setDraft(p=>({...p,email:e.target.value}))} placeholder="例：contact@example.com"
                style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, boxSizing:"border-box" }}/>
            </div>
            <div style={{ gridColumn:"1 / 3" }}>
              <div style={{ fontSize:11, color:"#6b7280", marginBottom:4, fontWeight:600 }}>住所</div>
              <input value={draft.address} onChange={e=>setDraft(p=>({...p,address:e.target.value}))} placeholder="例：東京都港区..."
                style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, boxSizing:"border-box" }}/>
            </div>
            <div style={{ gridColumn:"1 / 3" }}>
              <div style={{ fontSize:11, color:"#6b7280", marginBottom:4, fontWeight:600 }}>メモ</div>
              <textarea value={draft.note} onChange={e=>setDraft(p=>({...p,note:e.target.value}))} placeholder="契約条件・特記事項など"
                style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, resize:"vertical", minHeight:60, fontFamily:"inherit", boxSizing:"border-box", outline:"none" }}/>
            </div>
          </div>
          <button onClick={submit} disabled={!draft.name.trim()}
            style={{ padding:"8px 20px", background:draft.name.trim()?accent:"#cbd5e1", color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600, cursor:draft.name.trim()?"pointer":"not-allowed" }}>
            {editingId?"保存":"登録"}
          </button>
        </Card>
      )}

      {/* サマリ */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:16 }}>
        <Card style={{ padding:"16px 20px" }}>
          <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6 }}>登録上位荷主</div>
          <div style={{ fontSize:20, fontWeight:700, color:accent }}>{parents.length}社</div>
        </Card>
        <Card style={{ padding:"16px 20px" }}>
          <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6 }}>紐付け済 荷主</div>
          <div style={{ fontSize:20, fontWeight:700, color:"#16a34a" }}>{Object.keys(parentMap).length} / {clients.length}件</div>
        </Card>
        <Card style={{ padding:"16px 20px" }}>
          <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6 }}>未紐付け 荷主</div>
          <div style={{ fontSize:20, fontWeight:700, color:unassignedClients.length>0?"#d97706":"#9ca3af" }}>{unassignedClients.length}件</div>
        </Card>
      </div>

      <div style={{ display:"grid", gridTemplateColumns: sel?"1fr 400px":"1fr", gap:16, alignItems:"start" }}>
        <Card>
          {parents.length === 0 ? (
            <div style={{ padding:40, textAlign:"center", color:"#9ca3af", fontSize:13 }}>
              上位荷主が未登録です。「+ 新規上位荷主を登録」から追加してください。
            </div>
          ) : (
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>
                  {["上位荷主","担当者","紐付け荷主","当月売上","当月粗利","操作"].map(h=>(
                    <th key={h} style={{ padding:"9px 14px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {parentSummaries.map((p,i)=>(
                  <tr key={p.id} onClick={()=>setSel(sel?.id===p.id?null:p)}
                    style={{ borderBottom:"1px solid #e5e7eb", cursor:"pointer", background:sel?.id===p.id?"#f0f9ff":"transparent" }}>
                    <td style={{ padding:"12px 14px", fontWeight:600 }}>
                      <div>{p.name}</div>
                      <div style={{ fontSize:11, color:"#9ca3af", fontWeight:400 }}>{p.id}</div>
                    </td>
                    <td style={{ padding:"12px 14px", color:"#374151" }}>{p.contact||"—"}</td>
                    <td style={{ padding:"12px 14px" }}>
                      {p.children.length===0 ? <span style={{ color:"#9ca3af", fontSize:12 }}>未紐付け</span> : (
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                          {p.children.map(c=>(
                            <span key={c.id} style={{ fontSize:11, background:accent+"15", color:accent, padding:"2px 8px", borderRadius:3 }}>{c.name}</span>
                          ))}
                        </div>
                      )}
                    </td>
                    <td style={{ padding:"12px 14px", fontWeight:700, color:accent }}>{p.totalSell>0?fmt(p.totalSell):"—"}</td>
                    <td style={{ padding:"12px 14px", fontWeight:700, color:"#16a34a" }}>{p.totalProfit>0?fmt(p.totalProfit):"—"}</td>
                    <td style={{ padding:"12px 14px" }}>
                      <div style={{ display:"flex", gap:4 }} onClick={e=>e.stopPropagation()}>
                        <button onClick={()=>startEdit(p)} style={{ padding:"4px 10px", background:"#fff", color:"#6b7280", border:"1px solid #e5e7eb", borderRadius:4, fontSize:11, cursor:"pointer" }}>編集</button>
                        <button onClick={()=>remove(p.id)} style={{ padding:"4px 10px", background:"#fff", color:"#dc2626", border:"1px solid #fecaca", borderRadius:4, fontSize:11, cursor:"pointer" }}>削除</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </Card>

        {sel && (
          <Card style={{ padding:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
              <div>
                <div style={{ fontSize:16, fontWeight:700 }}>{sel.name}</div>
                <div style={{ fontSize:11, color:"#9ca3af" }}>{sel.id}</div>
              </div>
              <button onClick={()=>setSel(null)} style={{ background:"none", border:"none", fontSize:18, cursor:"pointer", color:"#9ca3af" }}>×</button>
            </div>
            {sel.contact && <div style={{ fontSize:12, color:"#374151", marginBottom:4 }}>👤 {sel.contact}</div>}
            {sel.tel && <div style={{ fontSize:12, color:"#374151", marginBottom:4 }}>📞 {sel.tel}</div>}
            {sel.email && <div style={{ fontSize:12, color:"#374151", marginBottom:4 }}>✉ {sel.email}</div>}
            {sel.address && <div style={{ fontSize:12, color:"#374151", marginBottom:8 }}>📍 {sel.address}</div>}
            {sel.note && <div style={{ fontSize:12, color:"#6b7280", background:"#f9fafb", padding:8, borderRadius:4, whiteSpace:"pre-wrap", marginBottom:12 }}>{sel.note}</div>}

            <div style={{ borderTop:"1px solid #e5e7eb", paddingTop:14, marginTop:8 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#6b7280", marginBottom:8 }}>紐付け荷主の管理</div>
              <div style={{ marginBottom:10 }}>
                {sel.children.length>0 ? sel.children.map(c=>(
                  <div key={c.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 8px", background:"#f9fafb", borderRadius:4, marginBottom:4 }}>
                    <div>
                      <span style={{ fontSize:12, fontWeight:600 }}>{c.name}</span>
                      <span style={{ fontSize:10, color:"#9ca3af", marginLeft:6 }}>{fmt(c.sell)}</span>
                    </div>
                    <button onClick={()=>assignChild(c.id, "")} style={{ padding:"2px 8px", background:"#fff", color:"#dc2626", border:"1px solid #fecaca", borderRadius:3, fontSize:10, cursor:"pointer" }}>解除</button>
                  </div>
                )) : <div style={{ fontSize:11, color:"#9ca3af", padding:6 }}>紐付けされた荷主はまだありません</div>}
              </div>
              <div style={{ fontSize:11, fontWeight:600, color:"#6b7280", marginBottom:4 }}>＋ 荷主を紐付ける</div>
              <select onChange={e=>{ if (e.target.value) { assignChild(e.target.value, sel.id); e.target.value=""; } }}
                style={{ width:"100%", padding:"6px 10px", border:"1.5px solid #e5e7eb", borderRadius:4, fontSize:12, background:"#fff", cursor:"pointer" }}>
                <option value="">— 荷主を選択 —</option>
                {clients.filter(c => !parentMap[c.id] || parentMap[c.id]===sel.id).filter(c => !sel.children.some(ch=>ch.id===c.id)).map(c=>(
                  <option key={c.id} value={c.id}>{c.name}（{c.id}）</option>
                ))}
              </select>
            </div>
          </Card>
        )}
      </div>

      {/* 未紐付けリスト */}
      {unassignedClients.length>0 && (
        <Card style={{ padding:16, marginTop:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#d97706", marginBottom:10 }}>⚠ 上位荷主が未設定の荷主 ({unassignedClients.length}件)</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))", gap:8 }}>
            {unassignedClients.map(c=>(
              <div key={c.id} style={{ display:"flex", gap:6, alignItems:"center", padding:"6px 8px", background:"#fef3c7", borderRadius:4 }}>
                <span style={{ fontSize:12, fontWeight:600, flexShrink:0 }}>{c.name}</span>
                <select onChange={e=>assignChild(c.id, e.target.value)} defaultValue=""
                  style={{ flex:1, padding:"4px 6px", border:"1px solid #fcd34d", borderRadius:3, fontSize:11, background:"#fff" }}>
                  <option value="">— 上位荷主に紐付け —</option>
                  {parents.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
};

// ── AppearanceSettings（配色テーマ設定画面） ─────────────────────────────
function AppearanceSettings() {
  const { theme, setTheme, previewTheme, resetTheme, presets } = useTheme();
  const [draft, setDraft] = React.useState(theme);
  React.useEffect(() => { setDraft(theme); }, [theme]);

  const onChange = (key, value) => {
    const next = { ...draft, [key]: value };
    setDraft(next); previewTheme(next);
  };
  const applyPreset = (preset) => { setDraft(preset); previewTheme(preset); };
  const onSave = () => { setTheme(draft); showToast('保存しました'); };
  const onReset = () => { resetTheme(); setDraft(presets.default); showToast('既定値に戻しました'); };

  const fields = [

                  <div style={{ color:"#1e40af", marginTop:3 }}>予定日: {reservations[sel.id].date}{reservations[sel.id].note && ` ／ ${reservations[sel.id].note}`}</div>
                  <button onClick={()=>{ const cp={...reservations}; delete cp[sel.id]; setReservations(cp); }} style={{ marginTop:6, padding:"3px 10px", border:"none", background:"#fff", color:"#1e40af", borderRadius:4, fontSize:11, cursor:"pointer" }}>キャンセル</button>
                </div>
              )}

              <div style={{ display:"flex", gap:8, marginTop:16 }}>
                <button onClick={()=>setShowResForm(s=>!s)} style={{ flex:1, padding:"9px", background:accent, color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:13, cursor:"pointer" }}>
                  {reservations[sel.id]?"予約変更":"車検予約"}
                </button>
                <button onClick={()=>setShowMaintForm(s=>!s)} style={{ flex:1, padding:"9px", border:"1px solid #94a3b8", background:"#fff", color:"#374151", borderRadius:6, fontSize:13, cursor:"pointer" }}>整備記録を追加</button>
              </div>

              {showResForm && (
                <div style={{ marginTop:10, padding:12, background:"#f8fafc", borderRadius:6, border:"1px solid #94a3b8" }}>
                  <div style={{ fontSize:11, color:"#6b7280", marginBottom:4 }}>予約日</div>
                  <input type="date" value={resDraft.date} onChange={e=>setResDraft({...resDraft, date:e.target.value})}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #94a3b8", borderRadius:4, fontSize:13, marginBottom:6 }}/>
                  <div style={{ fontSize:11, color:"#6b7280", marginBottom:4 }}>メモ（任意）</div>
                  <input type="text" placeholder="例: ○○整備工場" value={resDraft.note} onChange={e=>setResDraft({...resDraft, note:e.target.value})}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #94a3b8", borderRadius:4, fontSize:13, marginBottom:8 }}/>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={()=>{
                      if (!resDraft.date) { showToast("予約日を入力してください", "error"); return; }
                      setReservations({ ...reservations, [sel.id]: {...resDraft} });
                      setResDraft({date:"", note:""});
                      setShowResForm(false);
                      showToast(sel.plate+" の車検予約を保存しました");
                    }} style={{ flex:1, padding:"6px", background:accent, color:"#fff", border:"none", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer" }}>保存</button>
                    <button onClick={()=>setShowResForm(false)} style={{ padding:"6px 12px", background:"#fff", border:"1px solid #94a3b8", borderRadius:4, fontSize:12, cursor:"pointer" }}>キャンセル</button>
                  </div>
                </div>
              )}

              {showMaintForm && (
                <div style={{ marginTop:10, padding:12, background:"#f8fafc", borderRadius:6, border:"1px solid #94a3b8" }}>
                  <div style={{ fontSize:11, color:"#6b7280", marginBottom:4 }}>整備日</div>
                  <input type="date" value={maintDraft.date} onChange={e=>setMaintDraft({...maintDraft, date:e.target.value})}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #94a3b8", borderRadius:4, fontSize:13, marginBottom:6 }}/>
                  <div style={{ fontSize:11, color:"#6b7280", marginBottom:4 }}>整備内容</div>
                  <input type="text" placeholder="例: オイル交換" value={maintDraft.item} onChange={e=>setMaintDraft({...maintDraft, item:e.target.value})}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #94a3b8", borderRadius:4, fontSize:13, marginBottom:8 }}/>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={()=>{
                      if (!maintDraft.date || !maintDraft.item) { showToast("日付と内容を入力してください", "error"); return; }
                      const cur = maintExtras[sel.id] || [];
                      setMaintExtras({ ...maintExtras, [sel.id]: [{...maintDraft}, ...cur] });
                      setMaintDraft({date:"", item:""});
                      setShowMaintForm(false);
                      showToast("整備記録を追加しました");
                    }} style={{ flex:1, padding:"6px", background:accent, color:"#fff", border:"none", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer" }}>追加</button>
                    <button onClick={()=>setShowMaintForm(false)} style={{ padding:"6px 12px", background:"#fff", border:"1px solid #94a3b8", borderRadius:4, fontSize:12, cursor:"pointer" }}>キャンセル</button>
                  </div>
                </div>
              )}
            </Card>
          );
        })()}
      </div>
    </div>
  );
};

// ── 配車管理（DispatchPage）: 週間配車表 + シフト管理 ─────────────────────
const DISPATCH_CLIENT_COLORS = {
  "C-01":{bg:"#dbeafe",fg:"#1e40af"}, "C-02":{bg:"#fce7f3",fg:"#9d174d"}, "C-03":{bg:"#d1fae5",fg:"#065f46"},
  "C-04":{bg:"#fef9c3",fg:"#854d0e"}, "C-05":{bg:"#ede9fe",fg:"#5b21b6"}, "C-06":{bg:"#e2e8f0",fg:"#334155"},
  "C-07":{bg:"#dcfce7",fg:"#14532d"}, "C-08":{bg:"#fee2e2",fg:"#991b1b"}, "C-09":{bg:"#e0e7ff",fg:"#3730a3"},
  "C-10":{bg:"#ffedd5",fg:"#9a3412"}, "C-11":{bg:"#fef3c7",fg:"#92400e"},
};
const DISPATCH_CLIENT_SHORT = {
  "C-01":"ASKUL","C-02":"Bloomee","C-03":"アクア","C-04":"カウネット","C-05":"サーガ","C-06":"スポット",
  "C-07":"ファミマ","C-08":"トムソン","C-09":"RICOH","C-10":"旭食品","C-11":"タイヤ",
};
const SHIFT_STATES = ["日勤","早番","遅番","有休","休"];
const SHIFT_STYLE = {
  "日勤":{bg:"#eff6ff",fg:"#2563eb"}, "早番":{bg:"#ecfeff",fg:"#0891b2"}, "遅番":{bg:"#fff7ed",fg:"#c2410c"},
  "有休":{bg:"#f5f3ff",fg:"#7c3aed"}, "休":{bg:"#f1f5f9",fg:"#94a3b8"},
};

const DispatchPage = ({ accent, setPage }) => {
  const [tab, setTab] = React.useState("dispatch"); // dispatch | shift | bill
  const [weekOffset, setWeekOffset] = React.useState(0);
  const [dispatch, setDispatch] = useLocalStorage("jt_dispatch", {});
  const [shifts, setShifts] = useLocalStorage("jt_shifts", {});
  const [confirmed, setConfirmed] = useLocalStorage("jt_dispatch_confirmed", {});
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  const [billMonth, setBillMonth] = React.useState(REF_MONTH);
  const shiftMonth = (delta) => { const [y,m]=billMonth.split("-").map(Number); const d=new Date(y,m-1+delta,1); setBillMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); };

  // ── Supabase 永続化（jt_dispatch / jt_shifts / jt_dispatch_confirmed）─────────
  // jt_daily_entries と同じ方針: localStorage を即時キャッシュにしつつ、
  // マウント時にロード（SB優先・空なら既存localStorageを温存して初回移行）、
  // 変更時はデバウンスで差分 upsert/delete（バッチ操作も state 監視で捕捉される）。
  const sbReady = React.useRef(false);
  const sbSnap = React.useRef({ dispatch:{}, shifts:{}, confirmed:{} });
  const sbTimer = React.useRef({});
  // {dk:{did:val}} を "dk|did"→val のフラットMapに展開（空値は除外）
  const flat2 = (obj) => { const m={}; Object.keys(obj||{}).forEach(dk=>{ const day=obj[dk]||{}; Object.keys(day).forEach(did=>{ if(day[did]) m[`${dk}|${did}`]=day[did]; }); }); return m; };
  const syncFlat = async (table, dateCol, valCol, curr, snapKey) => {
    if(!window.sb) return;
    const want = flat2(curr), have = flat2(sbSnap.current[snapKey]);
    const ups=[], dels=[];
    Object.keys(want).forEach(k=>{ if(have[k]!==want[k]){ const [dk,did]=k.split("|"); ups.push({ [dateCol]:dk, driver_id:did, [valCol]:want[k] }); } });
    Object.keys(have).forEach(k=>{ if(!(k in want)){ const [dk,did]=k.split("|"); dels.push({dk,did}); } });
    try {
      if(ups.length) await window.sb.from(table).upsert(ups, { onConflict:`${dateCol},driver_id` });
      for(const d of dels) await window.sb.from(table).delete().eq(dateCol,d.dk).eq("driver_id",d.did);
      sbSnap.current[snapKey] = JSON.parse(JSON.stringify(curr));
    } catch(e){ console.warn(`[Supabase] ${table} sync failed:`, e); }
  };
  const syncConfirmed = async (curr) => {
    if(!window.sb) return;
    const want=curr||{}, have=sbSnap.current.confirmed||{};
    const ups=[], dels=[];
    Object.keys(want).forEach(dk=>{ if(have[dk]!==want[dk]) ups.push({ confirm_date:dk, confirmed_at:want[dk] }); });
    Object.keys(have).forEach(dk=>{ if(!(dk in want)) dels.push(dk); });
    try {
      if(ups.length) await window.sb.from("jt_dispatch_confirmed").upsert(ups, { onConflict:"confirm_date" });
      for(const dk of dels) await window.sb.from("jt_dispatch_confirmed").delete().eq("confirm_date",dk);
      sbSnap.current.confirmed = JSON.parse(JSON.stringify(curr));
    } catch(e){ console.warn("[Supabase] jt_dispatch_confirmed sync failed:", e); }
  };
  React.useEffect(() => {
    if(!window.sb){ sbReady.current = true; return; }
    (async () => {
      try {
        const [d,s,c] = await Promise.all([
          window.sb.from("jt_dispatch").select("*"),
          window.sb.from("jt_shifts").select("*"),
          window.sb.from("jt_dispatch_confirmed").select("*"),
        ]);
        if(!d.error && d.data && d.data.length){
          const o={}; d.data.forEach(r=>{ (o[r.dispatch_date]=o[r.dispatch_date]||{})[r.driver_id]=r.client_id; });
          sbSnap.current.dispatch = JSON.parse(JSON.stringify(o)); setDispatch(o);
        } else { sbSnap.current.dispatch = {}; } // SB空: 既存localStorageを保存処理で移行
        if(!s.error && s.data && s.data.length){
          const o={}; s.data.forEach(r=>{ (o[r.shift_date]=o[r.shift_date]||{})[r.driver_id]=r.state; });
          sbSnap.current.shifts = JSON.parse(JSON.stringify(o)); setShifts(o);
        } else { sbSnap.current.shifts = {}; }
        if(!c.error && c.data && c.data.length){
          const o={}; c.data.forEach(r=>{ o[r.confirm_date]=r.confirmed_at; });
          sbSnap.current.confirmed = JSON.parse(JSON.stringify(o)); setConfirmed(o);
        } else { sbSnap.current.confirmed = {}; }
        console.log("[Supabase] dispatch loaded:", d.data?.length||0, s.data?.length||0, c.data?.length||0);
        // 初回移行: SBが空で既存localStorageにデータがあれば push（state不変で保存effectが発火しないため明示実行）
        if((!d.data || !d.data.length) && Object.keys(dispatch).length) syncFlat("jt_dispatch","dispatch_date","client_id",dispatch,"dispatch");
        if((!s.data || !s.data.length) && Object.keys(shifts).length) syncFlat("jt_shifts","shift_date","state",shifts,"shifts");
        if((!c.data || !c.data.length) && Object.keys(confirmed).length) syncConfirmed(confirmed);
      } catch(e){ console.warn("[Supabase] dispatch load failed:", e); }
      finally { sbReady.current = true; }
    })();
  }, []);
  React.useEffect(() => { if(!sbReady.current) return; clearTimeout(sbTimer.current.d); sbTimer.current.d = setTimeout(()=>syncFlat("jt_dispatch","dispatch_date","client_id",dispatch,"dispatch"), 500); }, [dispatch]);
  React.useEffect(() => { if(!sbReady.current) return; clearTimeout(sbTimer.current.s); sbTimer.current.s = setTimeout(()=>syncFlat("jt_shifts","shift_date","state",shifts,"shifts"), 500); }, [shifts]);
  React.useEffect(() => { if(!sbReady.current) return; clearTimeout(sbTimer.current.c); sbTimer.current.c = setTimeout(()=>syncConfirmed(confirmed), 500); }, [confirmed]);

  const now = new Date();
  const dkOf = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const dow0 = now.getDay()===0?6:now.getDay()-1;
  const mon = new Date(now); mon.setHours(0,0,0,0); mon.setDate(now.getDate()-dow0+weekOffset*7);
  const dayNames = ["月","火","水","木","金","土","日"];
  const weekDays = Array.from({length:7},(_,i)=>{
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    return { date:d, dk:dkOf(d), label:`${d.getMonth()+1}/${d.getDate()}`, dayName:dayNames[i],
      isToday:d.toDateString()===now.toDateString(), isSun:i===6, isSat:i===5, isWeekend:i>=5 };
  });
  const prevWeekDk = weekDays.map(wd=>{ const d=new Date(wd.date); d.setDate(d.getDate()-7); return dkOf(d); });
  const weekLabel = `${weekDays[0].label}（月）〜 ${weekDays[6].label}（日）`;
  const todayDk = dkOf(now);
  const todayInWeek = weekDays.some(wd=>wd.dk===todayDk);

  const assignableClients = (did) => clients.filter(c=>c.drivers.includes(did));
  const vehByDriver = {}; vehicleMaster.forEach(v=>{ if(v.driverId) vehByDriver[v.driverId]=v; });
  const selfDrivers = drivers.filter(d=>d.type==="自社");
  const partnerDrivers = drivers.filter(d=>d.type==="協力会社");

  // ── 配車データ操作 ──
  const getDisp = (dk,did) => (dispatch[dk]&&dispatch[dk][did]) || "";
  const setDisp = (dk,did,cid) => setDispatch(prev=>{
    const next={...prev}; const day={...(next[dk]||{})};
    if(!cid) delete day[did]; else day[did]=cid;
    if(Object.keys(day).length) next[dk]=day; else delete next[dk];
    return next;
  });
  const autoFillWeek = () => {
    if(!confirm("空いている平日（月〜金）に、各ドライバーの主担当荷主を自動配車します。\n（入力済みのセルは変更しません）")) return;
    setDispatch(prev=>{
      const next={...prev};
      weekDays.forEach(wd=>{
        if(wd.isWeekend || confirmed[wd.dk]) return;
        const day={...(next[wd.dk]||{})};
        drivers.forEach(dr=>{ if(day[dr.id]) return; const ac=assignableClients(dr.id); if(ac.length) day[dr.id]=ac[0].id; });
        if(Object.keys(day).length) next[wd.dk]=day;
      });
      return next;
    });
  };
  const copyPrevWeek = () => {
    if(!confirm("先週の配車を今週にコピーします。今週の既存入力は上書きされます。よろしいですか？")) return;
    setDispatch(prev=>{
      const next={...prev};
      weekDays.forEach((wd,i)=>{ if(confirmed[wd.dk]) return; const src=prev[prevWeekDk[i]]; if(src&&Object.keys(src).length) next[wd.dk]={...src}; else delete next[wd.dk]; });
      return next;
    });
  };
  const clearWeekDisp = () => {
    if(!confirm("今週の配車をすべてクリアします。（確定済みの日は保持されます）よろしいですか？")) return;
    setDispatch(prev=>{ const next={...prev}; weekDays.forEach(wd=>{ if(!confirmed[wd.dk]) delete next[wd.dk]; }); return next; });
  };

  // ── 配車先の確定 ──
  const isConfirmed = (dk) => !!confirmed[dk];
  const toggleConfirmDay = (dk) => {
    const has = dispCountFor(dk) > 0;
    if(!confirmed[dk] && !has){ alert("この日には配車が入力されていないため、確定できません。"); return; }
    setConfirmed(prev=>{ const next={...prev}; if(next[dk]) delete next[dk]; else next[dk]=new Date().toISOString(); return next; });
  };
  const confirmWeek = () => {
    const target = weekDays.filter(wd=>dispCountFor(wd.dk)>0 && !confirmed[wd.dk]);
    if(!target.length){ alert("確定できる配車（入力済みで未確定の日）がありません。"); return; }
    if(!confirm(`今週の配車 ${target.length}日分を確定します。\n確定後は自動配車・先週コピー・週クリアの対象外になり、請求連動の集計対象になります。\nよろしいですか？`)) return;
    setConfirmed(prev=>{ const next={...prev}; const ts=new Date().toISOString(); target.forEach(wd=>{ next[wd.dk]=ts; }); return next; });
  };
  const unconfirmWeek = () => {
    const target = weekDays.filter(wd=>confirmed[wd.dk]);
    if(!target.length) return;
    if(!confirm(`今週の確定済み ${target.length}日分を解除します。よろしいですか？`)) return;
    setConfirmed(prev=>{ const next={...prev}; target.forEach(wd=>delete next[wd.dk]); return next; });
  };

  // 確定セル → 実績(dailyActuals + jt_daily_edits)の読み取り専用ジョイン（computeLiveSum と同じセル単位マージ）
  const cellBilling = (cid, dk, did) => {
    const c = resolveClientById(cid); if(!c) return {sell:0,pay:0,has:false};
    const baseDrv = (dailyActuals[cid]&&dailyActuals[cid][dk]&&dailyActuals[cid][dk][did]) || {};
    const editDrv = (dailyEdits[cid]&&dailyEdits[cid][dk]&&dailyEdits[cid][dk][did]) || {};
    const labels = new Set([...Object.keys(baseDrv), ...Object.keys(editDrv)]);
    let sell=0, pay=0, has=false;
    labels.forEach(lbl=>{ const editV=editDrv[lbl]; const v=editV!==undefined?editV:baseDrv[lbl]; const cnt=Number(v)||0; const r=c.rates.find(rr=>rr.label===lbl); if(r&&cnt){ sell+=cnt*r.sell; pay+=cnt*r.pay; has=true; } });
    return {sell, pay, has};
  };

  // 荷主×締め期間内の「配車のべ件数 / 確定日数」（読み取り専用）
  const dispatchPeriodInfo = (cid, mk) => {
    const c = resolveClientById(cid) || {};
    const bp = billingPeriodFor(mk, c.billingCycle);
    let count=0, confirmedCount=0; const days=new Set(); const cfDays=new Set();
    Object.keys(dispatch).forEach(dk=>{
      if(dk < bp.start || dk > bp.end) return;
      const day = dispatch[dk]||{};
      const assigned = Object.keys(day).filter(did=>day[did]===cid);
      if(assigned.length){ count+=assigned.length; days.add(dk); if(confirmed[dk]){ confirmedCount+=assigned.length; cfDays.add(dk); } }
    });
    return { count, confirmedCount, days:days.size, confirmedDays:cfDays.size, bp };
  };

  // ── シフトデータ操作 ──
  const getShift = (dk,did) => (shifts[dk]&&shifts[dk][did]) || "";
  const cycleShift = (dk,did) => {
    const cur=getShift(dk,did); const idx=SHIFT_STATES.indexOf(cur);
    const nx = idx<0 ? SHIFT_STATES[0] : (idx===SHIFT_STATES.length-1 ? "" : SHIFT_STATES[idx+1]);
    setShifts(prev=>{
      const next={...prev}; const day={...(next[dk]||{})};
      if(!nx) delete day[did]; else day[did]=nx;
      if(Object.keys(day).length) next[dk]=day; else delete next[dk];
      return next;
    });
  };
  const fillShiftWeek = () => {
    if(!confirm("平日（月〜金）を全ドライバー「日勤」、土日を「休」に一括設定します。\n（入力済みも上書きされます）")) return;
    setShifts(prev=>{
      const next={...prev};
      weekDays.forEach(wd=>{ const day={}; drivers.forEach(dr=>{ day[dr.id]=wd.isWeekend?"休":"日勤"; }); next[wd.dk]=day; });
      return next;
    });
  };
  const clearShiftWeek = () => {
    if(!confirm("今週のシフトをすべてクリアします。よろしいですか？")) return;
    setShifts(prev=>{ const next={...prev}; weekDays.forEach(wd=>delete next[wd.dk]); return next; });
  };

  // ── 集計 ──
  const dispCountFor = (dk) => { const day=dispatch[dk]||{}; return Object.values(day).filter(v=>v).length; };
  const weekDispTotal = weekDays.reduce((s,wd)=>s+dispCountFor(wd.dk),0);
  const weekdayDispTotal = weekDays.filter(wd=>!wd.isWeekend).reduce((s,wd)=>s+dispCountFor(wd.dk),0);
  const activeDriverIds = new Set();
  weekDays.forEach(wd=>{ const day=dispatch[wd.dk]||{}; Object.keys(day).forEach(did=>{ if(day[did]) activeDriverIds.add(did); }); });
  const openSlots = weekDays.filter(wd=>!wd.isWeekend).reduce((s,wd)=>{
    return s + drivers.filter(dr=>assignableClients(dr.id).length>0 && !getDisp(wd.dk,dr.id)).length;
  },0);
  const driverWeekDays = (did) => weekDays.filter(wd=>getDisp(wd.dk,did)).length;
  const weekDispDays = weekDays.filter(wd=>dispCountFor(wd.dk)>0).length;
  const weekConfirmedDays = weekDays.filter(wd=>isConfirmed(wd.dk)).length;

  const shiftCount = (dk,states) => { const day=shifts[dk]||{}; return Object.values(day).filter(v=>states.includes(v)).length; };
  const weekWork = weekDays.reduce((s,wd)=>s+shiftCount(wd.dk,["日勤","早番","遅番"]),0);
  const weekPaid = weekDays.reduce((s,wd)=>s+shiftCount(wd.dk,["有休"]),0);
  const weekOff  = weekDays.reduce((s,wd)=>s+shiftCount(wd.dk,["休"]),0);
  const driverShiftWorkDays = (did) => weekDays.filter(wd=>["日勤","早番","遅番"].includes(getShift(wd.dk,did))).length;

  // 荷主別の週間配車件数（凡例兼サマリ）
  const clientWeekCount = {};

                    <td style={{ padding:"9px 12px", textAlign:"right", fontWeight:700, color:"#6b7280" }}>{totMargin.toFixed(1)}%</td>
                    <td/>
                  </tr>
                </tfoot>
              </table>
            </Card>

            <div style={{ fontSize:11, color:"#9ca3af", marginTop:10, lineHeight:1.8 }}>
              ※「請求連動」は確定した配車を実績（日次実績・収支）と<b>読み取り専用</b>で突合する画面です。配車の確定によって請求金額そのものが書き換わることはありません。<br/>
              ※ 売上・支払・粗利は各荷主の<b>締め期間</b>（{mkLabel(billMonth)}）で集計しています（収支管理・請求管理と同一ロジック）。<br/>
              ※ 連動状態: <b style={{color:"#15803d"}}>連動済</b>=確定配車あり＋実績あり／<b style={{color:"#b45309"}}>確定（実績待ち）</b>=確定済だが実績未入力／<b style={{color:"#0369a1"}}>未確定</b>=配車はあるが未確定／<b style={{color:"#64748b"}}>実績のみ</b>=配車登録なし。<br/>
              ※ 実際の請求書発行・入金消込は「請求管理」、金額の修正は「日次実績入力」で行ってください。
            </div>
          </div>
        );
      })()}
    </div>
  );
};

const AttendancePage = ({ accent }) => {
  const [tab, setTab] = React.useState("attendance"); // "attendance" | "schedule"
  const [expandedDriver, setExpandedDriver] = React.useState(null);
  const [weekOffset, setWeekOffset] = React.useState(0);
  // 配車・シフトの実データを購読（配車ページの入力と連動）
  const [dispatch] = useLocalStorage("jt_dispatch", {});
  const [shifts] = useLocalStorage("jt_shifts", {});

  const stColor = { "出勤":"#16a34a","出勤中":"#2563eb","有給":"#7c3aed","休日":"#9ca3af","欠勤":"#dc2626","公休":"#6b7280","早番":"#0891b2","遅番":"#7c3aed" };
  const stBg    = { "出勤":"#f0fdf4","出勤中":"#eff6ff","有給":"#f5f3ff","休日":"#f8fafc","欠勤":"#fef2f2","公休":"#f9fafb","早番":"#ecfeff","遅番":"#f5f3ff" };

  const _pad = n => String(n).padStart(2,"0");
  const _now = new Date();
  const _todayDk = `${_now.getFullYear()}-${_pad(_now.getMonth()+1)}-${_pad(_now.getDate())}`;
  const _monthPrefix = REF_MONTH;            // 集計対象月（実データ基準月）
  const _monthLabel = mkLabel(REF_MONTH);
  const [_y, _mo] = REF_MONTH.split("-").map(Number);
  const _daysInMonth = new Date(_y, _mo, 0).getDate();
  const _dowName = ["日","月","火","水","木","金","土"];
  // id→荷主名（追加荷主込み）
  const _clientName = {}; allClientsLive().forEach(c => { _clientName[c.id] = c.name; });
  const _shiftToSt = { "有休":"有給", "休":"休日", "日勤":"出勤", "早番":"早番", "遅番":"遅番" };

  // 実ドライバー（drivers）＋実配車（dispatch）／シフト（shifts）から月次サマリーを生成
  const driverSummary = drivers.map(d => {
    let workDays = 0, restDays = 0;
    for (let dd = 1; dd <= _daysInMonth; dd++) {
      const dk = `${_monthPrefix}-${_pad(dd)}`;
      const assigned = dispatch[dk] && dispatch[dk][d.id];
      const sh = shifts[dk] && shifts[dk][d.id];
      if (assigned) workDays++;
      else if (sh === "有休" || sh === "休") restDays++;
    }
    const tAssigned = dispatch[_todayDk] && dispatch[_todayDk][d.id];
    const tShift = shifts[_todayDk] && shifts[_todayDk][d.id];
    let todaySt = "—";
    if (tShift && _shiftToSt[tShift]) todaySt = _shiftToSt[tShift];
    else if (tAssigned) todaySt = "出勤";
    return { id:d.id, name:d.name, type:d.type, workDays, restDays,
      todaySt, in:"—", ot:"—", otMin:0, paidLeft:"—", absent:0,
      todayClient: tAssigned ? (_clientName[tAssigned] || tAssigned) : null };
  });

  // ドライバー詳細日次記録（当月・実配車/シフトから生成）
  const detailRecords = Object.fromEntries(drivers.map(d => {
    const rows = [];
    for (let dd = 1; dd <= _daysInMonth; dd++) {
      const dk = `${_monthPrefix}-${_pad(dd)}`;
      const dow = _dowName[new Date(_y, _mo-1, dd).getDay()];
      const assigned = dispatch[dk] && dispatch[dk][d.id];
      const sh = shifts[dk] && shifts[dk][d.id];
      let st;
      if (assigned) st = "出勤";
      else if (sh && _shiftToSt[sh]) st = _shiftToSt[sh];
      else continue; // 配車もシフトも無い日は表示しない
      rows.push({ d:dd, day:dow, in:"—", out:"—",
        work: assigned ? (_clientName[assigned] || assigned) : "—",
        ot:"—", st });
    }
    return [d.id, rows];
  }));

  const clientColor = {
    "ASKUL":"#dbeafe","Bloomee":"#fce7f3","アクアクララ":"#d1fae5","カウネット・NBC":"#fef9c3",
    "サーガ":"#ede9fe","ファミリーマート":"#dcfce7","日本トムソン":"#fee2e2","タイヤ配送":"#ffedd5",
    "RICOH":"#e0e7ff","旭食品（ダイコク便）":"#fef3c7","有給":"#f5f3ff","—":"transparent"
  };
  const clientTextColor = {
    "ASKUL":"#1e40af","Bloomee":"#9d174d","アクアクララ":"#065f46","カウネット・NBC":"#854d0e",
    "サーガ":"#5b21b6","ファミリーマート":"#14532d","日本トムソン":"#991b1b","タイヤ配送":"#9a3412",
    "RICOH":"#3730a3","旭食品（ダイコク便）":"#92400e","有給":"#7c3aed","—":"#d1d5db"
  };
  const _palette = ["#dbeafe","#fce7f3","#d1fae5","#fef9c3","#ede9fe","#dcfce7","#fee2e2","#ffedd5","#e0e7ff","#fef3c7"];

  // 今週の日付生成
  const now = _now;
  const dow0 = now.getDay()===0?6:now.getDay()-1;
  const mon = new Date(now); mon.setDate(now.getDate()-dow0+weekOffset*7);
  const weekDays = Array.from({length:7},(_,i)=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const dk = `${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
    const isToday = d.toDateString()===now.toDateString();
    return { dk, label:`${d.getMonth()+1}/${d.getDate()}`, dayName:["月","火","水","木","金","土","日"][i], isToday, isSun:i===6, isSat:i===5 };
  });
  const weekLabel = `${weekDays[0].label}（月）〜 ${weekDays[4].label}（金）`;

  // 運行予定（実配車から週次で生成）：scheduleData[did] = 7日分の荷主名 or "—"
  const scheduleData = {};
  drivers.forEach(d => {
    scheduleData[d.id] = weekDays.map(wd => {
      const cid = dispatch[wd.dk] && dispatch[wd.dk][d.id];
      if (cid) return _clientName[cid] || cid;
      const sh = shifts[wd.dk] && shifts[wd.dk][d.id];
      if (sh === "有休") return "有給";
      return "—";
    });
  });
  // 未知の荷主名にも安定した色を割り当てる
  const _colorFor = (name) => {
    if (clientColor[name] !== undefined) return { bg:clientColor[name], fg:clientTextColor[name]||"#374151" };
    let h=0; for (let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
    return { bg:_palette[h % _palette.length], fg:"#374151" };
  };

  const otLimit = 45*60;

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:700, marginBottom:16 }}>勤怠管理</div>

      {/* タブ */}
      <div style={{ display:"flex", gap:4, marginBottom:16, borderBottom:"2px solid #475569", paddingBottom:0 }}>
        {[["attendance","勤怠一覧"],["schedule","運行予定"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            style={{ padding:"8px 20px", border:"none", background:"transparent", fontWeight:tab===v?700:400,
              color:tab===v?accent:"#6b7280", fontSize:14, cursor:"pointer",
              borderBottom:tab===v?`2px solid ${accent}`:"2px solid transparent", marginBottom:-2 }}>
            {l}
          </button>
        ))}
      </div>

      {tab==="attendance" && (
        <div>
          {/* サマリーKPI */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:16 }}>
            {[
              { label:"本日出勤", value:`${driverSummary.filter(d=>["出勤","出勤中","早番","遅番"].includes(d.todaySt)).length}名`, sub:`全${driverSummary.length}名中`, color:"#16a34a" },
              { label:`${_monthLabel} 配車のべ日数`, value:`${driverSummary.reduce((s,d)=>s+d.workDays,0)}日`, sub:"確定・実績ベース", color:accent },
              { label:"本日有給", value:`${driverSummary.filter(d=>d.todaySt==="有給").length}名`, sub:"取得中", color:"#7c3aed" },
              { label:"本日休日", value:`${driverSummary.filter(d=>d.todaySt==="休日").length}名`, sub:"シフト", color:"#6b7280" },
            ].map(k=>(
              <Card key={k.label} style={{ padding:"14px 18px" }}>
                <div style={{ fontSize:11, color:"#6b7280", marginBottom:6 }}>{k.label}</div>
                <div style={{ fontSize:22, fontWeight:700, color:k.color }}>{k.value}</div>
                <div style={{ fontSize:11, color:"#9ca3af", marginTop:4 }}>{k.sub}</div>
              </Card>
            ))}
          </div>

          {/* 全ドライバー一覧 */}
          <Card>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>
                  {["ドライバー","種別","今日の状況","当月配車日数","当月休日数","本日担当",""].map(h=>(
                    <th key={h} style={{ padding:"10px 14px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:11, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {driverSummary.map(d=>{
                  const isExpanded = expandedDriver===d.id;
                  const otWarn = d.otMin >= otLimit*0.9;
                  const recs = detailRecords[d.id];
                  return (
                    <React.Fragment key={d.id}>
                      <tr style={{ borderBottom:"1px solid #94a3b8", background:isExpanded?accent+"06":"transparent", cursor:"pointer" }}
                        onClick={()=>setExpandedDriver(isExpanded?null:d.id)}>
                        <td style={{ padding:"11px 14px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <Avatar name={d.name} size={28} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                            <span style={{ fontWeight:600 }}>{d.name}</span>
                          </div>
                        </td>
                        <td style={{ padding:"11px 14px" }}><StatusBadge label={d.type}/></td>
                        <td style={{ padding:"11px 14px" }}>
                          <span style={{ padding:"3px 10px", borderRadius:4, fontSize:11.5, fontWeight:600,
                            background:stBg[d.todaySt]||"#f1f5f9", color:stColor[d.todaySt]||"#475569" }}>
                            {d.todaySt}{d.in!=="—"?` ${d.in}〜`:""}
                          </span>
                        </td>
                        <td style={{ padding:"11px 14px", fontWeight:600 }}>{d.workDays>0?`${d.workDays}日`:"—"}</td>
                        <td style={{ padding:"11px 14px", color:"#6b7280" }}>{d.restDays>0?`${d.restDays}日`:"—"}</td>
                        <td style={{ padding:"11px 14px", color:d.todayClient?"#374151":"#9ca3af", fontSize:12 }}>{d.todayClient||"—"}</td>
                        <td style={{ padding:"11px 14px", color:"#9ca3af", fontSize:12 }}>{isExpanded?"▲":"▼"}</td>
                      </tr>
                      {isExpanded && (
                        <tr>
                          <td colSpan={7} style={{ padding:"0 0 8px 0", background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>
                            <div style={{ padding:"12px 16px" }}>
                              <div style={{ fontSize:12, fontWeight:600, color:"#374151", marginBottom:8 }}>{_monthLabel} 日次記録（配車・シフト連動）</div>
                              {recs.length===0 ? (
                                <div style={{ fontSize:12, color:"#9ca3af", padding:"8px 0" }}>当月の配車・シフト記録はありません。</div>
                              ) : (
                              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                                <thead>
                                  <tr style={{ background:"#f1f3f5" }}>
                                    {["日付","状態","担当荷主"].map(h=>(
                                      <th key={h} style={{ padding:"6px 12px", textAlign:"left", color:"#6b7280", fontWeight:500 }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {[...recs].reverse().map(r=>(
                                    <tr key={r.d} style={{ borderBottom:"1px solid #94a3b8" }}>
                                      <td style={{ padding:"6px 12px", fontWeight:500 }}>{_mo}/{String(r.d).padStart(2,"0")}（{r.day}）</td>
                                      <td style={{ padding:"6px 12px" }}>
                                        <span style={{ padding:"2px 8px", borderRadius:3, fontSize:11, fontWeight:600,
                                          background:stBg[r.st]||"#f1f5f9", color:stColor[r.st]||"#6b7280" }}>{r.st}</span>

                                  ))}

                              </table>
                              )}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {tab==="schedule" && (

          {/* 週ナビ */}
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>

            <span style={{ fontWeight:600, fontSize:14 }}>{weekLabel}</span>
            <button onClick={()=>setWeekOffset(w=>w+1)}
              style={{ padding:"5px 12px", border:"1.5px solid #e5e7eb", borderRadius:4, background:"#fff", cursor:"pointer", fontSize:13 }}>次週 ＞</button>
            {weekOffset!==0&&<button onClick={()=>setWeekOffset(0)}
              style={{ padding:"5px 12px", border:`1.5px solid ${accent}`, borderRadius:4, background:accent+"10", color:accent, cursor:"pointer", fontSize:12, fontWeight:600 }}>今週</button>}
          </div>

          <Card style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>

                    <th key={i} style={{ padding:"10px 10px", textAlign:"center", color:d.isSun?"#dc2626":d.isSat?"#2563eb":d.isToday?accent:"#6b7280",
                      fontWeight:d.isToday?700:500, fontSize:12, minWidth:90,
                      background:d.isToday?accent+"0a":"transparent",
                      borderRight:i<6?"1px solid #94a3b8":"none" }}>
                      <div>{d.label}</div>
                      <div style={{ fontSize:10 }}>({d.dayName})</div>
                      {d.isToday&&<div style={{ fontSize:9, background:accent, color:"#fff", borderRadius:2, padding:"1px 4px", marginTop:2, display:"inline-block" }}>TODAY</div>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {driverSummary.map(d=>(
                  <tr key={d.id} style={{ borderBottom:"1px solid #94a3b8" }}>
                    <td style={{ padding:"10px 14px", borderRight:"1px solid #94a3b8" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                        <Avatar name={d.name} size={24} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                        <div>
                          <div style={{ fontWeight:600, fontSize:12 }}>{d.name}</div>
                          <div style={{ fontSize:10, color:"#9ca3af" }}>{d.type}</div>
                        </div>
                      </div>
                    </td>
                    {(scheduleData[d.id]||[]).map((c,i)=>(
                      <td key={i} style={{ padding:"8px 6px", textAlign:"center",
                        background:weekDays[i]?.isToday?accent+"06":"transparent",
                        borderRight:i<6?"1px solid #94a3b8":"none" }}>
                        {c!=="—"
                          ? <span style={{ display:"inline-block", padding:"3px 8px", borderRadius:4, fontSize:11, fontWeight:600,
                              background:_colorFor(c).bg, color:_colorFor(c).fg }}>{c}</span>
                          : <span style={{ color:"#e5e7eb", fontSize:12 }}>—</span>
                        }
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      )}
    </div>
  );
};
