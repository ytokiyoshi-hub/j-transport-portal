// ── TodoPage（ToDo リスト管理）─────────────────────────────────────────
const TodoPage = ({ accent }) => {
  const [todos, setTodos] = useLocalStorage("jt_todos", []);
  const [draft, setDraft] = React.useState({ title:"", priority:"中", due:"", assignee:"", note:"" });
  const [filter, setFilter] = React.useState("active"); // active | all | done
  const [editingId, setEditingId] = React.useState(null);
  const editOrigTitle = React.useRef("");

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const add = () => {
    if (!draft.title.trim()) return;
    const now = Date.now();
    setTodos(prev => [{
      id: now, title: draft.title.trim(), priority: draft.priority,
      due: draft.due || null, assignee: draft.assignee.trim() || null,
      note: draft.note.trim() || "", done: false, createdAt: now,
    }, ...prev]);
    setDraft({ title:"", priority:"中", due:"", assignee:"", note:"" });
    showToast("タスクを追加しました");
  };

  const toggle = (id) => setTodos(prev => prev.map(t => t.id===id ? { ...t, done: !t.done, doneAt: t.done?null:Date.now() } : t));
  const remove = (id) => { if (confirm("このタスクを削除しますか？")) setTodos(prev => prev.filter(t => t.id!==id)); };
  const startEdit = (t) => { editOrigTitle.current = t.title; setEditingId(t.id); };
  const updateTodo = (id, patch) => setTodos(prev => prev.map(t => t.id===id ? { ...t, ...patch } : t));
  const closeEdit = () => { const cur = todos.find(x => x.id === editingId); if (cur && !cur.title.trim()) updateTodo(cur.id, { title: editOrigTitle.current }); setEditingId(null); };

  const list = todos.filter(t => filter==="all" ? true : filter==="done" ? t.done : !t.done);
  // 優先度→期日順にソート
  const priOrder = { "高":0, "中":1, "低":2 };
  const sorted = [...list].sort((a,b) => {
    if (a.done !== b.done) return a.done?1:-1;
    const pd = priOrder[a.priority] - priOrder[b.priority];
    if (pd) return pd;
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1; if (b.due) return 1;
    return b.createdAt - a.createdAt;
  });

  const stats = {
    total: todos.length,
    active: todos.filter(t=>!t.done).length,
    overdue: todos.filter(t=>!t.done && t.due && t.due < todayStr).length,
    today: todos.filter(t=>!t.done && t.due === todayStr).length,
    done: todos.filter(t=>t.done).length,
  };

  const priColor = (p) => p==="高"?"#B05A60":p==="中"?"#C39A52":"#A09AAB";
  const dueColor = (due, done) => {
    if (!due || done) return "#A09AAB";
    if (due < todayStr) return "#B05A60";
    if (due === todayStr) return "#C39A52";
    return "#6E9E78";
  };
  const dueLabel = (due) => {
    if (!due) return "—";
    const d = new Date(due+"T00:00:00");
    const diff = Math.round((d - new Date(todayStr+"T00:00:00"))/86400000);
    const mm = d.getMonth()+1, dd = d.getDate();
    if (diff === 0) return `今日 (${mm}/${dd})`;
    if (diff === 1) return `明日 (${mm}/${dd})`;
    if (diff === -1) return `昨日 (${mm}/${dd})`;
    if (diff < 0) return `${-diff}日前 (${mm}/${dd})`;
    if (diff <= 7) return `${diff}日後 (${mm}/${dd})`;
    return `${mm}/${dd}`;
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>概況</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"#393443" }}>ToDoリスト</div>
          <div style={{ fontSize:12, color:"#A09AAB", marginTop:2 }}>未完了 {stats.active}件{stats.overdue>0?` / 期限切れ ${stats.overdue}件`:""}{stats.today>0?` / 本日締切 ${stats.today}件`:""}</div>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          {[{k:"active",l:`未完了 ${stats.active}`},{k:"done",l:`完了 ${stats.done}`},{k:"all",l:`すべて ${stats.total}`}].map(({k,l})=>(
            <button key={k} onClick={()=>setFilter(k)}
              style={{ padding:"6px 14px", borderRadius:6, border:`1.5px solid ${filter===k?"var(--jt-accent)":"var(--jt-line)"}`, background:"var(--jt-base)", color:filter===k?"var(--jt-accent)":"var(--jt-text-sub)", fontSize:13, fontWeight:filter===k?600:400, cursor:"pointer", boxShadow:filter===k?"var(--jt-inset)":"none" }}>{l}</button>
          ))}
        </div>
      </div>

      {/* 新規追加フォーム */}
      <Card style={{ padding:16, marginBottom:16 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#645F6E", marginBottom:10 }}>新規タスク追加</div>
        <div style={{ display:"grid", gridTemplateColumns:"2fr 100px 140px 140px auto", gap:8, alignItems:"center", marginBottom:8 }}>
          <input value={draft.title} onChange={e=>setDraft(p=>({...p,title:e.target.value}))}
            onKeyDown={e=>{ if (e.key==='Enter' && !e.isComposing && !e.nativeEvent?.isComposing) add(); }}
            placeholder="タスク内容（必須）"
            style={{ padding:"8px 12px", border:"none", background:"var(--jt-base)", boxShadow:"var(--jt-inset)", borderRadius:13, fontSize:13, outline:"none" }}/>
          <select value={draft.priority} onChange={e=>setDraft(p=>({...p,priority:e.target.value}))}
            style={{ padding:"8px 12px", background:"var(--jt-base)", border:"none", boxShadow:"var(--jt-inset)", borderRadius:13, fontSize:13 }}>
            {["高","中","低"].map(p=><option key={p} value={p}>{p}</option>)}
          </select>
          <input type="date" value={draft.due} onChange={e=>setDraft(p=>({...p,due:e.target.value}))}
            style={{ padding:"8px 12px", background:"var(--jt-base)", border:"none", boxShadow:"var(--jt-inset)", borderRadius:13, fontSize:13 }}/>
          <input value={draft.assignee} onChange={e=>setDraft(p=>({...p,assignee:e.target.value}))}
            placeholder="担当者（任意）"
            style={{ padding:"8px 12px", border:"none", background:"var(--jt-base)", boxShadow:"var(--jt-inset)", borderRadius:13, fontSize:13, outline:"none" }}/>
          <button onClick={add} disabled={!draft.title.trim()}
            style={{ padding:"8px 18px", background:draft.title.trim()?"var(--jt-accent-grad)":"var(--jt-line)", color:"#fff", border:"none", borderRadius:13, fontSize:13, fontWeight:600, cursor:draft.title.trim()?"pointer":"not-allowed", whiteSpace:"nowrap", boxShadow:draft.title.trim()?"var(--jt-raised-sm),var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)":"none" }}>+ 追加</button>
        </div>
        <textarea value={draft.note} onChange={e=>setDraft(p=>({...p,note:e.target.value}))} placeholder="メモ（任意）"
          style={{ width:"100%", padding:"8px 12px", background:"var(--jt-base)", border:"none", boxShadow:"var(--jt-inset)", borderRadius:13, fontSize:13, resize:"vertical", minHeight:50, outline:"none", fontFamily:"inherit", boxSizing:"border-box" }}/>
      </Card>

      {/* リスト */}
      <Card>
        {sorted.length === 0 ? (
          <div style={{ padding:40, textAlign:"center", color:"#A09AAB", fontSize:13 }}>
            {filter==="active"?"未完了のタスクはありません 🎉":filter==="done"?"完了したタスクはありません":"タスクがありません"}
          </div>
        ) : (
          <div>
            {sorted.map((t, i) => {
              const isEditing = editingId === t.id;
              return (
                <div key={t.id} style={{ borderBottom: i<sorted.length-1?"1px solid var(--jt-line)":"none", padding:"12px 16px", display:"flex", alignItems:"flex-start", gap:12, background:"var(--jt-base)" }}>
                  <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)}
                    style={{ marginTop:3, width:18, height:18, accentColor:accent, cursor:"pointer" }}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    {isEditing ? (
                      <div>
                        <input value={t.title} onChange={e=>updateTodo(t.id,{title:e.target.value})} onBlur={()=>{ if(!t.title.trim()){ updateTodo(t.id,{title:editOrigTitle.current}); showToast("タスク内容は必須です","error"); } else { showToast("タスクを更新しました"); } }}
                          style={{ width:"100%", padding:"6px 10px", background:"var(--jt-base)", border:"none", boxShadow:"var(--jt-inset)", borderRadius:13, fontSize:14, fontWeight:600, marginBottom:6, boxSizing:"border-box" }}/>
                        <div style={{ display:"grid", gridTemplateColumns:"100px 140px 140px", gap:6, marginBottom:6 }}>
                          <select value={t.priority} onChange={e=>{ updateTodo(t.id,{priority:e.target.value}); showToast("タスクを更新しました"); }}
                            style={{ padding:"4px 8px", background:"var(--jt-base)", border:"none", boxShadow:"var(--jt-inset-sm)", borderRadius:13, fontSize:12 }}>
                            {["高","中","低"].map(p=><option key={p} value={p}>{p}</option>)}
                          </select>
                          <input type="date" value={t.due||""} onChange={e=>{ updateTodo(t.id,{due:e.target.value||null}); showToast("タスクを更新しました"); }}
                            style={{ padding:"4px 8px", border:"1px solid #DEDAE5", borderRadius:4, fontSize:12 }}/>
                          <input value={t.assignee||""} onChange={e=>updateTodo(t.id,{assignee:e.target.value||null})} onBlur={()=>showToast("タスクを更新しました")}
                            placeholder="担当者" style={{ padding:"4px 8px", border:"1px solid #DEDAE5", borderRadius:4, fontSize:12 }}/>
                        </div>
                        <textarea value={t.note||""} onChange={e=>updateTodo(t.id,{note:e.target.value})} onBlur={()=>showToast("タスクを更新しました")}
                          placeholder="メモ" style={{ width:"100%", padding:"6px 10px", background:"var(--jt-base)", border:"none", boxShadow:"var(--jt-inset-sm)", borderRadius:13, fontSize:12, resize:"vertical", minHeight:40, fontFamily:"inherit", boxSizing:"border-box", marginBottom:6 }}/>
                        <div style={{ display:"flex", gap:6 }}>
                          <button onClick={closeEdit} style={{ padding:"5px 14px", background:"var(--jt-accent-grad)", color:"#fff", border:"none", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer", boxShadow:"var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)" }}>閉じる</button>
                        </div>
                      </div>
                    ) : (
                      <div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:t.note?4:0 }}>
                          <span style={{ fontSize:14, fontWeight:600, color:t.done?"#A09AAB":"#1a1f2e", textDecoration:t.done?"line-through":"none" }}>{t.title}</span>
                          <span style={{ fontSize:10, fontWeight:700, color:"#fff", background:priColor(t.priority), padding:"2px 6px", borderRadius:3 }}>優先{t.priority}</span>
                          {t.due && <span style={{ fontSize:11, fontWeight:600, color:dueColor(t.due, t.done) }}>📅 {dueLabel(t.due)}</span>}
                          {t.assignee && <span style={{ fontSize:11, color:"#645F6E" }}>👤 {t.assignee}</span>}
                        </div>
                        {t.note && <div style={{ fontSize:12, color:"#645F6E", whiteSpace:"pre-wrap" }}>{t.note}</div>}
                      </div>
                    )}
                  </div>
                  {!isEditing && (
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={()=>startEdit(t)} title="編集"
                        style={{ padding:"4px 10px", background:"var(--jt-base)", color:"var(--jt-text-sub)", border:"none", boxShadow:"var(--jt-raised-sm)", borderRadius:13, fontSize:11, cursor:"pointer" }}>編集</button>
                      <button onClick={()=>remove(t.id)} title="削除"
                        style={{ padding:"4px 10px", background:"transparent", color:"#B05A60", border:"none", borderRadius:4, fontSize:11, cursor:"pointer" }}>削除</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
};

// ── ParentClientsPage（荷主管理）─────────────────────────────────────
// 荷主 = ASKUL等(現案件)の上にいる発注元/元請け/親会社。案件を束ねて管理する。
// データ: jt_parent_clients = [{id, name, contact, tel, address, email, note, createdAt}]
// 紐付け: jt_client_parent_map = {clientId: parentId}
const ParentClientsPage = ({ accent }) => {
  const [parents, setParents] = useLocalStorage("jt_parent_clients", []);
  const [parentMap, setParentMap] = useLocalStorage("jt_client_parent_map", {});
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  const [showForm, setShowForm] = React.useState(false);
  const [draft, setDraft] = React.useState({ name:"", contact:"", tel:"", address:"", email:"", note:"" });
  const [editingId, setEditingId] = React.useState(null);
  const [sel, setSel] = React.useState(null);

  // 各荷主に紐付く案件の一覧と当月集計（今月実績が無ければ最新確定月へフォールバック）
  const refMonth = displayMonthForPay(dailyEdits);
  const parentSummaries = parents.map(p => {
    const childIds = Object.keys(parentMap).filter(cid => parentMap[cid] === p.id);
    let sell=0, pay=0;
    const children = childIds.map(cid => {
      const c = allClientsLive().find(x => x.id === cid);
      if (!c) return null;
      const v = cm(cid, refMonth, dailyEdits);
      sell += v.s; pay += v.p;
      return { id: cid, name: c.name, sell: v.s, pay: v.p };
    }).filter(Boolean);
    return { ...p, children, totalSell: sell, totalPay: pay, totalProfit: sell-pay };
  });

  // 自動保存: フィールドからフォーカスが外れた時点で反映。名称が入った最初の1回だけ新規作成（ref で二重作成を防止）
  const committedIdRef = React.useRef(null);
  const commitParent = () => {
    const name = draft.name.trim();
    if (!name) return;
    if (editingId) {
      setParents(prev => prev.map(p => p.id===editingId ? { ...p, ...draft, name } : p));
      showToast("保存しました");
    } else if (committedIdRef.current) {
      const id = committedIdRef.current;
      setParents(prev => prev.map(p => p.id===id ? { ...p, ...draft, name } : p));
      showToast("保存しました");
    } else {
      const id = "PC-" + String(Date.now()).slice(-8);
      committedIdRef.current = id;
      setParents(prev => [...prev, { id, ...draft, name, createdAt: Date.now() }]);
      showToast("荷主を登録しました");
    }
  };
  const startEdit = (p) => {
    committedIdRef.current = null;
    setEditingId(p.id);
    setDraft({ name:p.name, contact:p.contact||"", tel:p.tel||"", address:p.address||"", email:p.email||"", note:p.note||"" });
    setShowForm(true);
  };
  const remove = (id) => {
    if (!confirm("この荷主を削除しますか？\n紐付いている案件は「未設定」に戻ります。")) return;
    setParents(prev => prev.filter(p => p.id !== id));
    const nextMap = { ...parentMap };
    Object.keys(nextMap).forEach(cid => { if (nextMap[cid] === id) delete nextMap[cid]; });
    setParentMap(nextMap);
    if (sel?.id === id) setSel(null);
  };
  const assignChild = (clientId, parentId) => {
    const next = { ...parentMap };
    if (parentId === "") delete next[clientId];
    else next[clientId] = parentId;
    setParentMap(next);
    showToast(parentId ? "紐付けを保存しました" : "紐付けを解除しました");
  };

  const unassignedClients = allClientsLive().filter(c => !parentMap[c.id]);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>荷主・人員管理</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"var(--jt-text)" }}>荷主管理</div>
          <div style={{ fontSize:12, color:"var(--jt-text-sub)", marginTop:2 }}>発注元・元請け・親会社など、現在の案件の上位にあたる取引先を登録</div>
        </div>
        <button onClick={()=>{ committedIdRef.current = null; setShowForm(!showForm); setEditingId(null); setDraft({ name:"", contact:"", tel:"", address:"", email:"", note:"" }); }}
          style={{ padding:"7px 16px", background:showForm?"var(--jt-base)":"var(--jt-accent-grad)", color:showForm?"var(--jt-text-sub)":"#fff", fontWeight:showForm?600:700, border:"none", borderRadius:13, fontSize:13, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>
          {showForm?"閉じる":"+ 新規荷主を登録"}
        </button>
      </div>

      {showForm && (
        <Card style={{ padding:20, marginBottom:20, border:`1.5px solid ${accent}30` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={{ fontSize:13, fontWeight:700 }}>{editingId?"荷主を編集":"新規荷主登録"}</div>
            <span style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:11, color:"#6E9E78", fontWeight:600 }}>
              <Ic name="check" size={11} color="#6E9E78" strokeWidth={2.5}/>入力すると自動保存
            </span>
          </div>
          <div onBlur={commitParent} style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:10 }}>
            <div>
              <div style={{ fontSize:11, color:"var(--jt-text-sub)", marginBottom:4, fontWeight:600 }}>会社名・組織名（必須）</div>
              <input value={draft.name} onChange={e=>setDraft(p=>({...p,name:e.target.value}))} placeholder="例：○○ロジスティクス株式会社"
                style={{ width:"100%", padding:"8px 12px", background:"var(--jt-base)", border:"none", borderRadius:13, fontSize:13, boxSizing:"border-box", boxShadow:"var(--jt-inset)" }}/>
            </div>
            <div>
              <div style={{ fontSize:11, color:"#645F6E", marginBottom:4, fontWeight:600 }}>担当者</div>
              <input value={draft.contact} onChange={e=>setDraft(p=>({...p,contact:e.target.value}))} placeholder="例：田中 太郎"
                style={{ width:"100%", padding:"8px 12px", background:"var(--jt-base)", border:"none", borderRadius:13, fontSize:13, boxSizing:"border-box", boxShadow:"var(--jt-inset)" }}/>
            </div>
            <div>
              <div style={{ fontSize:11, color:"#645F6E", marginBottom:4, fontWeight:600 }}>電話番号</div>
              <input value={draft.tel} onChange={e=>setDraft(p=>({...p,tel:e.target.value}))} placeholder="例：03-1234-5678"
                style={{ width:"100%", padding:"8px 12px", background:"var(--jt-base)", border:"none", borderRadius:13, fontSize:13, boxSizing:"border-box", boxShadow:"var(--jt-inset)" }}/>
            </div>
            <div>
              <div style={{ fontSize:11, color:"#645F6E", marginBottom:4, fontWeight:600 }}>メールアドレス</div>
              <input value={draft.email} onChange={e=>setDraft(p=>({...p,email:e.target.value}))} placeholder="例：contact@example.com"
                style={{ width:"100%", padding:"8px 12px", background:"var(--jt-base)", border:"none", borderRadius:13, fontSize:13, boxSizing:"border-box", boxShadow:"var(--jt-inset)" }}/>
            </div>
            <div style={{ gridColumn:"1 / 3" }}>
              <div style={{ fontSize:11, color:"#645F6E", marginBottom:4, fontWeight:600 }}>住所</div>
              <input value={draft.address} onChange={e=>setDraft(p=>({...p,address:e.target.value}))} placeholder="例：東京都港区..."
                style={{ width:"100%", padding:"8px 12px", background:"var(--jt-base)", border:"none", borderRadius:13, fontSize:13, boxSizing:"border-box", boxShadow:"var(--jt-inset)" }}/>
            </div>
            <div style={{ gridColumn:"1 / 3" }}>
              <div style={{ fontSize:11, color:"#645F6E", marginBottom:4, fontWeight:600 }}>メモ</div>
              <textarea value={draft.note} onChange={e=>setDraft(p=>({...p,note:e.target.value}))} placeholder="契約条件・特記事項など"
                style={{ width:"100%", padding:"8px 12px", background:"var(--jt-base)", border:"none", borderRadius:13, fontSize:13, resize:"vertical", minHeight:60, fontFamily:"inherit", boxSizing:"border-box", outline:"none", boxShadow:"var(--jt-inset)" }}/>
            </div>
          </div>
        </Card>
      )}

      {/* サマリ */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:16 }}>
        <Card style={{ padding:"16px 20px" }}>
          <div style={{ fontSize:11, color:"var(--jt-text-mute)", marginBottom:6 }}>登録荷主</div>
          <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.01em", color:"var(--jt-accent)" }}>{parents.length}社</div>
        </Card>
        <Card style={{ padding:"16px 20px" }}>
          <div style={{ fontSize:11, color:"#A09AAB", marginBottom:6 }}>紐付け済 案件</div>
          <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.01em", color:"#6E9E78" }}>{Object.keys(parentMap).length} / {allClientsLive().length}件</div>
        </Card>
        <Card style={{ padding:"16px 20px" }}>
          <div style={{ fontSize:11, color:"#A09AAB", marginBottom:6 }}>未紐付け 案件</div>
          <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.01em", color:unassignedClients.length>0?"#C39A52":"#A09AAB" }}>{unassignedClients.length}件</div>
        </Card>
      </div>

      <div style={{ display:"grid", gridTemplateColumns: sel?"1fr 400px":"1fr", gap:16, alignItems:"start" }}>
        <Card>
          {parents.length === 0 ? (
            <div style={{ padding:40, textAlign:"center", color:"#A09AAB", fontSize:13 }}>
              荷主が未登録です。「+ 新規荷主を登録」から追加してください。
            </div>
          ) : (
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"var(--jt-accent-lt)", borderBottom:"1px solid #DEDAE5" }}>
                  {["荷主","担当者","紐付け案件",`当月売上（${mkLabel(refMonth)}）`,`当月粗利（${mkLabel(refMonth)}）`,"操作"].map(h=>(
                    <th key={h} style={{ padding:"9px 14px", textAlign:"left", color:"#645F6E", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {parentSummaries.map((p,i)=>(
                  <tr key={p.id} onClick={()=>setSel(sel?.id===p.id?null:p)}
                    style={{ borderBottom:"1px solid var(--jt-line)", cursor:"pointer", background:sel?.id===p.id?"var(--jt-base)":"transparent" }}>
                    <td style={{ padding:"12px 14px", fontWeight:600 }}>
                      <div>{p.name}</div>
                      <div style={{ fontSize:11, color:"#A09AAB", fontWeight:400 }}>{p.id}</div>
                    </td>
                    <td style={{ padding:"12px 14px", color:"var(--jt-text-sub)" }}>{p.contact||"—"}</td>
                    <td style={{ padding:"12px 14px" }}>
                      {p.children.length===0 ? <span style={{ color:"var(--jt-text-mute)", fontSize:12 }}>未紐付け</span> : (
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                          {p.children.map(c=>(
                            <span key={c.id} style={{ fontSize:11, background:"var(--jt-base)", boxShadow:"var(--jt-raised-sm)", color:"var(--jt-accent)", padding:"2px 8px", borderRadius:13 }}>{c.name}</span>
                          ))}
                        </div>
                      )}
                    </td>
                    <td style={{ padding:"12px 14px", fontWeight:700, color:"var(--jt-accent)" }}>{p.totalSell>0?fmt(p.totalSell):"—"}</td>
                    <td style={{ padding:"12px 14px", fontWeight:700, color:"#6E9E78" }}>{p.totalProfit>0?fmt(p.totalProfit):"—"}</td>
                    <td style={{ padding:"12px 14px" }}>
                      <div style={{ display:"flex", gap:4 }} onClick={e=>e.stopPropagation()}>
                        <button onClick={()=>startEdit(p)} style={{ padding:"4px 10px", background:"var(--jt-base)", color:"var(--jt-text-sub)", border:"none", borderRadius:13, fontSize:11, fontWeight:600, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>編集</button>
                        <button onClick={()=>remove(p.id)} style={{ padding:"4px 10px", background:"transparent", color:"#B05A60", border:"none", borderRadius:4, fontSize:11, cursor:"pointer" }}>削除</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </Card>

        {sel && (
          <Card style={{ padding:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
              <div>
                <div style={{ fontSize:16, fontWeight:700 }}>{sel.name}</div>
                <div style={{ fontSize:11, color:"#A09AAB" }}>{sel.id}</div>
              </div>
              <button onClick={()=>setSel(null)} style={{ background:"none", border:"none", fontSize:18, cursor:"pointer", color:"var(--jt-text-mute)" }}>×</button>
            </div>
            {sel.contact && <div style={{ fontSize:12, color:"var(--jt-text-sub)", marginBottom:4 }}>👤 {sel.contact}</div>}
            {sel.tel && <div style={{ fontSize:12, color:"#645F6E", marginBottom:4 }}>📞 {sel.tel}</div>}
            {sel.email && <div style={{ fontSize:12, color:"#645F6E", marginBottom:4 }}>✉ {sel.email}</div>}
            {sel.address && <div style={{ fontSize:12, color:"#645F6E", marginBottom:8 }}>📍 {sel.address}</div>}
            {sel.note && <div style={{ fontSize:12, color:"var(--jt-text-sub)", background:"var(--jt-base)", boxShadow:"var(--jt-inset-sm)", padding:8, borderRadius:13, whiteSpace:"pre-wrap", marginBottom:12 }}>{sel.note}</div>}

            <div style={{ borderTop:"1px solid var(--jt-line)", paddingTop:14, marginTop:8 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"var(--jt-text-sub)", marginBottom:8 }}>紐付け案件の管理</div>
              <div style={{ marginBottom:10 }}>
                {sel.children.length>0 ? sel.children.map(c=>(
                  <div key={c.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 8px", background:"var(--jt-base)", boxShadow:"var(--jt-raised-sm)", borderRadius:13, marginBottom:4 }}>
                    <div>
                      <span style={{ fontSize:12, fontWeight:600 }}>{c.name}</span>
                      <span style={{ fontSize:10, color:"#A09AAB", marginLeft:6 }}>{fmt(c.sell)}</span>
                    </div>
                    <button onClick={()=>assignChild(c.id, "")} style={{ padding:"2px 8px", background:"transparent", color:"var(--jt-alert)", border:"none", borderRadius:13, fontSize:10, cursor:"pointer" }}>解除</button>
                  </div>
                )) : <div style={{ fontSize:11, color:"var(--jt-text-mute)", padding:6 }}>紐付けされた案件はまだありません</div>}
              </div>
              <div style={{ fontSize:11, fontWeight:600, color:"var(--jt-text-sub)", marginBottom:4 }}>＋ 案件を紐付ける</div>
              <select onChange={e=>{ if (e.target.value) { assignChild(e.target.value, sel.id); e.target.value=""; } }}
                style={{ width:"100%", padding:"6px 10px", border:"none", borderRadius:13, fontSize:12, background:"var(--jt-base)", cursor:"pointer", boxShadow:"var(--jt-inset)" }}>
                <option value="">— 案件を選択 —</option>
                {allClientsLive().filter(c => !parentMap[c.id] || parentMap[c.id]===sel.id).filter(c => !sel.children.some(ch=>ch.id===c.id)).map(c=>(
                  <option key={c.id} value={c.id}>{c.name}（{c.id}）</option>
                ))}
              </select>
            </div>
          </Card>
        )}
      </div>

      {/* 未紐付けリスト */}
      {unassignedClients.length>0 && (
        <Card style={{ padding:16, marginTop:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"var(--jt-alert)", marginBottom:10 }}>⚠ 荷主が未設定の案件 ({unassignedClients.length}件)</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:8 }}>
            {unassignedClients.map(c=>(
              <div key={c.id} style={{ display:"flex", gap:6, alignItems:"center", padding:"6px 8px", background:"var(--jt-base)", boxShadow:"var(--jt-raised-sm)", borderRadius:13 }}>
                <span style={{ fontSize:12, fontWeight:600, flex:1, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={c.name}>{c.name}</span>
                <select onChange={e=>assignChild(c.id, e.target.value)} defaultValue=""
                  style={{ width:150, flexShrink:0, padding:"4px 6px", border:"none", borderRadius:13, fontSize:11, background:"var(--jt-base)", boxShadow:"var(--jt-inset)" }}>
                  <option value="">— 荷主に紐付け —</option>
                  {parents.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
};

// ── AppearanceSettings（配色テーマ設定画面） ─────────────────────────────
function AppearanceSettings() {
  const { theme, setTheme, previewTheme, resetTheme, presets } = useTheme();
  const [draft, setDraft] = React.useState(theme);
  React.useEffect(() => { setDraft(theme); }, [theme]);

  const onChange = (key, value) => {
    const next = { ...draft, [key]: value };
    setDraft(next); setTheme(next);
  };
  const applyPreset = (preset) => { setDraft(preset); setTheme(preset); showToast('テーマを適用しました'); };
  const onReset = () => { resetTheme(); setDraft(presets.default); showToast('既定値に戻しました'); };

  // 色ユーティリティ: hex を target 方向へ t(0-1) 混ぜる
  const _hexRgb = (h) => { h=String(h).replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; };
  const _toHex = (r,g,b) => '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');
  const _mix = (hex, target, t) => { const [r,g,b]=_hexRgb(hex), [tr,tg,tb]=_hexRgb(target); return _toHex(r+(tr-r)*t, g+(tg-g)*t, b+(tb-b)*t); };
  // テーマカラー（主色）: 種色を選ぶと 濃(hover)・薄(active背景) を自動導出。濃淡スライダー(tone)は種色から再計算。
  const _deriveAccent = (accent) => ({ accent, accentDk: _mix(accent,'#000000',0.22), accentLt: _mix(accent,'#FFFFFF',0.86) });
  const _toneApply = (seed, tone) => _deriveAccent(tone < 0 ? _mix(seed,'#000000', -tone*0.45) : tone > 0 ? _mix(seed,'#FFFFFF', tone*0.40) : seed);
  const setThemeColor = (hex) => {
    const next = { ...draft, accentSeed: hex, accentTone: 0, ..._deriveAccent(hex) };
    setDraft(next); setTheme(next);
  };
  const setAccentTone = (v) => {
    const seed = draft.accentSeed || draft.accent || '#7E6593';
    const next = { ...draft, accentTone: v, ..._toneApply(seed, v) };
    setDraft(next); previewTheme(next);
  };
  // 立体感（凹凸・影/光）だけ既定へ戻す（配色はそのまま）
  const resetDepth = () => {
    const d = presets.default;
    const next = { ...draft, depth: d.depth, shadowDark: d.shadowDark, shadowLight: d.shadowLight };
    setDraft(next); setTheme(next); showToast('立体感を既定に戻しました');
  };

  const fields = [
    { group: '罫線', items: [
      { key: 'line',     label: '薄罫',         hint: 'body の罫線' },
      { key: 'lineDk',   label: '濃罫',         hint: '強調・thead 下' },
    ]},
    { group: 'アクセント（ブランド色）', items: [
      { key: 'accent',   label: 'アクセント',   hint: '主アクション' },
      { key: 'accentDk', label: 'アクセント濃', hint: 'hover' },
      { key: 'accentLt', label: 'アクセント薄', hint: 'active 背景' },
    ]},
    { group: 'アラート（警告色）', items: [
      { key: 'alert',    label: 'アラート',     hint: '削除・警告' },
      { key: 'alertLt',  label: 'アラート薄',   hint: '背景' },
    ]},
    { group: '背景', items: [
      { key: 'base',     label: '基面',         hint: 'カード地' },
      { key: 'bg',       label: '補助',         hint: 'コンテンツ背景' },

      { key: 'textSub',  label: 'サブ',         hint: 'ラベル・補助' },
      { key: 'textMute', label: 'ミュート',     hint: '無効・脚注' },

  ];
  const presetLabels = { default: 'ラベンダー（既定）', sv_navy: 'ネイビー', sv_teal: 'ティール', sv_green: 'グリーン', sv_rose: 'ローズ', sv_amber: 'アンバー', navy_strong: 'ネイビー濃', gray: 'グレー', blue: 'ブルー', green: 'グリーン', warm: 'ウォーム' };

  const S = {

      <h1 style={S.h1}>外観設定（配色テーマ）</h1>

      </div>
      <div style={S.card}>

          <React.Fragment key={grp.title}>
            <div style={S.sectionH}>{grp.title}</div>
            <div style={{ ...S.presetWrap, marginBottom: 8 }}>
              {grp.keys.map(key => {
                const p = presets[key]; if (!p) return null;
                const swatches = [p.accent, p.lineDk, p.alert, p.bg];
                return (
                  <button key={key} type="button" style={S.preset} onClick={() => applyPreset(p)}>
                    <span style={S.swatchSet}>{swatches.map((c, i) => <span key={i} style={S.swatch(c)} />)}</span>

  { id:"V-09", plate:"神戸 580 け 5566", driverId:"DR-09", type:"軽バン",     status:"稼働中",  inspection:"2026-11-25", mileage:91200,
    maintenance:[{date:"2025-03-30",item:"オイル交換・フィルター"},{date:"2024-11-10",item:"タイヤ交換（2本）"}] },
  { id:"V-10", plate:"江東 580 こ 7788", driverId:"DR-10", type:"軽バン",     status:"稼働中",  inspection:"2027-02-28", mileage:29300,
    maintenance:[{date:"2025-04-05",item:"オイル交換"}] },
];
// 追加(jt_extra_vehicles)・編集(jt_vehicle_overrides)を反映した実効車両一覧。driversLiveと同じ方式。
const vehiclesLive = (extra, ov) => {
  if (extra === undefined) extra = _lsGet('jt_extra_vehicles', []);
  if (ov === undefined) ov = _lsGet('jt_vehicle_overrides', {});
  const base = Array.isArray(extra) && extra.length ? [...vehicleMaster, ...extra] : vehicleMaster;
  return (ov && Object.keys(ov).length) ? base.map(v => ov[v.id] ? { ...v, ...ov[v.id] } : v) : base;
};

const VehiclesPage = ({ accent }) => {
  const drivers = driversLive();
  const [sel, setSel] = React.useState(null);
  const [statusFilter, setStatusFilter] = React.useState("すべて");
  const today = new Date(); today.setHours(0,0,0,0);
  const daysUntil = (dateStr) => { const [y,m,d] = String(dateStr).split("-").map(Number); return Math.ceil((new Date(y, m-1, d) - today) / 86400000); };
  // 車両の追加・編集（driversLive/DriversPage と同じ方式）
  const [extraVehicles, setExtraVehicles] = useLocalStorage("jt_extra_vehicles", []);
  const [vehicleOverrides, setVehicleOverrides] = useLocalStorage("jt_vehicle_overrides", {});
  const [form, setForm] = React.useState(null); // null=閉 / {mode,id?,plate,type,driverId,status,mileage,inspection}
  useEscapeToClose(!!form, ()=>setForm(null));
  const vehicleMaster = vehiclesLive(extraVehicles, vehicleOverrides); // 自stateで即時反映
  const isExtra = (id) => (extraVehicles||[]).some(v => v.id === id);
  const nextVehicleId = () => { const nums = vehicleMaster.map(v => parseInt((String(v.id).match(/\d+/)||["0"])[0],10)||0); return "V-" + String(Math.max(0,...nums) + 1).padStart(2,"0"); };
  const openAdd = () => setForm({ mode:"add", plate:"", type:"軽バン", driverId:"", status:"稼働中", mileage:"", inspection:"" });
  const openEdit = (v) => setForm({ mode:"edit", id:v.id, plate:v.plate, type:v.type, driverId:v.driverId||"", status:v.status, mileage:String(v.mileage??""), inspection:v.inspection||"" });
  const saveVehicle = () => {
    const plate = (form.plate||"").trim();
    if (!plate) { showToast("ナンバーを入力してください", "error"); return; }
    const rec = { plate, type:form.type, driverId:form.driverId||"", status:form.status, mileage:Number(String(form.mileage).replace(/[^0-9.]/g,""))||0, inspection:(form.inspection||"").trim() };
    if (form.mode === "add") {
      const id = nextVehicleId();
      setExtraVehicles([ ...(extraVehicles||[]), { id, maintenance:[], ...rec } ]);
      showToast("車両を追加しました");
    } else {
      if (isExtra(form.id)) setExtraVehicles((extraVehicles||[]).map(v => v.id===form.id ? { ...v, ...rec } : v));
      else setVehicleOverrides({ ...vehicleOverrides, [form.id]: rec });
      setSel(s => (s && s.id===form.id) ? { ...s, ...rec } : s);
      showToast("車両情報を更新しました");
    }
    setForm(null);
  };
  const deleteExtraVehicle = (id) => { if (!confirm("この追加車両を削除しますか？")) return; setExtraVehicles((extraVehicles||[]).filter(v => v.id !== id)); setSel(null); showToast("削除しました"); };
  // 整備記録／車検予約は localStorage に追記保存
  const [maintExtras, setMaintExtras] = useLocalStorage("jt_vehicle_maintenance", {});
  const [reservations, setReservations] = useLocalStorage("jt_vehicle_reservations", {});
  const [showMaintForm, setShowMaintForm] = React.useState(false);
  const [showResForm, setShowResForm] = React.useState(false);
  const [maintDraft, setMaintDraft] = React.useState({date:"", item:""});
  const [resDraft, setResDraft] = React.useState({date:"", note:""});
  const maintCommittedRef = React.useRef(false);
  // 車両切替時はフォーム状態をリセット（別車両のドラフトを持ち越して誤保存するのを防止）
  React.useEffect(()=>{ setShowResForm(false); setShowMaintForm(false); setResDraft({date:"",note:""}); setMaintDraft({date:"",item:""}); maintCommittedRef.current=false; }, [sel?.id]);
  // 車検予約: 予約日が入った時点で即保存（1台1予約の upsert）
  const onResDate = (val) => {
    const next = { ...resDraft, date: val };
    setResDraft(next);
    if (!val && sel) {
      const cp = { ...reservations };
      delete cp[sel.id];
      setReservations(cp);
      showToast(sel.plate + " の車検予約を削除しました");
    } else if (next.date && sel) { setReservations({ ...reservations, [sel.id]: next }); showToast(sel.plate + " の車検予約を保存しました"); }
  };
  const onResNote = (val) => {
    const next = { ...resDraft, note: val };
    setResDraft(next);
    if (next.date && sel) setReservations({ ...reservations, [sel.id]: next });
  };
  // 整備記録: 整備日・内容が揃ってフォームから離れた時点で1回だけ追記（ref で二重追記を防止）
  const commitMaint = () => {
    if (maintCommittedRef.current || !sel) return;
    if (!maintDraft.date || !maintDraft.item) return;
    maintCommittedRef.current = true;
    const cur = maintExtras[sel.id] || [];
    setMaintExtras({ ...maintExtras, [sel.id]: [{ ...maintDraft }, ...cur] });
    setMaintDraft({ date:"", item:"" });
    setShowMaintForm(false);
    showToast("整備記録を追加しました");
  };

  const list = vehicleMaster.filter(v => statusFilter==="すべて" || v.status===statusFilter);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>荷主・人員管理</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"#393443" }}>車両管理</div>
          <div style={{ fontSize:12, color:"#A09AAB", marginTop:2 }}>全{vehicleMaster.length}台 ／ 車検期限30日以内: {vehicleMaster.filter(v=>{const d=daysUntil(v.inspection); return d>=0 && d<=30;}).length}台 ／ 期限切れ: {vehicleMaster.filter(v=>daysUntil(v.inspection)<0).length}台</div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {["すべて","稼働中","整備中"].map(s=>(
            <button key={s} onClick={()=>setStatusFilter(s)}
              style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", height:34, padding:"0 15px", borderRadius:13, border:"none", cursor:"pointer", whiteSpace:"nowrap", fontFamily:"inherit", fontSize:13, lineHeight:1, letterSpacing:.2, color:statusFilter===s?"var(--jt-accent)":"var(--jt-text-sub)", fontWeight:statusFilter===s?600:500, background:"var(--jt-base)", boxShadow:statusFilter===s?"var(--jt-inset-sm)":"var(--jt-raised-sm)" }}>{s}</button>
          ))}
          <button onClick={openAdd}
            style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", height:34, padding:"0 16px", marginLeft:4, background:"var(--jt-accent-grad)", color:"#fff", border:"none", borderRadius:13, fontSize:13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", boxShadow:"var(--jt-raised-sm), inset 0 1px 0 rgba(255,255,255,.28)" }}>＋ 車両追加</button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns: sel?"1fr 300px":"1fr", gap:16 }}>
        <Card>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"var(--jt-accent-lt)", borderBottom:"1px solid #DEDAE5" }}>
                {["ナンバー","車種","担当ドライバー","状態","走行距離","車検期限"].map(h=>(
                  <th key={h} style={{ padding:"10px 16px", textAlign:"left", color:"#645F6E", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {list.map(v=>{
                const d = drivers.find(dr=>dr.id===v.driverId) || {};
                const days = daysUntil(v.inspection);
                const expired = days < 0;
                const urgent = days <= 30;
                const warn   = days <= 60 && days > 30;
                return (
                  <tr key={v.id} onClick={()=>setSel(sel?.id===v.id?null:v)}
                    style={{ borderBottom:"1px solid var(--jt-line)", cursor:"pointer", background: sel?.id===v.id?accent+"0d": urgent?"#F3E6E3":"transparent", transition:"background .1s" }}>
                    <td style={{ padding:"12px 16px", fontWeight:700, borderLeft:sel?.id===v.id?`3px solid ${accent}`:"3px solid transparent", transition:"border-color .1s" }}>{v.plate}</td>
                    <td style={{ padding:"12px 16px", color:"var(--jt-text-sub)" }}>{v.type}</td>
                    <td style={{ padding:"12px 16px" }}>
                      {d && <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                        <Avatar name={d.name} size={24} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                        <span style={{ fontWeight:500 }}>{d.name}</span>
                      </div>}
                    </td>
                    <td style={{ padding:"12px 16px" }}>
                      <span style={{ padding:"2px 9px", borderRadius:4, fontSize:11.5, fontWeight:600, background:v.status==="稼働中"?"#E6EFE4":"#F3E6E3", color:v.status==="稼働中"?"#6E9E78":"#B05A60" }}>{v.status}</span>
                    </td>
                    <td style={{ padding:"12px 16px", color:"var(--jt-text-sub)" }}>{v.mileage.toLocaleString()} km</td>
                    <td style={{ padding:"12px 16px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontWeight: urgent||warn?700:400, color: urgent?"#B05A60":warn?"#C39A52":"#645F6E" }}>{v.inspection}</span>
                        {urgent && <span style={{ fontSize:11, background:"#F3E6E3", color:"#B05A60", padding:"1px 7px", borderRadius:3, fontWeight:700 }}>{expired?`${-days}日超過`:`あと${days}日`}</span>}
                        {warn   && <span style={{ fontSize:11, background:"#FFFBEC", color:"#C39A52", padding:"1px 7px", borderRadius:3, fontWeight:700 }}>あと{days}日</span>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Card>

        {sel && (() => {
          const d = drivers.find(dr=>dr.id===sel.driverId) || {};
          const days = daysUntil(sel.inspection);
          const expired = days < 0;
          const urgent = days <= 30;
          return (
            <Card style={{ padding:20, alignSelf:"start" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
                <div>
                  <div style={{ fontWeight:700, fontSize:18, color:"var(--jt-text)" }}>{sel.plate}</div>
                  <div style={{ fontSize:12, color:"var(--jt-text-mute)", marginTop:2 }}>{sel.type} ／ {sel.id}</div>
                </div>
                <span style={{ padding:"2px 9px", borderRadius:4, fontSize:11.5, fontWeight:600, background:sel.status==="稼働中"?"#E6EFE4":"#F3E6E3", color:sel.status==="稼働中"?"#6E9E78":"#B05A60" }}>{sel.status}</span>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
                {[["走行距離",sel.mileage.toLocaleString()+" km"],["車検期限",sel.inspection]].map(([l,v])=>(
                  <div key={l} style={{ background:"#EDEBF1", borderRadius:6, padding:"10px 12px" }}>
                    <div style={{ fontSize:11, color:"#A09AAB" }}>{l}</div>
                    <div style={{ fontSize:13, fontWeight:700, marginTop:3, color: l==="車検期限"&&urgent?"#B05A60":"#393443" }}>{v}</div>
                  </div>
                ))}
              </div>

              {urgent && (
                <div style={{ background:"#F3E6E3", border:"1px solid #E8BDBA", borderRadius:6, padding:"10px 14px", marginBottom:16, fontSize:12.5, color:"var(--jt-alert)", fontWeight:600 }}>
                  {expired ? `⚠ 車検期限を${-days}日超過しています。至急対応してください。` : `⚠ 車検期限まであと${days}日です。早めに予約してください。`}
                </div>
              )}

              <div style={{ fontSize:12, color:"var(--jt-text-mute)", marginBottom:8 }}>担当ドライバー</div>
              {d && <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px", background:"var(--jt-base)", borderRadius:6, marginBottom:16, boxShadow:"var(--jt-inset)" }}>
                <Avatar name={d.name} size={32} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                <div>
                  <div style={{ fontWeight:600, fontSize:13 }}>{d.name}</div>
                  <div style={{ fontSize:11, color:"var(--jt-text-mute)" }}>{d.area}</div>
                </div>
              </div>}

              <div style={{ fontSize:12, color:"var(--jt-text-mute)", marginBottom:8 }}>整備・点検履歴</div>
              {[...(maintExtras[sel.id]||[]), ...sel.maintenance].sort((a,b)=> (b.date||"").localeCompare(a.date||"")).map((m,i)=>(
                <div key={i} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:"1px solid var(--jt-line)", fontSize:13 }}>
                  <span style={{ color:"var(--jt-text-mute)", fontSize:12, width:80, flexShrink:0 }}>{m.date}</span>
                  <span style={{ color:"var(--jt-text-sub)", flex:1 }}>{m.item}</span>
                  {(maintExtras[sel.id]||[]).includes(m) && <span style={{ fontSize:9, padding:"1px 5px", background:accent+"22", color:accent, borderRadius:3 }}>追記</span>}
                </div>
              ))}

              {/* 車検予約済み */}
              {reservations[sel.id] && (
                <div style={{ marginTop:14, padding:"10px 12px", background:"var(--jt-base)", borderRadius:6, fontSize:12.5, border:"1px solid var(--jt-line)", boxShadow:"var(--jt-inset-sm)" }}>
                  <div style={{ fontWeight:700, color:"var(--jt-accent)" }}>車検予約済み</div>
                  <div style={{ color:"var(--jt-accent)", marginTop:3 }}>予定日: {reservations[sel.id].date}{reservations[sel.id].note && ` ／ ${reservations[sel.id].note}`}</div>
                  <button onClick={()=>{ const cp={...reservations}; delete cp[sel.id]; setReservations(cp); setResDraft({date:"",note:""}); setShowResForm(false); }} style={{ marginTop:6, padding:"3px 10px", border:"none", background:"var(--jt-base)", color:"var(--jt-accent)", borderRadius:4, fontSize:11, cursor:"pointer", fontWeight:600, boxShadow:"var(--jt-raised-sm)" }}>キャンセル</button>
                </div>
              )}

              <div style={{ display:"flex", gap:8, marginTop:16 }}>
                <button onClick={()=>{ const open=!showResForm; if(open) setResDraft(reservations[sel.id]||{date:"",note:""}); setShowResForm(open); }} style={{ flex:1, padding:"9px", background:"var(--jt-accent-grad)", color:"#fff", border:"none", borderRadius:13, fontWeight:700, fontSize:13, cursor:"pointer", boxShadow:"var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)" }}>
                  {reservations[sel.id]?"予約変更":"車検予約"}
                </button>
                <button onClick={()=>{ const open=!showMaintForm; if(open){ maintCommittedRef.current=false; setMaintDraft({date:"",item:""}); } setShowMaintForm(open); }} style={{ flex:1, padding:"9px", border:"none", background:"var(--jt-base)", color:"var(--jt-text-sub)", borderRadius:13, fontSize:13, cursor:"pointer", fontWeight:600, boxShadow:"var(--jt-raised-sm)" }}>整備記録を追加</button>
              </div>

              {showResForm && (
                <div style={{ marginTop:10, padding:12, background:"var(--jt-base)", borderRadius:6, border:"1px solid #DEDAE5" }}>
                  <div style={{ fontSize:11, color:"var(--jt-text-sub)", marginBottom:4 }}>予約日</div>
                  <input type="date" value={resDraft.date} onChange={e=>onResDate(e.target.value)}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #DEDAE5", borderRadius:4, fontSize:13, marginBottom:6, boxShadow:"inset 2px 2px 4px #CECAD5" }}/>
                  <div style={{ fontSize:11, color:"var(--jt-text-sub)", marginBottom:4 }}>メモ（任意）</div>
                  <input type="text" placeholder="例: ○○整備工場" value={resDraft.note} onChange={e=>onResNote(e.target.value)} onBlur={()=>{ if(resDraft.date) showToast("車検予約を保存しました"); }}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #DEDAE5", borderRadius:4, fontSize:13, marginBottom:8, boxShadow:"inset 2px 2px 4px #CECAD5" }}/>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ display:"inline-flex", alignItems:"center", gap:5, fontSize:11, color:"#6E9E78", fontWeight:600 }}>
                      <Ic name="check" size={11} color="#6E9E78" strokeWidth={2.5}/>予約日を入れると自動保存
                    </span>
                    <button onClick={()=>setShowResForm(false)} style={{ padding:"6px 14px", background:"transparent", border:"none", borderRadius:4, fontSize:12, cursor:"pointer", color:"#645F6E" }}>閉じる</button>
                  </div>
                </div>
              )}

              {showMaintForm && (
                <div onBlur={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) commitMaint(); }} style={{ marginTop:10, padding:12, background:"var(--jt-base)", borderRadius:6, border:"1px solid #DEDAE5" }}>
                  <div style={{ fontSize:11, color:"var(--jt-text-sub)", marginBottom:4 }}>整備日</div>
                  <input type="date" value={maintDraft.date} onChange={e=>setMaintDraft({...maintDraft, date:e.target.value})}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #DEDAE5", borderRadius:4, fontSize:13, marginBottom:6, boxShadow:"inset 2px 2px 4px #CECAD5" }}/>
                  <div style={{ fontSize:11, color:"var(--jt-text-sub)", marginBottom:4 }}>整備内容</div>
                  <input type="text" placeholder="例: オイル交換" value={maintDraft.item} onChange={e=>setMaintDraft({...maintDraft, item:e.target.value})}
                    style={{ width:"100%", padding:"6px 10px", border:"1px solid #DEDAE5", borderRadius:4, fontSize:13, marginBottom:8, boxShadow:"inset 2px 2px 4px #CECAD5" }}/>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ display:"inline-flex", alignItems:"center", gap:5, fontSize:11, color:"#6E9E78", fontWeight:600 }}>
                      <Ic name="check" size={11} color="#6E9E78" strokeWidth={2.5}/>整備日・内容を入れると自動保存
                    </span>
                    <button onClick={()=>{ commitMaint(); setShowMaintForm(false); }} style={{ padding:"6px 14px", background:"transparent", border:"none", borderRadius:4, fontSize:12, cursor:"pointer", color:"#645F6E" }}>閉じる</button>
                  </div>
                </div>
              )}

              <div style={{ display:"flex", gap:8, marginTop:16, paddingTop:14, borderTop:"1px solid var(--jt-line)" }}>
                <button onClick={()=>openEdit(sel)} style={{ flex:1, padding:"9px", background:"var(--jt-base)", color:"var(--jt-accent)", border:"none", borderRadius:13, fontWeight:600, fontSize:13, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>車両情報を編集</button>
                {isExtra(sel.id) && <button onClick={()=>deleteExtraVehicle(sel.id)} style={{ padding:"9px 14px", background:"transparent", color:"var(--jt-alert)", border:"none", borderRadius:13, fontWeight:600, fontSize:13, cursor:"pointer" }}>削除</button>}
              </div>
            </Card>
          );
        })()}
      </div>

      {form && (
        <div onClick={()=>setForm(null)} style={{ position:"fixed", inset:0, background:"rgba(60,55,75,.32)", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"60px 16px", zIndex:1000, overflowY:"auto" }}>
          <div onClick={(e)=>e.stopPropagation()} style={{ width:460, maxWidth:"calc(100vw - 32px)", background:"var(--jt-base)", borderRadius:18, boxShadow:"0 20px 50px rgba(35,28,50,.30)", padding:22, overflowX:"hidden", boxSizing:"border-box" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <h3 style={{ margin:0, fontSize:17, fontWeight:700, color:"var(--jt-text)" }}>{form.mode==="add"?"車両追加":"車両情報の編集"}</h3>
              <button onClick={()=>setForm(null)} style={{ width:30, height:30, borderRadius:9, border:"none", background:"var(--jt-base)", color:"var(--jt-text-sub)", cursor:"pointer", boxShadow:"var(--jt-raised-sm)", fontSize:16, lineHeight:1 }}>×</button>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <label style={{ display:"flex", flexDirection:"column", gap:6 }}>
                <span style={{ fontSize:12, fontWeight:600, color:"var(--jt-text-sub)" }}>ナンバー <span style={{ color:"var(--jt-alert)" }}>*</span></span>
                <input value={form.plate} onChange={(e)=>setForm({...form, plate:e.target.value})} placeholder="例：品川 580 あ 1234" style={{ width:"100%", boxSizing:"border-box", padding:"11px 14px", border:"none", borderRadius:11, background:"var(--jt-base)", boxShadow:"var(--jt-inset)", color:"var(--jt-text)", fontSize:14, outline:"none" }} />
              </label>
              <div style={{ display:"flex", gap:12 }}>

                  <span style={{ fontSize:12, fontWeight:600, color:"var(--jt-text-sub)" }}>走行距離（km）</span>
                  <input value={form.mileage} onChange={(e)=>setForm({...form, mileage:e.target.value})} inputMode="numeric" placeholder="0" style={{ width:"100%", boxSizing:"border-box", padding:"11px 14px", border:"none", borderRadius:11, background:"var(--jt-base)", boxShadow:"var(--jt-inset)", color:"var(--jt-text)", fontSize:14, outline:"none" }} />
                </label>
                <label style={{ flex:1, display:"flex", flexDirection:"column", gap:6, minWidth:0 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:"var(--jt-text-sub)" }}>車検期限</span>
                  <input type="date" value={form.inspection} onChange={(e)=>setForm({...form, inspection:e.target.value})} style={{ width:"100%", boxSizing:"border-box", padding:"11px 14px", border:"none", borderRadius:11, background:"var(--jt-base)", boxShadow:"var(--jt-inset)", color:"var(--jt-text)", fontSize:14, outline:"none" }} />
                </label>
              </div>
            </div>
            <div style={{ display:"flex", gap:10, marginTop:22 }}>
              <button onClick={()=>setForm(null)} style={{ flex:"0 0 auto", padding:"11px 18px", background:"transparent", color:"var(--jt-text-sub)", border:"none", borderRadius:12, fontWeight:600, fontSize:14, cursor:"pointer" }}>キャンセル</button>
              <button onClick={saveVehicle} style={{ flex:1, padding:"11px", background:"var(--jt-accent-grad)", color:"#fff", border:"none", borderRadius:12, fontWeight:700, fontSize:14, cursor:"pointer", boxShadow:"var(--jt-raised-sm), inset 0 1px 0 rgba(255,255,255,.28)" }}>{form.mode==="add"?"追加する":"更新する"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── 配車管理（DispatchPage）: 週間配車表 + シフト管理 ─────────────────────
// 全荷主・案件で共通のチップ色（アクセント点使い・荷主ごとの色分けはしない）
const DISPATCH_CLIENT_COLOR = { bg:"#EFEDF3", fg:"#7E6593" };
const DISPATCH_CLIENT_COLORS = {
  "C-01":DISPATCH_CLIENT_COLOR, "C-02":DISPATCH_CLIENT_COLOR, "C-03":DISPATCH_CLIENT_COLOR,
  "C-04":DISPATCH_CLIENT_COLOR, "C-05":DISPATCH_CLIENT_COLOR, "C-06":DISPATCH_CLIENT_COLOR,
  "C-07":DISPATCH_CLIENT_COLOR, "C-08":DISPATCH_CLIENT_COLOR, "C-09":DISPATCH_CLIENT_COLOR,
  "C-10":DISPATCH_CLIENT_COLOR, "C-11":DISPATCH_CLIENT_COLOR,
};
const DISPATCH_CLIENT_SHORT = {
  "C-01":"ASKUL","C-02":"Bloomee","C-03":"アクア","C-04":"カウネット","C-05":"サーガ","C-06":"スポット",
  "C-07":"ファミマ","C-08":"トムソン","C-09":"RICOH","C-10":"旭食品","C-11":"タイヤ",
};
const SHIFT_STATES = ["日勤","早番","遅番","有休","休"];
const SHIFT_STYLE = {
  "日勤":{bg:"#EFEDF3",fg:"#7E6593"}, "早番":{bg:"#ecfeff",fg:"#0891b2"}, "遅番":{bg:"#F2EBDC",fg:"#c2410c"},
  "有休":{bg:"#f5f3ff",fg:"#7E6593"}, "休":{bg:"#f1f5f9",fg:"#94a3b8"},
};

const DispatchPage = ({ accent, setPage }) => {
  const drivers = driversLive();
  const [tab, setTab] = React.useState("dispatch"); // dispatch | shift | bill
  const [weekOffset, setWeekOffset] = React.useState(0);
  const [dispatch, setDispatch] = useLocalStorage("jt_dispatch", {});
  const [shifts, setShifts] = useLocalStorage("jt_shifts", {});
  const [confirmed, setConfirmed] = useLocalStorage("jt_dispatch_confirmed", {});
  const [plan, setPlan] = useLocalStorage("jt_dispatch_plan", {}); // 自動配車ルール: { priority:[cid...], perDay:{cid:n} }
  const [showRules, setShowRules] = React.useState(false);
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  const [billMonth, setBillMonth] = React.useState(REF_MONTH);
  const [saved, setSaved] = React.useState(true);
  const shiftMonth = (delta) => { const [y,m]=billMonth.split("-").map(Number); const d=new Date(y,m-1+delta,1); setBillMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); };

  // ── Supabase 永続化（jt_dispatch / jt_shifts / jt_dispatch_confirmed）─────────
  // jt_daily_entries と同じ方針: localStorage を即時キャッシュにしつつ、
  // マウント時にロード（SB優先・空なら既存localStorageを温存して初回移行）、
  // 変更時はデバウンスで差分 upsert/delete（バッチ操作も state 監視で捕捉される）。
  const sbReady = React.useRef(false);
  const sbSnap = React.useRef({ dispatch:{}, shifts:{}, confirmed:{} });
  const sbTimer = React.useRef({});
  // {dk:{did:val}} を "dk|did"→val のフラットMapに展開（空値は除外）
  const flat2 = (obj) => { const m={}; Object.keys(obj||{}).forEach(dk=>{ const day=obj[dk]||{}; Object.keys(day).forEach(did=>{ if(day[did]) m[`${dk}|${did}`]=day[did]; }); }); return m; };
  const syncFlat = async (table, dateCol, valCol, curr, snapKey) => {
    if(!window.sb) return;
    const want = flat2(curr), have = flat2(sbSnap.current[snapKey]);
    const ups=[], dels=[];
    Object.keys(want).forEach(k=>{ if(have[k]!==want[k]){ const [dk,did]=k.split("|"); ups.push({ [dateCol]:dk, driver_id:did, [valCol]:want[k] }); } });
    Object.keys(have).forEach(k=>{ if(!(k in want)){ const [dk,did]=k.split("|"); dels.push({dk,did}); } });
    try {
      if(ups.length) await window.sb.from(table).upsert(ups, { onConflict:`${dateCol},driver_id` });
      for(const d of dels) await window.sb.from(table).delete().eq(dateCol,d.dk).eq("driver_id",d.did);
      sbSnap.current[snapKey] = JSON.parse(JSON.stringify(curr));
      setSaved(true);
    } catch(e){ console.warn(`[Supabase] ${table} sync failed:`, e); setSaved(false); showToast("配車の保存に失敗しました（端末には保存済み）", "error"); }
  };
  const syncConfirmed = async (curr) => {
    if(!window.sb) return;
    const want=curr||{}, have=sbSnap.current.confirmed||{};
    const ups=[], dels=[];
    Object.keys(want).forEach(dk=>{ if(have[dk]!==want[dk]) ups.push({ confirm_date:dk, confirmed_at:want[dk] }); });
    Object.keys(have).forEach(dk=>{ if(!(dk in want)) dels.push(dk); });
    try {
      if(ups.length) await window.sb.from("jt_dispatch_confirmed").upsert(ups, { onConflict:"confirm_date" });
      for(const dk of dels) await window.sb.from("jt_dispatch_confirmed").delete().eq("confirm_date",dk);
      sbSnap.current.confirmed = JSON.parse(JSON.stringify(curr));
      setSaved(true);
    } catch(e){ console.warn("[Supabase] jt_dispatch_confirmed sync failed:", e); setSaved(false); showToast("確定配車の保存に失敗しました（端末には保存済み）", "error"); }
  };
  React.useEffect(() => {
    if(!window.sb){ sbReady.current = true; return; }
    (async () => {
      try {
        // データ肥大化対策: 直近12ヶ月のみ取得（条件なし全件selectは運用数ヶ月で起動フリーズ/タブクラッシュの原因）
        const _cut = (()=>{ const d=new Date(); d.setMonth(d.getMonth()-12); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();
        const [d,s,c] = await Promise.all([
          window.sb.from("jt_dispatch").select("*").gte("dispatch_date", _cut),
          window.sb.from("jt_shifts").select("*").gte("shift_date", _cut),
          window.sb.from("jt_dispatch_confirmed").select("*").gte("confirm_date", _cut),
        ]);
        if(!d.error && d.data && d.data.length){
          const o={}; d.data.forEach(r=>{ (o[r.dispatch_date]=o[r.dispatch_date]||{})[r.driver_id]=r.client_id; });
          sbSnap.current.dispatch = JSON.parse(JSON.stringify(o)); setDispatch(o);
        } else { sbSnap.current.dispatch = {}; } // SB空: 既存localStorageを保存処理で移行
        if(!s.error && s.data && s.data.length){
          const o={}; s.data.forEach(r=>{ (o[r.shift_date]=o[r.shift_date]||{})[r.driver_id]=r.state; });
          sbSnap.current.shifts = JSON.parse(JSON.stringify(o)); setShifts(o);
        } else { sbSnap.current.shifts = {}; }
        if(!c.error && c.data && c.data.length){
          const o={}; c.data.forEach(r=>{ o[r.confirm_date]=r.confirmed_at; });
          sbSnap.current.confirmed = JSON.parse(JSON.stringify(o)); setConfirmed(o);
        } else { sbSnap.current.confirmed = {}; }
        console.log("[Supabase] dispatch loaded:", d.data?.length||0, s.data?.length||0, c.data?.length||0);
        // 初回移行: SBが空で既存localStorageにデータがあれば push（state不変で保存effectが発火しないため明示実行）
        if((!d.data || !d.data.length) && Object.keys(dispatch).length) syncFlat("jt_dispatch","dispatch_date","client_id",dispatch,"dispatch");
        if((!s.data || !s.data.length) && Object.keys(shifts).length) syncFlat("jt_shifts","shift_date","state",shifts,"shifts");
        if((!c.data || !c.data.length) && Object.keys(confirmed).length) syncConfirmed(confirmed);
      } catch(e){ console.warn("[Supabase] dispatch load failed:", e); showToast("配車情報の読み込みに失敗しました", "error"); }
      finally { sbReady.current = true; setSaved(true); }
    })();
  }, []);
  React.useEffect(() => { if(!sbReady.current) return; setSaved(false); clearTimeout(sbTimer.current.d); sbTimer.current.d = setTimeout(()=>syncFlat("jt_dispatch","dispatch_date","client_id",dispatch,"dispatch"), 500); }, [dispatch]);
  React.useEffect(() => { if(!sbReady.current) return; setSaved(false); clearTimeout(sbTimer.current.s); sbTimer.current.s = setTimeout(()=>syncFlat("jt_shifts","shift_date","state",shifts,"shifts"), 500); }, [shifts]);
  React.useEffect(() => { if(!sbReady.current) return; setSaved(false); clearTimeout(sbTimer.current.c); sbTimer.current.c = setTimeout(()=>syncConfirmed(confirmed), 500); }, [confirmed]);

  const now = new Date();
  const dkOf = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const dow0 = now.getDay()===0?6:now.getDay()-1;
  const mon = new Date(now); mon.setHours(0,0,0,0); mon.setDate(now.getDate()-dow0+weekOffset*7);
  const dayNames = ["月","火","水","木","金","土","日"];
  const weekDays = Array.from({length:7},(_,i)=>{
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    return { date:d, dk:dkOf(d), label:`${d.getMonth()+1}/${d.getDate()}`, dayName:dayNames[i],
      isToday:d.toDateString()===now.toDateString(), isSun:i===6, isSat:i===5, isWeekend:i>=5 };
  });
  const prevWeekDk = weekDays.map(wd=>{ const d=new Date(wd.date); d.setDate(d.getDate()-7); return dkOf(d); });
  const weekLabel = `${weekDays[0].label}（月）〜 ${weekDays[6].label}（日）`;
  const todayDk = dkOf(now);
  const todayInWeek = weekDays.some(wd=>wd.dk===todayDk);

  const assignableClients = (did) => allClientsLive().filter(c=>driversOfClient(c).includes(did));
  const vehicleMaster = vehiclesLive();
  const vehByDriver = {}; vehicleMaster.forEach(v=>{ if(v.driverId) vehByDriver[v.driverId]=v; });
  const selfDrivers = drivers.filter(d=>d.type==="自社");
  const partnerDrivers = drivers.filter(d=>d.type==="協力会社");

  // ── 配車データ操作 ──
  const getDisp = (dk,did) => (dispatch[dk]&&dispatch[dk][did]) || "";
  const setDisp = (dk,did,cid) => setDispatch(prev=>{
    const next={...prev}; const day={...(next[dk]||{})};
    if(!cid) delete day[did]; else day[did]=cid;
    if(Object.keys(day).length) next[dk]=day; else delete next[dk];
    return next;
  });
  // ── 自動配車ルール（案件の優先順位 × 必要便数/日 × 担当ドライバー） ──
  const clientById = (cid) => allClientsLive().find(c=>c.id===cid);
  const isSpotClient = (c) => !!(c && (c.billing||"").includes("スポット"));
  // 既定の必要便数 = 現ロジックの主担当人数（その案件を first-eligible とするドライバー数）。スポットは0。
  const primaryCount = {}; drivers.forEach(d=>{ const ac=assignableClients(d.id); if(ac.length) primaryCount[ac[0].id]=(primaryCount[ac[0].id]||0)+1; });
  const defaultDemand = (cid) => { const c=clientById(cid); if(!c) return 0; return isSpotClient(c)?0:(primaryCount[cid]||0); };
  const planOrder = () => { const all=allClientsLive().map(c=>c.id); const saved=(plan&&plan.priority)||[]; const seen=new Set(); const out=[]; saved.forEach(id=>{ if(all.includes(id)&&!seen.has(id)){ out.push(id); seen.add(id); } }); all.forEach(id=>{ if(!seen.has(id)){ out.push(id); seen.add(id); } }); return out; };
  const demandFor = (cid) => (plan&&plan.perDay&&plan.perDay[cid]!=null) ? Number(plan.perDay[cid]) : defaultDemand(cid);
  // 案件に割当可能なドライバーを「自社優先→登録順」で並べる
  const orderedDriversForClient = (cid) => { const c=clientById(cid); if(!c) return []; const elig=driversOfClient(c); return drivers.filter(d=>elig.includes(d.id)).sort((a,b)=>(a.type==="自社"?0:1)-(b.type==="自社"?0:1)).map(d=>d.id); };
  const setDemand = (cid,n) => { const v=Math.max(0,Math.floor(Number(n)||0)); setPlan(p=>({ ...p, perDay:{ ...((p&&p.perDay)||{}), [cid]:v } })); };
  const movePriority = (cid,dir) => { const ord=planOrder(); const i=ord.indexOf(cid), j=i+dir; if(i<0||j<0||j>=ord.length) return; const a=[...ord]; [a[i],a[j]]=[a[j],a[i]]; setPlan(p=>({ ...p, priority:a })); };
  const resetPlan = () => { if(!confirm("自動配車ルール（優先順位・必要便数）を初期値に戻します。よろしいですか？")) return; setPlan({}); };
  const miniBtn = (disabled) => ({ width:22, height:14, padding:0, lineHeight:1, fontSize:8, border:"none", borderRadius:4, cursor:disabled?"default":"pointer", background:"var(--jt-base)", color:disabled?"var(--jt-text-mute)":"var(--jt-text-sub)", boxShadow:disabled?"none":"var(--jt-raised-sm)", opacity:disabled?.4:1 });

  const autoFillWeek = () => {
    if(!confirm("空いている平日（月〜金）に、優先順位の高い案件から「必要便数/日」だけ担当ドライバーを割り当てます。\n（入力済みセル・確定済みの日は変更しません。必要便数0=スポット等は自動配車しません）")) return;
    setDispatch(prev=>{
      const next={...prev};
      const order = planOrder();
      weekDays.forEach(wd=>{
        if(wd.isWeekend || confirmed[wd.dk]) return;
        const day={...(next[wd.dk]||{})};
        const used = new Set(Object.keys(day)); // その日すでに割当済みのドライバー（手入力含む）
        order.forEach(cid=>{
          const need = demandFor(cid);
          if(need<=0) return;
          let cnt = Object.values(day).filter(v=>v===cid).length; // 既にこの案件に入っている数
          if(cnt>=need) return;
          for(const did of orderedDriversForClient(cid)){
            if(cnt>=need) break;
            if(used.has(did)) continue;
            day[did]=cid; used.add(did); cnt++;
          }
        });
        if(Object.keys(day).length) next[wd.dk]=day; else delete next[wd.dk];
      });
      return next;
    });
  };
  const copyPrevWeek = () => {
    if(!confirm("先週の配車を今週にコピーします。今週の既存入力は上書きされます。よろしいですか？")) return;
    setDispatch(prev=>{
      const next={...prev};
      weekDays.forEach((wd,i)=>{ if(confirmed[wd.dk]) return; const src=prev[prevWeekDk[i]]; if(src&&Object.keys(src).length) next[wd.dk]={...src}; else delete next[wd.dk]; });
      return next;
    });
  };
  const clearWeekDisp = () => {
    if(!confirm("今週の配車をすべてクリアします。（確定済みの日は保持されます）よろしいですか？")) return;
    setDispatch(prev=>{ const next={...prev}; weekDays.forEach(wd=>{ if(!confirmed[wd.dk]) delete next[wd.dk]; }); return next; });
  };

  // ── 配車先の確定 ──
  const isConfirmed = (dk) => !!confirmed[dk];
  const toggleConfirmDay = (dk) => {
    const has = dispCountFor(dk) > 0;
    if(!confirmed[dk] && !has){ showToast("この日には配車が入力されていないため、確定できません。", "error"); return; }
    setConfirmed(prev=>{ const next={...prev}; if(next[dk]) delete next[dk]; else next[dk]=new Date().toISOString(); return next; });
  };
  const confirmWeek = () => {
    const target = weekDays.filter(wd=>dispCountFor(wd.dk)>0 && !confirmed[wd.dk]);
    if(!target.length){ showToast("確定できる配車（入力済みで未確定の日）がありません。", "error"); return; }
    if(!confirm(`今週の配車 ${target.length}日分を確定します。\n確定後は自動配車・先週コピー・週クリアの対象外になり、請求連動の集計対象になります。\nよろしいですか？`)) return;
    setConfirmed(prev=>{ const next={...prev}; const ts=new Date().toISOString(); target.forEach(wd=>{ next[wd.dk]=ts; }); return next; });
    showToast(`今週の配車 ${target.length}日分を確定しました`);
  };
  const unconfirmWeek = () => {
    const target = weekDays.filter(wd=>confirmed[wd.dk]);
    if(!target.length) return;
    if(!confirm(`今週の確定済み ${target.length}日分を解除します。よろしいですか？`)) return;
    setConfirmed(prev=>{ const next={...prev}; target.forEach(wd=>delete next[wd.dk]); return next; });
    showToast(`今週の確定 ${target.length}日分を解除しました`);
  };

  // 確定セル → 実績(dailyActuals + jt_daily_edits)の読み取り専用ジョイン（computeLiveSum と同じセル単位マージ）
  const cellBilling = (cid, dk, did) => {
    const c = resolveClientById(cid); if(!c) return {sell:0,pay:0,has:false};
    const baseDrv = (dailyActuals[cid]&&dailyActuals[cid][dk]&&dailyActuals[cid][dk][did]) || {};
    const editDrv = (dailyEdits[cid]&&dailyEdits[cid][dk]&&dailyEdits[cid][dk][did]) || {};
    const labels = new Set([...Object.keys(baseDrv), ...Object.keys(editDrv)]);
    let sell=0, pay=0, has=false;
    labels.forEach(lbl=>{ const editV=editDrv[lbl]; const v=editV!==undefined?editV:baseDrv[lbl]; const cnt=Number(v)||0; const r=c.rates.find(rr=>rr.label===lbl); if(r&&cnt){ sell+=cnt*r.sell; pay+=cnt*r.pay; has=true; } });
    return {sell, pay, has};
  };

  // 荷主×締め期間内の「配車のべ件数 / 確定日数」（読み取り専用）
  const dispatchPeriodInfo = (cid, mk) => {
    const c = resolveClientById(cid) || {};
    const bp = billingPeriodFor(mk, c.billingCycle);
    let count=0, confirmedCount=0; const days=new Set(); const cfDays=new Set();
    Object.keys(dispatch).forEach(dk=>{
      if(dk < bp.start || dk > bp.end) return;
      const day = dispatch[dk]||{};
      const assigned = Object.keys(day).filter(did=>day[did]===cid);
      if(assigned.length){ count+=assigned.length; days.add(dk); if(confirmed[dk]){ confirmedCount+=assigned.length; cfDays.add(dk); } }
    });
    return { count, confirmedCount, days:days.size, confirmedDays:cfDays.size, bp };
  };

  // ── シフトデータ操作 ──
  const getShift = (dk,did) => (shifts[dk]&&shifts[dk][did]) || "";
  const cycleShift = (dk,did) => {
    const cur=getShift(dk,did); const idx=SHIFT_STATES.indexOf(cur);
    const nx = idx<0 ? SHIFT_STATES[0] : (idx===SHIFT_STATES.length-1 ? "" : SHIFT_STATES[idx+1]);
    setShifts(prev=>{
      const next={...prev}; const day={...(next[dk]||{})};
      if(!nx) delete day[did]; else day[did]=nx;
      if(Object.keys(day).length) next[dk]=day; else delete next[dk];
      return next;
    });
  };
  const fillShiftWeek = () => {
    if(!confirm("平日（月〜金）を全ドライバー「日勤」、土日を「休」に一括設定します。\n（入力済みも上書きされます）")) return;
    setShifts(prev=>{
      const next={...prev};

        const needAttention = rows.filter(r=>r.status==="未確定"||r.status==="確定（実績待ち）").length;
