          ))}
          <div style={{ borderTop:"1px solid #f1f3f5", marginTop:16, paddingTop:12 }}>
            <div style={{ fontSize:11.5, color:"#9ca3af", lineHeight:1.7 }}>通常2〜3営業日<br/>緊急の場合は運行管理（内線301）へ直接連絡してください</div>
          </div>
        </Card>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:700, marginBottom:20 }}>各種申請</div>

      {/* 申請種別 */}
      <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:12 }}>申請種別を選択</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:28 }}>
        {types.map(a=>(
          <button key={a.name} onClick={()=>setSel(a)}
            style={{ background:"#fff", border:"1.5px solid #e5e7eb", borderRadius:8, padding:"18px 16px", textAlign:"left", transition:"all .15s", cursor:"pointer" }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=accent; e.currentTarget.style.background=accent+"08"; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor="#e5e7eb"; e.currentTarget.style.background="#fff"; }}>
            <div style={{ width:32, height:32, borderRadius:8, background:accent+"14", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:10 }}>
              <Ic name={a.icon} size={16} color={accent}/>
            </div>
            <div style={{ fontWeight:600, fontSize:13, lineHeight:1.4 }}>{a.name}</div>
          </button>
        ))}
      </div>

      {/* 申請履歴 */}
      <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:12 }}>申請履歴</div>
      <Card>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"#f9fafb", borderBottom:"1px solid #e5e7eb" }}>
              {["申請番号","申請種別","申請日","承認者","ステータス",""].map(h=>(
                <th key={h} style={{ padding:"9px 16px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:11.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[...submitted, ...pendingList].map((p,i)=>{
              const sc=stC(p.status);
              return (
                <tr key={i} style={{ borderBottom:"1px solid #f1f3f5" }}>
                  <td style={{ padding:"11px 16px", color:"#6b7280", fontSize:12 }}>{p.id}</td>
                  <td style={{ padding:"11px 16px", fontWeight:600 }}>{p.type}</td>
                  <td style={{ padding:"11px 16px", color:"#6b7280" }}>{p.date}</td>
                  <td style={{ padding:"11px 16px", color:"#6b7280" }}>{p.approver}</td>
                  <td style={{ padding:"11px 16px" }}>
                    <span style={{ padding:"3px 8px", borderRadius:4, fontSize:11.5, fontWeight:600, background:sc.bg, color:sc.c }}>{p.status}</span>
                  </td>
                  <td style={{ padding:"11px 16px" }}>
                    <button onClick={()=>alert(p.id+" "+p.type+" / 状態: "+p.status+" / 承認者: "+p.approver)} style={{ padding:"4px 10px", border:"1px solid #e5e7eb", borderRadius:4, background:"#fff", fontSize:11, color:"#6b7280", cursor:"pointer" }}>詳細</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = React.useState("dashboard");
  const accent = tweaks.accent;
  const pp = { accent, setPage };

  const pageMap = {
    dashboard:    <Dashboard {...pp}/>,
    announce:     <AnnouncePage {...pp}/>,
    pl:           <PLPage {...pp}/>,
    invoice:      <InvoicePage {...pp}/>,
    driverfinance:<DriverFinancePage {...pp}/>,
    ratemaster:   <RateMasterPage {...pp}/>,
    daily:        <DailyInputPage {...pp}/>,
    clients:      <ClientPage {...pp}/>,
    drivers:      <DriversPage {...pp}/>,
    vehicles:     <VehiclesPage {...pp}/>,
    attendance:   <AttendancePage {...pp}/>,
    apply:        <ApplyPage {...pp}/>,
    safety:       <SafetyPage {...pp}/>,
    faq:          <FAQPage {...pp}/>,
    manual:       <ManualPage {...pp}/>,
    contact:      <ContactPage {...pp}/>,
  };

  return (
    <div style={{ display:"flex", height:"100vh", background:"#f4f5f7" }}>
      {/* Sidebar */}
      <div style={{ width:220, background:"#fff", borderRight:"1px solid #e8eaed", display:"flex", flexDirection:"column", flexShrink:0 }}>
        <div style={{ padding:"18px 20px 14px", borderBottom:"1px solid #f1f3f5" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:32, height:32, background:accent, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <Ic name="truck" size={16} color="#fff" strokeWidth={2}/>
            </div>
            <div>
              <div style={{ fontWeight:800, fontSize:14, color:"#111827", lineHeight:1.2, letterSpacing:-0.3 }}>J transport</div>
              <div style={{ fontSize:10, color:"#9ca3af", marginTop:1 }}>社内ポータル</div>
            </div>
          </div>
        </div>
        <nav style={{ flex:1, padding:"8px 8px", overflowY:"auto" }}>
          {navGroups.map((group,gi)=>(
            <div key={gi}>
              {group.label && <div style={{ fontSize:10, fontWeight:700, color:"#c4c9d4", letterSpacing:0.8, padding:"10px 10px 4px", textTransform:"uppercase" }}>{group.label}</div>}
              {group.items.map(item=>{
                const active=page===item.id;
                return (
                  <button key={item.id} onClick={()=>setPage(item.id)}
                    style={{ width:"100%", display:"flex", alignItems:"center", gap:9, padding:"7px 10px", borderRadius:6, border:"none", background:active?accent+"14":"transparent", color:active?accent:"#374151", cursor:"pointer", fontFamily:"inherit", fontSize:12.5, fontWeight:active?600:400, marginBottom:1, transition:"all .1s", textAlign:"left" }}
                    onMouseEnter={e=>{ if(!active) e.currentTarget.style.background="#f3f4f6"; }}
                    onMouseLeave={e=>{ if(!active) e.currentTarget.style.background="transparent"; }}>
                    <Ic name={item.icon} size={14} color={active?accent:"#6b7280"}/>
                    <span style={{ flex:1 }}>{item.label}</span>
                    {item.badge && <span style={{ background:"#dc2626", color:"#fff", borderRadius:10, fontSize:10, padding:"1px 6px", fontWeight:700 }}>{item.badge}</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div style={{ padding:"12px 16px", borderTop:"1px solid #f1f3f5", display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:28, height:28, borderRadius:"50%", background:accent+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:accent, flexShrink:0 }}>{tweaks.userName[0]}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12.5, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tweaks.userName}</div>
            <div style={{ fontSize:11, color:"#9ca3af" }}>{tweaks.dept}</div>
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        <div style={{ background:"#fff", borderBottom:"1px solid #e8eaed", height:48, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px", flexShrink:0 }}>
          <div style={{ fontSize:12.5, color:"#9ca3af" }}>{navItems.find(n=>n.id===page)?.label}</div>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <div style={{ position:"relative" }}>
              <Ic name="bell" size={17} color="#6b7280"/>
              <div style={{ position:"absolute", top:-3, right:-3, width:12, height:12, borderRadius:"50%", background:"#dc2626", fontSize:8, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>4</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:26, height:26, borderRadius:"50%", background:accent+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:accent }}>{tweaks.userName[0]}</div>
              <span style={{ fontSize:13, fontWeight:500 }}>{tweaks.userName}</span>
            </div>
          </div>
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:"22px 28px" }}>
          {pageMap[page] || <div style={{ color:"#9ca3af" }}>ページが見つかりません</div>}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakColor id="accent" label="アクセントカラー"/>
        <TweakText id="userName" label="ユーザー名"/>
        <TweakText id="dept" label="部署"/>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
