// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,

function useLocalStorage(key, initial) {

    try { const s = localStorage.getItem(key); return s != null ? JSON.parse(s) : initial; }

const TARGET_MARGIN = 25;     // 粗利率目標 (%)
const ALERT_MARGIN_LOW = 10;  // 警告粗利率 (%)
const ALERT_DROP_PCT = 20;    // 前月比急減アラート閾値 (%)

// 全月キーを sorted で返す
const ALL_MONTH_KEYS = (()=>{
  const s = new Set();
  Object.values(monthlyHistory).forEach(m => Object.keys(m).forEach(k => s.add(k)));
  return Array.from(s).sort();
})();

// 月キー操作
const prevMonthKey = (mk) => {
  const [y,m] = mk.split('-').map(Number);
  return m===1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
};

// localStorage 直読みヘルパー（モジュールレベル: 編集オーバーライドを集計関数に反映するため）
const _lsGet = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
// 追加荷主(jt_extra_clients)込みの全クライアント
const allClientsLive = () => { const ex = _lsGet('jt_extra_clients', []); return Array.isArray(ex) && ex.length ? [...clients, ...ex] : clients; };
// 単価編集(jt_rate_overrides) / 締日編集(jt_cycle_overrides) を適用した実効クライアント
const effectiveClient = (c) => {
  if (!c) return c;
  const ro = _lsGet('jt_rate_overrides', {});
  const co = _lsGet('jt_cycle_overrides', {});
  const rates = ro[c.id] || c.rates;
  const billingCycle = (co[c.id] !== undefined && co[c.id] !== null) ? co[c.id] : c.billingCycle;
  return (rates === c.rates && billingCycle === c.billingCycle) ? c : { ...c, rates, billingCycle };
};
// id から実効クライアントを解決（追加荷主・編集オーバーライド込み）
const resolveClientById = (cid) => effectiveClient(allClientsLive().find(c => c.id === cid));

// 請求期間を計算（締日アウェア）
const billingPeriodFor = (mk, cycle) => {
  const [y, m] = mk.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  const pad = (n) => String(n).padStart(2,'0');
  if (!cycle || cycle === '案件都度' || cycle.indexOf('末締め') >= 0) {
    return { start: `${mk}-01`, end: `${mk}-${pad(last)}` };
  }
  const m20 = cycle.match(/^翌月(\d+)日締め/);
  if (m20) {
    const cd = parseInt(m20[1]);
    const prev = new Date(y, m-2, cd+1);
    return {
      start: `${prev.getFullYear()}-${pad(prev.getMonth()+1)}-${pad(prev.getDate())}`,
      end: `${mk}-${pad(cd)}`,
    };
  }
  return { start: `${mk}-01`, end: `${mk}-${pad(last)}` };
};

// 締め日の選択肢（billingPeriodFor がパースできる値と揃える）。単価マスタ・荷主管理で共用
const CYCLE_OPTIONS = ["—","当月末締め","翌月5日締め","翌月10日締め","翌月15日締め","翌月20日締め","翌月25日締め","翌月末締め"];

// dailyActuals + dailyEdits の merge から、cid×monthKey の billing-period 合計を計算
const computeLiveSum = (cid, mk, dailyEdits) => {
  const c = resolveClientById(cid);
  if (!c) return null;
  const bp = billingPeriodFor(mk, c.billingCycle);
  const baseDA = (typeof dailyActuals !== 'undefined' && dailyActuals[cid]) || {};
  const editsDA = (dailyEdits && dailyEdits[cid]) || {};
  const dateSet = new Set([...Object.keys(baseDA), ...Object.keys(editsDA)]);
  let sell=0, pay=0, hasAny=false;
  for (const date of dateSet) {
    if (date < bp.start || date > bp.end) continue;
    const baseDay = baseDA[date] || {};
    const editDay = editsDA[date] || {};
    const drivers = new Set([...Object.keys(baseDay), ...Object.keys(editDay)]);
    for (const did of drivers) {
      const baseDrv = baseDay[did] || {};
      const editDrv = editDay[did] || {};
      const labels = new Set([...Object.keys(baseDrv), ...Object.keys(editDrv)]);
      for (const lbl of labels) {
        // edits の値が優先（"" も「ユーザーが0にした」として尊重）
        const editV = editDrv[lbl];
        const baseV = baseDrv[lbl];
        const v = editV !== undefined ? editV : baseV;
        const cnt = Number(v) || 0;
        const r = c.rates.find(rr => rr.label === lbl);
        if (!r || cnt === 0) continue;
        sell += cnt * r.sell;
        pay += cnt * r.pay;
        hasAny = true;
      }
    }
  }
  return hasAny ? { s: sell, p: pay } : null;
};

// クライアント×月の値取得（live edits を優先、なければ monthlyHistory フォールバック）
const cm = (cid, mk, dailyEdits) => {
  const live = computeLiveSum(cid, mk, dailyEdits);
  if (live) return live;
  return (monthlyHistory[cid] && monthlyHistory[cid][mk]) || {s:0,p:0};
};
// 全社合算
const monthAgg = (mk, dailyEdits) => {
  let sell=0, pay=0;
  allClientsLive().forEach(c => { const h = cm(c.id, mk, dailyEdits); sell += h.s; pay += h.p; });
  return { sell, pay, profit: sell-pay };
};

const PLPage = ({ accent, setPage }) => {
  const [selectedMonth, setSelectedMonth] = React.useState(LATEST_DATA_MONTH);
  const [graphRange, setGraphRange] = React.useState("year"); // year | half
  const [tblSort, setTblSort] = React.useState({key:"sell", dir:"desc"});
  // 日次入力ページからの編集を反映するために localStorage 経由で購読
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});

  // === 当月・前月・年計の集計 ===
  const cur = monthAgg(selectedMonth, dailyEdits);
  const prevMk = prevMonthKey(selectedMonth);
  const prev = monthAgg(prevMk, dailyEdits);
  const curMargin = cur.sell>0 ? cur.profit/cur.sell*100 : 0;
  const prevMargin = prev.sell>0 ? prev.profit/prev.sell*100 : 0;
  const sellDelta = prev.sell>0 ? (cur.sell-prev.sell)/prev.sell*100 : 0;
  const profitDelta = prev.profit>0 ? (cur.profit-prev.profit)/prev.profit*100 : 0;

  // 当月の荷主別データ
  const curByClient = allClientsLive().map(c => {
    const h = cm(c.id, selectedMonth, dailyEdits);
    const ph = cm(c.id, prevMk, dailyEdits);
    // 直近3ヶ月平均（当月含む直近3）
    const idx = ALL_MONTH_KEYS.indexOf(selectedMonth);
    let avg3 = 0, n=0;
    for (let k=Math.max(0,idx-2); k<=idx; k++) {
      const v = cm(c.id, ALL_MONTH_KEYS[k], dailyEdits);
      if (v.s>0) { avg3 += v.s; n++; }
    }
    avg3 = n>0 ? avg3/n : 0;
    return {
      id: c.id, name: c.name, billing: c.billing, billingCycle: c.billingCycle,
      sell: h.s, pay: h.p, profit: h.s-h.p,
      rate: h.s>0 ? (h.s-h.p)/h.s*100 : 0,
      pct: cur.sell>0 ? h.s/cur.sell*100 : 0,
      prevSell: ph.s,
      sellDelta: ph.s>0 ? (h.s-ph.s)/ph.s*100 : (h.s>0?100:0),
      avg3,
      vsAvg: avg3>0 ? (h.s-avg3)/avg3*100 : 0,
    };
  });
  const curActive = curByClient.filter(r => r.sell>0);
  const curSorted = [...curActive].sort((a,b)=>{
    const k=tblSort.key, d=tblSort.dir==="asc"?1:-1;
    return (a[k]-b[k])*d;
  });

  // === 経営アラート ===
  const alerts = [];
  // 1. トップ荷主依存度
  const topClient = [...curActive].sort((a,b)=>b.sell-a.sell)[0];
  if (topClient && topClient.pct>=30) {
    alerts.push({
      level: topClient.pct>=40?"high":"mid",
      title:`売上集中: ${topClient.name} で ${topClient.pct.toFixed(1)}%`,
      desc:`単一荷主依存度が高い。${topClient.name} の解約は当月売上で ${fmt(topClient.sell)} のインパクト。多角化検討。`
    });
  }
  // 2. 粗利率低い荷主
  const lowMargin = curActive.filter(r => r.rate<ALERT_MARGIN_LOW && r.sell>10000);
  if (lowMargin.length>0) {
    alerts.push({
      level:"mid",
      title:`粗利率 ${ALERT_MARGIN_LOW}%未満: ${lowMargin.length}社`,
      desc: lowMargin.map(r=>`${r.name}（${r.rate.toFixed(1)}%）`).join('、')+" — 単価交渉 or 撤退判断"
    });
  }
  // 3. 売上急減
  const dropped = curActive.filter(r => r.sellDelta<=-ALERT_DROP_PCT && r.prevSell>0);
  if (dropped.length>0) {
    alerts.push({
      level:"high",
      title:`売上急減: ${dropped.length}社（前月比${-ALERT_DROP_PCT}%以上ダウン）`,
      desc: dropped.map(r=>`${r.name}（${r.sellDelta.toFixed(0)}%）`).join('、')+" — 原因調査"
    });
  }
  // 4. 入金遅延・未請求
  const unpaid = invoices.filter(i=>i.status==="遅延");
  const pending = invoices.filter(i=>i.status==="未請求");
  if (unpaid.length>0) {
    alerts.push({
      level:"high",
      title:`入金遅延: ${unpaid.length}件 ${fmt(unpaid.reduce((s,i)=>s+i.amount,0))}`,
      desc: unpaid.map(i=>`${i.client}（${i.period}）`).join('、')+" — 至急督促"
    });
  }
  if (pending.length>0) {
    alerts.push({
      level:"low",
      title:`未請求: ${pending.length}件 ${fmt(pending.reduce((s,i)=>s+i.amount,0))}`,
      desc:"請求書発行待ち。期日内発行で資金繰り改善"
    });
  }
  // 5. 粗利率が目標下回り
  if (curMargin>0 && curMargin < TARGET_MARGIN) {
    alerts.push({
      level:"mid",
      title:`粗利率 ${curMargin.toFixed(1)}% — 目標 ${TARGET_MARGIN}% に未達`,
      desc:`差 ${(TARGET_MARGIN-curMargin).toFixed(1)}pt。${(cur.sell*(TARGET_MARGIN-curMargin)/100).toFixed(0)|0} 円の粗利改善余地`
    });
  }

  // === 12ヶ月推移 ===
  const trend = ALL_MONTH_KEYS.map(mk => ({...monthAgg(mk, dailyEdits), mk}));
  const recentTrend = graphRange==="half" ? trend.slice(-6) : trend.slice(-12);
  const maxTrend = Math.max(...recentTrend.map(d=>d.sell), 1);
  // 3ヶ月移動平均
  const ma3 = recentTrend.map((_,i) => {
    const slice = recentTrend.slice(Math.max(0,i-2), i+1);
    return slice.reduce((s,d)=>s+d.sell,0)/slice.length;
  });

  // === ドライバー収益性 ===
  const inhouseDrivers = drivers.filter(d=>d.type==="自社");
  const coopDrivers    = drivers.filter(d=>d.type==="協力会社");
  // pay の自社/協力会社割合（近似: ドライバー人数比率）
  const inhouseRatio = inhouseDrivers.length / Math.max(1, inhouseDrivers.length+coopDrivers.length);
  const inhousePayEst = cur.pay * inhouseRatio;
  const coopPayEst    = cur.pay - inhousePayEst;
  const activeDriverCount = inhouseDrivers.length + coopDrivers.length;
  const perDriverProfit   = activeDriverCount>0 ? cur.profit/activeDriverCount : 0;

  // === 資金繰り予測（締め日別の入金スケジュール） ===
  const cycleGroups = {};
  curActive.forEach(r => {
    const c = clients.find(x=>x.id===r.id) || {};
    const key = c?.billingCycle || "未設定";
    if (!cycleGroups[key]) cycleGroups[key] = { clients:[], sell:0, pay:0 };
    cycleGroups[key].clients.push(r);
    cycleGroups[key].sell += r.sell;
    cycleGroups[key].pay  += r.pay;
  });

  // === YTD（年計）===
  const curYear = selectedMonth.slice(0,4);
  const ytdMonths = ALL_MONTH_KEYS.filter(mk => mk.startsWith(curYear));
  const ytdData = ytdMonths.reduce((acc,mk)=>{
    const m = monthAgg(mk, dailyEdits); acc.sell+=m.sell; acc.pay+=m.pay; return acc;
  }, {sell:0,pay:0});
  const ytdProfit = ytdData.sell - ytdData.pay;
  const ytdMonthCount = ytdMonths.length;
  const monthAvg = ytdMonthCount>0 ? ytdData.sell/ytdMonthCount : 0;
  // 年間着地予測 (月平均 × 12)
  const projection = monthAvg * 12;
  const projectionProfit = ytdMonthCount>0 ? (ytdProfit/ytdMonthCount)*12 : 0;

  // 黒字荷主数
  const profitableCount = curActive.filter(r=>r.profit>0).length;

  // === スタイル ===
  const SortHd = ({label, k, align="left"}) => {
    const active = tblSort.key===k;
    return (
      <th onClick={()=>setTblSort({key:k, dir:active&&tblSort.dir==="desc"?"asc":"desc"})}
        style={{ padding:"9px 12px", textAlign:align, color:active?accent:"#374151", fontWeight:600, fontSize:11.5, whiteSpace:"nowrap", cursor:"pointer", userSelect:"none", background:"#f9fafb" }}>
        {label}{active&&<span style={{ marginLeft:3, fontSize:9 }}>{tblSort.dir==="desc"?"▼":"▲"}</span>}
      </th>
    );
  };

  const alertColor = (lv) => lv==="high"?"#dc2626":lv==="mid"?"#d97706":"#0ea5e9";
  const alertBg    = (lv) => lv==="high"?"#fee2e2":lv==="mid"?"#fef3c7":"#dbeafe";

  return (
    <div>
      {/* ── ヘッダ ── */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700, display:"flex", alignItems:"center", gap:10 }}>
            収支管理 <span style={{ fontSize:11, padding:"2px 8px", background:accent+"22", color:accent, borderRadius:99, fontWeight:600 }}>経営分析室</span>
          </div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:3 }}>
            対象月: {mkLabel(selectedMonth)} ／ 前月: {mkLabel(prevMk)}
            {!_hasCurrent && selectedMonth===LATEST_DATA_MONTH && ` ／ 今月（${REF_MONTH_LABEL}）実績未入力のため最新確定月を表示`}
          </div>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <label style={{ fontSize:12, color:"#6b7280" }}>対象月：</label>
          <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}
            style={{ padding:"7px 14px", border:`1.5px solid ${accent}`, borderRadius:6, background:"#fff", fontSize:13, fontWeight:600, color:"#111827", cursor:"pointer", fontFamily:"inherit", outline:"none" }}>
            {ALL_MONTH_KEYS.slice().reverse().map(mk=>(
              <option key={mk} value={mk}>{mkLabel(mk)}</option>
            ))}
          </select>
        </div>
      </div>

      {/* ── 経営KPI 6カード ── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:10, marginBottom:14 }}>
        {[
          { l:"売上", v:fmt(cur.sell), sub:`前月比 ${sellDelta>=0?"+":""}${sellDelta.toFixed(1)}%`, c:accent, up: sellDelta>=0 },
          { l:"支払", v:fmt(cur.pay),  sub:`原価率 ${cur.sell>0?(cur.pay/cur.sell*100).toFixed(1):"—"}%`, c:"#d97706", up:null },
          { l:"粗利", v:fmt(cur.profit), sub:`前月比 ${profitDelta>=0?"+":""}${profitDelta.toFixed(1)}%`, c:"#16a34a", up: profitDelta>=0 },
          { l:`粗利率（目標 ${TARGET_MARGIN}%）`, v:`${curMargin.toFixed(1)}%`, sub:`前月 ${prevMargin.toFixed(1)}% ／ ${curMargin>=TARGET_MARGIN?"目標達成":"目標未達"}`, c: curMargin>=TARGET_MARGIN?"#16a34a":curMargin>=ALERT_MARGIN_LOW?"#d97706":"#dc2626", up: curMargin>=TARGET_MARGIN },
          { l:"受取勘定（未請求＋遅延）", v:fmt(pending.reduce((s,i)=>s+i.amount,0)+unpaid.reduce((s,i)=>s+i.amount,0)), sub:`未請求 ${pending.length} ／ 遅延 ${unpaid.length}`, c:"#7c3aed", up:null },
          { l:"黒字荷主数", v:`${profitableCount} / ${curActive.length}`, sub: profitableCount===curActive.length?"全社黒字":`${curActive.length-profitableCount}社が赤字`, c:profitableCount===curActive.length?"#16a34a":"#dc2626", up: profitableCount===curActive.length },
        ].map(({l,v,sub,c,up})=>(
          <Card key={l} style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:10.5, color:"#9ca3af", marginBottom:6, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{l}</div>
            <div style={{ fontSize:18, fontWeight:800, color:c, lineHeight:1.1 }}>{v}</div>
            <div style={{ fontSize:10.5, color: up===true?"#16a34a":up===false?"#dc2626":"#9ca3af", marginTop:5 }}>{sub}</div>
          </Card>
        ))}
      </div>

      {/* ── 経営アラート ── */}
      {alerts.length>0 && (
        <Card style={{ marginBottom:14 }}>
          <SH title={`経営アラート（${alerts.length}件）`}/>
          <div style={{ padding:"10px 16px" }}>
            {alerts.map((a,i)=>(
              <div key={i} style={{ display:"flex", gap:10, padding:"9px 10px", marginBottom:6, background:alertBg(a.level), borderLeft:`4px solid ${alertColor(a.level)}`, borderRadius:4 }}>
                <span style={{ fontSize:11, fontWeight:700, color:alertColor(a.level), minWidth:36, textTransform:"uppercase" }}>{a.level==="high"?"高":a.level==="mid"?"中":"情報"}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#111827" }}>{a.title}</div>
                  <div style={{ fontSize:11.5, color:"#6b7280", marginTop:2 }}>{a.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* ── 月次推移 + 構成 ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:14, marginBottom:14 }}>
        <Card>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px 4px" }}>
            <div style={{ fontSize:13, fontWeight:700 }}>月次収支推移 ＋ 3ヶ月移動平均</div>
            <div style={{ display:"flex", gap:5 }}>
              {[{v:"half",l:"6ヶ月"},{v:"year",l:"12ヶ月"}].map(opt=>(
                <button key={opt.v} onClick={()=>setGraphRange(opt.v)}
                  style={{ padding:"3px 10px", borderRadius:4, border:`1.5px solid ${graphRange===opt.v?accent:"#94a3b8"}`, background:graphRange===opt.v?accent:"#fff", color:graphRange===opt.v?"#fff":"#374151", fontSize:11, fontWeight:graphRange===opt.v?600:400, cursor:"pointer" }}>
                  {opt.l}
                </button>
              ))}
            </div>
          </div>
          <div style={{ padding:"10px 20px 16px" }}>
            <div style={{ position:"relative", display:"flex", alignItems:"flex-end", gap:graphRange==="year"?5:12, height:180, marginBottom:10 }}>
              {recentTrend.map((d,i)=>{
                const isCur = d.mk===selectedMonth;
                const h = (d.sell/maxTrend)*100;
                const mh = (ma3[i]/maxTrend)*100;
                return (
                  <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", height:"100%", justifyContent:"flex-end", alignItems:"center", position:"relative" }}>
                    {isCur && <div style={{ fontSize:10, color:accent, fontWeight:700, marginBottom:2, whiteSpace:"nowrap" }}>{fmt(d.sell/10000)}万</div>}
                    <div style={{ width:"100%", position:"relative", height:`${h}%`, minHeight:4 }}>
                      <div style={{ position:"absolute", bottom:0, width:"100%", height:`${d.sell>0?(d.sell-d.pay)/d.sell*100:0}%`, background:isCur?"#86efac":"#dcfce7", borderRadius:"3px 3px 0 0" }}/>
                      <div style={{ position:"absolute", bottom:`${d.sell>0?(d.sell-d.pay)/d.sell*100:0}%`, width:"100%", height:`${d.sell>0?d.pay/d.sell*100:0}%`, background:isCur?accent:"#cbd5e1" }}/>
                    </div>
                    {/* 移動平均ドット */}
                    <div style={{ position:"absolute", left:"50%", bottom:`${mh}%`, transform:"translate(-50%,50%)", width:6, height:6, background:"#dc2626", borderRadius:"50%", zIndex:2 }}/>
                    <div style={{ fontSize:9.5, color:isCur?accent:"#9ca3af", marginTop:5, fontWeight:isCur?700:400 }}>{mkShort(d.mk)}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", gap:14, fontSize:10.5, color:"#6b7280", borderTop:"1px solid #94a3b8", paddingTop:10 }}>
              <span style={{ display:"flex", gap:4, alignItems:"center" }}><span style={{ width:10, height:10, background:"#dcfce7", borderRadius:2 }}/>粗利</span>
              <span style={{ display:"flex", gap:4, alignItems:"center" }}><span style={{ width:10, height:10, background:"#cbd5e1", borderRadius:2 }}/>支払</span>
              <span style={{ display:"flex", gap:4, alignItems:"center" }}><span style={{ width:10, height:10, background:accent, borderRadius:2 }}/>選択月</span>
              <span style={{ display:"flex", gap:4, alignItems:"center" }}><span style={{ width:8, height:8, background:"#dc2626", borderRadius:"50%" }}/>3ヶ月移動平均</span>
            </div>
          </div>
        </Card>

        {/* 荷主構成（売上） */}
        <Card>
          <SH title="売上構成（当月）"/>
          <div style={{ padding:"10px 16px" }}>
            {[...curActive].sort((a,b)=>b.sell-a.sell).slice(0,10).map((r,i)=>(
              <div key={i} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11.5, marginBottom:3 }}>
                  <span style={{ fontWeight:500 }}>{i+1}. {r.name}</span>
                  <span style={{ fontWeight:700, color:accent }}>{r.pct.toFixed(1)}%</span>
                </div>
                <div style={{ height:5, background:"#f1f5f9", borderRadius:2 }}>
                  <div style={{ width:`${r.pct}%`, height:"100%", background:r.pct>=30?"#dc2626":r.pct>=20?"#d97706":accent, borderRadius:2 }}/>
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* ── 上位荷主別サマリ ── */}
      <ParentClientSummaryBlock accent={accent} selectedMonth={selectedMonth} dailyEdits={dailyEdits}/>

      {/* ── 荷主別 詳細表（拡張） ── */}
      <Card style={{ marginBottom:14 }}>
        <SH title={`荷主別 月次収支詳細（${mkLabel(selectedMonth)}）`}/>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12.5 }}>
            <thead>
              <tr>
                <SortHd label="荷主" k="name"/>
                <th style={{ padding:"9px 12px", textAlign:"left", fontSize:11.5, color:"#6b7280", background:"#f9fafb" }}>体系/締め</th>
                <SortHd label="売上" k="sell" align="right"/>
                <SortHd label="支払" k="pay" align="right"/>
                <SortHd label="粗利" k="profit" align="right"/>
                <SortHd label="粗利率" k="rate" align="right"/>
                <SortHd label="構成比" k="pct" align="right"/>
                <SortHd label="前月比" k="sellDelta" align="right"/>
                <SortHd label="3M平均" k="avg3" align="right"/>
                <th style={{ padding:"9px 12px", textAlign:"center", fontSize:11.5, color:"#6b7280", background:"#f9fafb" }}>状態</th>
              </tr>
            </thead>
            <tbody>
              {curSorted.map((r,i)=>{
                const warn = [];
                if (r.rate<ALERT_MARGIN_LOW) warn.push({l:"低粗利", c:"#dc2626"});
                if (r.sellDelta<=-ALERT_DROP_PCT) warn.push({l:"急減", c:"#dc2626"});
                if (r.pct>=30) warn.push({l:"集中", c:"#d97706"});
                if (r.profit<0) warn.push({l:"赤字", c:"#dc2626"});
                return (
                  <tr key={r.id} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{ padding:"10px 12px", fontWeight:700 }}>{r.name}</td>
                    <td style={{ padding:"10px 12px", fontSize:11 }}>
                      <div>{r.billing}</div>
                      <div style={{ color:"#9ca3af" }}>{r.billingCycle}</div>
                    </td>
                    <td style={{ padding:"10px 12px", textAlign:"right", fontWeight:700, color:accent }}>{fmt(r.sell)}</td>
                    <td style={{ padding:"10px 12px", textAlign:"right", color:"#374151" }}>{fmt(r.pay)}</td>
                    <td style={{ padding:"10px 12px", textAlign:"right", fontWeight:700, color:r.profit>=0?"#16a34a":"#dc2626" }}>{fmt(r.profit)}</td>
                    <td style={{ padding:"10px 12px", textAlign:"right", fontWeight:700, color:r.rate>=TARGET_MARGIN?"#16a34a":r.rate>=ALERT_MARGIN_LOW?"#d97706":"#dc2626" }}>{r.rate.toFixed(1)}%</td>
                    <td style={{ padding:"10px 12px", textAlign:"right" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, justifyContent:"flex-end" }}>
                        <div style={{ width:50, height:4, background:"#f1f5f9", borderRadius:2 }}>
                          <div style={{ width:`${Math.min(r.pct,100)}%`, height:"100%", background:accent, borderRadius:2 }}/>
                        </div>
                        <span style={{ fontSize:11 }}>{r.pct.toFixed(1)}%</span>
                      </div>
                    </td>
                    <td style={{ padding:"10px 12px", textAlign:"right", color:r.sellDelta>=0?"#16a34a":"#dc2626", fontWeight:600 }}>
                      {r.prevSell>0 ? `${r.sellDelta>=0?"+":""}${r.sellDelta.toFixed(1)}%` : "—"}
                    </td>
                    <td style={{ padding:"10px 12px", textAlign:"right", color:"#6b7280", fontSize:11 }}>{fmt(Math.round(r.avg3))}</td>
                    <td style={{ padding:"10px 12px", textAlign:"center" }}>
                      <div style={{ display:"flex", gap:3, flexWrap:"wrap", justifyContent:"center" }}>
                        {warn.length===0
                          ? <span style={{ fontSize:10, padding:"2px 6px", background:"#dcfce7", color:"#16a34a", borderRadius:3, fontWeight:600 }}>健全</span>
                          : warn.map((w,wi)=><span key={wi} style={{ fontSize:10, padding:"2px 6px", background:w.c+"22", color:w.c, borderRadius:3, fontWeight:600 }}>{w.l}</span>)
                        }
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ background:"#f9fafb" }}>
                <td colSpan={2} style={{ padding:"11px 12px", fontWeight:700 }}>合計（{curActive.length}社）</td>
                <td style={{ padding:"11px 12px", textAlign:"right", fontWeight:800, color:accent }}>{fmt(cur.sell)}</td>
                <td style={{ padding:"11px 12px", textAlign:"right", fontWeight:800 }}>{fmt(cur.pay)}</td>
                <td style={{ padding:"11px 12px", textAlign:"right", fontWeight:800, color:"#16a34a" }}>{fmt(cur.profit)}</td>
                <td style={{ padding:"11px 12px", textAlign:"right", fontWeight:800 }}>{curMargin.toFixed(1)}%</td>
                <td style={{ padding:"11px 12px", textAlign:"right", fontWeight:600 }}>100%</td>
                <td style={{ padding:"11px 12px", textAlign:"right", fontWeight:600, color:sellDelta>=0?"#16a34a":"#dc2626" }}>{prev.sell>0?`${sellDelta>=0?"+":""}${sellDelta.toFixed(1)}%`:"—"}</td>
                <td colSpan={2}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </Card>

      {/* ── ドライバー収益性 + 締め日別資金繰り ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
        <Card>
          <SH title="ドライバー収益性"/>
          <div style={{ padding:"14px 18px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
              <div style={{ padding:"10px 12px", background:"#dbeafe", borderRadius:4 }}>
                <div style={{ fontSize:11, color:"#1e40af" }}>自社ドライバー {inhouseDrivers.length}名</div>
                <div style={{ fontSize:16, fontWeight:800, color:"#1e40af", marginTop:3 }}>{fmt(Math.round(inhousePayEst))}</div>
                <div style={{ fontSize:10, color:"#1e40af", opacity:0.8, marginTop:2 }}>当月支払 推定（{(inhouseRatio*100).toFixed(0)}%）</div>
              </div>
              <div style={{ padding:"10px 12px", background:"#f3e8ff", borderRadius:4 }}>
                <div style={{ fontSize:11, color:"#6b21a8" }}>協力会社 {coopDrivers.length}名</div>
                <div style={{ fontSize:16, fontWeight:800, color:"#6b21a8", marginTop:3 }}>{fmt(Math.round(coopPayEst))}</div>
                <div style={{ fontSize:10, color:"#6b21a8", opacity:0.8, marginTop:2 }}>当月支払 推定（{((1-inhouseRatio)*100).toFixed(0)}%）</div>
              </div>
            </div>
            <div style={{ padding:"10px 12px", border:"1px solid #94a3b8", borderRadius:4, marginBottom:8 }}>
              <div style={{ fontSize:11, color:"#9ca3af" }}>1ドライバーあたり粗利貢献（{activeDriverCount}名）</div>
              <div style={{ fontSize:18, fontWeight:800, color:"#16a34a", marginTop:3 }}>{fmt(Math.round(perDriverProfit))}/名</div>
              <div style={{ fontSize:10, color:"#9ca3af", marginTop:2 }}>当月粗利 ÷ 全ドライバー数</div>
            </div>
            <div style={{ fontSize:11, color:"#6b7280", lineHeight:1.5 }}>
              詳細はドライバー別収支ページへ →
              <button onClick={()=>setPage("driverfinance")} style={{ marginLeft:6, padding:"3px 10px", background:accent, color:"#fff", border:"none", borderRadius:4, fontSize:11, cursor:"pointer" }}>詳細</button>
            </div>
          </div>
        </Card>

        <Card>
          <SH title="締め日別 資金繰り予測"/>
          <div style={{ padding:"14px 18px" }}>
            {Object.entries(cycleGroups).map(([cyc,grp])=>{
              const dueLabel = cyc.includes("20日") ? "翌月20日 入金予定"
                            : cyc==="当月末締め" ? "翌月10日頃 入金予定"
                            : cyc==="翌月末締め" ? "翌々月10日頃 入金予定"
                            : cyc==="案件都度" ? "案件完了後 即時"
                            : "確認要";
              return (
                <div key={cyc} style={{ marginBottom:12, paddingBottom:10, borderBottom:"1px dashed #cbd5e1" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                    <div>
                      <div style={{ fontSize:13, fontWeight:700 }}>{cyc}</div>
                      <div style={{ fontSize:10.5, color:"#9ca3af" }}>{dueLabel}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:15, fontWeight:800, color:accent }}>{fmt(grp.sell)}</div>
                      <div style={{ fontSize:10, color:"#16a34a" }}>粗利 {fmt(grp.sell-grp.pay)}</div>
                    </div>
                  </div>
                  <div style={{ fontSize:10.5, color:"#6b7280", marginTop:4 }}>
                    対象: {grp.clients.map(c=>c.name).join("、")}
                  </div>
                </div>
              );
            })}
            <div style={{ display:"flex", justifyContent:"space-between", paddingTop:6 }}>
              <span style={{ fontSize:12, fontWeight:700 }}>当月分 入金見込み合計</span>
              <span style={{ fontSize:14, fontWeight:800, color:accent }}>{fmt(cur.sell)}</span>
            </div>
          </div>
        </Card>
      </div>

      {/* ── 年度ダイジェスト ── */}
      <Card>
        <SH title={`${curYear}年度 ダイジェスト（実績${ytdMonthCount}ヶ月）`}/>
        <div style={{ padding:"14px 18px", display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12 }}>
          {[
            { l:"累計売上",       v:`${fmt(ytdData.sell)}`,         sub:`月平均 ${fmt(Math.round(monthAvg))}`,   c:accent },
            { l:"累計支払",       v:`${fmt(ytdData.pay)}`,          sub:`原価率 ${ytdData.sell>0?(ytdData.pay/ytdData.sell*100).toFixed(1):"—"}%`, c:"#d97706" },
            { l:"累計粗利",       v:`${fmt(ytdProfit)}`,           sub:`粗利率 ${ytdData.sell>0?(ytdProfit/ytdData.sell*100).toFixed(1):"—"}%`,   c:"#16a34a" },
            { l:"年間着地予測",   v:`${fmt(Math.round(projection))}`, sub:`月平均×12（${ytdMonthCount}ヶ月実績ベース）`, c:"#7c3aed" },
            { l:"目標達成率",     v:`${curMargin>=TARGET_MARGIN?"達成":"未達"}`, sub:`粗利率 ${curMargin.toFixed(1)}% ／ 目標 ${TARGET_MARGIN}%`, c: curMargin>=TARGET_MARGIN?"#16a34a":"#dc2626" },
          ].map(({l,v,sub,c})=>(
            <div key={l} style={{ padding:"10px 12px", borderLeft:`3px solid ${c}`, background:"#fafbfc", borderRadius:4 }}>
              <div style={{ fontSize:11, color:"#9ca3af", marginBottom:4 }}>{l}</div>
              <div style={{ fontSize:16, fontWeight:800, color:c }}>{v}</div>
              <div style={{ fontSize:10, color:"#9ca3af", marginTop:3 }}>{sub}</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
};

// ── 単価マスタ管理 ─────────────────────────────────────────────────────────
const RateMasterPage = ({ accent, setPage }) => {
  const [sel, setSel] = React.useState(null);
  const [editMode, setEditMode] = React.useState(false);
  const [extraClients, setExtraClients] = useLocalStorage("jt_extra_clients", []);
  const [rateOverrides, setRateOverrides] = useLocalStorage("jt_rate_overrides", {});
  const [draft, setDraft] = React.useState(null);
  const ratesFor = (c) => (c && rateOverrides[c.id]) ? rateOverrides[c.id] : (c ? c.rates : []);
  const [cycleOverrides, setCycleOverrides] = useLocalStorage("jt_cycle_overrides", {});
  const [driverOverrides, setDriverOverrides] = useLocalStorage("jt_client_driver_overrides", {});
  const driversFor = (c) => (c && driverOverrides[c.id]) ? driverOverrides[c.id] : (c ? c.drivers : []);
  const [contactOverrides, setContactOverrides] = useLocalStorage("jt_contact_overrides", {});
  const cv = (v) => (v && v !== "—") ? v : "";
  const contactFor = (c) => { const o = (c && contactOverrides[c.id]) || {}; return { person: o.person!==undefined?o.person:cv(c?.person||c?.contact), tel: o.tel!==undefined?o.tel:cv(c?.tel), address: o.address!==undefined?o.address:cv(c?.address) }; };
  const [contactDraft, setContactDraft] = React.useState({ person:"", tel:"", address:"" });
  const [cycleDraft, setCycleDraft] = React.useState("");
  const [showDrvPicker, setShowDrvPicker] = React.useState(false);
  const cycleFor = (c) => (c && cycleOverrides[c.id]) || (c && c.billingCycle) || "—";
  const [showAdd, setShowAdd] = React.useState(false);
  useEscapeToClose(showAdd, ()=>setShowAdd(false));
  const blankForm = { code:"", name:"", area:"", billing:"個建て", billingCycle:"翌月末締め", person:"", tel:"", address:"", rateLabel:"配完", sell:"", pay:"" };
  const nextCode = () => "C-" + String(clients.length + extraClients.length + 1).padStart(2,"0");
  const [form, setForm] = React.useState(blankForm);
  const allClients = [...clients, ...extraClients];
  const billingOptions = ["個建て","個建て（2区分）","個建て（3区分）","スポット","固定（日額）","固定＋変動"];

  // 荷主管理ページからの「新規荷主追加」遷移時にモーダルを自動オープン
  React.useEffect(() => {
    try {
      if (sessionStorage.getItem("jt_open_add_client") === "1") {
        sessionStorage.removeItem("jt_open_add_client");
        setForm({ ...blankForm, code: nextCode() });
        setShowAdd(true);
      }
    } catch (e) {}
  }, []);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700 }}>単価マスタ管理</div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>荷主ごとの売単価・支払単価を一元管理</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={()=>{
              const head=["荷主コード","荷主名","エリア","業務区分","売単価","支払単価","粗利","粗利率"];
              const rows=[head];
              allClients.forEach(c=>ratesFor(c).forEach(r=>{ const gp=r.sell-r.pay; const rt=r.sell>0?Math.round(gp/r.sell*100)+"%":""; rows.push([c.id,c.name,c.area,r.label,r.sell,r.pay,gp,rt]); }));
              const csv="﻿"+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\r\n");
              const url=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
              const a=document.createElement("a"); a.href=url; a.download="単価マスタ.csv"; a.click(); URL.revokeObjectURL(url);
            }} style={{ padding:"7px 16px", border:"1.5px solid #e5e7eb", background:"#fff", color:"#374151", borderRadius:6, fontSize:13, fontWeight:600, cursor:"pointer" }}>
            CSVエクスポート
          </button>
          <button onClick={()=>{ setForm({ ...blankForm, code: nextCode() }); setShowAdd(true); }} style={{ padding:"7px 16px", background:accent, color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600, cursor:"pointer" }}>
            + 荷主追加
          </button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"280px 1fr", gap:16, alignItems:"start" }}>
        {/* 荷主リスト */}
        <Card>
          <SH title="荷主一覧"/>
          <div style={{ padding:"8px 0" }}>
            {allClients.map((c,i)=>(
              <button key={i} onClick={()=>{ setSel(c); setEditMode(false); }}
                style={{ width:"100%", padding:"12px 16px", border:"none", borderLeft: sel?.id===c.id ? `3px solid ${accent}` : "3px solid transparent", background: sel?.id===c.id ? "#f0f9ff" : "transparent", textAlign:"left", display:"flex", flexDirection:"column", gap:3 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontWeight:600, fontSize:13 }}>{c.name}</span>
                  <StatusBadge label={c.billing.replace("（2区分）","").replace("（3区分）","")}/>
                </div>
                <span style={{ fontSize:11, color:"#9ca3af" }}><span style={{ fontFamily:"ui-monospace, monospace", color:"#6b7280" }}>{c.id}</span> ・ {c.area}</span>
              </button>
            ))}
          </div>
        </Card>

        {/* 単価詳細 */}
        {sel ? (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <Card style={{ padding:24 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
                <div>
                  <div style={{ fontSize:18, fontWeight:700 }}>{sel.name}</div>
                  <div style={{ fontSize:12, color:"#9ca3af", marginTop:2, display:"flex", alignItems:"center", gap:6 }}><span style={{ fontFamily:"ui-monospace, monospace", color:"#6b7280", fontWeight:700 }}>{sel.id}</span><span>／</span><span>{sel.area}</span><span>／</span><span style={{ color:"#6b7280" }}>締め:</span>{editMode ? (<select value={cycleDraft} onChange={e=>setCycleDraft(e.target.value)} style={{ padding:"2px 8px", border:`1.5px solid ${accent}`, borderRadius:4, fontSize:12, fontFamily:"inherit", outline:"none", background:"#fff" }}>{CYCLE_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}</select>) : (<span style={{ fontWeight:600, color:"#374151" }}>{cycleFor(sel)}</span>)}</div>
                </div>
                <button onClick={()=>{
                    if (editMode) {
                      setRateOverrides({ ...rateOverrides, [sel.id]: draft });
                      setCycleOverrides({ ...cycleOverrides, [sel.id]: cycleDraft });
                      setContactOverrides({ ...contactOverrides, [sel.id]: { ...contactDraft } });
                      if (window.sb) window.sb.from("jt_contact_overrides").upsert({ client_id: sel.id, person: contactDraft.person||null, tel: contactDraft.tel||null, address: contactDraft.address||null }, { onConflict:"client_id" }).then(({error})=>{ if(error) console.warn("[Supabase] contact upsert failed:", error); else console.log("[Supabase] contact saved:", sel.id); });
                      setEditMode(false); setDraft(null);
                    } else {
                      setDraft(ratesFor(sel).map(r=>({ ...r })));
                      setCycleDraft(cycleFor(sel));
                      setContactDraft(contactFor(sel));
                      setEditMode(true);

                  }}

                  <Ic name="edit" size={13} color={editMode?"#fff":accent}/>
                  {editMode ? "保存" : "編集"}
                </button>
              </div>

              {/* 単価テーブル */}
              <div style={{ marginBottom:20 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:10 }}>単価設定</div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead>
                    <tr style={{ background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>
                      {["業務区分","売単価（荷主→自社）","支払単価（自社→ドライバー）","粗利単価","粗利率"].map(h=>(
                        <th key={h} style={{ padding:"8px 12px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:12 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {(editMode && draft ? draft : ratesFor(sel)).map((r,ri)=>{
                      const gp = r.sell - r.pay;
                      const rate = r.sell > 0 ? (gp/r.sell*100).toFixed(0) : "—";
                      return (
                        <tr key={ri} style={{ borderBottom:"1px solid #94a3b8" }}>
                          <td style={{ padding:"10px 12px", fontWeight:600 }}>{r.label}</td>

                              <input value={r.sell} type="number" min="0"

                              <span style={{ fontWeight:700, color:accent }}>{r.sell > 0 ? fmt(r.sell) : "—"}</span>

                          <td style={{ padding:"10px 12px" }}>
                            {editMode ? (
                              <input value={r.pay} type="number" min="0"
                                onChange={e=>setDraft(d=>d.map((x,xi)=>xi===ri?{...x, pay:Number(e.target.value)||0}:x))}
                                style={{ width:90, padding:"4px 8px", border:"1.5px solid #e5e7eb", borderRadius:4, fontSize:13, fontFamily:"inherit", outline:"none" }}/>
                            ) : (
                              <span style={{ color:"#374151" }}>{r.pay > 0 ? fmt(r.pay) : "—"}</span>

                          </td>
                          <td style={{ padding:"10px 12px", color:"#16a34a", fontWeight:600 }}>
                            {gp > 0 ? "+" + fmt(gp) : "—"}
                          </td>
                          <td style={{ padding:"10px 12px" }}>
                            {rate !== "—" ? (
                              <span style={{ fontWeight:600, color: Number(rate)>=30?"#16a34a":Number(rate)>=20?accent:"#d97706" }}>{rate}%</span>

                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              <div>
                <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:10 }}>担当ドライバー</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {driversFor(sel).map(did => {
                    const d = drivers.find(dr=>dr.id===did) || {};
                    return d ? (
                      <div key={did} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 12px", background:"#f8fafc", borderRadius:6, border:"1px solid #94a3b8" }}>

                        <div>

                      </div>
                    ) : null;
                  })}
                  {editMode && (
                    <div style={{ position:"relative" }}>
                      <button onClick={()=>setShowDrvPicker(s=>!s)} style={{ padding:"6px 12px", border:`1.5px dashed ${accent}`, borderRadius:6, background:"transparent", color:accent, fontSize:12, fontWeight:600, cursor:"pointer" }}>+ ドライバー追加</button>
                      {showDrvPicker && (
                        <div style={{ position:"absolute", top:"110%", left:0, background:"#fff", border:"1px solid #94a3b8", borderRadius:6, padding:6, minWidth:200, maxHeight:280, overflowY:"auto", zIndex:20, boxShadow:"0 8px 24px rgba(0,0,0,0.12)" }}>
                          {drivers.filter(d => !driversFor(sel).includes(d.id)).map(d=>(
                            <button key={d.id} onClick={()=>{
                              const cur = driversFor(sel);

                            }} style={{ display:"block", width:"100%", padding:"6px 10px", background:"transparent", border:"none", textAlign:"left", fontSize:12, cursor:"pointer", borderRadius:4 }}
                              onMouseEnter={e=>e.currentTarget.style.background="#f3f4f6"}
                              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                              {d.name}
                              <span style={{ color:"#9ca3af", marginLeft:6, fontSize:10 }}>{d.type}</span>
                            </button>
                          ))}
                          {drivers.filter(d => !driversFor(sel).includes(d.id)).length===0 && (
                            <div style={{ padding:"8px 10px", fontSize:11, color:"#9ca3af" }}>追加できるドライバーなし</div>

                        </div>
                      )}
                    </div>
                  )}

                          <input value={contactDraft[key]||""} onChange={e=>setContactDraft({ ...contactDraft, [key]:e.target.value })} placeholder={ph}

                        ) : (
                          <div style={{ color: cinfo[key] ? "#374151" : "#cbd5e1" }}>{cinfo[key] || "未登録"}</div>
                        )}
                      </div>
                    ));
                  })()}
                </div>
              </div>
            </Card>

            <Card style={{ padding:20 }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>今月実績（速報）</div>

                return (
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:16 }}>
                    {[["売上",fmt(act.sell),accent],["支払",fmt(act.pay),"#d97706"],["粗利",fmt(act.profit),"#16a34a"]].map(([l,v,c])=>(
                      <div key={l} style={{ textAlign:"center", padding:"12px", background:"#f8fafc", borderRadius:6 }}>
                        <div style={{ fontSize:11, color:"#9ca3af" }}>{l}</div>
                        <div style={{ fontSize:18, fontWeight:700, color:c, marginTop:4 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </Card>
          </div>
        ) : (
          <Card style={{ padding:60, textAlign:"center" }}>
            <Ic name="tag" size={36} color="#e5e7eb"/>
            <div style={{ fontSize:14, color:"#9ca3af", marginTop:12 }}>荷主を選択すると単価詳細が表示されます</div>
          </Card>

        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.45)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={()=>setShowAdd(false)}>
          <div style={{ background:"#fff", borderRadius:10, width:480, maxHeight:"85vh", overflowY:"auto", padding:32 }} onClick={e=>e.stopPropagation()}>

            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div style={{ display:"flex", gap:12 }}>
                <label style={{ flex:"0 0 132px", display:"flex", flexDirection:"column", gap:5 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:"#374151" }}>荷主コード</span>
                  <input value={form.code} onChange={e=>setForm({ ...form, code:e.target.value })} placeholder="C-12"
                    style={{ padding:"9px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"ui-monospace, monospace", outline:"none" }}/>
                </label>
                <label style={{ flex:1, display:"flex", flexDirection:"column", gap:5 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:"#374151" }}>荷主名</span>
                  <input value={form.name} onChange={e=>setForm({ ...form, name:e.target.value })} placeholder="例）新規物流株式会社"
                    style={{ padding:"9px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none" }}/>
                </label>

              <label style={{ display:"flex", flexDirection:"column", gap:5 }}>
                <span style={{ fontSize:12, fontWeight:600, color:"#374151" }}>エリア</span>
                <input value={form.area} onChange={e=>setForm({ ...form, area:e.target.value })} placeholder="例）東京西部・多摩"

              </label>

              <div style={{ display:"flex", gap:12 }}>
                <label style={{ flex:1, display:"flex", flexDirection:"column", gap:5 }}>

                  <select value={form.billing} onChange={e=>setForm({ ...form, billing:e.target.value })}

                    {billingOptions.map(o=><option key={o} value={o}>{o}</option>)}

                </label>
                <label style={{ flex:1, display:"flex", flexDirection:"column", gap:5 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:"#374151" }}>締め</span>

// ── ドライバー別収支 ───────────────────────────────────────────────────────
// ── 支払明細書 共通ロジック（ドライバー別収支 / ドライバー管理 で共用）──────────
const _dowOf = (ds) => { const [y,mm,dd] = ds.split("-").map(Number); return ["日","月","火","水","木","金","土"][new Date(y, mm-1, dd).getDay()]; };
// 表示月: 今月実績があれば今月、なければ最新確定月
const displayMonthForPay = (dailyEdits) => { const agg = monthAgg(REF_MONTH, dailyEdits); return agg.sell > 0 ? REF_MONTH : LATEST_DATA_MONTH; };
// 支払予定日: 当月分を翌月15日払いと仮定
const payDueFor = (mk) => { const [y,m] = mk.split("-").map(Number); const ny = m===12?y+1:y, nm = m===12?1:m+1; return `${ny}年${nm}月15日`; };

// 実際の日次実績(dailyActuals + 編集)から、ドライバー本人が運んだ実数で支払を集計（按分ではない）
const buildDriverStatement = (d, dailyEdits, mk) => {
  const clientMap = {}, dayMap = {};
  let totalSell = 0, totalPay = 0;
  allClientsLive().forEach(c => {
    const ec = effectiveClient(c); // 単価編集を反映
    const baseDA = (typeof dailyActuals !== "undefined" && dailyActuals[c.id]) || {};
    const editsDA = (dailyEdits && dailyEdits[c.id]) || {};
    [...new Set([...Object.keys(baseDA), ...Object.keys(editsDA)])].forEach(date => {
      if (date.slice(0,7) !== mk) return; // 給与は暦月で集計
      const bd = (baseDA[date]||{})[d.id] || {}, ed = (editsDA[date]||{})[d.id] || {};
      [...new Set([...Object.keys(bd), ...Object.keys(ed)])].forEach(lbl => {
        const v = ed[lbl] !== undefined ? ed[lbl] : bd[lbl];
        const cnt = Number(v) || 0; if (!cnt) return;
        const r = (ec.rates||[]).find(rr => rr.label === lbl); if (!r) return;
        const payAmt = cnt * r.pay, sellAmt = cnt * r.sell;
        if (!clientMap[c.id]) clientMap[c.id] = { name:c.name, lines:{}, pay:0, sell:0, days:new Set() };
        const cmp = clientMap[c.id];
        if (!cmp.lines[lbl]) cmp.lines[lbl] = { label:lbl, qty:0, unitPay:r.pay, amount:0 };
        cmp.lines[lbl].qty += cnt; cmp.lines[lbl].amount += payAmt;
        cmp.pay += payAmt; cmp.sell += sellAmt; cmp.days.add(date);
        if (!dayMap[date]) dayMap[date] = { date, items:[], pay:0 };
        dayMap[date].items.push({ client:c.name, label:lbl, qty:cnt, amount:payAmt });
        dayMap[date].pay += payAmt;
        totalPay += payAmt; totalSell += sellAmt;
      });
    });
  });
  const clientRows = Object.values(clientMap).map(cmp => ({
    name:cmp.name, pay:cmp.pay, sell:cmp.sell, days:cmp.days.size, lines:Object.values(cmp.lines),
  })).sort((a,b) => b.pay - a.pay);
  const dayRows = Object.values(dayMap).sort((a,b) => a.date<b.date?-1:1).map(dr => ({ ...dr, dow:_dowOf(dr.date) }));
  const tax = d.type === "協力会社" ? Math.round(totalPay * 0.1) : 0; // 外注は消費税込で支払
  return { ...d, mk, clientRows, dayRows, totalSell, totalPay, totalProfit: totalSell-totalPay, tax, grandTotal: totalPay+tax, workDays: dayRows.length };
};

const exportDriverCSV = (d) => {
  const rows = ["荷主,区分,数量,支払単価,金額"];
  d.clientRows.forEach(c => c.lines.forEach(l => rows.push(`${c.name},${l.label},${l.qty},${l.unitPay},${l.amount}`)));
  rows.push(`,,,小計,${d.totalPay}`);
  if (d.tax > 0) rows.push(`,,,消費税(10%),${d.tax}`);
  rows.push(`,,,支払合計,${d.grandTotal}`);
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent("﻿" + rows.join("\n"));
  a.download = `支払明細_${d.name}_${d.mk}.csv`; a.click();
};

// 支払明細書 A4印刷／PDF保存（.driver-slip-paper を iframe に複製して印刷）
const printDriverSlip = (d, monthLabel) => {
  const paper = document.querySelector(".driver-slip-paper");

  const clone = paper.cloneNode(true);
  const old = document.getElementById("jt-slip-iframe"); if (old) old.remove();
  const iframe = document.createElement("iframe");
  iframe.id = "jt-slip-iframe";
  iframe.style.cssText = "position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden;";
  document.body.appendChild(iframe);
  const doc = iframe.contentWindow.document; doc.open();
  doc.write(`<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>支払明細書 ${d.name} ${monthLabel}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  table { border-collapse:collapse; width:100%; } td, th { vertical-align:middle; }

  @page { size:A4 portrait; margin:14mm; }
</style></head><body>${clone.outerHTML}</body></html>`);
  doc.close();
  setTimeout(() => { try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e) { showToast("印刷に失敗: "+e.message, "error"); } setTimeout(()=>iframe.remove(),1500); }, 250);

            {/* 荷主別・区分別 実数内訳 */}
            <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:10 }}>荷主別 支払内訳（実数）</div>
            {sel.clientRows.length === 0 ? (

            {/* 合計 */}
            <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0 0", marginTop:4, fontSize:12, color:"#6b7280" }}>
              <span>支払小計</span><span>{fmt(sel.totalPay)}</span>

            {sel.tax > 0 && (
              <div style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:12, color:"#6b7280" }}>

            <div style={{ display:"flex", justifyContent:"space-between", padding:"10px 0", borderTop:"2px solid #475569", marginTop:4 }}>
              <span style={{ fontWeight:700 }}>支払合計</span>

            <div style={{ marginTop:14, display:"flex", gap:8 }}>

              <button onClick={()=>exportCSV(sel)}
                style={{ flex:1, padding:"9px", border:"1px solid #94a3b8", background:"#fff", color:"#374151", borderRadius:6, fontSize:13, cursor:"pointer" }}>CSV出力</button>
            </div>
          </Card>
        )}
      </div>

      {/* 支払明細書モーダル（共通コンポーネント） */}
      <DriverSlipModal driver={slipDriver} accent={accent} onClose={()=>setSlipDriver(null)} />
    </div>
  );
};

// ── 請求管理 ───────────────────────────────────────────────────────────────
const InvoicePage = ({ accent }) => {
  const [filter, setFilter] = React.useState("すべて");
  const [sel, setSel] = React.useState(null);
  const [issuedArr, setIssuedArr] = useLocalStorage("jt_issued", []);
  const [remindedArr, setRemindedArr] = useLocalStorage("jt_reminded", []);
  // 日次入力の編集を請求金額・明細に反映
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  // 単価マスタで編集した請求先情報（担当者・住所）を請求書に反映
  const [contactOverrides] = useLocalStorage("jt_contact_overrides", {});
  const issuedSet = new Set(issuedArr);
  const remindedSet = new Set(remindedArr);
  const setIssuedSet = (fn) => setIssuedArr(prev => Array.from(fn(new Set(prev))));
  const setRemindedSet = (fn) => setRemindedArr(prev => Array.from(fn(new Set(prev))));
  // 発行済（jt_issued）の未請求は実効ステータスを「請求済」に。行バッジ・KPI・フィルタを揃える
  const effStatus = (inv) => (inv.status==="未請求" && issuedSet.has(inv.id)) ? "請求済" : inv.status;

  const statuses = ["すべて","未請求","請求済","入金済","遅延"];
  const list = filter==="すべて"?invoices:invoices.filter(i=>effStatus(i)===filter);

  // 名前から実効クライアント（追加荷主・単価/締日編集込み）を解決
  const resolveClientByName = (name) => effectiveClient(allClientsLive().find(c => c.name === name));

  // 請求対象月キー（"2025-04"）と締日アウェアの請求期間を取得
  const periodOf = (inv) => {
    const c = resolveClientByName(inv.client);
    const mk = (inv.period && /^\d{4}-\d{2}/.test(inv.period)) ? inv.period.slice(0,7) : LATEST_DATA_MONTH;
    return { mk, bp: billingPeriodFor(mk, c ? c.billingCycle : null) };
  };

  // 日次実績(dailyActuals) + 日次編集(dailyEdits) から、請求期間内の区分別 実数明細を生成
  const lineItemsFor = (inv) => {
    const c = resolveClientByName(inv.client);
    if (!c) return [];
    const { bp } = periodOf(inv);
    const baseDA = (typeof dailyActuals !== "undefined" && dailyActuals[c.id]) || {};
    const editsDA = (dailyEdits && dailyEdits[c.id]) || {};
    const dateSet = new Set([...Object.keys(baseDA), ...Object.keys(editsDA)]);
    const agg = {}; // label -> { qty, days:Set }
    for (const date of dateSet) {
      if (date < bp.start || date > bp.end) continue;
      const bDay = baseDA[date] || {}, eDay = editsDA[date] || {};
      for (const did of new Set([...Object.keys(bDay), ...Object.keys(eDay)])) {
        const bd = bDay[did] || {}, ed = eDay[did] || {};
        for (const lbl of new Set([...Object.keys(bd), ...Object.keys(ed)])) {
          const v = ed[lbl] !== undefined ? ed[lbl] : bd[lbl];
          const cnt = Number(v) || 0;
          if (!cnt) continue;
          if (!agg[lbl]) agg[lbl] = { qty:0, days:new Set() };
          agg[lbl].qty += cnt;
          agg[lbl].days.add(date);
        }
      }
    }
    const realLabels = Object.keys(agg);
    if (realLabels.length) {
      // rates の定義順を尊重し、未定義ラベルは末尾に
      const ordered = [
        ...c.rates.filter(r => agg[r.label]),
        ...realLabels.filter(l => !c.rates.some(r => r.label === l)).map(l => ({ label:l, sell:0 })),
      ];
      return ordered.map(r => {
        const a = agg[r.label];
        const unit = /日額|日数|日$/.test(r.label) ? "日" : "個";
        return { label:r.label, qty:a.qty, unit, unitPrice:r.sell, amount:a.qty * r.sell, days:a.days.size };
      });
    }
    // 実績データが無い場合のフォールバック（固定系 / 未登録月）
    if (c.billing.includes("固定")) {
      const r0 = c.rates[0] || { label:"固定日額", sell:0 };
      const days = r0.sell > 0 ? Math.round(inv.amount / r0.sell) : 0;
      return [{ label:r0.label, qty:days || "—", unit:"日", unitPrice:r0.sell, amount:r0.sell * days || inv.amount, days }];
    }
    return c.rates.filter(r => r.sell > 0).map(r => ({ label:r.label, qty:"—", unit:"個", unitPrice:r.sell, amount:"—" }));
  };

  // 明細から算出した実数小計（実績が無ければ invoice.amount をフォールバック）
  const subtotalFor = (inv) => {
    const sum = lineItemsFor(inv).reduce((s,it) => s + (typeof it.amount === "number" ? it.amount : 0), 0);
    return sum > 0 ? sum : inv.amount;
  };

  const summary = {
    未請求: invoices.filter(i=>effStatus(i)==="未請求").reduce((s,i)=>s+subtotalFor(i),0),
    請求済: invoices.filter(i=>effStatus(i)==="請求済").reduce((s,i)=>s+subtotalFor(i),0),
    遅延:   invoices.filter(i=>effStatus(i)==="遅延").reduce((s,i)=>s+subtotalFor(i),0),
    入金済: invoices.filter(i=>effStatus(i)==="入金済").reduce((s,i)=>s+subtotalFor(i),0),
  };

  // 画面上で正式な請求書を表示するプレビュー
  const [preview, setPreview] = React.useState(null);

  // 請求書1枚分の表示モデル（請求先・明細・金額・期間）を生成
  const invoiceModel = (inv) => {
    const baseClient = resolveClientByName(inv.client) || {};
    const cov = contactOverrides[baseClient.id] || {};
    const nd = (v) => (v && v !== "—") ? v : undefined;
    const clientObj = { ...baseClient,
      address: cov.address!==undefined ? nd(cov.address) : nd(baseClient.address),
      person:  cov.person!==undefined  ? nd(cov.person)  : nd(baseClient.person||baseClient.contact),
      tel:     cov.tel!==undefined     ? nd(cov.tel)     : nd(baseClient.tel) };
    const items = lineItemsFor(inv);
    const subtotal = subtotalFor(inv);
    const tax = Math.round(subtotal * 0.1);
    const total = subtotal + tax;
    const bp = periodOf(inv).bp;
    const fmtDate = (d) => { const [y,m,dd] = d.split("-"); return `${y}年${parseInt(m)}月${parseInt(dd)}日`; };
    const today = new Date();

    // 日別明細（請求期間内の各稼働日 × 区分別 数量・金額）
    const baseDA = (typeof dailyActuals !== "undefined" && dailyActuals[baseClient.id]) || {};
    const editsDA = (dailyEdits && dailyEdits[baseClient.id]) || {};
    const dates = [...new Set([...Object.keys(baseDA), ...Object.keys(editsDA)])]
      .filter(d => d >= bp.start && d <= bp.end).sort();
    const labelSet = new Set();
    const dailyRows = dates.map(date => {
      const bDay = baseDA[date] || {}, eDay = editsDA[date] || {};
      const per = {};
      let amount = 0;
      for (const did of new Set([...Object.keys(bDay), ...Object.keys(eDay)])) {
        const bd = bDay[did] || {}, ed = eDay[did] || {};
        for (const lbl of new Set([...Object.keys(bd), ...Object.keys(ed)])) {
          const v = ed[lbl] !== undefined ? ed[lbl] : bd[lbl];
          const cnt = Number(v) || 0;
          if (!cnt) continue;
          per[lbl] = (per[lbl] || 0) + cnt;
          labelSet.add(lbl);
          const r = (baseClient.rates || []).find(rr => rr.label === lbl);
          if (r) amount += cnt * r.sell;
        }
      }
      const wd = ["日","月","火","水","木","金","土"][new Date(date).getDay()];
      return { date, dow: wd, per, amount };
    }).filter(r => Object.keys(r.per).length);
    const dailyLabels = [
      ...(baseClient.rates || []).filter(r => labelSet.has(r.label)).map(r => r.label),
      ...[...labelSet].filter(l => !(baseClient.rates || []).some(r => r.label === l)),
    ];

    return {
      clientObj, items, subtotal, tax, total, dailyRows, dailyLabels,
      period: `${fmtDate(bp.start)} 〜 ${fmtDate(bp.end)}`,
      issueDate: inv.issued || `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`,
    };
  };

  // 画面に表示中の正式請求書(.invoice-paper)を iframe 経由で印刷／PDF保存
  const printPaper = (inv) => {
    const paper = document.querySelector(".invoice-paper");
    if (!paper) { showToast("請求書が見つかりません", "error"); return; }
    const clone = paper.cloneNode(true);
    const old = document.getElementById("jt-print-iframe");
    if (old) old.remove();
    const iframe = document.createElement("iframe");
    iframe.id = "jt-print-iframe";
    iframe.style.cssText = "position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden;";
    document.body.appendChild(iframe);
    const doc = iframe.contentWindow.document;
    doc.open();
    doc.write(`<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>請求書 ${inv.id} - ${inv.client}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; color: #111827; font-size: 12px; line-height: 1.6; }
  table { border-collapse: collapse; width: 100%; }
  td, th { vertical-align: middle; }
  /* 改ページしても各表のヘッダを繰り返す／合計は末尾に1回だけ */
  thead { display: table-header-group; }
  tfoot { display: table-row-group; }
  /* 行・見出しブロックはページ途中で割らない */
  tr { break-inside: avoid; page-break-inside: avoid; }
  .jt-keep { break-inside: avoid; page-break-inside: avoid; }
  /* @page 側で余白を持たせる → 2ページ目以降も同じ余白になる */
  .invoice-paper { padding: 0 !important; }
  /* 日別明細が長い時は2ページ目の先頭から（1ページ目=正式請求書） */
  .jt-daily-section { break-inside: auto; }
  .jt-daily-section.jt-page2 { break-before: page; page-break-before: always; }
  .jt-invoice-footer { break-inside: avoid; page-break-inside: avoid; }
  @page { size: A4 portrait; margin: 14mm; }
</style></head><body>${clone.outerHTML}</body></html>`);
    doc.close();
    setTimeout(() => {
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e) { showToast("印刷に失敗: " + e.message, "error"); }
      setTimeout(() => iframe.remove(), 1500);
    }, 250);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div style={{ fontSize:20, fontWeight:700 }}>請求管理</div>
        <button onClick={()=>{ const ids=invoices.filter(i=>i.status==="未請求").map(i=>i.id); setIssuedSet(s=>new Set([...s,...ids])); showToast(ids.length+"件の請求書を発行しました"); }} style={{ padding:"7px 16px", background:accent, color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600, cursor:"pointer" }}>+ 請求書を一括作成</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:16 }}>
        {[
          { l:"未請求（発行前）",  v:fmt(summary.未請求), n:invoices.filter(i=>effStatus(i)==="未請求").length, c:"#64748b" },
          { l:"請求済（入金待ち）",v:fmt(summary.請求済), n:invoices.filter(i=>effStatus(i)==="請求済").length, c:accent },
          { l:"入金遅延",          v:fmt(summary.遅延),   n:invoices.filter(i=>effStatus(i)==="遅延").length,   c:"#dc2626" },
          { l:"入金済（今月）",    v:fmt(summary.入金済), n:invoices.filter(i=>effStatus(i)==="入金済").length,  c:"#16a34a" },
        ].map(({ l,v,n,c })=>(
          <Card key={l} style={{ padding:"16px 20px" }}>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6 }}>{l}</div>
            <div style={{ fontSize:20, fontWeight:700, color:c }}>{v}</div>
            <div style={{ fontSize:11, color:"#9ca3af", marginTop:4 }}>{n}件</div>
          </Card>
        ))}
      </div>
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {statuses.map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{ padding:"5px 14px", borderRadius:4, border:`1.5px solid ${filter===s?accent:"#e5e7eb"}`, background:filter===s?accent:"#fff", color:filter===s?"#fff":"#374151", fontSize:13, fontWeight:filter===s?600:400, cursor:"pointer" }}>{s}</button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:sel?"1fr 340px":"1fr", gap:16, alignItems:"start" }}>
        <Card>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>
                {["請求番号","荷主","対象月","請求金額","状態","支払期限","操作"].map(h=>(
                  <th key={h} style={{ padding:"9px 16px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {list.map((inv,i)=>(
                <tr key={i} onClick={()=>setSel(sel?.id===inv.id?null:inv)}
                  style={{ borderBottom:"1px solid #94a3b8", cursor:"pointer", background:sel?.id===inv.id?"#f0f9ff":"transparent", transition:"background .1s" }}
                  onMouseEnter={e=>{ if(sel?.id!==inv.id) e.currentTarget.style.background="#f9fafb"; }}
                  onMouseLeave={e=>{ if(sel?.id!==inv.id) e.currentTarget.style.background="transparent"; }}>
                  <td style={{ padding:"12px 16px", fontWeight:600, color:accent, fontSize:12 }}>{inv.id}</td>
                  <td style={{ padding:"12px 16px", fontWeight:500 }}>{inv.client}</td>
                  <td style={{ padding:"12px 16px", color:"#6b7280" }}>{inv.period}</td>
                  <td style={{ padding:"12px 16px", fontWeight:700 }}>{fmt(subtotalFor(inv))}</td>
                  <td style={{ padding:"12px 16px" }}>
                    <StatusBadge label={issuedSet.has(inv.id)?"請求済":inv.status}/>
                  </td>
                  <td style={{ padding:"12px 16px", color:inv.status==="遅延"?"#dc2626":"#374151", fontWeight:inv.status==="遅延"?600:400 }}>{inv.due}</td>
                  <td style={{ padding:"12px 16px" }}>
                    <div style={{ display:"flex", gap:6 }} onClick={e=>e.stopPropagation()}>
                      {inv.status==="未請求" && !issuedSet.has(inv.id) && (
                        <button onClick={()=>setIssuedSet(s=>new Set([...s,inv.id]))}
                          style={{ padding:"4px 10px", border:`1px solid ${accent}`, borderRadius:4, background:accent, color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer" }}>発行</button>
                      )}
                      {issuedSet.has(inv.id) && <span style={{ fontSize:11, color:"#16a34a", fontWeight:600 }}>発行済</span>}
                      {inv.status==="遅延" && !remindedSet.has(inv.id) && (
                        <button onClick={()=>setRemindedSet(s=>new Set([...s,inv.id]))}
                          style={{ padding:"4px 10px", border:"1px solid #dc2626", borderRadius:4, background:"#fff", color:"#dc2626", fontSize:11, fontWeight:600, cursor:"pointer" }}>督促</button>
                      )}
                      {remindedSet.has(inv.id) && <span style={{ fontSize:11, color:"#dc2626", fontWeight:600 }}>督促送信済</span>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>

        {sel && (() => {
          const _baseClient = clients.find(c => c.name === sel.client) || {};
          const _cov = contactOverrides[_baseClient.id] || {};
          const _nd = (v) => (v && v !== "—") ? v : undefined;
          const _clientObj = { ..._baseClient,
            address: _cov.address!==undefined ? _nd(_cov.address) : _nd(_baseClient.address),
            person:  _cov.person!==undefined  ? _nd(_cov.person)  : _nd(_baseClient.person||_baseClient.contact) };
          const _today = new Date();
          const _issueDate = sel.issued || `${_today.getFullYear()}年${_today.getMonth()+1}月${_today.getDate()}日`;
          const _items = lineItemsFor(sel);
          const _subtotal = subtotalFor(sel);
          const _tax = Math.round(_subtotal * 0.1);
          const _total = _subtotal + _tax;
          const _bp = periodOf(sel).bp;
          const _fmtDate = (d) => { const [y,m,dd]=d.split("-"); return `${y}年${parseInt(m)}月${parseInt(dd)}日`; };
          const _periodLabel = `${_fmtDate(_bp.start)} 〜 ${_fmtDate(_bp.end)}`;
          const _dm = invoiceModel(sel); // 日別明細(dailyRows/dailyLabels)を流用
          return (
          <Card style={{ padding:20 }} className="invoice-print">

              <div style={{ textAlign:"center", marginBottom:24 }}>

                  </div>
                </div>
              </div>
            </div>
            {/* 通常画面用ヘッダ（印刷時非表示） */}

                <div style={{ fontSize:11, color:"#9ca3af", marginBottom:3 }}>{sel.id}</div>

                    </div>
                  </div>
                  <div style={{ width:240, fontSize:11.5 }}>

                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}><span style={{ color:"#6b7280" }}>発行日</span><span>{m.issueDate}</span></div>

                      <div style={{ fontWeight:700, fontSize:13, marginBottom:4 }}>J transport株式会社</div>
                      <div>〒XXX-XXXX 東京都〇〇区〇〇 1-2-3</div>
                      <div>TEL: 03-XXXX-XXXX</div>
                      <div style={{ marginTop:4 }}>登録番号: T1234567890123</div>

                </div>

                <div style={{ fontSize:11.5, color:"#374151", marginBottom:6 }}>対象期間: {m.period}</div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ background:"#f1f5f9" }}>
                      {["区分","数量","単価","金額"].map((h,hi)=>(

                    </tr>
                  </thead>
                  <tbody>
                    {m.items.map((it,ii)=>(
                      <tr key={ii} style={{ borderBottom:"1px solid #d1d5db" }}>

                          {it.label}
                          {it.days>0 && <span style={{ fontSize:10, color:"#9ca3af", marginLeft:6 }}>（{it.days}日稼働）</span>}

                    ))}
                  </tbody>
                  <tfoot>
                    <tr><td colSpan={3} style={{ padding:"7px 12px", textAlign:"right", fontSize:11.5 }}>小計</td><td style={{ padding:"7px 12px", textAlign:"right", fontWeight:600 }}>{yen(m.subtotal)}</td></tr>

                      <td colSpan={3} style={{ padding:"10px 12px", textAlign:"right", fontWeight:700, fontSize:13 }}>合計（税込）</td>

                      <tbody>
                        {m.dailyRows.map((r,ri)=>(

                            <td style={{ padding:"5px 10px", color:(r.dow==="日")?"#dc2626":(r.dow==="土")?"#2563eb":"#6b7280" }}>{r.dow}</td>
                            <td style={{ padding:"5px 10px", color:"#374151" }}>{m.dailyLabels.filter(l=>r.per[l]).map(l=>`${l}×${r.per[l].toLocaleString()}`).join("、")}</td>

                      <tfoot>
                        <tr style={{ background:"#f1f5f9", borderTop:"1.5px solid #111827" }}>
