        const navLink = (label, page, color) => (
          <button onClick={()=>setPage(page)} style={{ padding:"7px 14px", borderRadius:6, border:`1.5px solid ${color}`, background:"var(--jt-base)", color, fontSize:12.5, fontWeight:600, cursor:"pointer" }}>{label} →</button>
        );
        const kpis = [
          { label:"請求対象 売上", value:fmt(tot.s), sub:mkLabel(billMonth)+"（締め期間ベース）", color:accent },
          { label:"粗利", value:fmt(totProfit), sub:`粗利率 ${totMargin.toFixed(1)}%`, color:totProfit>=0?"#6E9E78":"#B05A60" },
          { label:"確定配車のべ", value:`${tot.cc}件`, sub:`配車のべ ${tot.count}件中`, color:"#6E9E78" },
          { label:"要確認", value:`${needAttention}社`, sub:`連動済 ${linked}社`, color:needAttention>0?"#C39A52":"#A09AAB" },
        ];
        return (
          <div>
            {/* 月ナビ + 関連ページ導線 */}
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
              <button onClick={()=>shiftMonth(-1)} style={navBtn}>＜ 前月</button>
              <span style={{ fontWeight:700, fontSize:15, minWidth:130, textAlign:"center" }}>{mkLabel(billMonth)}</span>
              <button onClick={()=>shiftMonth(1)} style={navBtn}>翌月 ＞</button>
              {billMonth!==REF_MONTH && <button onClick={()=>setBillMonth(REF_MONTH)} style={{ ...navBtn, border:"none", background:"var(--jt-base)", color:"var(--jt-accent)", fontWeight:600 }}>今月</button>}
              <div style={{ flex:1 }}/>
              {navLink("収支管理","pl","#7E6593")}
              {navLink("請求管理","invoice","#7E6593")}
              {navLink("日次実績入力","daily","#0891b2")}
            </div>

            {/* KPI */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:16 }}>
              {kpis.map(k=>(
                <Card key={k.label} style={{ padding:"14px 18px" }}>
                  <div style={{ fontSize:11, color:"#645F6E", marginBottom:6 }}>{k.label}</div>
                  <div style={{ fontSize:21, fontWeight:700, letterSpacing:"-0.01em", color:k.color }}>{k.value}</div>
                  <div style={{ fontSize:11, color:"#A09AAB", marginTop:4 }}>{k.sub}</div>
                </Card>
              ))}
            </div>

            {/* 突合テーブル */}
            <Card style={{ padding:0 }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                <thead>
                  <tr style={{ background:"var(--jt-accent-lt)", borderBottom:"1px solid var(--jt-line)" }}>
                    {["荷主","締め","配車のべ","確定日","売上（請求）","支払","粗利","粗利率","連動状態"].map((h,i)=>(
                      <th key={i} style={{ padding:"9px 12px", textAlign:i===0?"left":(i>=2&&i<=7?"right":"center"), color:"var(--jt-text-sub)", fontWeight:600, fontSize:11, whiteSpace:"nowrap",
                        position:i===0?"sticky":"static", left:0, background:"var(--jt-accent-lt)", borderRight:i===0?"1px solid var(--jt-line)":"none", zIndex:i===0?2:1 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map(r=>(
                    <tr key={r.c.id} style={{ borderBottom:"1px solid var(--jt-line)" }}>
                      <td style={{ padding:"8px 12px", borderRight:"1px solid #DEDAE5", position:"sticky", left:0, background:"var(--jt-base)", zIndex:1 }}>
                        <div style={{ fontWeight:600, fontSize:12.5 }}>{DISPATCH_CLIENT_SHORT[r.c.id]||r.c.name}</div>
                        <div style={{ fontSize:10, color:"var(--jt-text-mute)" }}>{r.c.id}</div>
                      </td>
                      <td style={{ padding:"8px 12px", textAlign:"center", fontSize:11, color:"var(--jt-text-sub)", whiteSpace:"nowrap" }}>{r.c.billingCycle||"—"}</td>
                      <td style={{ padding:"8px 12px", textAlign:"right", fontWeight:600, color:r.di.count>0?"#393443":"var(--jt-text-mute)" }}>{r.di.count||"—"}</td>
                      <td style={{ padding:"8px 12px", textAlign:"right", fontWeight:600, color:r.di.confirmedDays>0?"#6E9E78":"var(--jt-text-mute)" }}>{r.di.confirmedDays?`${r.di.confirmedDays}日`:"—"}</td>
                      <td style={{ padding:"8px 12px", textAlign:"right", fontWeight:700, color:r.v.s>0?"#393443":"var(--jt-text-mute)" }}>{r.v.s>0?fmt(r.v.s):"—"}</td>
                      <td style={{ padding:"8px 12px", textAlign:"right", color:r.v.p>0?"#645F6E":"var(--jt-text-mute)" }}>{r.v.p>0?fmt(r.v.p):"—"}</td>
                      <td style={{ padding:"8px 12px", textAlign:"right", fontWeight:600, color:r.profit>=0?"#6E9E78":"#B05A60" }}>{r.v.s>0?fmt(r.profit):"—"}</td>
                      <td style={{ padding:"8px 12px", textAlign:"right", fontSize:12, color:"#645F6E" }}>{r.v.s>0?r.margin.toFixed(1)+"%":"—"}</td>
                      <td style={{ padding:"8px 12px", textAlign:"center" }}>
                        <span style={{ fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:10, color:r.sc, background:r.sb }}>{r.status}</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{ borderTop:"2px solid var(--jt-line)", background:"var(--jt-accent-lt)" }}>
                    <td style={{ padding:"9px 12px", fontWeight:700, fontSize:12, color:"var(--jt-text-sub)", borderRight:"1px solid var(--jt-line)", position:"sticky", left:0, background:"var(--jt-accent-lt)", zIndex:1 }}>合計（{rows.length}社）</td>
                    <td/>
                    <td style={{ padding:"9px 12px", textAlign:"right", fontWeight:700 }}>{tot.count||"—"}</td>
                    <td style={{ padding:"9px 12px", textAlign:"right", fontWeight:700, color:"#6E9E78" }}>{tot.cd?`${tot.cd}日`:"—"}</td>
                    <td style={{ padding:"9px 12px", textAlign:"right", fontWeight:700, color:accent }}>{fmt(tot.s)}</td>
                    <td style={{ padding:"9px 12px", textAlign:"right", fontWeight:700 }}>{fmt(tot.p)}</td>
                    <td style={{ padding:"9px 12px", textAlign:"right", fontWeight:700, color:totProfit>=0?"#6E9E78":"#B05A60" }}>{fmt(totProfit)}</td>
                    <td style={{ padding:"9px 12px", textAlign:"right", fontWeight:700, color:"#645F6E" }}>{totMargin.toFixed(1)}%</td>
                    <td/>
                  </tr>
                </tfoot>
              </table>
            </Card>

            <div style={{ fontSize:11, color:"var(--jt-text-mute)", marginTop:10, lineHeight:1.8 }}>
              ※「請求連動」は確定した配車を実績（日次実績・収支）と<b>読み取り専用</b>で突合する画面です。配車の確定によって請求金額そのものが書き換わることはありません。<br/>
              ※ 売上・支払・粗利は各荷主の<b>締め期間</b>（{mkLabel(billMonth)}）で集計しています（収支管理・請求管理と同一ロジック）。<br/>
              ※ 連動状態: <b style={{color:"#6E9E78"}}>連動済</b>=確定配車あり＋実績あり／<b style={{color:"#b45309"}}>確定（実績待ち）</b>=確定済だが実績未入力／<b style={{color:"#0369a1"}}>未確定</b>=配車はあるが未確定／<b style={{color:"#645F6E"}}>実績のみ</b>=配車登録なし。<br/>
              ※ 実際の請求書発行・入金消込は「請求管理」、金額の修正は「日次実績入力」で行ってください。
            </div>
          </div>
        );
      })()}
    </div>
  );
};

const AttendancePage = ({ accent }) => {
  const drivers = driversLive();
  const [tab, setTab] = React.useState("attendance"); // "attendance" | "schedule"
  const [expandedDriver, setExpandedDriver] = React.useState(null);
  const [weekOffset, setWeekOffset] = React.useState(0);
  // 配車・シフトの実データを購読（配車ページの入力と連動）
  const [dispatch] = useLocalStorage("jt_dispatch", {});
  const [shifts] = useLocalStorage("jt_shifts", {});

  const stColor = { "出勤":"#6E9E78","出勤中":"#7E6593","有給":"#7E6593","休日":"#A09AAB","欠勤":"#B05A60","公休":"#645F6E","早番":"#0891b2","遅番":"#7E6593" };
  const stBg    = { "出勤":"#E6EFE4","出勤中":"#EFEDF3","有給":"#f5f3ff","休日":"#EDEBF1","欠勤":"#F3E6E3","公休":"#ECEAF0","早番":"#ecfeff","遅番":"#f5f3ff" };

  const _pad = n => String(n).padStart(2,"0");
  const _now = new Date();
  const _todayDk = `${_now.getFullYear()}-${_pad(_now.getMonth()+1)}-${_pad(_now.getDate())}`;
  // 当月に配車またはシフト実績があるか判定してフォールバック（シフトだけ先に入れた月も当月扱い）
  const _hasCurrentDispatch = drivers.some(d => {
    for (let dd = 1; dd <= 31; dd++) {
      const dk = `${REF_MONTH}-${_pad(dd)}`;
      if ((dispatch[dk] && dispatch[dk][d.id]) || (shifts[dk] && shifts[dk][d.id])) return true;
    }
    return false;
  });
  const _monthPrefix = _hasCurrentDispatch ? REF_MONTH : LATEST_DATA_MONTH;
  const _isFallback = !_hasCurrentDispatch && LATEST_DATA_MONTH !== REF_MONTH;
  const _monthLabel = mkLabel(_monthPrefix);
  const [_y, _mo] = _monthPrefix.split("-").map(Number);
  const _daysInMonth = new Date(_y, _mo, 0).getDate();
  const _dowName = ["日","月","火","水","木","金","土"];
  // id→荷主名（追加荷主込み）
  const _clientName = {}; allClientsLive().forEach(c => { _clientName[c.id] = c.name; });
  const _shiftToSt = { "有休":"有給", "休":"休日", "日勤":"出勤", "早番":"早番", "遅番":"遅番" };

  // 配車とシフトの併存時は常にシフト優先で状態を決定するヘルパー
  const _resolveState = (assigned, sh) => {
    // 有休・休があれば、配車があってもシフト優先
    if (sh && _shiftToSt[sh]) return _shiftToSt[sh];
    if (assigned) return "出勤";
    return null; // 両方ない
  };

  // 実ドライバー（drivers）＋実配車（dispatch）／シフト（shifts）から月次サマリーを生成
  const driverSummary = drivers.map(d => {
    let workDays = 0, restDays = 0;
    for (let dd = 1; dd <= _daysInMonth; dd++) {
      const dk = `${_monthPrefix}-${_pad(dd)}`;
      const assigned = dispatch[dk] && dispatch[dk][d.id];
      const sh = shifts[dk] && shifts[dk][d.id];
      const st = _resolveState(assigned, sh);
      if (st === "出勤") workDays++;
      else if (sh === "有休" || sh === "休") restDays++;
    }
    const tAssigned = dispatch[_todayDk] && dispatch[_todayDk][d.id];
    const tShift = shifts[_todayDk] && shifts[_todayDk][d.id];
    const todaySt = _resolveState(tAssigned, tShift) || "—";
    return { id:d.id, name:d.name, type:d.type, workDays, restDays,
      todaySt, in:"—", ot:"—", otMin:0, paidLeft:"—", absent:0,
      todayClient: (todaySt === "出勤" && tAssigned) ? (_clientName[tAssigned] || tAssigned) : null };
  });

  // ドライバー詳細日次記録（当月・実配車/シフトから生成）
  const detailRecords = Object.fromEntries(drivers.map(d => {
    const rows = [];
    for (let dd = 1; dd <= _daysInMonth; dd++) {
      const dk = `${_monthPrefix}-${_pad(dd)}`;
      const dow = _dowName[new Date(_y, _mo-1, dd).getDay()];
      const assigned = dispatch[dk] && dispatch[dk][d.id];
      const sh = shifts[dk] && shifts[dk][d.id];
      const st = _resolveState(assigned, sh);
      if (!st) continue; // 配車もシフトも無い日は表示しない
      rows.push({ d:dd, day:dow, in:"—", out:"—",
        work: assigned ? (_clientName[assigned] || assigned) : "—",
        ot:"—", st });
    }
    return [d.id, rows];
  }));

  const clientColor = {
    "ASKUL":"#dbeafe","Bloomee":"#fce7f3","アクアクララ":"#d1fae5","カウネット・NBC":"#fef9c3",
    "サーガ":"#ede9fe","ファミリーマート":"#dcfce7","日本トムソン":"#fee2e2","タイヤ配送":"#ffedd5",
    "RICOH":"#e0e7ff","旭食品（ダイコク便）":"#fef3c7","有給":"#f5f3ff","休":"#f1f5f9","—":"transparent"
  };
  const clientTextColor = {
    "ASKUL":"#1e40af","Bloomee":"#9d174d","アクアクララ":"#065f46","カウネット・NBC":"#854d0e",
    "サーガ":"#5b21b6","ファミリーマート":"#14532d","日本トムソン":"#991b1b","タイヤ配送":"#9a3412",
    "RICOH":"#3730a3","旭食品（ダイコク便）":"#92400e","有給":"#7E6593","休":"#94a3b8","—":"#d1d5db"
  };
  const _palette = ["#dbeafe","#fce7f3","#d1fae5","#fef9c3","#ede9fe","#dcfce7","#fee2e2","#ffedd5","#e0e7ff","#fef3c7"];

  // 今週の日付生成
  const now = _now;
  const dow0 = now.getDay()===0?6:now.getDay()-1;
  const mon = new Date(now); mon.setDate(now.getDate()-dow0+weekOffset*7);
  const weekDays = Array.from({length:7},(_,i)=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const dk = `${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
    const isToday = d.toDateString()===now.toDateString();
    return { dk, label:`${d.getMonth()+1}/${d.getDate()}`, dayName:["月","火","水","木","金","土","日"][i], isToday, isSun:i===6, isSat:i===5 };
  });
  const weekLabel = `${weekDays[0].label}（月）〜 ${weekDays[6].label}（日）`;

  // 運行予定（実配車から週次で生成）：scheduleData[did] = 7日分の荷主名 or "—"
  const scheduleData = {};
  drivers.forEach(d => {
    scheduleData[d.id] = weekDays.map(wd => {
      const cid = dispatch[wd.dk] && dispatch[wd.dk][d.id];
      const sh = shifts[wd.dk] && shifts[wd.dk][d.id];
      const st = _resolveState(cid, sh);
      if (st === "有給") return "有給";
      if (st === "休日") return "休";
      if (st === "出勤") return _clientName[cid] || cid;
      return "—";
    });
  });
  // 未知の荷主名にも安定した色を割り当てる
  const _colorFor = (name) => {
    if (clientColor[name] !== undefined) return { bg:clientColor[name], fg:clientTextColor[name]||"#645F6E" };
    let h=0; for (let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
    return { bg:_palette[h % _palette.length], fg:"#645F6E" };
  };

  const otLimit = 45*60;

  return (
    <div>
      <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>荷主・人員管理</div>
      <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", marginBottom:16, color:"#393443" }}>勤怠管理</div>

      {/* タブ */}
      <div style={{ display:"flex", gap:4, marginBottom:16, borderBottom:"2px solid var(--jt-text-mute)", paddingBottom:0 }}>
        {[["attendance","勤怠一覧"],["schedule","運行予定"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            style={{ padding:"8px 20px", border:"none", background:"transparent", fontWeight:tab===v?700:400,
              color:tab===v?accent:"#645F6E", fontSize:14, cursor:"pointer",
              borderBottom:tab===v?`2px solid ${accent}`:"2px solid transparent", marginBottom:-2 }}>
            {l}
          </button>
        ))}
      </div>

      {tab==="attendance" && (
        <div>
          {/* サマリーKPI */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:16 }}>
            {[
              { label:"本日出勤", value:`${driverSummary.filter(d=>["出勤","出勤中","早番","遅番"].includes(d.todaySt)).length}名`, sub:`全${driverSummary.length}名中`, color:"#6E9E78" },
              { label:`${_monthLabel} 配車のべ日数${_isFallback ? ` (${REF_MONTH_LABEL}実績未入力)` : ""}`, value:`${driverSummary.reduce((s,d)=>s+d.workDays,0)}日`, sub:"確定・実績ベース", color:accent },
              { label:"本日有給", value:`${driverSummary.filter(d=>d.todaySt==="有給").length}名`, sub:"取得中", color:"var(--jt-accent)" },
              { label:"本日休日", value:`${driverSummary.filter(d=>d.todaySt==="休日").length}名`, sub:"シフト", color:"#645F6E" },
            ].map(k=>(
              <Card key={k.label} style={{ padding:"14px 18px" }}>
                <div style={{ fontSize:11, color:"#645F6E", marginBottom:6 }}>{k.label}</div>
                <div style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.01em", color:k.color }}>{k.value}</div>
                <div style={{ fontSize:11, color:"#A09AAB", marginTop:4 }}>{k.sub}</div>
              </Card>
            ))}
          </div>

          {/* 全ドライバー一覧 */}
          <Card>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"var(--jt-accent-lt)", borderBottom:"1px solid #DEDAE5" }}>
                  {["ドライバー","種別","今日の状況","当月配車日数","当月休日数","本日担当",""].map(h=>(
                    <th key={h} style={{ padding:"10px 14px", textAlign:"left", color:"#645F6E", fontWeight:500, fontSize:11, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {driverSummary.map(d=>{
                  const isExpanded = expandedDriver===d.id;
                  const otWarn = d.otMin >= otLimit*0.9;
                  const recs = detailRecords[d.id];
                  return (
                    <React.Fragment key={d.id}>
                      <tr style={{ borderBottom:"1px solid var(--jt-line)", background:isExpanded?accent+"06":"transparent", cursor:"pointer" }}
                        onClick={()=>setExpandedDriver(isExpanded?null:d.id)}>
                        <td style={{ padding:"11px 14px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <Avatar name={d.name} size={28} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                            <span style={{ fontWeight:600 }}>{d.name}</span>
                          </div>
                        </td>
                        <td style={{ padding:"11px 14px" }}><StatusBadge label={d.type}/></td>
                        <td style={{ padding:"11px 14px" }}>
                          <span style={{ padding:"3px 10px", borderRadius:4, fontSize:11.5, fontWeight:600,
                            background:stBg[d.todaySt]||"var(--jt-base)", color:stColor[d.todaySt]||"var(--jt-text-sub)" }}>
                            {d.todaySt}{d.in!=="—"?` ${d.in}〜`:""}
                          </span>
                        </td>
                        <td style={{ padding:"11px 14px", fontWeight:600 }}>{d.workDays>0?`${d.workDays}日`:"—"}</td>
                        <td style={{ padding:"11px 14px", color:"var(--jt-text-sub)" }}>{d.restDays>0?`${d.restDays}日`:"—"}</td>
                        <td style={{ padding:"11px 14px", color:d.todayClient?"var(--jt-text)":"var(--jt-text-mute)", fontSize:12 }}>{d.todayClient||"—"}</td>
                        <td style={{ padding:"11px 14px", color:"var(--jt-text-mute)", fontSize:12 }}>{isExpanded?"▲":"▼"}</td>
                      </tr>
                      {isExpanded && (
                        <tr>
                          <td colSpan={7} style={{ padding:"0 0 8px 0", background:"var(--jt-base)", borderBottom:"1px solid var(--jt-line)" }}>
                            <div style={{ padding:"12px 16px" }}>
                              <div style={{ fontSize:12, fontWeight:600, color:"var(--jt-text)", marginBottom:8 }}>{_monthLabel} 日次記録（配車・シフト連動）{_isFallback && ` / ${REF_MONTH_LABEL}実績未入力のため最新確定月を表示`}</div>
                              {recs.length===0 ? (
                                <div style={{ fontSize:12, color:"var(--jt-text-mute)", padding:"8px 0" }}>当月の配車・シフト記録はありません。</div>
                              ) : (
                              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                                <thead>
                                  <tr style={{ background:"var(--jt-base)" }}>
                                    {["日付","状態","担当荷主"].map(h=>(
                                      <th key={h} style={{ padding:"6px 12px", textAlign:"left", color:"var(--jt-text-sub)", fontWeight:500 }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {[...recs].reverse().map(r=>(
                                    <tr key={r.d} style={{ borderBottom:"1px solid #DEDAE5" }}>
                                      <td style={{ padding:"6px 12px", fontWeight:500 }}>{_mo}/{String(r.d).padStart(2,"0")}（{r.day}）</td>
                                      <td style={{ padding:"6px 12px" }}>
                                        <span style={{ padding:"2px 8px", borderRadius:3, fontSize:11, fontWeight:600,
                                          background:stBg[r.st]||"var(--jt-base)", color:stColor[r.st]||"var(--jt-text-sub)" }}>{r.st}</span>
                                      </td>
                                      <td style={{ padding:"6px 12px", color:r.work==="—"?"var(--jt-text-mute)":"var(--jt-text)" }}>{r.work}</td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                              )}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {tab==="schedule" && (
        <div>

// ── 共有トースト（保存フィードバックを全画面で統一）──────────────────────────
// どこからでも showToast("保存しました") で通知。<ToastHost/> を App 直下に1つ置く。
function showToast(message, type = "success") {
  window.dispatchEvent(new CustomEvent("jt-toast", { detail: { message, type } }));
}
const ToastHost = () => {
  const [toasts, setToasts] = React.useState([]);
  React.useEffect(() => {
    const onToast = (e) => {
      const { message, type } = e.detail || {};
      if (!message) return;
      const id = Date.now() + Math.random();
      setToasts(prev => [...prev, { id, message, type: type || "success" }]);
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2400);
    };
    window.addEventListener("jt-toast", onToast);
    return () => window.removeEventListener("jt-toast", onToast);
  }, []);
  if (!toasts.length) return null;
  return (
    <div style={{ position:"fixed", bottom:24, right:24, zIndex:99999, display:"flex", flexDirection:"column", gap:8, alignItems:"flex-end", pointerEvents:"none" }}>
      <style>{`@keyframes jtToastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}`}</style>
      {toasts.map(t => (
        <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, background: t.type==="error" ? "#F3E6E3" : "#393443", color: t.type==="error" ? "#B05A60" : "#fff", padding:"10px 16px", borderRadius:8, fontSize:13, fontWeight:600, boxShadow:"0 6px 20px rgba(0,0,0,.18)", animation:"jtToastIn .18s ease-out" }}>
          <Ic name={t.type==="error"?"alert":"check"} size={15} color={t.type==="error"?"#B05A60":"#34d399"} strokeWidth={2.5}/>
          {t.message}
        </div>
      ))}
    </div>
  );
};

// ── Error Boundary（1画面の描画例外でアプリ全体が白画面化するのを防ぐ） ──
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err){ return { err }; }
  componentDidCatch(err, info){ try { console.error("[ErrorBoundary]", err, info); } catch(e){} }
  render(){
    if (this.state.err) {
      return (
        <div style={{ padding:24, margin:16, border:"1px solid #fecaca", background:"#F3E6E3", borderRadius:8, color:"#991b1b" }}>
          <div style={{ fontSize:15, fontWeight:700, marginBottom:6 }}>この画面の表示中にエラーが発生しました</div>
          <div style={{ fontSize:12, color:"#7f1d1d", marginBottom:10 }}>他の画面は引き続きご利用いただけます。お手数ですが、操作内容を控えて管理者にご連絡ください。</div>
          <button onClick={()=>this.setState({ err:null })} style={{ padding:"6px 14px", border:"none", borderRadius:6, background:"#B05A60", color:"#fff", fontWeight:600, cursor:"pointer" }}>再表示する</button>
          <pre style={{ marginTop:10, fontSize:10, color:"#A09AAB", whiteSpace:"pre-wrap", overflowX:"auto" }}>{String((this.state.err && this.state.err.message) || this.state.err)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

  const announceUnread = allAnnounces.filter(a => !announceReadIds.includes(a.id)).length;

  React.useEffect(() => {

  React.useEffect(() => {

    (async () => {
      try {
        // データ肥大化対策: 直近24ヶ月のみ取得（条件なし全件selectは運用数年で起動フリーズの原因。財務の前月比/3M平均/直近12ヶ月の比較期間は包含）
        const _cut = (()=>{ const d=new Date(); d.setMonth(d.getMonth()-24); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();
        const { data, error } = await window.sb.from("jt_daily_entries").select("*").gte("entry_date", _cut);
        if (error || !data || !data.length) return;
        // Supabase rows → nested structure {cid: {date: {did: {lbl: "value"}}}}
        const sb = {};
        data.forEach(r => {
          if (!sb[r.client_id]) sb[r.client_id] = {};
          if (!sb[r.client_id][r.entry_date]) sb[r.client_id][r.entry_date] = {};
          if (!sb[r.client_id][r.entry_date][r.driver_id]) sb[r.client_id][r.entry_date][r.driver_id] = {};
          sb[r.client_id][r.entry_date][r.driver_id][r.rate_label] = String(r.value);
        });
        // 既存 localStorage edits とマージ（SB 優先・local にしか無いセルは温存）
        // ※編集は保存時に即 upsert されるため SB が正。local 優先だと他端末の更新が2回目以降反映されない
        const existing = (()=>{ try { return JSON.parse(localStorage.getItem("jt_daily_edits")||"{}"); } catch { return {}; } })();
        const merged = JSON.parse(JSON.stringify(existing));
        Object.keys(sb).forEach(cid => {
          if (!merged[cid]) merged[cid] = {};
          Object.keys(sb[cid]).forEach(d => {
            if (!merged[cid][d]) merged[cid][d] = {};
            Object.keys(sb[cid][d]).forEach(did => {
              if (!merged[cid][d][did]) merged[cid][d][did] = {};
              Object.assign(merged[cid][d][did], sb[cid][d][did]);
            });
          });
        });
        localStorage.setItem("jt_daily_edits", JSON.stringify(merged));
        // 他コンポーネントが useLocalStorage で購読しているので change イベントで再描画を促す
        window.dispatchEvent(new CustomEvent("jt-ls-change", { detail: { key: "jt_daily_edits", val: merged } }));
        console.log("[Supabase] jt_daily_entries synced:", data.length, "rows →", Object.keys(merged).length, "clients");
      } catch (e) { console.warn("[Supabase] sync failed:", e); }
    })();
  }, []);
  // 起動時に Supabase(jt_kv) から 単価/締め/担当ドライバー/お知らせ/各種申請 の編集を localStorage へ同期（多端末で一致）
  React.useEffect(() => {
    if (!window.sb) return;
    (async () => {
      try {
        const { data, error } = await window.sb.from("jt_kv").select("*");
        if (error || !data || !data.length) return;
        data.forEach(row => {
          if (!JT_KV_KEYS.has(row.k) || row.v == null || _jtKvEdited.has(row.k)) return;
          localStorage.setItem(row.k, JSON.stringify(row.v));
          window.dispatchEvent(new CustomEvent("jt-ls-change", { detail: { key: row.k, val: row.v } }));
        });
        console.log("[Supabase] jt_kv synced:", data.length, "keys");
      } catch (e) { console.warn("[Supabase] jt_kv sync failed:", e); }
    })();
  }, []);
  // 起動時に Supabase の jt_contact_overrides（請求先情報）を localStorage へ同期
  // → 単価マスタで編集した請求先が他端末・請求管理ページにも反映される
  React.useEffect(() => {
    if (!window.sb) return;
    (async () => {
      try {
        const { data, error } = await window.sb.from("jt_contact_overrides").select("*");
        if (error || !data || !data.length) return;
        const o = {};
        data.forEach(r => { o[r.client_id] = { person:r.person||"", tel:r.tel||"", address:r.address||"" }; });
        const existing = (()=>{ try { return JSON.parse(localStorage.getItem("jt_contact_overrides")||"{}"); } catch { return {}; } })();
        const merged = { ...existing, ...o }; // SB優先（他端末の更新・削除を反映。R21/R25対応）
        _contactEdited.forEach(cid => { if (existing[cid]) merged[cid] = existing[cid]; }); // ただし本セッションで編集中の荷主はローカルを温存
        localStorage.setItem("jt_contact_overrides", JSON.stringify(merged));
        window.dispatchEvent(new CustomEvent("jt-ls-change", { detail: { key: "jt_contact_overrides", val: merged } }));
        console.log("[Supabase] jt_contact_overrides synced:", data.length);
      } catch (e) { console.warn("[Supabase] contact sync failed:", e); }
    })();
  }, []);
  // 起動時に Supabase の jt_dispatch / jt_shifts を localStorage へ「読込のみ」同期する。
  // → 配車ページを経由せず勤怠ページ等を開いた端末でも、出勤予定・配車連動が実データで表示される（断線解消）。
  // 書込みは DispatchPage 側のデバウンスsyncに限定したまま（setItemのみ・SBへupsert/deleteしない）なので F62 のレース競合は再発しない。
  // DispatchPage を後で開けば 6404 の mount effect が SB を正本として読み直すため上書き・不整合は生じない。
  React.useEffect(() => {
    if (!window.sb) return;
    (async () => {
      try {
        const _cut = (()=>{ const d=new Date(); d.setMonth(d.getMonth()-12); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();
        const [d,s] = await Promise.all([
          window.sb.from("jt_dispatch").select("*").gte("dispatch_date", _cut),
          window.sb.from("jt_shifts").select("*").gte("shift_date", _cut),
        ]);
        if(!d.error && d.data && d.data.length){
          const o={}; d.data.forEach(r=>{ (o[r.dispatch_date]=o[r.dispatch_date]||{})[r.driver_id]=r.client_id; });
          localStorage.setItem("jt_dispatch", JSON.stringify(o));
          window.dispatchEvent(new CustomEvent("jt-ls-change", { detail: { key: "jt_dispatch", val: o } }));
        }
        if(!s.error && s.data && s.data.length){
          const o={}; s.data.forEach(r=>{ (o[r.shift_date]=o[r.shift_date]||{})[r.driver_id]=r.state; });
          localStorage.setItem("jt_shifts", JSON.stringify(o));
          window.dispatchEvent(new CustomEvent("jt-ls-change", { detail: { key: "jt_shifts", val: o } }));
        }
        console.log("[Supabase] dispatch/shifts startup-loaded:", d.data?.length||0, s.data?.length||0);
      } catch(e){ console.warn("[Supabase] dispatch startup load failed:", e); }
    })();
  }, []);
  const pp = { accent, setPage };

  const pageMap = {
    dashboard:    <Dashboard {...pp}/>,
    todo:         <TodoPage {...pp}/>,
    announce:     <AnnouncePage {...pp}/>,
    pl:           <PLPage {...pp}/>,
    invoice:      <InvoicePage {...pp}/>,
    driverfinance:<DriverFinancePage {...pp}/>,
    ratemaster:   <RateMasterPage {...pp}/>,
    daily:        <DailyInputPage {...pp}/>,
    parentclients:<ParentClientsPage {...pp}/>,
    clients:      <ClientPage {...pp}/>,
    drivers:      <DriversPage {...pp}/>,
    dispatch:     <DispatchPage {...pp}/>,
    vehicles:     <VehiclesPage {...pp}/>,
    attendance:   <AttendancePage {...pp}/>,
    apply:        <ApplyPage {...pp}/>,
    safety:       <SafetyPage {...pp}/>,
    faq:          <FAQPage {...pp}/>,
    manual:       <ManualPage {...pp}/>,
    contact:      <ContactPage {...pp}/>,
    appearance:   <AppearanceSettings/>,
  };

  return (
    <div className="jt-shell" style={{ display:"flex", height:"100vh", background:theme.bg }}>
      {navOpen && <div className="jt-backdrop" onClick={()=>setNavOpen(false)}/>}
      {/* Sidebar */}
      <div className={"jt-sidebar"+(navOpen?" jt-open":"")} style={{ width:220, background:theme.base, borderRight:`1px solid ${theme.line}`, display:"flex", flexDirection:"column", flexShrink:0 }}>
        <div style={{ padding:"18px 20px 14px", borderBottom:`1px solid ${theme.line}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <JtLogo size={34} />
            <div>
              <div style={{ fontWeight:800, fontSize:14, color:theme.text, lineHeight:1.2, letterSpacing:-0.3 }}>J transport</div>
              <div style={{ fontSize:10, color:theme.textMute, marginTop:1 }}>社内ポータル</div>
            </div>
          </div>
        </div>
        <nav style={{ flex:1, padding:"8px 8px", overflowY:"auto" }}>
          {navGroups.map((group,gi)=>(
            <div key={gi}>
              {group.label && <div style={{ fontSize:10, fontWeight:700, color:theme.textMute, letterSpacing:0.8, padding:"10px 10px 4px", textTransform:"uppercase" }}>{group.label}</div>}
              {group.items.map(item=>{
                const active=page===item.id;
                return (
                  <button key={item.id} onClick={()=>{ setPage(item.id); setNavOpen(false); }}
                    style={{ width:"100%", display:"flex", alignItems:"center", gap:9, padding:"7px 10px", borderRadius:10, border:"none", outline:"none", background:active?theme.base:"transparent", boxShadow:active?"var(--jt-inset)":"none", color:active?accent:theme.text, cursor:"pointer", fontFamily:"inherit", fontSize:12.5, fontWeight:active?700:400, marginBottom:1, transition:"all .1s", textAlign:"left" }}
                    onMouseEnter={e=>{ if(!active) e.currentTarget.style.background=theme.accentLt; }}
                    onMouseLeave={e=>{ if(!active) e.currentTarget.style.background="transparent"; }}>
                    <Ic name={item.icon} size={14} color={active?accent:theme.textSub}/>
                    <span style={{ flex:1 }}>{item.label}</span>
                    {item.id==="announce" && announceUnread>0 && <span style={{ background:theme.alert, color:"#fff", borderRadius:10, fontSize:10, padding:"1px 6px", fontWeight:700 }}>{announceUnread}</span>}
                    {item.badge && item.id!=="announce" && <span style={{ background:theme.alert, color:"#fff", borderRadius:10, fontSize:10, padding:"1px 6px", fontWeight:700 }}>{item.badge}</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div style={{ padding:"12px 16px", borderTop:`1px solid ${theme.line}`, display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:28, height:28, borderRadius:"50%", background:theme.accentLt, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:accent, flexShrink:0 }}>{tweaks.userName[0]}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12.5, fontWeight:600, color:theme.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tweaks.userName}</div>
            <div style={{ fontSize:11, color:theme.textMute }}>{tweaks.dept}</div>
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="jt-main" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        <div className="jt-main-header" style={{ background:theme.base, borderBottom:`1px solid ${theme.line}`, height:48, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px", flexShrink:0 }}>
          <div style={{ display:"flex", alignItems:"center", minWidth:0 }}>
            <button className="jt-hamburger" onClick={()=>setNavOpen(true)} aria-label="メニューを開く" style={{ color:theme.textSub }}>☰</button>
            <div style={{ fontSize:12.5, color:theme.textMute, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{navItems.find(n=>n.id===page)?.label}</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <button onClick={()=>setPage("announce")} title="お知らせ" style={{ position:"relative", background:"transparent", border:"none", cursor:"pointer", padding:0 }}>
              <Ic name="bell" size={17} color={theme.textSub}/>
              {announceUnread>0 && (
                <div style={{ position:"absolute", top:-3, right:-3, minWidth:14, height:14, padding:"0 3px", borderRadius:7, background:theme.alert, fontSize:8.5, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>{announceUnread}</div>
              )}
            </button>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:26, height:26, borderRadius:"50%", background:theme.accentLt, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:accent }}>{tweaks.userName[0]}</div>
              <span style={{ fontSize:13, fontWeight:500, color:theme.text }}>{tweaks.userName}</span>
            </div>
          </div>
        </div>
        <div ref={mainScrollRef} className="jt-content" style={{ flex:1, overflowY:"auto", padding:"22px 28px" }}>
          <ErrorBoundary key={page}>{pageMap[page] || <div style={{ color:theme.textMute }}>ページが見つかりません</div>}</ErrorBoundary>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakText label="ユーザー名" value={tweaks.userName} onChange={v=>setTweak("userName", v)}/>
        <TweakText label="部署" value={tweaks.dept} onChange={v=>setTweak("dept", v)}/>
      </TweaksPanel>

      <ToastHost/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<ThemeProvider><App/></ThemeProvider>);
</script>
</body>
</html>
