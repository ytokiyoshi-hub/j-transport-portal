// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (

      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// 全月キーを sorted で返す
const ALL_MONTH_KEYS = (()=>{
  const s = new Set();
  Object.values(monthlyHistory).forEach(m => Object.keys(m).forEach(k => s.add(k)));
  s.add(REF_MONTH); // 当月（今日の月）を常に選択肢に含める：日次実績入力で当月の実績が入るため
  return Array.from(s).sort();
})();

// シード月（ALL_MONTH_KEYS）に加え、日次入力(dailyEdits)が存在する月も含めた“実データのある全月キー”。
// シードに無い過去月/翌月以降へ日次入力しても、収支の対象月ドロップダウン・YTD・前年比に反映させるため。
// 締め越え荷主の月境界ズレを安全側でカバーするため、各入力日の「当月」と「翌月」の両方を候補に入れる（空月は monthAgg が0を返すだけで無害）。
const allMonthKeysLive = (dailyEdits) => {
  const s = new Set(ALL_MONTH_KEYS);
  Object.values(dailyEdits || {}).forEach(clientDays =>
    Object.keys(clientDays || {}).forEach(dateStr => {
      const ym = (dateStr||"").slice(0,7);
      if (!/^\d{4}-\d{2}$/.test(ym)) return;
      s.add(ym);
      const [y,m] = ym.split('-').map(Number);
      const nx = new Date(y, m, 1);
      s.add(`${nx.getFullYear()}-${String(nx.getMonth()+1).padStart(2,'0')}`);
    })
  );
  return Array.from(s).sort();
};

// 月キー操作（前月が data に無い場合は直近実在月にフォールバック）
const prevMonthKey = (mk) => {
  const [y,m] = mk.split('-').map(Number);
  const candidate = m===1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
  // candidate が実データに存在すれば返す
  if (ALL_MONTH_KEYS.includes(candidate)) return candidate;
  // 無ければ mk の1つ前のデータが存在する月を返す
  const idx = ALL_MONTH_KEYS.indexOf(mk);
  if (idx > 0) return ALL_MONTH_KEYS[idx - 1];
  // フォールバック先も無い場合は candidate を返す（cm が {s:0,p:0} を返す）
  return candidate;
};

// localStorage 直読みヘルパー（モジュールレベル: 編集オーバーライドを集計関数に反映するため）
const _lsGet = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
// 追加荷主(jt_extra_clients)込みの全クライアント
const allClientsLive = () => { const ex = _lsGet('jt_extra_clients', []); return Array.isArray(ex) && ex.length ? [...clients, ...ex] : clients; };
// 追加ドライバー(jt_extra_drivers)＋編集上書き(jt_driver_overrides)を反映した実効ドライバー一覧（全画面共通）
const driversLive = (extra, ov) => {
  // 引数があれば呼び出し側の最新stateを使う（編集画面が再renderで即反映するため）。無ければ localStorage から読む。
  if (extra === undefined) extra = _lsGet('jt_extra_drivers', []);
  if (ov === undefined) ov = _lsGet('jt_driver_overrides', {});
  const base = Array.isArray(extra) && extra.length ? [...drivers, ...extra] : drivers;
  return (ov && Object.keys(ov).length) ? base.map(d => ov[d.id] ? { ...d, ...ov[d.id] } : d) : base;
};
// 担当ドライバー編集(jt_client_driver_overrides)を適用した実効担当ドライバー
const driversOfClient = (c) => (_lsGet("jt_client_driver_overrides",{})[c.id]) || c.drivers || [];
// 単価編集(jt_rate_overrides) / 締日編集(jt_cycle_overrides) を適用した実効クライアント
const effectiveClient = (c) => {
  if (!c) return c;
  const ro = _lsGet('jt_rate_overrides', {});
  const co = _lsGet('jt_cycle_overrides', {});
  const rates = ro[c.id] || c.rates;
  const billingCycle = (co[c.id] !== undefined && co[c.id] !== null) ? co[c.id] : c.billingCycle;
  return (rates === c.rates && billingCycle === c.billingCycle) ? c : { ...c, rates, billingCycle };
};
// id から実効クライアントを解決（追加荷主・編集オーバーライド込み）
const resolveClientById = (cid) => effectiveClient(allClientsLive().find(c => c.id === cid));

// 請求期間を計算（締日アウェア）
const billingPeriodFor = (mk, cycle) => {
  const [y, m] = mk.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  const pad = (n) => String(n).padStart(2,'0');
  if (!cycle || cycle === '案件都度' || cycle.indexOf('末締め') >= 0) {
    return { start: `${mk}-01`, end: `${mk}-${pad(last)}` };
  }
  const m20 = cycle.match(/^翌月(\d+)日締め/);
  if (m20) {
    const cd = parseInt(m20[1]);
    const prev = new Date(y, m-2, cd+1);
    return {
      start: `${prev.getFullYear()}-${pad(prev.getMonth()+1)}-${pad(prev.getDate())}`,
      end: `${mk}-${pad(cd)}`,
    };
  }
  return { start: `${mk}-01`, end: `${mk}-${pad(last)}` };
};

// 締め日の選択肢（billingPeriodFor がパースできる値と揃える）。単価マスタ・荷主管理で共用
const CYCLE_OPTIONS = ["—","当月末締め","翌月5日締め","翌月10日締め","翌月15日締め","翌月20日締め","翌月25日締め","翌月末締め"];

// dailyActuals + dailyEdits の merge から、cid×monthKey の billing-period 合計を計算
const computeLiveSum = (cid, mk, dailyEdits) => {
  const c = resolveClientById(cid);
  if (!c) return null;
  const bp = billingPeriodFor(mk, c.billingCycle);
  const baseDA = (typeof dailyActuals !== 'undefined' && dailyActuals[cid]) || {};
  const editsDA = (dailyEdits && dailyEdits[cid]) || {};
  const dateSet = new Set([...Object.keys(baseDA), ...Object.keys(editsDA)]);
  let sell=0, pay=0, hasAny=false, edited=false;
  for (const date of dateSet) {
    if (date < bp.start || date > bp.end) continue;
    const baseDay = baseDA[date] || {};
    const editDay = editsDA[date] || {};
    const driverIds = new Set([...Object.keys(baseDay), ...Object.keys(editDay)]);
    for (const did of driverIds) {
      const baseDrv = baseDay[did] || {};
      const editDrv = editDay[did] || {};
      const labels = new Set([...Object.keys(baseDrv), ...Object.keys(editDrv)]);
      for (const lbl of labels) {
        // edits の値が優先（"" も「ユーザーが0にした」として尊重）
        const editV = editDrv[lbl];
        const baseV = baseDrv[lbl];
        const v = editV !== undefined ? editV : baseV;
        const cnt = Number(v) || 0;
        // 期間内にユーザーの編集があれば（"" や 0 でも）「当期は確定入力済み」とみなす。
        // → 全セルを0/空にクリアした荷主が、cm() で古い monthlyHistory シードに復活しない。
        if (editV !== undefined) edited = true;
        const r = c.rates.find(rr => rr.label === lbl);
        if (!r || cnt === 0) continue;
        sell += cnt * r.sell;
        pay += cnt * r.pay;
        hasAny = true;
      }
    }
  }
  // hasAny: 1セルでも実数あり / edited: ユーザーが当期を明示入力（全0含む）。どちらかあれば確定値を返しシードに戻さない。
  return (hasAny || edited) ? { s: sell, p: pay } : null;
};

// クライアント×月の値取得（live edits を優先、なければ monthlyHistory フォールバック）
const cm = (cid, mk, dailyEdits) => {
  const live = computeLiveSum(cid, mk, dailyEdits);
  if (live) return live;
  return (monthlyHistory[cid] && monthlyHistory[cid][mk]) || {s:0,p:0};
};
// 全社合算
const monthAgg = (mk, dailyEdits) => {
  let sell=0, pay=0;
  allClientsLive().forEach(c => { const h = cm(c.id, mk, dailyEdits); sell += h.s; pay += h.p; });
  return { sell, pay, profit: sell-pay };
};

                <td style={{ padding:"9px 14px", textAlign:"right", color:"#645F6E" }}>{g.pay>0?fmt(g.pay):"—"}</td>
                <td style={{ padding:"9px 14px", textAlign:"right", fontWeight:700, color:g.profit>0?"#6E9E78":"#A09AAB" }}>{g.profit!==0?fmt(g.profit):"—"}</td>
                <td style={{ padding:"9px 14px", textAlign:"right", color:g.rate>=15?"#6E9E78":g.rate>=10?"#C39A52":"#B05A60" }}>{g.sell>0?g.rate.toFixed(1)+"%":"—"}</td>
                <td style={{ padding:"9px 14px", textAlign:"right" }}>
                  <div style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
                    <div style={{ width:60, height:6, background:"#DEDAE5", borderRadius:3, overflow:"hidden" }}>
                      <div style={{ width:`${pct}%`, height:"100%", background:accent }}/>
                    </div>
                    <span style={{ fontSize:11, color:"#645F6E", minWidth:36 }}>{pct.toFixed(0)}%</span>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </Card>
  );
};

const PLPage = ({ accent, setPage }) => {
  // 日次入力ページからの編集を反映するために localStorage 経由で購読
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  // 既定月: 今月（REF_MONTH）に日次実績があれば今月を、無ければ最新確定月を表示（ダッシュボードと一致させる）
  const [selectedMonth, setSelectedMonth] = React.useState(() => monthAgg(REF_MONTH, dailyEdits).sell > 0 ? REF_MONTH : LATEST_DATA_MONTH);
  // 日次入力のある月も含めた“実データのある全月キー”。シード外月への入力もドロップダウン/YTD/前年比に反映させる。
  const ALL_MONTH_KEYS_LIVE = React.useMemo(() => allMonthKeysLive(dailyEdits), [dailyEdits]);
  const [tblSort, setTblSort] = React.useState({key:"sell", dir:"desc"});
  // 請求金額は請求管理/ダッシュボードと同じく「実効ステータス＋日次実績優先」で算出し、3画面の数値を一致させる
  const [issuedArr] = useLocalStorage("jt_issued", []);
  const [paidArr] = useLocalStorage("jt_paid", []);
  const _invAmount = (i) => {
    const c = allClientsLive().find(x => x.name === i.client);
    const mk = (i.period && /^\d{4}-\d{2}/.test(i.period)) ? i.period.slice(0,7) : LATEST_DATA_MONTH;
    const live = c ? computeLiveSum(c.id, mk, dailyEdits) : null;
    return (live && live.s > 0) ? live.s : i.amount;
  };

  // === 当月・前月・年計の集計 ===
  const cur = monthAgg(selectedMonth, dailyEdits);
  const prevMk = prevMonthKey(selectedMonth);
  const prev = monthAgg(prevMk, dailyEdits);
  const curMargin = cur.sell>0 ? cur.profit/cur.sell*100 : 0;
  const prevMargin = prev.sell>0 ? prev.profit/prev.sell*100 : 0;
  const sellDelta = prev.sell>0 ? (cur.sell-prev.sell)/prev.sell*100 : 0;
  const profitDelta = prev.profit>0 ? (cur.profit-prev.profit)/prev.profit*100 : 0;

  // 当月の荷主別データ
  const curByClient = allClientsLive().map(c => {
    const h = cm(c.id, selectedMonth, dailyEdits);
    const ph = cm(c.id, prevMk, dailyEdits);
    // 直近3ヶ月平均（当月含む直近3）カレンダー月による計算
    const m3 = selectedMonth;
    const m2 = prevMonthKey(selectedMonth);
    const m1 = prevMonthKey(m2);
    let avg3 = 0, n=0;
    for (const mk of [m1, m2, m3]) {
      const v = cm(c.id, mk, dailyEdits);
      if (v.s>0) { avg3 += v.s; n++; }
    }
    avg3 = n>0 ? avg3/n : 0;
    return {
      id: c.id, name: c.name, billing: c.billing, billingCycle: c.billingCycle,
      sell: h.s, pay: h.p, profit: h.s-h.p,
      rate: h.s>0 ? (h.s-h.p)/h.s*100 : 0,
      pct: cur.sell>0 ? h.s/cur.sell*100 : 0,
      prevSell: ph.s,
      sellDelta: ph.s>0 ? (h.s-ph.s)/ph.s*100 : (h.s>0?100:0),
      avg3,
      vsAvg: avg3>0 ? (h.s-avg3)/avg3*100 : 0,
    };
  });
  const curActive = curByClient.filter(r => r.sell>0);
  const curSorted = [...curActive].sort((a,b)=>{
    const k=tblSort.key, d=tblSort.dir==="asc"?1:-1;
    return (a[k]-b[k])*d;
  });

  // === 経営アラート ===
  const alerts = [];
  // 1. トップ荷主依存度
  const topClient = [...curActive].sort((a,b)=>b.sell-a.sell)[0];
  if (topClient && topClient.pct>=30) {
    alerts.push({
      level: topClient.pct>=40?"high":"mid",
      title:`売上集中: ${topClient.name} で ${topClient.pct.toFixed(1)}%`,
      desc:`単一荷主依存度が高い。${topClient.name} の解約は当月売上で ${fmt(topClient.sell)} のインパクト。多角化検討。`
    });
  }
  // 2. 粗利率低い荷主
  const lowMargin = curActive.filter(r => r.rate<ALERT_MARGIN_LOW && r.sell>10000);
  if (lowMargin.length>0) {
    alerts.push({
      level:"mid",
      title:`粗利率 ${ALERT_MARGIN_LOW}%未満: ${lowMargin.length}社`,
      desc: lowMargin.map(r=>`${r.name}（${r.rate.toFixed(1)}%）`).join('、')+" — 単価交渉 or 撤退判断"
    });
  }
  // 3. 売上急減
  const dropped = curActive.filter(r => r.sellDelta<=-ALERT_DROP_PCT && r.prevSell>0);
  if (dropped.length>0) {
    alerts.push({
      level:"high",
      title:`売上急減: ${dropped.length}社（前月比${-ALERT_DROP_PCT}%以上ダウン）`,
      desc: dropped.map(r=>`${r.name}（${r.sellDelta.toFixed(0)}%）`).join('、')+" — 原因調査"
    });
  }
  // 4. 入金遅延・未請求
  const unpaid = invoices.filter(i=>i.status==="遅延" && !paidArr.includes(i.id));
  const pending = invoices.filter(i=>i.status==="未請求" && !issuedArr.includes(i.id) && !paidArr.includes(i.id));
  if (unpaid.length>0) {
    alerts.push({
      level:"high",
      title:`入金遅延: ${unpaid.length}件 ${fmt(unpaid.reduce((s,i)=>s+_invAmount(i),0))}`,
      desc: unpaid.map(i=>`${i.client}（${i.period}）`).join('、')+" — 至急督促"
    });
  }
  if (pending.length>0) {
    alerts.push({
      level:"low",
      title:`未請求: ${pending.length}件 ${fmt(pending.reduce((s,i)=>s+_invAmount(i),0))}`,
      desc:"請求書発行待ち。期日内発行で資金繰り改善"
    });
  }
  // 5. 粗利率が目標下回り
  if (curMargin>0 && curMargin < TARGET_MARGIN) {
    alerts.push({
      level:"mid",
      title:`粗利率 ${curMargin.toFixed(1)}% — 目標 ${TARGET_MARGIN}% に未達`,
      desc:`差 ${(TARGET_MARGIN-curMargin).toFixed(1)}pt。${Math.round(cur.sell*(TARGET_MARGIN-curMargin)/100).toLocaleString("ja-JP")} 円の粗利改善余地`
    });
  }

  // === 前年同月比の分析（実データから算出。バッジ＆分析メモで使用）===
  const _curY = Number(REF_MONTH.split('-')[0]);
  const yoyMonths = []; // 当年の実データ月だけ {m, cs(当年売上), ps(前年売上), pct(前年比%)}
  for (let m=1; m<=12; m++) {
    const cmk = `${_curY}-${String(m).padStart(2,'0')}`;
    if (!ALL_MONTH_KEYS_LIVE.includes(cmk)) continue; // 実データ月のみ（締め按分の端数月を除外）
    const cs = monthAgg(cmk, dailyEdits).sell;
    if (cs<=0) continue;
    const ps = monthAgg(`${_curY-1}-${String(m).padStart(2,'0')}`, dailyEdits).sell;
    yoyMonths.push({ m, cs, ps, pct: ps>0 ? (cs-ps)/ps*100 : null });
  }
  const yoyLast = yoyMonths.length ? yoyMonths[yoyMonths.length-1] : null;
  const yoyBaseMonth = yoyLast ? `${_curY}-${String(yoyLast.m).padStart(2,'0')}` : null;
  const yoyDelta = yoyLast ? yoyLast.pct : null;
  // 前年の季節性（最需要期・最閑散期）
  const _prevVals = [];
  for (let m=1; m<=12; m++) _prevVals.push({ m, s: monthAgg(`${_curY-1}-${String(m).padStart(2,'0')}`, dailyEdits).sell });
  const _pwd = _prevVals.filter(v=>v.s>0);
  const yoyPeak   = _pwd.length ? _pwd.reduce((a,b)=>b.s>a.s?b:a) : null;
  const yoyTrough = _pwd.length ? _pwd.reduce((a,b)=>b.s<a.s?b:a) : null;
  // 分析メモ（自然文・すべて実データ由来）
  const yoyInsights = [];
  if (yoyLast && yoyLast.pct!=null) {
    yoyInsights.push({ tone: yoyLast.pct>=0?"up":"down",
      text: `当月 ${yoyLast.m}月 は前年同月比 ${yoyLast.pct>=0?"+":""}${yoyLast.pct.toFixed(1)}%（${fmt(yoyLast.cs)} ／ 前年 ${fmt(yoyLast.ps)}）` });
  }
  if (yoyMonths.length>=2) {
    const a = yoyMonths[yoyMonths.length-2], b = yoyLast;
    if (a.pct!=null && b.pct!=null) {
      const diff = b.pct - a.pct;
      yoyInsights.push({ tone: diff>=0?"up":"down",
        text: `前年比は ${a.m}月 ${a.pct>=0?"+":""}${a.pct.toFixed(1)}% → ${b.m}月 ${b.pct>=0?"+":""}${b.pct.toFixed(1)}%（${diff>=0?"改善":"悪化"} ${Math.abs(diff).toFixed(1)}pt）` });
    }
  }
  if (yoyPeak && yoyTrough && yoyPeak.m!==yoyTrough.m) {
    yoyInsights.push({ tone:"info",
      text: `前年実績の季節性：最需要期は ${yoyPeak.m}月（${fmt(yoyPeak.s)}）、最閑散は ${yoyTrough.m}月（${fmt(yoyTrough.s)}）` });
  }
  if (yoyMonths.length) {
    yoyInsights.push({ tone:"info",
      text: `当年は ${yoyMonths.map(x=>x.m+"月").join("・")} の実績のみ。残りの月は日次実績の入力で自動反映されます` });
  }

  // === ドライバー収益性 ===
  const inhouseDrivers = drivers.filter(d=>d.type==="自社");
  const coopDrivers    = drivers.filter(d=>d.type==="協力会社");
  // pay の自社/協力会社割合（近似: ドライバー人数比率）
  const inhouseRatio = inhouseDrivers.length / Math.max(1, inhouseDrivers.length+coopDrivers.length);
  const inhousePayEst = cur.pay * inhouseRatio;
  const coopPayEst    = cur.pay - inhousePayEst;
  const activeDriverCount = inhouseDrivers.length + coopDrivers.length;
  const perDriverProfit   = activeDriverCount>0 ? cur.profit/activeDriverCount : 0;

  // === 資金繰り予測（締め日別の入金スケジュール） ===
  const cycleGroups = {};
  curActive.forEach(r => {
    const c = resolveClientById(r.id) || {};
    const key = c?.billingCycle || "未設定";
    if (!cycleGroups[key]) cycleGroups[key] = { clients:[], sell:0, pay:0 };
    cycleGroups[key].clients.push(r);
    cycleGroups[key].sell += r.sell;
    cycleGroups[key].pay  += r.pay;
  });

  // === YTD（年計）===
  // 最後の12ヶ月（またはそれ以下）の合計で年計と予測を算出
  const curYear = selectedMonth.slice(0,4);
  const selectedIdx = ALL_MONTH_KEYS_LIVE.indexOf(selectedMonth);
  const ytdMonths = selectedIdx>=0 ? ALL_MONTH_KEYS_LIVE.slice(Math.max(0, selectedIdx-11), selectedIdx+1) : [];
  const ytdData = ytdMonths.reduce((acc,mk)=>{
    const m = monthAgg(mk, dailyEdits); acc.sell+=m.sell; acc.pay+=m.pay; return acc;
  }, {sell:0,pay:0});
  const ytdProfit = ytdData.sell - ytdData.pay;
  const ytdMonthCount = ytdMonths.length;
  const monthAvg = ytdMonthCount>0 ? ytdData.sell/ytdMonthCount : 0;
  // 年間着地予測 (月平均 × 12)
  const projection = monthAvg * 12;
  const projectionProfit = ytdMonthCount>0 ? (ytdProfit/ytdMonthCount)*12 : 0;

  // 黒字荷主数
  const profitableCount = curActive.filter(r=>r.profit>0).length;

  // === スタイル ===
  const SortHd = ({label, k, align="left"}) => {
    const active = tblSort.key===k;
    return (
      <th onClick={()=>setTblSort({key:k, dir:active&&tblSort.dir==="desc"?"asc":"desc"})}
        style={{ padding:"9px 12px", textAlign:align, color:active?accent:"var(--jt-text-sub)", fontWeight:600, fontSize:11.5, whiteSpace:"nowrap", cursor:"pointer", userSelect:"none", background:"var(--jt-base)", boxShadow:"var(--jt-raised-sm)", borderRadius:4 }}>
        {label}{active&&<span style={{ marginLeft:3, fontSize:9 }}>{tblSort.dir==="desc"?"▼":"▲"}</span>}
      </th>
    );
  };

  return (
    <div>
      {/* ── ヘッダ ── */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>財務・請求管理</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", display:"flex", alignItems:"center", gap:10, color:"var(--jt-text)" }}>
            収支管理 <span style={{ fontSize:11, padding:"2px 8px", background:accent+"22", color:accent, borderRadius:99, fontWeight:600 }}>経営分析室</span>
          </div>
          <div style={{ fontSize:12, color:"#A09AAB", marginTop:3 }}>
            対象月: {mkLabel(selectedMonth)} ／ 前月: {mkLabel(prevMk)}
            {!_hasCurrent && selectedMonth===LATEST_DATA_MONTH && ` ／ 今月（${mkLabel(REF_MONTH)}）実績未入力のため最新確定月を表示`}
          </div>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <label style={{ fontSize:12, color:"#645F6E" }}>対象月：</label>
          <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}
            style={{ padding:"7px 14px", border:"none", borderRadius:13, background:"var(--jt-base)", fontSize:13, fontWeight:600, color:"var(--jt-text)", cursor:"pointer", fontFamily:"inherit", outline:"none", boxShadow:"var(--jt-inset)", borderLeft:`5px solid ${accent}` }}>
            {ALL_MONTH_KEYS_LIVE.slice().filter(mk=>ALL_MONTH_KEYS.includes(mk)||monthAgg(mk,dailyEdits).sell>0).reverse().map(mk=>(
              <option key={mk} value={mk}>{mkLabel(mk)}</option>
            ))}
          </select>
        </div>
      </div>

      {/* ── 経営KPI 6カード ── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:10, marginBottom:14 }}>
        {[
          { l:"売上", v:fmt(cur.sell), sub:`前月比 ${sellDelta>=0?"+":""}${sellDelta.toFixed(1)}%`, c:"#7E6593", up: sellDelta>=0 },
          { l:"支払", v:fmt(cur.pay),  sub:`原価率 ${cur.sell>0?(cur.pay/cur.sell*100).toFixed(1):"—"}%`, c:"#C39A52", up:null },
          { l:"粗利", v:fmt(cur.profit), sub:`前月比 ${profitDelta>=0?"+":""}${profitDelta.toFixed(1)}%`, c:"#6E9E78", up: profitDelta>=0 },
          { l:`粗利率（目標 ${TARGET_MARGIN}%）`, v:`${curMargin.toFixed(1)}%`, sub:`前月 ${prevMargin.toFixed(1)}% ／ ${curMargin>=TARGET_MARGIN?"目標達成":"目標未達"}`, c: curMargin>=TARGET_MARGIN?"#6E9E78":curMargin>=ALERT_MARGIN_LOW?"#C39A52":"#B05A60", up: curMargin>=TARGET_MARGIN },
          { l:"受取勘定（未請求＋遅延）", v:fmt(pending.reduce((s,i)=>s+_invAmount(i),0)+unpaid.reduce((s,i)=>s+_invAmount(i),0)), sub:`未請求 ${pending.length} ／ 遅延 ${unpaid.length}`, c:"#7E6593", up:null },
          { l:"黒字荷主数", v:`${profitableCount} / ${curActive.length}`, sub: profitableCount===curActive.length?"全社黒字":`${curActive.length-profitableCount}社が赤字`, c:profitableCount===curActive.length?"#6E9E78":"#B05A60", up: profitableCount===curActive.length },
        ].map(({l,v,sub,c,up})=>(
          <Card key={l} style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:10.5, color:"#A09AAB", marginBottom:6, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{l}</div>
            <div style={{ fontSize:18, fontWeight:800, color:c, lineHeight:1.1 }}>{v}</div>
            <div style={{ fontSize:10.5, color: up===true?"#6E9E78":up===false?"#B05A60":"#A09AAB", marginTop:5 }}>{sub}</div>
          </Card>
        ))}
      </div>

      {/* ── 経営アラート ── */}
      {alerts.length>0 && (
        <Card style={{ marginBottom:14 }}>
          <SH title={`経営アラート（${alerts.length}件）`}/>
          <div style={{ padding:"10px 16px" }}>
            {alerts.map((a,i)=>{
              const sev = a.level==="high" ? {bg:"#F3E6E3",fg:"#B05A60",label:"高"}
                        : a.level==="mid"  ? {bg:"#F2EBDC",fg:"#8C6A2E",label:"中"}
                        :                     {bg:"#EFEDF3",fg:"#7E6593",label:"情報"};
              return (
                <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"10px 12px", marginBottom:8, background:"var(--jt-base)", borderRadius:10, boxShadow:"var(--jt-raised-sm)" }}>
                  <span style={{ flexShrink:0, marginTop:1, fontSize:10.5, fontWeight:600, color:sev.fg, background:sev.bg, padding:"3px 10px", borderRadius:20 }}>{sev.label}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"var(--jt-text)" }}>{a.title}</div>
                    <div style={{ fontSize:11.5, color:"var(--jt-text-sub)", marginTop:2 }}>{a.desc}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* 経営グラフ（実データ・テーマ連動）: 売上・支払・粗利 複合 ＋ 粗利率の推移 */}
      <div style={{ display:"grid", gridTemplateColumns:"1.5fr 1fr", gap:14, marginBottom:14 }}>
        <Card>
          <div style={{ fontSize:13, fontWeight:700, padding:"10px 16px 4px" }}>売上・支払・粗利（直近12ヶ月）</div>
          <div style={{ padding:"4px 16px 16px" }}><PLCompositeChart dailyEdits={dailyEdits}/></div>
        </Card>
        <Card>
          <div style={{ fontSize:13, fontWeight:700, padding:"10px 16px 4px" }}>粗利率の推移（直近12ヶ月）</div>
          <div style={{ padding:"4px 16px 16px" }}><ProfitMarginChart dailyEdits={dailyEdits}/></div>
        </Card>
      </div>

      {/* ── 前年同月比 + 構成 ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:14, marginBottom:14 }}>
        <Card>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px 4px" }}>
            <div style={{ fontSize:13, fontWeight:700 }}>前年同月比（当年 vs 前年・売上）</div>
            {yoyBaseMonth && yoyDelta!=null && (
              <div style={{ fontSize:11, fontWeight:700, color: yoyDelta>=0?"#6E9E78":"#B05A60", background:"var(--jt-base)", padding:"4px 11px", borderRadius:13, boxShadow:"var(--jt-raised-sm)", whiteSpace:"nowrap" }}>
                {mkLabel(yoyBaseMonth)} {yoyDelta>=0?"▲":"▼"} 前年比 {yoyDelta>=0?"+":""}{yoyDelta.toFixed(1)}%
              </div>
            )}
          </div>
          <div style={{ padding:"6px 16px 6px" }}><YoYSalesChart dailyEdits={dailyEdits}/></div>
          {yoyInsights.length>0 && (
            <div style={{ padding:"4px 16px 16px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"var(--jt-text-sub)", letterSpacing:".04em", marginBottom:9, paddingTop:10, borderTop:"1px solid var(--jt-line)" }}>分析メモ</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {yoyInsights.map((ins,i)=>{
                  const c = ins.tone==="up"?"#6E9E78":ins.tone==="down"?"#B05A60":"var(--jt-accent)";
                  const mark = ins.tone==="up"?"▲":ins.tone==="down"?"▼":"●";
                  return (
                    <div key={i} style={{ display:"flex", gap:9, alignItems:"flex-start", fontSize:12, lineHeight:1.55, color:"var(--jt-text)" }}>
                      <span style={{ flexShrink:0, color:c, fontSize:9, marginTop:3 }}>{mark}</span>
                      <span>{ins.text}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </Card>

        {/* 荷主構成（売上） */}
        <Card>
          <SH title="売上構成（当月）"/>
          <div style={{ padding:"10px 16px" }}>
            {[...curActive].sort((a,b)=>b.sell-a.sell).slice(0,10).map((r,i)=>(
              <div key={i} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11.5, marginBottom:3 }}>
                  <span style={{ fontWeight:500 }}>{i+1}. {r.name}</span>
                  <span style={{ fontWeight:700, color:accent }}>{r.pct.toFixed(1)}%</span>
                </div>
                <div style={{ height:5, background:"var(--jt-base)", borderRadius:13, boxShadow:"var(--jt-inset-sm)" }}>
                  <div style={{ width:`${r.pct}%`, height:"100%", background:r.pct>=30?"#B05A60":r.pct>=20?"#C39A52":accent, borderRadius:2 }}/>
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* ── 荷主別サマリ ── */}
      <ParentClientSummaryBlock accent={accent} selectedMonth={selectedMonth} dailyEdits={dailyEdits}/>

// ── 単価マスタ管理 ─────────────────────────────────────────────────────────
const RateMasterPage = ({ accent, setPage }) => {
  const drivers = driversLive();
  const [sel, setSel] = React.useState(null);
  const [extraClients, setExtraClients] = useLocalStorage("jt_extra_clients", []);
  const [rateOverrides, setRateOverrides] = useLocalStorage("jt_rate_overrides", {});
  const ratesFor = (c) => (c && rateOverrides[c.id]) ? rateOverrides[c.id] : (c ? c.rates : []);
  const [cycleOverrides, setCycleOverrides] = useLocalStorage("jt_cycle_overrides", {});
  const [driverOverrides, setDriverOverrides] = useLocalStorage("jt_client_driver_overrides", {});
  const driversFor = (c) => (c && driverOverrides[c.id]) ? driverOverrides[c.id] : (c ? c.drivers : []);
  const [contactOverrides, setContactOverrides] = useLocalStorage("jt_contact_overrides", {});
  const contactPrevRef = React.useRef({ person:"", tel:"", address:"" });
  const cv = (v) => (v && v !== "—") ? v : "";
  const contactFor = (c) => { const o = (c && contactOverrides[c.id]) || {}; return { person: o.person!==undefined?o.person:cv(c?.person||c?.contact), tel: o.tel!==undefined?o.tel:cv(c?.tel), address: o.address!==undefined?o.address:cv(c?.address) }; };
  // ── 自動保存ヘルパー（保存ボタン廃止：変更で即保存）──
  const updateRate = (ri, field, value) => {
    const cur = ratesFor(sel).map(r=>({ ...r }));
    cur[ri] = { ...cur[ri], [field]: Number(value)||0 };
    setRateOverrides({ ...rateOverrides, [sel.id]: cur });
  };
  const updateContact = (key, value) => {
    const cur = contactFor(sel);
    _contactEdited.add(sel.id); // 起動同期に上書きされないよう編集を記録
    setContactOverrides({ ...contactOverrides, [sel.id]: { ...cur, [key]: value } });
  };
  const flushContact = (isDirty=true) => {
    if (!isDirty) return;
    const c = contactFor(sel);
    if (window.sb) window.sb.from("jt_contact_overrides").upsert({ client_id: sel.id, person: c.person||null, tel: c.tel||null, address: c.address||null }, { onConflict:"client_id" }).then(({error})=>{ if(error) console.warn("[Supabase] contact upsert failed:", error); else console.log("[Supabase] contact saved:", sel.id); });
    showToast("請求先情報を保存しました");
  };
  const [showDrvPicker, setShowDrvPicker] = React.useState(false);
  const cycleFor = (c) => (c && cycleOverrides[c.id]) || (c && c.billingCycle) || "—";
  const [showAdd, setShowAdd] = React.useState(false);
  useEscapeToClose(showAdd, ()=>closeAdd());
  const blankForm = { code:"", name:"", area:"", billing:"個建て", billingCycle:"翌月末締め", person:"", tel:"", address:"", rateLabel:"配完", sell:"", pay:"" };
  // 既存ID群の数値最大+1で採番（件数ベースだと削除→追加や多端末同期でID衝突するため。DR-/V- と同方式）
  const nextCode = () => { const nums = [...clients, ...extraClients].map(c => parseInt((String(c.id||c.code||"").match(/\d+/)||["0"])[0],10)||0); return "C-" + String(Math.max(0,...nums) + 1).padStart(2,"0"); };
  const [form, setForm] = React.useState(blankForm);
  const allClients = [...clients, ...extraClients];
  const billingOptions = ["個建て","個建て（2区分）","個建て（3区分）","スポット","固定（日額）","固定＋変動"];
  // 荷主追加: 閉じる/背景クリック/Esc で確定（コード＋荷主名が揃っていれば作成。ref で二重作成を防止）
  const addCommittedRef = React.useRef(false);
  const commitClient = () => {
    if (addCommittedRef.current) return true;
    const code = form.code.trim();
    const name = form.name.trim();
    if (!code || !name) return true; // 未入力 → キャンセル扱いでそのまま閉じる
    if (allClients.some(c => c.id === code)) { showToast("荷主コード「" + code + "」は既に使われています", "error"); return false; }
    addCommittedRef.current = true;
    const newClient = {
      id: code, name,
      area: form.area.trim() || "—",
      billing: form.billing,
      billingCycle: form.billingCycle.trim() || "—",
      rates: [{ label: form.rateLabel.trim() || "配完", sell: Number(form.sell)||0, pay: Number(form.pay)||0 }],
      drivers: [], monthlyVol: {},
      person: form.person.trim() || "—",
      tel: form.tel.trim() || "—",
      address: form.address.trim() || "—",
      contact: form.person.trim() || "—",
      status: "稼働中",
    };
    setExtraClients([...extraClients, newClient]);
    setSel(newClient);
    showToast("荷主「" + name + "」を追加しました");
    return true;
  };
  const closeAdd = () => { if (commitClient()) setShowAdd(false); };

  // 荷主管理ページからの「新規荷主追加」遷移時にモーダルを自動オープン
  React.useEffect(() => {
    try {
      if (sessionStorage.getItem("jt_open_add_client") === "1") {
        sessionStorage.removeItem("jt_open_add_client");
        setForm({ ...blankForm, code: nextCode() });
        addCommittedRef.current = false;
        setShowAdd(true);
      }
    } catch (e) {}
  }, []);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>財務・請求管理</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"#393443" }}>単価マスタ管理</div>
          <div style={{ fontSize:12, color:"#A09AAB", marginTop:2 }}>荷主ごとの売単価・支払単価を一元管理</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={()=>{
              const head=["荷主コード","荷主名","エリア","業務区分","売単価","支払単価","粗利","粗利率"];
              const rows=[head];
              allClients.forEach(c=>ratesFor(c).forEach(r=>{ const gp=r.sell-r.pay; const rt=r.sell>0?Math.round(gp/r.sell*100)+"%":""; rows.push([c.id,c.name,c.area,r.label,r.sell,r.pay,gp,rt]); }));
              const csv="﻿"+rows.map(r=>r.map(x=>csvEscape(x)).join(",")).join("\r\n");
              const url=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
              const a=document.createElement("a"); a.href=url; a.download="単価マスタ.csv"; a.click(); URL.revokeObjectURL(url);
            }} style={{ padding:"7px 16px", background:"var(--jt-base)", color:"var(--jt-text-sub)", border:"none", borderRadius:6, fontSize:13, fontWeight:600, cursor:"pointer", boxShadow:"var(--jt-raised-sm)" }}>
            CSVエクスポート
          </button>
          <button onClick={()=>{ setForm({ ...blankForm, code: nextCode() }); addCommittedRef.current = false; setShowAdd(true); }} style={{ padding:"7px 16px", background:"var(--jt-accent-grad)", color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:700, cursor:"pointer", boxShadow:"var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)" }}>
            + 荷主追加
          </button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"280px 1fr", gap:16, alignItems:"start" }}>
        {/* 荷主リスト */}
        <Card>
          <SH title="荷主一覧"/>
          <div style={{ padding:"8px 0" }}>
            {allClients.map((c,i)=>(
              <button key={i} onClick={()=>setSel(c)}
                style={{ width:"100%", padding:"12px 16px", border:"none", borderLeft: sel?.id===c.id ? "3px solid #7E6593" : "3px solid transparent", background: sel?.id===c.id ? "var(--jt-base)" : "transparent", textAlign:"left", display:"flex", flexDirection:"column", gap:3 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontWeight:600, fontSize:13 }}>{c.name}</span>
                  <StatusBadge label={c.billing.replace("（2区分）","").replace("（3区分）","")}/>
                </div>
                <span style={{ fontSize:11, color:"#A09AAB" }}><span style={{ fontFamily:"ui-monospace, monospace", color:"#645F6E" }}>{c.id}</span> ・ {c.area}</span>
              </button>
            ))}
          </div>
        </Card>

        {/* 単価詳細 */}
        {sel ? (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <Card style={{ padding:24 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
                <div>
                  <div style={{ fontSize:18, fontWeight:700 }}>{sel.name}</div>
                  <div style={{ fontSize:12, color:"#645F6E", marginTop:2, display:"flex", alignItems:"center", gap:6 }}><span style={{ fontFamily:"ui-monospace, monospace", color:"#645F6E", fontWeight:700 }}>{sel.id}</span><span>／</span><span>{sel.area}</span><span>／</span><span style={{ color:"#645F6E" }}>締め:</span><select value={cycleFor(sel)} onChange={e=>{ setCycleOverrides({ ...cycleOverrides, [sel.id]: e.target.value }); showToast("締め日を保存しました"); }} style={{ padding:"2px 8px", border:"none", borderRadius:6, fontSize:12, fontFamily:"inherit", outline:"none", background:"var(--jt-base)", fontWeight:600, color:"var(--jt-text)", cursor:"pointer", boxShadow:"var(--jt-inset-sm)" }}>{Array.from(new Set([cycleFor(sel), sel.billingCycle, ...CYCLE_OPTIONS].filter(Boolean))).map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                </div>
                <span style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#A09AAB", fontWeight:600, whiteSpace:"nowrap" }}><Ic name="check" size={12} color="#34d399" strokeWidth={2.5}/>自動保存</span>

// ── ドライバー別収支 ───────────────────────────────────────────────────────
// ── 支払明細書 共通ロジック（ドライバー別収支 / ドライバー管理 で共用）──────────
const _dowOf = (ds) => { const [y,mm,dd] = ds.split("-").map(Number); return ["日","月","火","水","木","金","土"][new Date(y, mm-1, dd).getDay()]; };
// 表示月: 今月実績があれば今月、なければ最新確定月
// buildDriverStatement と同じ暦月基準で「今月実績あり」を判定（""/0 のセルは実績なし扱い）
const displayMonthForPay = (dailyEdits) => {
  const hasCal = allClientsLive().some(c => {
    const base = (typeof dailyActuals !== "undefined" && dailyActuals[c.id]) || {};
    const ed = (dailyEdits && dailyEdits[c.id]) || {};
    return [...new Set([...Object.keys(base), ...Object.keys(ed)])].some(date =>
      date.slice(0,7) === REF_MONTH &&
      [...new Set([...Object.keys(base[date]||{}), ...Object.keys(ed[date]||{})])].some(did => {
        const b = (base[date]||{})[did] || {}, e = (ed[date]||{})[did] || {};
        return [...new Set([...Object.keys(b), ...Object.keys(e)])].some(lbl =>
          (Number(e[lbl] !== undefined ? e[lbl] : b[lbl]) || 0) > 0);
      })
    );
  });
  return hasCal ? REF_MONTH : LATEST_DATA_MONTH;
};
// 支払予定日: 当月分を翌月15日払いと仮定
const payDueFor = (mk) => { const [y,m] = mk.split("-").map(Number); const ny = m===12?y+1:y, nm = m===12?1:m+1; return `${ny}年${nm}月15日`; };

// 実際の日次実績(dailyActuals + 編集)から、ドライバー本人が運んだ実数で支払を集計（按分ではない）
const buildDriverStatement = (d, dailyEdits, mk) => {
  const clientMap = {}, dayMap = {};
  let totalSell = 0, totalPay = 0;
  allClientsLive().forEach(c => {
    const ec = effectiveClient(c); // 単価編集を反映
    const baseDA = (typeof dailyActuals !== "undefined" && dailyActuals[c.id]) || {};
    const editsDA = (dailyEdits && dailyEdits[c.id]) || {};
    [...new Set([...Object.keys(baseDA), ...Object.keys(editsDA)])].forEach(date => {
      if (date.slice(0,7) !== mk) return; // 給与は暦月で集計
      const bd = (baseDA[date]||{})[d.id] || {}, ed = (editsDA[date]||{})[d.id] || {};
      [...new Set([...Object.keys(bd), ...Object.keys(ed)])].forEach(lbl => {
        const v = ed[lbl] !== undefined ? ed[lbl] : bd[lbl];
        const cnt = Number(v) || 0; if (!cnt) return;
        const r = (ec.rates||[]).find(rr => rr.label === lbl); if (!r) return;
        const payAmt = cnt * r.pay, sellAmt = cnt * r.sell;
        if (!clientMap[c.id]) clientMap[c.id] = { name:c.name, lines:{}, pay:0, sell:0, days:new Set() };
        const cmp = clientMap[c.id];
        if (!cmp.lines[lbl]) cmp.lines[lbl] = { label:lbl, qty:0, unitPay:r.pay, amount:0 };
        cmp.lines[lbl].qty += cnt; cmp.lines[lbl].amount += payAmt;
        cmp.pay += payAmt; cmp.sell += sellAmt; cmp.days.add(date);
        if (!dayMap[date]) dayMap[date] = { date, items:[], pay:0 };
        dayMap[date].items.push({ client:c.name, label:lbl, qty:cnt, amount:payAmt });
        dayMap[date].pay += payAmt;
        totalPay += payAmt; totalSell += sellAmt;
      });
    });
  });
  const clientRows = Object.values(clientMap).map(cmp => ({
    name:cmp.name, pay:cmp.pay, sell:cmp.sell, days:cmp.days.size, lines:Object.values(cmp.lines),
  })).sort((a,b) => b.pay - a.pay);
  const dayRows = Object.values(dayMap).sort((a,b) => a.date<b.date?-1:1).map(dr => ({ ...dr, dow:_dowOf(dr.date) }));
  const tax = d.type === "協力会社" ? Math.round(totalPay * 0.1) : 0; // 外注は消費税込で支払
  // 粗利は税抜どうしで算出（消費税は通過勘定のため粗利に含めない＝標準の売上総利益）
  return { ...d, mk, clientRows, dayRows, totalSell, totalPay, totalProfit: totalSell-totalPay, tax, grandTotal: totalPay+tax, workDays: dayRows.length };
};

const exportDriverCSV = (d) => {
  const rows = ["荷主,区分,数量,支払単価,金額"];
  d.clientRows.forEach(c => c.lines.forEach(l => rows.push([c.name,l.label,l.qty,l.unitPay,l.amount].map(csvEscape).join(","))));
  rows.push(`,,,小計,${d.totalPay}`);
  if (d.tax > 0) rows.push(`,,,消費税(10%),${d.tax}`);
  rows.push(`,,,支払合計,${d.grandTotal}`);
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent("﻿" + rows.join("\n"));
  a.download = `支払明細_${d.name}_${d.mk}.csv`; a.click();
};

// CSVセル値の無害化（数式インジェクション・改行・クオート対策）
const csvEscape = (v) => {
  const s = String(v);
  // 先頭が数式文字(=,+,-,@)またはタブ・CRの場合は先頭に ' を付与
  const sanitized = /^[=+\-@\t\r]/.test(s) ? "'" + s : s;
  // クオートを二重化し、全体をクオートで囲む
  return '"' + sanitized.replace(/"/g, '""') + '"';
};

// 支払明細書 A4印刷／PDF保存（.driver-slip-paper を iframe に複製して印刷）
const printDriverSlip = (d, monthLabel) => {
  const paper = document.querySelector(".driver-slip-paper");
  if (!paper) return;
  const clone = paper.cloneNode(true);
  const old = document.getElementById("jt-slip-iframe"); if (old) old.remove();
  const iframe = document.createElement("iframe");
  iframe.id = "jt-slip-iframe";
  iframe.style.cssText = "position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden;";
  document.body.appendChild(iframe);
  const doc = iframe.contentWindow.document; doc.open();
  doc.write(`<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>支払明細書 ${d.name} ${monthLabel}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body { font-family:'Noto Sans JP','Hiragino Sans',sans-serif; color:#393443; font-size:12px; line-height:1.6; }
  table { border-collapse:collapse; width:100%; } td, th { vertical-align:middle; }
  thead { display:table-header-group; } tfoot { display:table-row-group; }
  tr { break-inside:avoid; page-break-inside:avoid; }
  .jt-keep { break-inside:avoid; page-break-inside:avoid; }
  .driver-slip-paper { padding:0 !important; }
  .jt-daily-section { break-inside:auto; }
  .jt-daily-section.jt-page2 { break-before:page; page-break-before:always; }
  .jt-slip-footer { break-inside:avoid; page-break-inside:avoid; }
  @page { size:A4 portrait; margin:14mm; }
</style></head><body>${clone.outerHTML}</body></html>`);
  doc.close();
  setTimeout(() => { try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e) { showToast("印刷に失敗: "+e.message, "error"); } setTimeout(()=>iframe.remove(),1500); }, 250);
};

const InvoicePage = ({ accent }) => {
  const [filter, setFilter] = React.useState("すべて");
  const [sel, setSel] = React.useState(null);
  const [issuedArr, setIssuedArr] = useLocalStorage("jt_issued", []);
  const [remindedArr, setRemindedArr] = useLocalStorage("jt_reminded", []);
  // 入金消込（請求済/遅延 → 入金済）した請求書ID
  const [paidArr, setPaidArr] = useLocalStorage("jt_paid", []);
  // 発行日を発行時に固定保存（{invoiceId: "YYYY-MM-DD"}）。開くたびに当日へ変わるのを防ぐ
  const [issuedDates, setIssuedDates] = useLocalStorage("jt_issued_dates", {});
  // 日次入力の編集を請求金額・明細に反映
  const [dailyEdits] = useLocalStorage("jt_daily_edits", {});
  // 単価マスタで編集した請求先情報（担当者・住所）を請求書に反映
  const [contactOverrides] = useLocalStorage("jt_contact_overrides", {});
  const issuedSet = new Set(issuedArr);
  const remindedSet = new Set(remindedArr);
  const paidSet = new Set(paidArr);
  const setIssuedSet = (fn) => setIssuedArr(prev => Array.from(fn(new Set(prev))));
  const setRemindedSet = (fn) => setRemindedArr(prev => Array.from(fn(new Set(prev))));
  const setPaidSet = (fn) => setPaidArr(prev => Array.from(fn(new Set(prev))));
  // 発行済（jt_issued）の未請求は実効ステータスを「請求済」に、入金消込（jt_paid）済みは「入金済」に。行バッジ・KPI・フィルタを揃える
  const effStatus = (inv) => {
    if (paidSet.has(inv.id)) return "入金済";
    if (inv.status === "未請求" && issuedSet.has(inv.id)) {
      // 請求済だが、支払期限超過かつ未入金なら遅延
      const today = (()=>{ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();
      if (inv.due && inv.due < today) return "遅延";
      return "請求済";
    }
    // 元々「遅延」ステータスの場合も遅延のまま
    if (inv.status === "遅延") return "遅延";
    return inv.status;
  };
  const todayYmd = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
  const markIssued = (ids) => {
    setIssuedSet(s=>new Set([...s,...ids]));
    setIssuedDates(m=>{ const next={...m}; const t=todayYmd(); ids.forEach(id=>{ if(!next[id]) next[id]=t; }); return next; });
  };

  const statuses = ["すべて","未請求","請求済","入金済","遅延"];
  const list = filter==="すべて"?invoices:invoices.filter(i=>effStatus(i)===filter);

  // 名前から実効クライアント（追加荷主・単価/締日編集込み）を解決
  const resolveClientByName = (name) => effectiveClient(allClientsLive().find(c => c.name === name));

  // 請求対象月キー（"2025-04"）と締日アウェアの請求期間を取得
  const periodOf = (inv) => {
    const c = resolveClientByName(inv.client);
    const mk = (inv.period && /^\d{4}-\d{2}/.test(inv.period)) ? inv.period.slice(0,7) : LATEST_DATA_MONTH;
    return { mk, bp: billingPeriodFor(mk, c ? c.billingCycle : null) };
  };

  // 日次実績(dailyActuals) + 日次編集(dailyEdits) から、請求期間内の区分別 実数明細を生成
  const lineItemsFor = (inv) => {
    const c = resolveClientByName(inv.client);
    if (!c) return [];
    const { bp } = periodOf(inv);
    const baseDA = (typeof dailyActuals !== "undefined" && dailyActuals[c.id]) || {};
    const editsDA = (dailyEdits && dailyEdits[c.id]) || {};
    const dateSet = new Set([...Object.keys(baseDA), ...Object.keys(editsDA)]);
    const agg = {}; // label -> { qty, days:Set }
    for (const date of dateSet) {
      if (date < bp.start || date > bp.end) continue;
      const bDay = baseDA[date] || {}, eDay = editsDA[date] || {};
      for (const did of new Set([...Object.keys(bDay), ...Object.keys(eDay)])) {
        const bd = bDay[did] || {}, ed = eDay[did] || {};
        for (const lbl of new Set([...Object.keys(bd), ...Object.keys(ed)])) {
          const v = ed[lbl] !== undefined ? ed[lbl] : bd[lbl];
          const cnt = Number(v) || 0;
          if (!cnt) continue;
          if (!agg[lbl]) agg[lbl] = { qty:0, days:new Set() };
          agg[lbl].qty += cnt;
          agg[lbl].days.add(date);
        }
      }
    }
    const realLabels = Object.keys(agg);
    if (realLabels.length) {
      // rates の定義順を尊重し、未定義ラベルは末尾に
      const ordered = [
        ...c.rates.filter(r => agg[r.label]),
        ...realLabels.filter(l => !c.rates.some(r => r.label === l)).map(l => ({ label:l, sell:0 })),
      ];
      return ordered.map(r => {
        const a = agg[r.label];
        const unit = /日額|日数|日$/.test(r.label) ? "日" : "個";
        return { label:r.label, qty:a.qty, unit, unitPrice:r.sell, amount:a.qty * r.sell, days:a.days.size };
      });
    }
    // 実績データが無い場合のフォールバック（固定系 / 未登録月）
    // 固定分は日額×日数で表し、端数（距離超過等の変動分）は調整行で補正して合計を inv.amount に一致させる
    if (c.billing.includes("固定")) {
      const r0 = c.rates[0] || { label:"固定日額", sell:0 };
      const days = r0.sell > 0 ? Math.round(inv.amount / r0.sell) : 0;
      const fixedAmt = r0.sell * days;
      const items = [{ label:r0.label, qty:days || "—", unit:"日", unitPrice:r0.sell, amount:fixedAmt || inv.amount, days }];
      const diff = inv.amount - (fixedAmt || inv.amount);
      if (diff !== 0) items.push({ label:"変動分（距離超過等）", qty:"—", unit:"式", unitPrice:diff, amount:diff, days:0 });
      return items;
    }
    return c.rates.filter(r => r.sell > 0).map(r => ({ label:r.label, qty:"—", unit:"個", unitPrice:r.sell, amount:"—" }));
  };

  // 明細から算出した実数小計（実績が無ければ invoice.amount をフォールバック）
  const subtotalFor = (inv) => {
    const sum = lineItemsFor(inv).reduce((s,it) => s + (typeof it.amount === "number" ? it.amount : 0), 0);
    return sum > 0 ? sum : inv.amount;
  };

  const summary = {
    未請求: invoices.filter(i=>effStatus(i)==="未請求").reduce((s,i)=>s+subtotalFor(i),0),
    請求済: invoices.filter(i=>effStatus(i)==="請求済").reduce((s,i)=>s+subtotalFor(i),0),
    遅延:   invoices.filter(i=>effStatus(i)==="遅延").reduce((s,i)=>s+subtotalFor(i),0),
    入金済: invoices.filter(i=>effStatus(i)==="入金済").reduce((s,i)=>s+subtotalFor(i),0),
  };

  // 画面上で正式な請求書を表示するプレビュー
  const [preview, setPreview] = React.useState(null);

  // 請求書1枚分の表示モデル（請求先・明細・金額・期間）を生成
  const invoiceModel = (inv) => {
    const baseClient = resolveClientByName(inv.client) || {};
    const cov = contactOverrides[baseClient.id] || {};
    const nd = (v) => (v && v !== "—") ? v : undefined;
    const clientObj = { ...baseClient,
      address: cov.address!==undefined ? nd(cov.address) : nd(baseClient.address),
      person:  cov.person!==undefined  ? nd(cov.person)  : nd(baseClient.person||baseClient.contact),
      tel:     cov.tel!==undefined     ? nd(cov.tel)     : nd(baseClient.tel) };
    const items = lineItemsFor(inv);
    const subtotal = subtotalFor(inv);
    const tax = Math.round(subtotal * 0.1);
    const total = subtotal + tax;
    const bp = periodOf(inv).bp;
    const fmtDate = (d) => { const [y,m,dd] = d.split("-"); return `${y}年${parseInt(m)}月${parseInt(dd)}日`; };
    const today = new Date();

    // 日別明細（請求期間内の各稼働日 × 区分別 数量・金額）
    const baseDA = (typeof dailyActuals !== "undefined" && dailyActuals[baseClient.id]) || {};
    const editsDA = (dailyEdits && dailyEdits[baseClient.id]) || {};
    const dates = [...new Set([...Object.keys(baseDA), ...Object.keys(editsDA)])]
      .filter(d => d >= bp.start && d <= bp.end).sort();
    const labelSet = new Set();
    const dailyRows = dates.map(date => {
      const bDay = baseDA[date] || {}, eDay = editsDA[date] || {};
      const per = {};
      let amount = 0;
      for (const did of new Set([...Object.keys(bDay), ...Object.keys(eDay)])) {
        const bd = bDay[did] || {}, ed = eDay[did] || {};
        for (const lbl of new Set([...Object.keys(bd), ...Object.keys(ed)])) {
          const v = ed[lbl] !== undefined ? ed[lbl] : bd[lbl];
          const cnt = Number(v) || 0;
          if (!cnt) continue;
          per[lbl] = (per[lbl] || 0) + cnt;
          labelSet.add(lbl);
          const r = (baseClient.rates || []).find(rr => rr.label === lbl);
          if (r) amount += cnt * r.sell;
        }
      }
      const wd = _dowOf(date);
      return { date, dow: wd, per, amount };
    }).filter(r => Object.keys(r.per).length);
    const dailyLabels = [
      ...(baseClient.rates || []).filter(r => labelSet.has(r.label)).map(r => r.label),
      ...[...labelSet].filter(l => !(baseClient.rates || []).some(r => r.label === l)),
    ];

    const issuedRaw = issuedDates[inv.id] || inv.issued;
    return {
      clientObj, items, subtotal, tax, total, dailyRows, dailyLabels,
      period: `${fmtDate(bp.start)} 〜 ${fmtDate(bp.end)}`,
      issueDate: issuedRaw ? fmtDate(issuedRaw) : `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`,
      dueDate: fmtDate(inv.due),
    };
  };

  // 画面に表示中の正式請求書(.invoice-paper)を iframe 経由で印刷／PDF保存
  const printPaper = (inv) => {
    const paper = document.querySelector(".invoice-paper");
    if (!paper) { showToast("請求書が見つかりません", "error"); return; }
    const clone = paper.cloneNode(true);
    const old = document.getElementById("jt-print-iframe");
    if (old) old.remove();
    const iframe = document.createElement("iframe");
    iframe.id = "jt-print-iframe";
    iframe.style.cssText = "position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden;";
    document.body.appendChild(iframe);
    const doc = iframe.contentWindow.document;
    doc.open();
    doc.write(`<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>請求書 ${inv.id} - ${inv.client}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; color: #393443; font-size: 12px; line-height: 1.6; }
  table { border-collapse: collapse; width: 100%; }
  td, th { vertical-align: middle; }
  /* 改ページしても各表のヘッダを繰り返す／合計は末尾に1回だけ */
  thead { display: table-header-group; }
  tfoot { display: table-row-group; }
  /* 行・見出しブロックはページ途中で割らない */
  tr { break-inside: avoid; page-break-inside: avoid; }
  .jt-keep { break-inside: avoid; page-break-inside: avoid; }
  /* @page 側で余白を持たせる → 2ページ目以降も同じ余白になる */
  .invoice-paper { padding: 0 !important; }
  /* 日別明細が長い時は2ページ目の先頭から（1ページ目=正式請求書） */
  .jt-daily-section { break-inside: auto; }
  .jt-daily-section.jt-page2 { break-before: page; page-break-before: always; }
  .jt-invoice-footer { break-inside: avoid; page-break-inside: avoid; }
  @page { size: A4 portrait; margin: 14mm; }
</style></head><body>${clone.outerHTML}</body></html>`);
    doc.close();
    setTimeout(() => {
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e) { showToast("印刷に失敗: " + e.message, "error"); }
      setTimeout(() => iframe.remove(), 1500);
    }, 250);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{display:"inline-block",fontSize:11,fontWeight:700,letterSpacing:".08em",color:"var(--jt-accent)",background:"var(--jt-base)",padding:"6px 14px",borderRadius:20,marginBottom:11,boxShadow:"var(--jt-raised-sm)"}}>財務・請求管理</div>
          <div style={{ fontSize:30, fontWeight:700, letterSpacing:"-0.01em", color:"#393443" }}>請求管理</div>
        </div>
        <button onClick={()=>{ const ids=invoices.filter(i=>effStatus(i)==="未請求").map(i=>i.id); if(ids.length===0){ showToast("発行対象の請求書はありません"); return; } markIssued(ids); showToast(ids.length+"件の請求書を発行しました"); }} style={{ padding:"7px 16px", background:"var(--jt-accent-grad)", color:"#fff", fontWeight:700, border:"none", borderRadius:6, fontSize:13, cursor:"pointer", boxShadow:"var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)" }}>+ 請求書を一括作成</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:16 }}>
        {[
          { l:"未請求（発行前・税抜）",  v:fmt(summary.未請求), n:invoices.filter(i=>effStatus(i)==="未請求").length, c:"#A09AAB" },
          { l:"請求済（入金待ち・税抜）",v:fmt(summary.請求済), n:invoices.filter(i=>effStatus(i)==="請求済").length, c:"#7E6593" },
          { l:"入金遅延（税抜）",        v:fmt(summary.遅延),   n:invoices.filter(i=>effStatus(i)==="遅延").length,   c:"#B05A60" },
          { l:"入金済（累計・税抜）",    v:fmt(summary.入金済), n:invoices.filter(i=>effStatus(i)==="入金済").length,  c:"#6E9E78" },
        ].map(({ l,v,n,c })=>(
          <Card key={l} style={{ padding:"16px 20px" }}>
            <div style={{ fontSize:11, color:"#A09AAB", marginBottom:6 }}>{l}</div>
            <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.01em", color:c }}>{v}</div>
            <div style={{ fontSize:11, color:"#A09AAB", marginTop:4 }}>{n}件</div>
          </Card>
        ))}
      </div>
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {statuses.map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{ padding:"5px 14px", borderRadius:4, border:"none", background:filter===s?"var(--jt-base)":"var(--jt-base)", color:filter===s?"var(--jt-accent)":"var(--jt-text-sub)", fontSize:13, fontWeight:filter===s?600:400, cursor:"pointer", boxShadow:filter===s?"var(--jt-inset)":"var(--jt-raised-sm)" }}>{s}</button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:sel?"1fr 340px":"1fr", gap:16, alignItems:"start" }}>
        <Card>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"var(--jt-accent-lt)", borderBottom:"1px solid #DEDAE5" }}>
                {["請求番号","荷主","対象月","請求金額（税抜）","状態","支払期限","操作"].map(h=>(
                  <th key={h} style={{ padding:"9px 16px", textAlign:"left", color:"var(--jt-text-sub)", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {list.map((inv,i)=>(
                <tr key={i} onClick={()=>setSel(sel?.id===inv.id?null:inv)}
                  style={{ borderBottom:"1px solid #DEDAE5", cursor:"pointer", background:sel?.id===inv.id?"#E9E7EE":"transparent", transition:"background .1s" }}
                  onMouseEnter={e=>{ if(sel?.id!==inv.id) e.currentTarget.style.background="#EFEDF3"; }}
                  onMouseLeave={e=>{ if(sel?.id!==inv.id) e.currentTarget.style.background="transparent"; }}>
                  <td style={{ padding:"12px 16px", fontWeight:600, color:"var(--jt-accent)", fontSize:12 }}>{inv.id}</td>
                  <td style={{ padding:"12px 16px", fontWeight:500 }}>{inv.client}</td>
                  <td style={{ padding:"12px 16px", color:"#645F6E" }}>{inv.period}</td>
                  <td style={{ padding:"12px 16px", fontWeight:700 }}>{fmt(subtotalFor(inv))}</td>
                  <td style={{ padding:"12px 16px" }}>
                    <StatusBadge label={effStatus(inv)}/>
                  </td>
                  <td style={{ padding:"12px 16px", color:effStatus(inv)==="遅延"?"var(--jt-alert)":"var(--jt-text-sub)", fontWeight:effStatus(inv)==="遅延"?600:400 }}>{inv.due}</td>
                  <td style={{ padding:"12px 16px" }}>
                    <div style={{ display:"flex", gap:6 }} onClick={e=>e.stopPropagation()}>
                      {effStatus(inv)==="未請求" && (
                        <button onClick={()=>{ markIssued([inv.id]); showToast("請求書を発行しました"); }}
                          style={{ padding:"4px 10px", border:"none", borderRadius:4, background:"var(--jt-accent-grad)", color:"#fff", fontSize:11, fontWeight:700, cursor:"pointer", boxShadow:"var(--jt-raised-sm),inset 0 1px 0 rgba(255,255,255,.28)" }}>発行</button>
                      )}
                      {issuedSet.has(inv.id) && <span style={{ fontSize:11, color:"#6E9E78", fontWeight:600 }}>発行済</span>}
                      {effStatus(inv)==="遅延" && !remindedSet.has(inv.id) && (
                        <button onClick={()=>{ setRemindedSet(s=>new Set([...s,inv.id])); showToast("督促を送信しました"); }}
                          style={{ padding:"4px 10px", border:"none", borderRadius:4, background:"transparent", color:"var(--jt-alert)", fontSize:11, fontWeight:600, cursor:"pointer" }}>督促</button>
                      )}
                      {remindedSet.has(inv.id) && <span style={{ fontSize:11, color:"#B05A60", fontWeight:600 }}>督促送信済</span>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>

        {sel && (() => {
          const _baseClient = resolveClientByName(sel.client) || {};
          const _cov = contactOverrides[_baseClient.id] || {};
          const _nd = (v) => (v && v !== "—") ? v : undefined;
          const _clientObj = { ..._baseClient,
            address: _cov.address!==undefined ? _nd(_cov.address) : _nd(_baseClient.address),
            person:  _cov.person!==undefined  ? _nd(_cov.person)  : _nd(_baseClient.person||_baseClient.contact) };
          const _today = new Date();
          const _fmtDate = (d) => { const [y,m,dd]=d.split("-"); return `${y}年${parseInt(m)}月${parseInt(dd)}日`; };
          const _issuedRaw = issuedDates[sel.id] || sel.issued;
          const _issueDate = _issuedRaw ? _fmtDate(_issuedRaw) : `${_today.getFullYear()}年${_today.getMonth()+1}月${_today.getDate()}日`;
          const _items = lineItemsFor(sel);
          const _subtotal = subtotalFor(sel);
          const _tax = Math.round(_subtotal * 0.1);
          const _total = _subtotal + _tax;
          const _bp = periodOf(sel).bp;
          const _periodLabel = `${_fmtDate(_bp.start)} 〜 ${_fmtDate(_bp.end)}`;
          const _dm = invoiceModel(sel); // 日別明細(dailyRows/dailyLabels)を流用
          return (
          <Card style={{ padding:20 }} className="invoice-print">
            {/* 印刷時のみ表示する正式な請求書ヘッダ */}
            <div className="invoice-print-header" style={{ display:"none" }}>
              <div style={{ textAlign:"center", marginBottom:24 }}>
                <div style={{ fontSize:24, fontWeight:700, letterSpacing:8, borderBottom:"3px double #393443", display:"inline-block", padding:"4px 32px 8px" }}>請　求　書</div>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:18 }}>
                <div>
                  <div style={{ fontSize:14, marginBottom:8 }}>{_clientObj.name||sel.client} <span style={{ fontSize:12 }}>御中</span></div>
                  {_clientObj.address && <div style={{ fontSize:11, color:"#645F6E" }}>{_clientObj.address}</div>}
                  {_clientObj.person && <div style={{ fontSize:11, color:"#645F6E", marginTop:2 }}>ご担当: {_clientObj.person} 様</div>}
                  <div style={{ marginTop:12, fontSize:11 }}>下記の通りご請求申し上げます。</div>
                  <div style={{ marginTop:14, padding:"8px 14px", background:"var(--jt-base)", display:"inline-block" }}>
                    <span style={{ fontSize:11, color:"#645F6E" }}>合計金額（税込）</span><br/>
                    <span style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.01em" }}>¥{Number(_total).toLocaleString()}</span>
                  </div>
                </div>
                <div style={{ textAlign:"right", fontSize:11 }}>
                  <div>請求書番号: <b>{sel.id}</b></div>
                  <div>発行日: {_issueDate}</div>
                  <div>支払期限: {_fmtDate(sel.due)}</div>
                  <div>対象期間: {_periodLabel}</div>
                  <div style={{ marginTop:14, border:"1px solid #DEDAE5", padding:10, textAlign:"left", position:"relative", overflow:"visible", fontSize:10.5, lineHeight:1.55 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                      <JtLogo size={18} />
                      <div style={{ fontWeight:700, fontSize:12.5 }}>{COMPANY.name}</div>
                    </div>
                    <div>{COMPANY.zip}</div>
                    <div>{COMPANY.addr1}</div>
                    <div>{COMPANY.addr2}</div>
                    <div>TEL: {COMPANY.tel}　FAX: {COMPANY.fax}</div>
                    <div>登録番号: {COMPANY.invoiceNo}</div>
                  </div>
                </div>
              </div>
            </div>
            {/* 通常画面用ヘッダ（印刷時非表示） */}
            <div className="no-print" style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
              <div>
                <div style={{ fontSize:11, color:"var(--jt-text-mute)", marginBottom:3 }}>{sel.id}</div>
                <div style={{ fontSize:16, fontWeight:700 }}>{sel.client}</div>
                <div style={{ fontSize:12, color:"#645F6E", marginTop:2 }}>{sel.period} 分</div>
              </div>
              <button onClick={()=>setSel(null)} style={{ background:"none", border:"none", fontSize:18, color:"var(--jt-text-mute)", cursor:"pointer", lineHeight:1 }}>×</button>
            </div>

            <div className="no-print" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
              {[
                { l:"請求金額（税込）", v:fmt(_total), c:accent },
                { l:"状態", v:<StatusBadge label={effStatus(sel)}/>, c:null },
                { l:"対象期間", v:_periodLabel, c:"#645F6E" },
                { l:"支払期限", v:sel.due, c:effStatus(sel)==="遅延"?"#B05A60":"#645F6E" },
              ].map(({ l,v,c })=>(
                <div key={l} style={{ background:"#EDEBF1", borderRadius:6, padding:"10px 12px" }}>
                  <div style={{ fontSize:11, color:"#A09AAB", marginBottom:4 }}>{l}</div>
                  <div style={{ fontSize:13, fontWeight:600, color:c||"var(--jt-text)" }}>{v}</div>
                </div>
              ))}
            </div>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"var(--jt-text-sub)" }}>請求明細</div>
              <div style={{ fontSize:10.5, color:"var(--jt-text-sub)" }}>対象期間: {_periodLabel}</div>
            </div>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, marginBottom:14 }}>
              <thead>
