    ]},
  ];

  const iField = (f) => {
    const base = { width:"100%", padding:"9px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none", background:"#fff" };
    if (f.t==="textarea") return <textarea value={form[f.k]||""} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{...base,resize:"vertical",minHeight:80}}/>;
    if (f.t==="select")   return <select value={form[f.k]||""} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={base}>{(f.opts||[]).map(o=><option key={o}>{o}</option>)}</select>;
    if (f.t==="file")     return <input type="file" style={{ fontSize:13 }}/>;
    return <input type={f.t||"text"} value={form[f.k]||""} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={base}/>;
  };

  if (ok) return (
    <div style={{ textAlign:"center", paddingTop:80 }}>
      <div style={{ width:64, height:64, borderRadius:"50%", background:"#dcfce7", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 20px" }}>
        <Ic name="check" size={28} color="#16a34a" strokeWidth={2.5}/>
      </div>
      <div style={{ fontSize:18, fontWeight:700, marginBottom:8 }}>申請を送信しました</div>
      <div style={{ fontSize:13, color:"#6b7280", marginBottom:6 }}>担当者が確認後、承認・却下の通知が届きます</div>
      <div style={{ fontSize:12, color:"#9ca3af", marginBottom:28 }}>通常2〜3営業日以内に処理されます</div>
      <button onClick={()=>{ setOk(false); setSel(null); setForm({}); }} style={{ padding:"10px 28px", background:accent, color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:14, cursor:"pointer" }}>申請一覧に戻る</button>
    </div>
  );

  if (sel) return (
    <div>
      <button onClick={()=>{ setSel(null); setForm({}); }} style={{ background:"none", border:"none", fontSize:13, color:"#6b7280", marginBottom:20, cursor:"pointer" }}>← 申請種類を選び直す</button>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 280px", gap:20, alignItems:"start" }}>
        <Card style={{ padding:28 }}>
          <div style={{ fontWeight:700, fontSize:16, marginBottom:24, display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:8, background:accent+"14", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Ic name={sel.icon} size={18} color={accent}/>
            </div>
            {sel.name}
          </div>
          {sel.fields.map(f=>(
            <div key={f.k} style={{ marginBottom:18 }}>
              <label style={{ display:"flex", alignItems:"center", gap:4, fontSize:12.5, fontWeight:600, color:"#374151", marginBottom:6 }}>
                {f.l}
                {f.required!==false && <span style={{ color:"#dc2626", fontSize:11 }}>*</span>}
              </label>
              {iField(f)}
            </div>
          ))}
          <button onClick={()=>{
              const rec = { id:"A-"+String(Date.now()).slice(-4), type:sel.name, date:new Date().toISOString().slice(0,10), status:"承認待ち", approver:form.approver||"—" };
              setSubmitted(s=>[rec, ...s]);
              setOk(true);
            }} style={{ width:"100%", padding:13, background:accent, color:"#fff", border:"none", borderRadius:6, fontWeight:700, fontSize:14, cursor:"pointer", marginTop:8 }}>申請を送信する</button>
        </Card>
        <Card style={{ padding:20 }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:12 }}>申請フロー</div>
          {["申請送信","承認者へ通知","承認・却下","結果をお知らせ"].map((s,i)=>(
            <div key={i} style={{ display:"flex", gap:10, marginBottom:i<3?12:0 }}>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                <div style={{ width:22, height:22, borderRadius:"50%", background:i===0?accent:accent+"30", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:i===0?"#fff":accent, flexShrink:0 }}>{i+1}</div>
                {i<3 && <div style={{ width:1, height:20, background:"#e5e7eb", margin:"4px 0" }}/>}
              </div>
              <div style={{ paddingTop:2, fontSize:12.5, color: i===0?"#111827":"#6b7280", fontWeight:i===0?600:400 }}>{s}</div>
            </div>
          ))}
          <div style={{ borderTop:"1px solid #94a3b8", marginTop:16, paddingTop:12 }}>
            <div style={{ fontSize:11.5, color:"#9ca3af", lineHeight:1.7 }}>通常2〜3営業日<br/>緊急の場合は運行管理（内線301）へ直接連絡してください</div>
          </div>
        </Card>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:700, marginBottom:20 }}>各種申請</div>

      {/* 申請種別 */}
      <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:12 }}>申請種別を選択</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:28 }}>
        {types.map(a=>(
          <button key={a.name} onClick={()=>setSel(a)}
            style={{ background:"#fff", border:"1.5px solid #e5e7eb", borderRadius:8, padding:"18px 16px", textAlign:"left", transition:"all .15s", cursor:"pointer" }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=accent; e.currentTarget.style.background=accent+"08"; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor="#e5e7eb"; e.currentTarget.style.background="#fff"; }}>
            <div style={{ width:32, height:32, borderRadius:8, background:accent+"14", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:10 }}>
              <Ic name={a.icon} size={16} color={accent}/>
            </div>
            <div style={{ fontWeight:600, fontSize:13, lineHeight:1.4 }}>{a.name}</div>
          </button>
        ))}
      </div>

      {/* 申請履歴 */}
      <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:12 }}>申請履歴</div>
      <Card>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"#f9fafb", borderBottom:"1px solid #94a3b8" }}>
              {["申請番号","申請種別","申請日","承認者","ステータス",""].map(h=>(
                <th key={h} style={{ padding:"9px 16px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:11.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[...submitted, ...pendingList].map((p,i)=>{
              const sc=stC(p.status);
              return (
                <tr key={i} style={{ borderBottom:"1px solid #94a3b8" }}>
                  <td style={{ padding:"11px 16px", color:"#6b7280", fontSize:12 }}>{p.id}</td>
                  <td style={{ padding:"11px 16px", fontWeight:600 }}>{p.type}</td>
                  <td style={{ padding:"11px 16px", color:"#6b7280" }}>{p.date}</td>
                  <td style={{ padding:"11px 16px", color:"#6b7280" }}>{p.approver}</td>
                  <td style={{ padding:"11px 16px" }}>
                    <span style={{ padding:"3px 8px", borderRadius:4, fontSize:11.5, fontWeight:600, background:sc.bg, color:sc.c }}>{p.status}</span>
                  </td>
                  <td style={{ padding:"11px 16px" }}>
                    <button onClick={()=>alert(p.id+" "+p.type+" / 状態: "+p.status+" / 承認者: "+p.approver)} style={{ padding:"4px 10px", border:"1px solid #94a3b8", borderRadius:4, background:"#fff", fontSize:11, color:"#6b7280", cursor:"pointer" }}>詳細</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

// ── 共有トースト（保存フィードバックを全画面で統一）──────────────────────────
// どこからでも showToast("保存しました") で通知。<ToastHost/> を App 直下に1つ置く。
function showToast(message, type = "success") {
  window.dispatchEvent(new CustomEvent("jt-toast", { detail: { message, type } }));
}
const ToastHost = () => {
  const [toasts, setToasts] = React.useState([]);
  React.useEffect(() => {
    const onToast = (e) => {
      const { message, type } = e.detail || {};
      if (!message) return;
      const id = Date.now() + Math.random();
      setToasts(prev => [...prev, { id, message, type: type || "success" }]);
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2400);
    };
    window.addEventListener("jt-toast", onToast);
    return () => window.removeEventListener("jt-toast", onToast);
  }, []);
  if (!toasts.length) return null;
  return (
    <div style={{ position:"fixed", bottom:24, right:24, zIndex:99999, display:"flex", flexDirection:"column", gap:8, alignItems:"flex-end", pointerEvents:"none" }}>
      <style>{`@keyframes jtToastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}`}</style>
      {toasts.map(t => (
        <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, background: t.type==="error" ? "#fef2f2" : "#0f172a", color: t.type==="error" ? "#b91c1c" : "#fff", padding:"10px 16px", borderRadius:8, fontSize:13, fontWeight:600, boxShadow:"0 6px 20px rgba(0,0,0,.18)", animation:"jtToastIn .18s ease-out" }}>
          <Ic name={t.type==="error"?"alert":"check"} size={15} color={t.type==="error"?"#dc2626":"#34d399"} strokeWidth={2.5}/>
          {t.message}
        </div>
      ))}
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const { theme } = useTheme();
  const [page, setPage] = React.useState("dashboard");
  const accent = theme.accent;
  const mainScrollRef = React.useRef(null);
  // お知らせ未読件数（AnnouncePage と localStorage を共有）
  const [announceReadIds] = useLocalStorage("jt_announce_read_ids", announces.filter(a=>!a.unread).map(a=>a.id));
  const [extraAnnounces] = useLocalStorage("jt_extra_announces", []);
  const allAnnounces = [...announces, ...extraAnnounces];
  const announceUnread = allAnnounces.filter(a => !announceReadIds.includes(a.id)).length;
  // ページ切替時にメインコンテンツのスクロールを先頭へ戻す
  React.useEffect(() => {
    if (mainScrollRef.current) mainScrollRef.current.scrollTo({ top: 0, left: 0, behavior: "auto" });
  }, [page]);
  // 起動時に Supabase の jt_daily_entries を読み込み、jt_daily_edits (localStorage) へ同期
  // → 別端末で入力したデータがこの端末の収支管理/ダッシュボード等に反映される
  React.useEffect(() => {
    if (!window.sb) return;
    (async () => {
      try {
        const { data, error } = await window.sb.from("jt_daily_entries").select("*");
        if (error || !data || !data.length) return;
        // Supabase rows → nested structure {cid: {date: {did: {lbl: "value"}}}}
        const sb = {};
        data.forEach(r => {
          if (!sb[r.client_id]) sb[r.client_id] = {};
          if (!sb[r.client_id][r.entry_date]) sb[r.client_id][r.entry_date] = {};
          if (!sb[r.client_id][r.entry_date][r.driver_id]) sb[r.client_id][r.entry_date][r.driver_id] = {};
          sb[r.client_id][r.entry_date][r.driver_id][r.rate_label] = String(r.value);
        });
        // 既存 localStorage edits とマージ（local 優先）
        const existing = (()=>{ try { return JSON.parse(localStorage.getItem("jt_daily_edits")||"{}"); } catch { return {}; } })();
        const merged = JSON.parse(JSON.stringify(sb));
        Object.keys(existing).forEach(cid => {
          if (!merged[cid]) merged[cid] = {};
          Object.keys(existing[cid]).forEach(d => {
            if (!merged[cid][d]) merged[cid][d] = {};
            Object.keys(existing[cid][d]).forEach(did => {
              if (!merged[cid][d][did]) merged[cid][d][did] = {};
              Object.assign(merged[cid][d][did], existing[cid][d][did]);
            });
          });
        });
        localStorage.setItem("jt_daily_edits", JSON.stringify(merged));
        // 他コンポーネントが useLocalStorage で購読しているので change イベントで再描画を促す
        window.dispatchEvent(new CustomEvent("jt-ls-change", { detail: { key: "jt_daily_edits", val: merged } }));
        console.log("[Supabase] jt_daily_entries synced:", data.length, "rows →", Object.keys(merged).length, "clients");
      } catch (e) { console.warn("[Supabase] sync failed:", e); }
    })();
  }, []);
  // 起動時に Supabase の jt_contact_overrides（請求先情報）を localStorage へ同期
  // → 単価マスタで編集した請求先が他端末・請求管理ページにも反映される
  React.useEffect(() => {
    if (!window.sb) return;
    (async () => {
      try {
        const { data, error } = await window.sb.from("jt_contact_overrides").select("*");
        if (error || !data || !data.length) return;
        const o = {};
        data.forEach(r => { o[r.client_id] = { person:r.person||"", tel:r.tel||"", address:r.address||"" }; });
        const existing = (()=>{ try { return JSON.parse(localStorage.getItem("jt_contact_overrides")||"{}"); } catch { return {}; } })();
        const merged = { ...o, ...existing }; // local 優先（未同期のローカル編集を保持）
        localStorage.setItem("jt_contact_overrides", JSON.stringify(merged));
        window.dispatchEvent(new CustomEvent("jt-ls-change", { detail: { key: "jt_contact_overrides", val: merged } }));
        console.log("[Supabase] jt_contact_overrides synced:", data.length);
      } catch (e) { console.warn("[Supabase] contact sync failed:", e); }
    })();
  }, []);
  const pp = { accent, setPage };

  const pageMap = {
    dashboard:    <Dashboard {...pp}/>,
    todo:         <TodoPage {...pp}/>,
    announce:     <AnnouncePage {...pp}/>,
    pl:           <PLPage {...pp}/>,
    invoice:      <InvoicePage {...pp}/>,
    driverfinance:<DriverFinancePage {...pp}/>,
    ratemaster:   <RateMasterPage {...pp}/>,
    daily:        <DailyInputPage {...pp}/>,
    parentclients:<ParentClientsPage {...pp}/>,
    clients:      <ClientPage {...pp}/>,
    drivers:      <DriversPage {...pp}/>,
    dispatch:     <DispatchPage {...pp}/>,
    vehicles:     <VehiclesPage {...pp}/>,
    attendance:   <AttendancePage {...pp}/>,
    apply:        <ApplyPage {...pp}/>,
    safety:       <SafetyPage {...pp}/>,
    faq:          <FAQPage {...pp}/>,
    manual:       <ManualPage {...pp}/>,
    contact:      <ContactPage {...pp}/>,
    appearance:   <AppearanceSettings/>,
  };

  return (
    <div style={{ display:"flex", height:"100vh", background:theme.bg }}>
      {/* Sidebar */}
      <div style={{ width:220, background:theme.base, borderRight:`1px solid ${theme.line}`, display:"flex", flexDirection:"column", flexShrink:0 }}>
        <div style={{ padding:"18px 20px 14px", borderBottom:`1px solid ${theme.line}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:32, height:32, background:accent, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <Ic name="truck" size={16} color="#fff" strokeWidth={2}/>
            </div>
            <div>
              <div style={{ fontWeight:800, fontSize:14, color:theme.text, lineHeight:1.2, letterSpacing:-0.3 }}>J transport</div>
              <div style={{ fontSize:10, color:theme.textMute, marginTop:1 }}>社内ポータル</div>
            </div>
          </div>
        </div>
        <nav style={{ flex:1, padding:"8px 8px", overflowY:"auto" }}>
          {navGroups.map((group,gi)=>(
            <div key={gi}>
              {group.label && <div style={{ fontSize:10, fontWeight:700, color:theme.textMute, letterSpacing:0.8, padding:"10px 10px 4px", textTransform:"uppercase" }}>{group.label}</div>}
              {group.items.map(item=>{
                const active=page===item.id;
                return (
                  <button key={item.id} onClick={()=>setPage(item.id)}
                    style={{ width:"100%", display:"flex", alignItems:"center", gap:9, padding:"7px 10px", borderRadius:6, border:"none", background:active?theme.accentLt:"transparent", color:active?accent:theme.text, cursor:"pointer", fontFamily:"inherit", fontSize:12.5, fontWeight:active?600:400, marginBottom:1, transition:"all .1s", textAlign:"left" }}
                    onMouseEnter={e=>{ if(!active) e.currentTarget.style.background=theme.bg; }}
                    onMouseLeave={e=>{ if(!active) e.currentTarget.style.background="transparent"; }}>
                    <Ic name={item.icon} size={14} color={active?accent:theme.textSub}/>
                    <span style={{ flex:1 }}>{item.label}</span>
                    {item.id==="announce" && announceUnread>0 && <span style={{ background:theme.alert, color:"#fff", borderRadius:10, fontSize:10, padding:"1px 6px", fontWeight:700 }}>{announceUnread}</span>}
                    {item.badge && item.id!=="announce" && <span style={{ background:theme.alert, color:"#fff", borderRadius:10, fontSize:10, padding:"1px 6px", fontWeight:700 }}>{item.badge}</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div style={{ padding:"12px 16px", borderTop:`1px solid ${theme.line}`, display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:28, height:28, borderRadius:"50%", background:theme.accentLt, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:accent, flexShrink:0 }}>{tweaks.userName[0]}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12.5, fontWeight:600, color:theme.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tweaks.userName}</div>
            <div style={{ fontSize:11, color:theme.textMute }}>{tweaks.dept}</div>
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        <div style={{ background:theme.base, borderBottom:`1px solid ${theme.line}`, height:48, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px", flexShrink:0 }}>
          <div style={{ fontSize:12.5, color:theme.textMute }}>{navItems.find(n=>n.id===page)?.label}</div>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <button onClick={()=>setPage("announce")} title="お知らせ" style={{ position:"relative", background:"transparent", border:"none", cursor:"pointer", padding:0 }}>
              <Ic name="bell" size={17} color={theme.textSub}/>
              {announceUnread>0 && (
                <div style={{ position:"absolute", top:-3, right:-3, minWidth:14, height:14, padding:"0 3px", borderRadius:7, background:theme.alert, fontSize:8.5, fontWeight:700, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>{announceUnread}</div>
              )}
            </button>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:26, height:26, borderRadius:"50%", background:theme.accentLt, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:accent }}>{tweaks.userName[0]}</div>
              <span style={{ fontSize:13, fontWeight:500, color:theme.text }}>{tweaks.userName}</span>
            </div>
          </div>
        </div>
        <div ref={mainScrollRef} style={{ flex:1, overflowY:"auto", padding:"22px 28px" }}>
          {pageMap[page] || <div style={{ color:theme.textMute }}>ページが見つかりません</div>}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakColor id="accent" label="アクセントカラー"/>
        <TweakText id="userName" label="ユーザー名"/>
        <TweakText id="dept" label="部署"/>
      </TweaksPanel>

      <ToastHost/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<ThemeProvider><App/></ThemeProvider>);
</script>
