// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// localStorage-backed state — persists across reloads. Drop-in replacement for React.useState.
function useLocalStorage(key, initial) {
  const [val, setVal] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s != null ? JSON.parse(s) : initial; }
    catch (e) { return initial; }
  });
  React.useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }, [key, val]);
  return [val, setVal];
}

    承認済:["#f0fdf4","#16a34a"],

const PLPage = ({ accent }) => {
  const [period, setPeriod] = React.useState("year"); // "year" | "half"
  const margin = totalSell > 0 ? (totalProfit/totalSell*100).toFixed(1) : 0;

  const allMonths = Array.from({length:12}, (_,i)=>{
    const mk = "2025-"+String(i+1).padStart(2,"0");
    let sell=0, pay=0;
    Object.keys(monthlyHistory).forEach(cid=>{ const h=monthlyHistory[cid][mk]; if(h){ sell+=h.s; pay+=h.p; } });
    return { m:"25/"+(i+1), sell, pay, current: mk===REF_MONTH };
  });
  const curIdx = Math.max(0, allMonths.findIndex(d=>d.current));
  const prevSell = curIdx>0 ? allMonths[curIdx-1].sell : totalSell;
  const prevProfit = curIdx>0 ? (allMonths[curIdx-1].sell - allMonths[curIdx-1].pay) : totalProfit;
  const barData = period==="half" ? allMonths.slice(6) : allMonths;
  const maxBar = Math.max(...barData.map(d=>d.sell), 1);
  const ytdSell   = allMonths.reduce((s,d)=>s+d.sell,0);
  const ytdPay    = allMonths.reduce((s,d)=>s+d.pay,0);
  const ytdProfit = ytdSell - ytdPay;

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700 }}>収支管理</div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>全荷主合算・速報値</div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <div style={{ fontSize:12, color:"#9ca3af" }}>グラフ表示：</div>
          {[{v:"half",l:"直近6ヶ月"},{v:"year",l:"12ヶ月"}].map(opt=>(
            <button key={opt.v} onClick={()=>setPeriod(opt.v)}
              style={{ padding:"5px 12px", borderRadius:4, border:`1.5px solid ${period===opt.v?accent:"#e5e7eb"}`, background:period===opt.v?accent:"#fff", color:period===opt.v?"#fff":"#374151", fontSize:12, fontWeight:period===opt.v?600:400, cursor:"pointer" }}>
              {opt.l}
            </button>
          ))}
        </div>
      </div>

      {/* KPI */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:14 }}>
        {[
          { l:"今月売上",   v:fmt(totalSell),   sub:`前月比 +${((totalSell/prevSell-1)*100).toFixed(1)}%`, c:accent, up:true },
          { l:"今月支払",   v:fmt(totalPay),    sub:`原価率 ${(totalPay/totalSell*100).toFixed(1)}%`,       c:"#d97706", up:null },
          { l:"今月粗利",   v:fmt(totalProfit), sub:`前月比 +${((totalProfit/prevProfit-1)*100).toFixed(1)}%`, c:"#16a34a", up:true },
          { l:"今月粗利率", v:margin+"%",       sub:`前月 ${(prevProfit/prevSell*100).toFixed(1)}%`,        c:"#374151", up:null },
        ].map(({ l,v,sub,c,up })=>(
          <Card key={l} style={{ padding:"16px 20px" }}>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6 }}>{l}</div>
            <div style={{ fontSize:22, fontWeight:700, color:c, lineHeight:1 }}>{v}</div>
            <div style={{ fontSize:11.5, color: up===true?"#16a34a":up===false?"#d97706":"#9ca3af", marginTop:5, display:"flex", alignItems:"center", gap:3 }}>
              {up===true && <Ic name="trending" size={11} color="#16a34a"/>}
              {sub}
            </div>
          </Card>
        ))}
      </div>

      {/* YTD サマリー */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:14 }}>
        {[
          { l:"2025年度 累計売上", v:fmt(ytdSell),   sub:"1月〜12月（12ヶ月）", c:accent },
          { l:"2025年度 累計支払", v:fmt(ytdPay),    sub:`原価率 ${(ytdPay/ytdSell*100).toFixed(1)}%`, c:"#d97706" },
          { l:"2025年度 累計粗利", v:fmt(ytdProfit), sub:`粗利率 ${(ytdProfit/ytdSell*100).toFixed(1)}%`, c:"#16a34a" },
        ].map(({ l,v,sub,c })=>(
          <Card key={l} style={{ padding:"14px 18px", borderLeft:`3px solid ${c}` }}>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:4 }}>{l}</div>
            <div style={{ fontSize:18, fontWeight:700, color:c }}>{v}</div>
            <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>{sub}</div>
          </Card>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:16, marginBottom:16 }}>
        {/* 月次推移グラフ */}
        <Card>
          <SH title={`月次収支推移（${period==="half"?"直近6ヶ月":"12ヶ月"}）`}/>
          <div style={{ padding:"20px 24px 16px" }}>
            <div style={{ display:"flex", alignItems:"flex-end", gap:period==="year"?5:12, height:160, marginBottom:10 }}>
              {barData.map((d,i)=>(
                <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", height:"100%", justifyContent:"flex-end", alignItems:"center" }}>
                  {d.current && (
                    <div style={{ fontSize:10, color:accent, fontWeight:700, marginBottom:2, whiteSpace:"nowrap" }}>
                      {fmt(d.sell/10000)}万
                    </div>
                  )}
                  <div style={{ width:"100%", position:"relative", height:`${(d.sell/maxBar)*100}%`, minHeight:4 }}>
                    <div style={{ position:"absolute", bottom:0, width:"100%", height:`${(d.sell-d.pay)/d.sell*100}%`, background:d.current?"#dcfce7":"#e8f5e9", borderRadius:"3px 3px 0 0" }}/>
                    <div style={{ position:"absolute", bottom:`${(d.sell-d.pay)/d.sell*100}%`, width:"100%", height:`${d.pay/d.sell*100}%`, background:d.current?accent+"60":"#e5e7eb" }}/>
                  </div>
                  <div style={{ fontSize:9.5, color:d.current?accent:"#9ca3af", marginTop:5, fontWeight:d.current?700:400 }}>{d.m}</div>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", gap:16, fontSize:11, color:"#6b7280", borderTop:"1px solid #f1f3f5", paddingTop:12 }}>
              <span style={{ display:"flex", gap:4, alignItems:"center" }}><span style={{ width:10, height:10, background:"#dcfce7", border:"1px solid #16a34a", borderRadius:2, display:"inline-block" }}/> 粗利</span>
              <span style={{ display:"flex", gap:4, alignItems:"center" }}><span style={{ width:10, height:10, background:"#e5e7eb", borderRadius:2, display:"inline-block" }}/> 支払</span>
              <span style={{ display:"flex", gap:4, alignItems:"center" }}><span style={{ width:10, height:10, background:accent+"60", borderRadius:2, display:"inline-block" }}/> 当月</span>
            </div>
          </div>
        </Card>

        {/* 粗利率ランキング */}
        <Card>
          <SH title="荷主別 粗利率"/>
          <div style={{ padding:"12px 20px" }}>
            {[...monthlyActuals].filter(r=>r.sell>0).sort((a,b)=>(b.profit/b.sell)-(a.profit/a.sell)).map((r,i)=>{
              const rate = r.sell>0?(r.profit/r.sell*100).toFixed(1):0;
              const c = clients.find(c=>c.name===r.name);
              return (
                <div key={i} style={{ marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4 }}>
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      <span style={{ fontSize:11, color:"#9ca3af", width:16 }}>{i+1}</span>
                      <span style={{ fontWeight:500 }}>{r.name}</span>
                      {c && <StatusBadge label={c.billing.replace("（2区分）","").replace("（3区分）","")}/>}
                    </div>
                    <span style={{ fontWeight:700, color: Number(rate)>=30?"#16a34a":Number(rate)>=20?accent:"#d97706" }}>{rate}%</span>
                  </div>
                  <div style={{ height:4, background:"#f1f3f5", borderRadius:2 }}>
                    <div style={{ width:`${Math.min(Number(rate)*2,100)}%`, height:"100%", background: Number(rate)>=30?"#16a34a":Number(rate)>=20?accent:"#d97706", borderRadius:2 }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* 荷主別 収支一覧 */}
      <Card>
        <SH title="荷主別 月次収支一覧"/>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"#f9fafb", borderBottom:"1px solid #e5e7eb" }}>
              {["荷主","請求体系","売上","支払（ドライバー費）","粗利","粗利率","構成比"].map(h=>(
                <th key={h} style={{ padding:"9px 16px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[...monthlyActuals].filter(r=>r.sell>0).sort((a,b)=>b.sell-a.sell).map((r,i)=>{
              const rate = r.sell>0?(r.profit/r.sell*100).toFixed(1):0;
              const pct  = (r.sell/totalSell*100).toFixed(1);
              const c = clients.find(c=>c.name===r.name);
              return (
                <tr key={i} style={{ borderBottom:"1px solid #f1f3f5" }}
                  onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"12px 16px", fontWeight:700 }}>{r.name}</td>
                  <td style={{ padding:"12px 16px" }}>{c && <StatusBadge label={c.billing.replace("（2区分）","").replace("（3区分）","")}/>}</td>

                  <td style={{ padding:"12px 16px", color:"#374151" }}>{fmt(r.pay)}</td>
                  <td style={{ padding:"12px 16px", fontWeight:700, color:"#16a34a" }}>{fmt(r.profit)}</td>
                  <td style={{ padding:"12px 16px", fontWeight:600, color:Number(rate)>=30?"#16a34a":Number(rate)>=20?accent:"#d97706" }}>{rate}%</td>
                  <td style={{ padding:"12px 16px" }}>

                        <div style={{ width:`${pct}%`, height:"100%", background:accent, borderRadius:2 }}/>

                      <span style={{ fontSize:11, color:"#6b7280" }}>{pct}%</span>
                    </div>
                  </td>

              <td colSpan={2} style={{ padding:"12px 16px", fontWeight:700 }}>合計</td>
              <td style={{ padding:"12px 16px", fontWeight:700, color:accent }}>{fmt(totalSell)}</td>
              <td style={{ padding:"12px 16px", fontWeight:700 }}>{fmt(totalPay)}</td>
              <td style={{ padding:"12px 16px", fontWeight:700, color:"#16a34a" }}>{fmt(totalProfit)}</td>
              <td style={{ padding:"12px 16px", fontWeight:700 }}>{margin}%</td>
              <td style={{ padding:"12px 16px", color:"#9ca3af" }}>100%</td>

                    style={{ padding:"9px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none" }}/>

                    </label>
                    <label style={{ flex:1, display:"flex", flexDirection:"column", gap:5 }}>

                    <input value={form.pay} onChange={e=>setForm({ ...form, pay:e.target.value })} type="number" placeholder="0"

            </div>

            <div style={{ display:"flex", gap:10, marginTop:24 }}>
              <button onClick={()=>{
                  const code = form.code.trim();

                  if (!name) { alert("荷主名を入力してください"); return; }
                  if (allClients.some(c => c.id === code)) { alert("荷主コード「" + code + "」は既に使われています"); return; }
                  const newClient = {
                    id: code,
                    name,
                    area: form.area.trim() || "—",
                    billing: form.billing,
                    billingCycle: form.billingCycle.trim() || "—",
                    rates: [{ label: form.rateLabel.trim() || "配完", sell: Number(form.sell)||0, pay: Number(form.pay)||0 }],
                    drivers: [],
                    monthlyVol: {},
                    person: form.person.trim() || "—",
                    tel: form.tel.trim() || "—",
                    address: form.address.trim() || "—",
                    contact: form.person.trim() || "—",

            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── ドライバー別収支 ───────────────────────────────────────────────────────
const DriverFinancePage = ({ accent }) => {
  const [sel, setSel] = React.useState(null);
  const [slipDriver, setSlipDriver] = React.useState(null);

  // ドライバー別に荷主から収支計算
  const driverSummary = drivers.map(d => {
    let totalSellD = 0, totalPayD = 0;
    const breakdown = [];
    clients.forEach(c => {
      if (!c.drivers.includes(d.id)) return;
      const act = monthlyActuals.find(r=>r.name===c.name);
      if (!act) return;
      // 担当ドライバー数で按分
      const driverCount = c.drivers.length;
      const share = 1 / driverCount;
      const s = Math.round(act.sell * share);
      const p = Math.round(act.pay  * share);
      totalSellD += s;
      totalPayD  += p;
      breakdown.push({ client: c.name, billing: c.billing, sell: s, pay: p, profit: s - p });
    });
    return { ...d, totalSell: totalSellD, totalPay: totalPayD, totalProfit: totalSellD - totalPayD, breakdown };
  });

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:700, marginBottom:4 }}>ドライバー別収支</div>
      <div style={{ fontSize:12, color:"#9ca3af", marginBottom:20 }}>2025年4月 速報（担当荷主の実績按分）</div>

      <div style={{ display:"grid", gridTemplateColumns: sel?"1fr 360px":"1fr", gap:16 }}>
        <Card>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#f9fafb", borderBottom:"1px solid #e5e7eb" }}>
                {["ドライバー","雇用","担当荷主数","売上按分","支払按分","粗利按分","ステータス"].map(h=>(
                  <th key={h} style={{ padding:"9px 14px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {driverSummary.map((d,i)=>(
                <tr key={i} onClick={()=>setSel(sel?.id===d.id?null:d)}
                  style={{ borderBottom:"1px solid #f1f3f5", cursor:"pointer", background:sel?.id===d.id?"#f0f9ff":"transparent", transition:"background .1s" }}>
                  <td style={{ padding:"12px 14px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <Avatar name={d.name} size={28} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                      <span style={{ fontWeight:600 }}>{d.name}</span>
                    </div>
                  </td>
                  <td style={{ padding:"12px 14px" }}><StatusBadge label={d.type}/></td>
                  <td style={{ padding:"12px 14px" }}>{d.breakdown.length}社</td>
                  <td style={{ padding:"12px 14px", fontWeight:700, color:accent }}>{d.totalSell>0?fmt(d.totalSell):"—"}</td>
                  <td style={{ padding:"12px 14px" }}>{d.totalPay>0?fmt(d.totalPay):"—"}</td>

// ── 請求管理 ───────────────────────────────────────────────────────────────
const InvoicePage = ({ accent }) => {
  const [filter, setFilter] = React.useState("すべて");
  const [sel, setSel] = React.useState(null);
  const [issuedArr, setIssuedArr] = useLocalStorage("jt_issued", []);
  const [remindedArr, setRemindedArr] = useLocalStorage("jt_reminded", []);
  const issuedSet = new Set(issuedArr);
  const remindedSet = new Set(remindedArr);
  const setIssuedSet = (fn) => setIssuedArr(prev => Array.from(fn(new Set(prev))));
  const setRemindedSet = (fn) => setRemindedArr(prev => Array.from(fn(new Set(prev))));

  const statuses = ["すべて","未請求","請求済","入金済","遅延"];
  const list = filter==="すべて"?invoices:invoices.filter(i=>i.status===filter);
  const summary = {
    未請求: invoices.filter(i=>i.status==="未請求").reduce((s,i)=>s+i.amount,0),
    請求済: invoices.filter(i=>i.status==="請求済").reduce((s,i)=>s+i.amount,0),
    遅延:   invoices.filter(i=>i.status==="遅延").reduce((s,i)=>s+i.amount,0),
    入金済: invoices.filter(i=>i.status==="入金済").reduce((s,i)=>s+i.amount,0),
  };

  const buildLineItems = (inv) => {
    const c = clients.find(c=>c.name===inv.client);
    if (!c) return [];
    if (c.billing.includes("固定")) {
      const wdays = 22;
      return [
        { label:c.rates[0]?.label||"固定日額", qty:wdays, unit:"日", unitPrice:c.rates[0]?.sell||0, amount:c.rates[0]?.sell*wdays||0 },
        ...(c.rates[1]?[{ label:c.rates[1].label, qty:Math.round(inv.amount*0.1/c.rates[1].sell)||1, unit:"個", unitPrice:c.rates[1].sell, amount:Math.round(inv.amount*0.1) }]:[]),
      ];
    }
    const act = monthlyActuals.find(r=>r.name===inv.client);
    if (!act) return c.rates.filter(r=>r.sell>0).map(r=>({ label:r.label, qty:"—", unit:"個", unitPrice:r.sell, amount:"—" }));
    const totalRateSell = c.rates.filter(r=>r.sell>0).reduce((s,r)=>s+r.sell,0)||1;
    return c.rates.filter(r=>r.sell>0).map(r=>{
      const share = r.sell/totalRateSell;
      const est = Math.round(act.sell*share);
      const qty = r.sell>0?Math.round(est/r.sell):0;
      return { label:r.label, qty, unit:"個", unitPrice:r.sell, amount:est };
    });
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div style={{ fontSize:20, fontWeight:700 }}>請求管理</div>
        <button onClick={()=>{ const ids=invoices.filter(i=>i.status==="未請求").map(i=>i.id); setIssuedSet(s=>new Set([...s,...ids])); alert(ids.length+"件の請求書を発行しました"); }} style={{ padding:"7px 16px", background:accent, color:"#fff", border:"none", borderRadius:6, fontSize:13, fontWeight:600, cursor:"pointer" }}>+ 請求書を一括作成</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:16 }}>
        {[
          { l:"未請求（発行前）",  v:fmt(summary.未請求), n:invoices.filter(i=>i.status==="未請求").length, c:"#64748b" },
          { l:"請求済（入金待ち）",v:fmt(summary.請求済), n:invoices.filter(i=>i.status==="請求済").length, c:accent },
          { l:"入金遅延",          v:fmt(summary.遅延),   n:invoices.filter(i=>i.status==="遅延").length,   c:"#dc2626" },
          { l:"入金済（今月）",    v:fmt(summary.入金済), n:invoices.filter(i=>i.status==="入金済").length,  c:"#16a34a" },
        ].map(({ l,v,n,c })=>(
          <Card key={l} style={{ padding:"16px 20px" }}>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6 }}>{l}</div>
            <div style={{ fontSize:20, fontWeight:700, color:c }}>{v}</div>
            <div style={{ fontSize:11, color:"#9ca3af", marginTop:4 }}>{n}件</div>
          </Card>
        ))}
      </div>
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {statuses.map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{ padding:"5px 14px", borderRadius:4, border:`1.5px solid ${filter===s?accent:"#e5e7eb"}`, background:filter===s?accent:"#fff", color:filter===s?"#fff":"#374151", fontSize:13, fontWeight:filter===s?600:400, cursor:"pointer" }}>{s}</button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:sel?"1fr 340px":"1fr", gap:16, alignItems:"start" }}>
        <Card>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#f9fafb", borderBottom:"1px solid #e5e7eb" }}>
                {["請求番号","荷主","対象月","請求金額","状態","支払期限","操作"].map(h=>(
                  <th key={h} style={{ padding:"9px 16px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {list.map((inv,i)=>(
                <tr key={i} onClick={()=>setSel(sel?.id===inv.id?null:inv)}
                  style={{ borderBottom:"1px solid #f1f3f5", cursor:"pointer", background:sel?.id===inv.id?"#f0f9ff":"transparent", transition:"background .1s" }}
                  onMouseEnter={e=>{ if(sel?.id!==inv.id) e.currentTarget.style.background="#f9fafb"; }}
                  onMouseLeave={e=>{ if(sel?.id!==inv.id) e.currentTarget.style.background="transparent"; }}>
                  <td style={{ padding:"12px 16px", fontWeight:600, color:accent, fontSize:12 }}>{inv.id}</td>
                  <td style={{ padding:"12px 16px", fontWeight:500 }}>{inv.client}</td>
                  <td style={{ padding:"12px 16px", color:"#6b7280" }}>{inv.period}</td>
                  <td style={{ padding:"12px 16px", fontWeight:700 }}>{fmt(inv.amount)}</td>
                  <td style={{ padding:"12px 16px" }}>
                    <StatusBadge label={issuedSet.has(inv.id)?"請求済":inv.status}/>
                  </td>
                  <td style={{ padding:"12px 16px", color:inv.status==="遅延"?"#dc2626":"#374151", fontWeight:inv.status==="遅延"?600:400 }}>{inv.due}</td>
                  <td style={{ padding:"12px 16px" }}>
                    <div style={{ display:"flex", gap:6 }} onClick={e=>e.stopPropagation()}>
                      {inv.status==="未請求" && !issuedSet.has(inv.id) && (
                        <button onClick={()=>setIssuedSet(s=>new Set([...s,inv.id]))}
                          style={{ padding:"4px 10px", border:`1px solid ${accent}`, borderRadius:4, background:accent, color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer" }}>発行</button>
                      )}
                      {issuedSet.has(inv.id) && <span style={{ fontSize:11, color:"#16a34a", fontWeight:600 }}>発行済</span>}
                      {inv.status==="遅延" && !remindedSet.has(inv.id) && (
                        <button onClick={()=>setRemindedSet(s=>new Set([...s,inv.id]))}
                          style={{ padding:"4px 10px", border:"1px solid #dc2626", borderRadius:4, background:"#fff", color:"#dc2626", fontSize:11, fontWeight:600, cursor:"pointer" }}>督促</button>
                      )}
                      {remindedSet.has(inv.id) && <span style={{ fontSize:11, color:"#dc2626", fontWeight:600 }}>督促送信済</span>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>

        {sel && (
          <Card style={{ padding:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
              <div>
                <div style={{ fontSize:11, color:"#9ca3af", marginBottom:3 }}>{sel.id}</div>
                <div style={{ fontSize:16, fontWeight:700 }}>{sel.client}</div>
                <div style={{ fontSize:12, color:"#6b7280", marginTop:2 }}>{sel.period} 分</div>
              </div>
              <button onClick={()=>setSel(null)} style={{ background:"none", border:"none", fontSize:18, color:"#9ca3af", cursor:"pointer", lineHeight:1 }}>×</button>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
              {[
                { l:"請求金額", v:fmt(sel.amount), c:accent },
                { l:"状態", v:<StatusBadge label={issuedSet.has(sel.id)?"請求済":sel.status}/>, c:null },
                { l:"支払期限", v:sel.due, c:sel.status==="遅延"?"#dc2626":"#374151" },
                { l:"発行日", v:sel.issued||"—", c:"#374151" },
              ].map(({ l,v,c })=>(
                <div key={l} style={{ background:"#f8fafc", borderRadius:6, padding:"10px 12px" }}>
                  <div style={{ fontSize:11, color:"#9ca3af", marginBottom:4 }}>{l}</div>
                  <div style={{ fontSize:13, fontWeight:600, color:c||"#111827" }}>{v}</div>
                </div>
              ))}
            </div>

            <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:10 }}>請求明細（概算）</div>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, marginBottom:14 }}>
              <thead>
                <tr style={{ background:"#f9fafb" }}>
                  {["区分","数量","単価","小計"].map(h=>(
                    <th key={h} style={{ padding:"6px 10px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:11, borderBottom:"1px solid #e5e7eb" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {buildLineItems(sel).map((item,ii)=>(
                  <tr key={ii} style={{ borderBottom:"1px solid #f8f9fa" }}>
                    <td style={{ padding:"7px 10px", fontWeight:500 }}>{item.label}</td>
                    <td style={{ padding:"7px 10px", color:"#6b7280" }}>{typeof item.qty==="number"?item.qty.toLocaleString():item.qty}{item.unit}</td>
                    <td style={{ padding:"7px 10px", color:"#6b7280" }}>{item.unitPrice>0?fmt(item.unitPrice):"—"}</td>
                    <td style={{ padding:"7px 10px", fontWeight:600 }}>{typeof item.amount==="number"?fmt(item.amount):"—"}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{ borderTop:"2px solid #e5e7eb", background:"#f9fafb" }}>
                  <td colSpan={3} style={{ padding:"8px 10px", fontWeight:700 }}>合計</td>
                  <td style={{ padding:"8px 10px", fontWeight:700, color:accent }}>{fmt(sel.amount)}</td>
                </tr>
              </tfoot>
            </table>

            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {sel.status==="未請求" && !issuedSet.has(sel.id) && (
                <button onClick={()=>setIssuedSet(s=>new Set([...s,sel.id]))}
                  style={{ padding:"10px", background:accent, color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:13, cursor:"pointer" }}>
                  請求書を発行する
                </button>
              )}
              {sel.status==="遅延" && !remindedSet.has(sel.id) && (
                <button onClick={()=>setRemindedSet(s=>new Set([...s,sel.id]))}
                  style={{ padding:"10px", background:"#fee2e2", color:"#dc2626", border:"1.5px solid #dc2626", borderRadius:6, fontWeight:600, fontSize:13, cursor:"pointer" }}>
                  督促メールを送付
                </button>
              )}
              <button onClick={()=>window.print()} style={{ padding:"10px", background:"#fff", color:"#374151", border:"1.5px solid #e5e7eb", borderRadius:6, fontWeight:600, fontSize:13, cursor:"pointer" }}>
                PDFで印刷
              </button>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
};

                    <td style={{ padding:"12px 14px" }}><StatusBadge label={c.billing.replace("（2区分）","").replace("（3区分）","")}/></td>
                    <td style={{ padding:"12px 14px" }}>
                      <div style={{ display:"flex", gap:4 }}>
                        {c.drivers.slice(0,3).map(did => {
                          const d = drivers.find(dr=>dr.id===did);
                          return d ? <div key={did} style={{ width:24, height:24, borderRadius:"50%", background:d.type==="自社"?"#dbeafe":"#ede9fe", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:d.type==="自社"?"#1e40af":"#5b21b6" }}>{d.name[0]}</div> : null;
                        })}
                        {c.drivers.length > 3 && <div style={{ width:24, height:24, borderRadius:"50%", background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#64748b" }}>+{c.drivers.length-3}</div>}
                      </div>
                    </td>
                    <td style={{ padding:"12px 14px", fontWeight:700, color:accent }}>{act&&act.sell>0?fmt(act.sell):"—"}</td>
                    <td style={{ padding:"12px 14px", fontWeight:600, color:"#16a34a" }}>{act&&act.profit>0?fmt(act.profit):"—"}</td>
                    <td style={{ padding:"12px 14px" }}><StatusBadge label={c.status}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Card>

        {sel && (
          <Card style={{ padding:20, alignSelf:"start" }}>
            <div style={{ fontWeight:700, fontSize:16, marginBottom:4 }}>{sel.name}</div>
            <div style={{ fontSize:12, color:"#9ca3af", marginBottom:16 }}>{sel.area}</div>
            <div style={{ fontSize:12, fontWeight:700, color:"#9ca3af", marginBottom:8 }}>単価一覧</div>
            {sel.rates.map((r,ri)=>(
              <div key={ri} style={{ display:"flex", justifyContent:"space-between", fontSize:13, padding:"7px 0", borderBottom:"1px solid #f8f9fa" }}>
                <span style={{ color:"#374151" }}>{r.label}</span>
                <div style={{ textAlign:"right" }}>
                  <span style={{ fontWeight:700, color:accent }}>{r.sell>0?fmt(r.sell):"要確認"}</span>
                  <span style={{ color:"#9ca3af", fontSize:11, marginLeft:6 }}>→ 支払{r.pay>0?fmt(r.pay):"—"}</span>
                </div>
              </div>
            ))}
            {(() => {
              const act = monthlyActuals.find(r=>r.name===sel.name);
              if (!act||act.sell===0) return null;
              return (
                <div style={{ marginTop:16, background:"#f8fafc", borderRadius:6, padding:14 }}>
                  <div style={{ fontSize:11, color:"#9ca3af", marginBottom:8 }}>今月実績</div>
                  {[["売上",fmt(act.sell),accent],["支払",fmt(act.pay),"#374151"],["粗利",fmt(act.profit)+" ("+(act.sell>0?(act.profit/act.sell*100).toFixed(1):0)+"%)","#16a34a"]].map(([l,v,c])=>(
                    <div key={l} style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:5 }}>
                      <span style={{ color:"#6b7280" }}>{l}</span>
                      <span style={{ fontWeight:600, color:c }}>{v}</span>
                    </div>
                  ))}
                </div>
              );
            })()}
            <div style={{ marginTop:14, display:"flex", gap:8 }}>
              <button onClick={()=>setPage("invoice")} style={{ flex:1, padding:"9px", background:accent, color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:13 }}>請求書作成</button>
              <button onClick={()=>setPage("ratemaster")} style={{ flex:1, padding:"9px", border:"1px solid #e5e7eb", background:"#fff", color:"#374151", borderRadius:6, fontSize:13 }}>単価編集</button>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
};

// ── 日次実績入力 ───────────────────────────────────────────────────────────
const DailyInputPage = ({ accent }) => {
  const [scClients, setScClients] = React.useState(null);
  const [scDrivers, setScDrivers] = React.useState(null);
  const clientSrc = scClients ?? clients;
  const driverSrc = scDrivers ?? drivers;

  const [selClient, setSelClient] = React.useState(clientSrc[0]);
  const [monthYear, setMonthYear] = React.useState("2025-10");
  const [entries, setEntries] = React.useState({});
  const [saved, setSaved] = React.useState(false);
  const [cycleOverrides] = useLocalStorage("jt_cycle_overrides", {});
  const [focusedCell, setFocusedCell] = React.useState(null);
  const [confirmClear, setConfirmClear] = React.useState(false);
  const inputRefs = React.useRef({});

  React.useEffect(() => {
    (async () => {
      const [{ data: cs }, { data: rates }, { data: cds }, { data: ds }] = await Promise.all([
        window.sb.from("jt_clients").select("*").order("id"),
        window.sb.from("jt_client_rates").select("*").order("sort_order"),
        window.sb.from("jt_client_drivers").select("*"),
        window.sb.from("jt_drivers").select("*").order("id"),
      ]);
      if (cs && rates && cds && ds) {
        const transformed = cs.map(c => ({
          id: c.id, name: c.name, area: c.area, billing: c.billing,
          billingCycle: c.billing_cycle, monthlyVol: c.monthly_vol || {},
          contact: c.contact, status: c.status,
          rates: rates.filter(r => r.client_id === c.id).map(r => ({
            label: r.label, sell: Number(r.sell), pay: Number(r.pay),
          })),
          drivers: cds.filter(cd => cd.client_id === c.id).map(cd => cd.driver_id),
        }));
        // 旧Supabaseマスタで実データ定数を上書きしない（収支・ダッシュと同一データ源に統一）
        void transformed; void ds;
        console.log("[Supabase] master fetch ignored; using embedded real data + dailyActuals");
      } else {
        console.warn("[Supabase] fetch failed, using hardcoded fallback");
      }
    })();
  }, []);

  React.useEffect(() => {
    if (scClients) {
      const updated = scClients.find(c => c.id === selClient?.id);
      if (updated) setSelClient(updated);
    }
  }, [scClients]);

  const clientList = clientSrc.filter(c => c.billing !== "スポット");
  const assignedDrivers = driverSrc.filter(d => selClient.drivers.includes(d.id) || (typeof dailyActuals!=="undefined" && dailyActuals[selClient.id] && Object.values(dailyActuals[selClient.id]).some(day=>day[d.id])));
  const rates = selClient.rates.filter(r => r.sell > 0 || r.pay > 0);
  const nD = assignedDrivers.length;
  const nR = rates.length;
  const nCols = nD * nR;

  const [yr, mo] = monthYear.split("-").map(Number);
  const _cycle = (cycleOverrides && cycleOverrides[selClient?.id]) || selClient?.billingCycle || "翌月末締め";
  const _cm = /翌月(\d+)日締め/.exec(_cycle);
  const _cutoff = _cm ? parseInt(_cm[1]) : null;
  const _fmtD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  let _bStart, _bEnd;
  if (_cutoff && _cutoff < 28) {
    _bStart = new Date(yr, mo-2, _cutoff+1);
    _bEnd = new Date(yr, mo-1, _cutoff);
  } else {
    _bStart = new Date(yr, mo-1, 1);
    _bEnd = new Date(yr, mo, 0);
  }
  const bStartStr = _fmtD(_bStart), bEndStr = _fmtD(_bEnd);
  const daysInMonth = Math.round((_bEnd - _bStart)/86400000) + 1;
  const dayRows = Array.from({length: daysInMonth}, (_, i) => {
    const date = new Date(_bStart); date.setDate(date.getDate()+i);
    const dow = date.getDay();
    return {
      d: date.getDate(),
      dateStr: _fmtD(date),
      dayName: ["日","月","火","水","木","金","土"][dow],
      dow, isWeekend: dow===0||dow===6, isSun: dow===0,
    };
  });

  const getVal = (dateStr, dId, rLabel) => entries[dateStr]?.[dId]?.[rLabel] ?? "";
  const saveTimers = React.useRef({});
  const setVal = (dateStr, dId, rLabel, v) => {
    setEntries(p => ({ ...p, [dateStr]: { ...(p[dateStr]||{}), [dId]: { ...((p[dateStr]||{})[dId]||{}), [rLabel]: v } } }));
    setSaved(false);
    const key = `${dateStr}|${dId}|${rLabel}`;
    if (saveTimers.current[key]) clearTimeout(saveTimers.current[key]);
    saveTimers.current[key] = setTimeout(async () => {
      delete saveTimers.current[key];
      if (!window.sb || !selClient?.id) return;
      const numV = v === "" ? null : Number(v);
      if (numV === null || isNaN(numV)) {
        await window.sb.from("jt_daily_entries").delete()
          .eq("entry_date", dateStr).eq("client_id", selClient.id)
          .eq("driver_id", dId).eq("rate_label", rLabel);
      } else {
        await window.sb.from("jt_daily_entries").upsert({
          entry_date: dateStr, client_id: selClient.id,
          driver_id: dId, rate_label: rLabel, value: numV,
        }, { onConflict: "entry_date,client_id,driver_id,rate_label" });
      }
      setSaved(true);
    }, 400);
  };

  // 月・荷主切替時に実績をロード（埋め込みdailyActuals → Supabaseで上書き）
  React.useEffect(() => {
    const start = bStartStr;
    const end = bEndStr;
    const next = {};
    const da = (typeof dailyActuals !== "undefined" && dailyActuals[selClient?.id]) || {};
    Object.keys(da).forEach(ds => {
      if (ds < start || ds > end) return;
      next[ds] = {};
      Object.keys(da[ds]).forEach(did => {
        next[ds][did] = {};
        Object.keys(da[ds][did]).forEach(lbl => { next[ds][did][lbl] = String(da[ds][did][lbl]); });
      });
    });
    setEntries(next);
    setSaved(true);
    if (window.sb && selClient?.id) {
      (async () => {
        const { data, error } = await window.sb.from("jt_daily_entries")
          .select("*").eq("client_id", selClient.id)
          .gte("entry_date", start).lte("entry_date", end);
        if (error || !data || !data.length) return;
        setEntries(prev => {
          const m = JSON.parse(JSON.stringify(prev));
          data.forEach(r => {
            if (!m[r.entry_date]) m[r.entry_date] = {};
            if (!m[r.entry_date][r.driver_id]) m[r.entry_date][r.driver_id] = {};
            m[r.entry_date][r.driver_id][r.rate_label] = String(r.value);
          });
          return m;
        });
      })();
    }
  }, [selClient?.id, monthYear]);

  const dayTotals = dayRows.map(day => {
    let sell=0, pay=0;
    assignedDrivers.forEach(d => rates.forEach(r => {
      const v = Number(getVal(day.dateStr, d.id, r.label))||0;
      sell += v*r.sell; pay += v*r.pay;
    }));
    return { sell, pay, profit: sell-pay };
  });
  const monthTotals = dayTotals.reduce((a,t)=>({sell:a.sell+t.sell,pay:a.pay+t.pay,profit:a.profit+t.profit}),{sell:0,pay:0,profit:0});
  const colTotals = assignedDrivers.flatMap((d) =>
    rates.map((r) => ({
      vol:  dayRows.reduce((s,day)=>s+(Number(getVal(day.dateStr,d.id,r.label))||0),0),
      sell: dayRows.reduce((s,day)=>s+(Number(getVal(day.dateStr,d.id,r.label))||0)*r.sell,0),
    }))
  );
  const inputDays = dayRows.filter((_,i)=>dayTotals[i].sell>0).length;
  const workdays  = dayRows.filter(d=>!d.isWeekend).length;

  // ── 今日・目標 ──
  const now0 = new Date();
  const currentMonthYear = `${now0.getFullYear()}-${String(now0.getMonth()+1).padStart(2,"0")}`;
  const isCurrentMonth = monthYear === currentMonthYear;
  const todayD = now0.getDate();
  const todayStr = `${monthYear}-${String(todayD).padStart(2,"0")}`;
  const todayDayRow = isCurrentMonth ? dayRows.find(r=>r.d===todayD) : null;
  const dayNames7 = ["日","月","火","水","木","金","土"];
  const todayLabel = isCurrentMonth ? `${now0.getMonth()+1}月${todayD}日（${dayNames7[now0.getDay()]}）` : "";
  const dailyTargets = rates.reduce((obj,r)=>{
    const mVol = selClient.monthlyVol[r.label]||0;
    obj[r.label] = workdays>0&&mVol>0 ? Math.round(mVol/workdays) : 0;
    return obj;
  },{});
  const todayCompletedCount = isCurrentMonth
    ? assignedDrivers.filter(d=>rates.every(r=>getVal(todayStr,d.id,r.label)!=="")).length : 0;
  const todayComplete = isCurrentMonth && todayDayRow && !todayDayRow.isWeekend
    && todayCompletedCount===assignedDrivers.length;

  const focusCell = (di, ci) => {
    let d=di, c=ci;
    if (c<0){c=nCols-1;d--;} if(c>=nCols){c=0;d++;}
    if(d<0||d>=daysInMonth) return;
    inputRefs.current[`${d}-${c}`]?.focus();
  };
  const handleKeyDown = (e, di, ci) => {
    if(e.key==='Enter'||e.key==='ArrowDown'){e.preventDefault();focusCell(di+1,ci);}
    else if(e.key==='ArrowUp'){e.preventDefault();focusCell(di-1,ci);}
    else if(e.key==='ArrowLeft'){e.preventDefault();if(ci>0)focusCell(di,ci-1);}
    else if(e.key==='ArrowRight'){e.preventDefault();if(ci<nCols-1)focusCell(di,ci+1);}
    else if(e.key==='Tab'){e.preventDefault();focusCell(di,ci+(e.shiftKey?-1:1));}
  };

  // 今日のクイック入力パネル用の十字キー＆Enter移動
  const todayRefs = React.useRef({});
  const focusTodayCell = (di, ri) => {
    todayRefs.current[`${di}-${ri}`]?.focus();
  };
  const handleTodayKeyDown = (e, di, ri) => {
    const nD = assignedDrivers.length, nR = rates.length;
    if(e.key==='Enter'||e.key==='ArrowDown'){
      e.preventDefault();
      if(ri<nR-1) focusTodayCell(di, ri+1);
      else if(di<nD-1) focusTodayCell(di+1, 0);
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      if(ri>0) focusTodayCell(di, ri-1);
      else if(di>0) focusTodayCell(di-1, nR-1);
    } else if(e.key==='ArrowLeft'){
      e.preventDefault();
      if(di>0) focusTodayCell(di-1, ri);
    } else if(e.key==='ArrowRight'){
      e.preventDefault();
      if(di<nD-1) focusTodayCell(di+1, ri);
    } else if(e.key==='Tab'){
      e.preventDefault();
      const next = ri + (e.shiftKey?-1:1);
      if(next>=0 && next<nR) focusTodayCell(di, next);
      else if(e.shiftKey && di>0) focusTodayCell(di-1, nR-1);
      else if(!e.shiftKey && di<nD-1) focusTodayCell(di+1, 0);
    }
  };

  React.useEffect(() => {
    const h = e => {
      if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();setSaved(true);}
      if(e.altKey&&e.key>='1'&&e.key<='9'){
        const idx=Number(e.key)-1;
        if(idx<clientList.length){setSelClient(clientList[idx]);setEntries({});setSaved(false);}
      }
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  }, [clientList]);

  const stickyHeaderRef = React.useRef(null);
  React.useEffect(() => {
    setTimeout(() => inputRefs.current["0-0"]?.focus(), 80);
    if (isCurrentMonth) {
      setTimeout(() => {
        const todayEl = document.querySelector('[data-today="true"]');
        if (!todayEl) return;
        const stickyH = stickyHeaderRef.current?.offsetHeight || 0;
        const rect = todayEl.getBoundingClientRect();
        const scroller = document.scrollingElement || document.documentElement;
        scroller.scrollTo({ top: scroller.scrollTop + rect.top - stickyH - 20, behavior:"smooth" });
      }, 300);
    }
  }, [selClient, monthYear]);

  const handleCSV = () => {
    const rHeaders = assignedDrivers.flatMap(d=>rates.map(r=>`${d.name}:${r.label}`));
    const header = ["日付","曜日",...rHeaders,"売上合計","支払合計","粗利"];
    const rows = dayRows.map((day,i)=>{
      const vals = assignedDrivers.flatMap(d=>rates.map(r=>getVal(day.dateStr,d.id,r.label)||0));
      const {sell,pay,profit}=dayTotals[i];
      return [day.dateStr,day.dayName,...vals,sell,pay,profit];
    });
    const footRow = ["月次合計","",...colTotals.map(c=>c.vol),monthTotals.sell,monthTotals.pay,monthTotals.profit];
    const csv = [header,...rows,footRow].map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,﻿"+encodeURIComponent(csv);
    a.download=`実績_${selClient.name}_${monthYear}.csv`;
    a.click();
  };

  return (
    <div>
      <div ref={stickyHeaderRef} style={{ marginBottom:8 }}>
      {/* ヘッダー */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, gap:12, flexWrap:"wrap" }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700 }}>日次実績入力</div>
          <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>月次一覧・スプレッドシート形式</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, color:"#9ca3af", flexShrink:0 }}>対象月</span>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            <button onClick={()=>{ const d=new Date(yr,mo-2,1); setMonthYear(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }}
              style={{ padding:"7px 10px", border:"1.5px solid #e5e7eb", borderRadius:6, background:"#fff", cursor:"pointer", fontSize:13 }}>‹</button>
            <input type="month" value={monthYear} onChange={e=>setMonthYear(e.target.value)}
              style={{ padding:"7px 12px", border:"1.5px solid #e5e7eb", borderRadius:6, fontSize:13, fontFamily:"inherit", outline:"none" }}
              onFocus={e=>e.target.style.borderColor=accent} onBlur={e=>e.target.style.borderColor="#e5e7eb"}/>
            <button onClick={()=>{ const d=new Date(yr,mo,1); setMonthYear(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }}
              style={{ padding:"7px 10px", border:"1.5px solid #e5e7eb", borderRadius:6, background:"#fff", cursor:"pointer", fontSize:13 }}>›</button>
          </div>
        </div>
      </div>

      {/* 操作バー（荷主） */}
      <div style={{ marginBottom:8 }}>
        <div>
          <label style={{ fontSize:11, color:"#9ca3af", display:"block", marginBottom:3 }}>荷主</label>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {clientList.map((c,i)=>{
              const on = selClient.id===c.id;
              return (
              <button key={i} onClick={()=>{ setSelClient(c); setEntries({}); setSaved(false); }}
                onMouseEnter={e=>{ if(!on){ e.currentTarget.style.borderColor=accent; e.currentTarget.style.background=accent+"0c"; } }}
                onMouseLeave={e=>{ if(!on){ e.currentTarget.style.borderColor="#e5e7eb"; e.currentTarget.style.background="#fff"; } }}
                style={{ display:"flex", alignItems:"center", gap:7, padding:"6px 14px 6px 7px", borderRadius:999,
                  border:`1.5px solid ${on?accent:"#e5e7eb"}`, background:on?accent:"#fff", color:on?"#fff":"#374151",
                  fontSize:12.5, fontWeight:on?700:500, cursor:"pointer",
                  boxShadow:on?`0 2px 8px -1px ${accent}55`:"0 1px 2px rgba(15,23,42,0.05)",
                  transition:"border-color .12s, background .12s, box-shadow .12s" }}>
                <span style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", width:19, height:19, borderRadius:"50%",
                  fontSize:10, fontWeight:700, flexShrink:0, background:on?"rgba(255,255,255,0.25)":"#eef2f7", color:on?"#fff":"#94a3b8" }}>{i+1}</span>
                {c.name}
              </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* 月次KPI */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:8 }}>
        {[
          { l:"月次売上（速報）", v:monthTotals.sell>0?fmt(monthTotals.sell):"—", c:accent },
          { l:"月次支払",         v:monthTotals.pay>0?fmt(monthTotals.pay):"—",   c:"#d97706" },
          { l:"月次粗利",         v:monthTotals.profit>0?fmt(monthTotals.profit):"—", c:"#16a34a" },
          { l:"入力進捗",         v:`${inputDays} / ${workdays}日`, c:"#374151",
            sub: inputDays===workdays&&workdays>0?"✓ 入力完了":`残 ${workdays-inputDays}日` },
        ].map(({l,v,c,sub})=>(
          <Card key={l} style={{ padding:"8px 14px" }}>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:2 }}>{l}</div>
            <div style={{ fontSize:16, fontWeight:700, color:c }}>{v}</div>
            {sub && <div style={{ fontSize:10, color:inputDays===workdays&&workdays>0?"#16a34a":"#9ca3af", marginTop:2 }}>{sub}</div>}
          </Card>
        ))}
      </div>

      </div>
      {/* 月次テーブル */}
      <Card>
        <div>
          <table style={{ borderCollapse:"collapse", fontSize:12, whiteSpace:"nowrap" }}>
            <thead style={{ position:"sticky", top:0, zIndex:4 }}>
              <tr style={{ background:"#f9fafb" }}>
                <th style={{ padding:"8px 12px", textAlign:"left", color:"#6b7280", fontWeight:500, fontSize:11, borderRight:"1px solid #e5e7eb", borderBottom:"1px solid #e5e7eb", minWidth:90, position:"sticky", left:0, top:0, background:"#f9fafb", zIndex:5 }}>日付</th>
                {assignedDrivers.map((d,dri)=>(
                  <th key={d.id} colSpan={nR}
                    style={{ padding:"7px 12px", textAlign:"center", borderRight:"1px solid #e5e7eb", borderBottom:"1px solid #e5e7eb", background:focusedCell?.dri===dri?accent+"0e":"#f9fafb", position:"sticky", top:0, zIndex:3 }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:5 }}>
                      <Avatar name={d.name} size={18} bg={d.type==="自社"?"#dbeafe":"#ede9fe"} color={d.type==="自社"?"#1e40af":"#5b21b6"}/>
                      <span style={{ fontWeight:700, fontSize:12 }}>{d.name}</span>
                      <StatusBadge label={d.type}/>
                    </div>
                  </th>
                ))}
                <th colSpan={3} style={{ padding:"7px 12px", textAlign:"center", color:"#6b7280", fontWeight:500, fontSize:11, borderLeft:"2px solid #e5e7eb", borderBottom:"1px solid #e5e7eb", background:"#f9fafb", position:"sticky", top:0, zIndex:3 }}>日次合計</th>
                <th style={{ padding:"7px 8px", textAlign:"center", color:"#6b7280", fontWeight:500, fontSize:11, borderLeft:"1px solid #e5e7eb", borderBottom:"1px solid #e5e7eb", minWidth:40, background:"#f9fafb", position:"sticky", top:0, zIndex:3 }}>状態</th>
              </tr>
              <tr style={{ background:"#f9fafb", borderBottom:"2px solid #e5e7eb" }}>
                <th style={{ padding:"4px 12px", borderRight:"1px solid #e5e7eb", position:"sticky", left:0, top:36, background:"#f9fafb", zIndex:5 }}/>
                {assignedDrivers.map((d,dri)=>
                  rates.map((r,ri)=>{
                    const ci=dri*nR+ri;
                    const active=focusedCell?.ci===ci;
                    return (
                      <th key={`${dri}-${ri}`}
                        style={{ padding:"4px 8px", textAlign:"center", color:active?accent:"#6b7280", fontWeight:500, fontSize:10,
                          borderLeft:ri===0&&dri>0?"1px solid #d1d5db":"none", borderRight:"1px solid #eceef0",
                          background:active?accent+"0e":"#f9fafb", position:"sticky", top:36, zIndex:3, minWidth:60 }}>
                        <div style={{ fontWeight:600 }}>{r.label}</div>
                      </th>
                    );
                  })
                )}
                {["売上","支払","粗利"].map((h,i)=>(
                  <th key={h} style={{ padding:"4px 10px", textAlign:"right", color:"#9ca3af", fontWeight:500, fontSize:10, borderLeft:i===0?"2px solid #e5e7eb":"none", minWidth:76, background:"#f9fafb", position:"sticky", top:36, zIndex:3 }}>{h}</th>
                ))}
                <th style={{ padding:"4px 8px", borderLeft:"1px solid #e5e7eb", background:"#f9fafb", position:"sticky", top:36, zIndex:3 }}/>
              </tr>
            </thead>
            <tbody>
              {dayRows.map((day,di)=>{
                const dt = dayTotals[di];
                const isActiveRow = focusedCell?.di===di;
                const isToday = day.dateStr===todayStr&&isCurrentMonth;
                const rowBg = isActiveRow?accent+"08":isToday?accent+"06":day.isWeekend?"#f9fafb":"#fff";
                const rowFilled = !day.isWeekend&&assignedDrivers.every(d=>rates.every(r=>getVal(day.dateStr,d.id,r.label)!==""));
                const rowPartial = !rowFilled&&!day.isWeekend&&assignedDrivers.some(d=>rates.some(r=>getVal(day.dateStr,d.id,r.label)!==""));
                return (
                  <tr key={di} data-today={isToday?"true":"false"} style={{ borderBottom:"1px solid #f1f3f5", background:rowBg }}>
                    <td style={{ padding:"4px 12px", borderRight:"1px solid #e5e7eb", fontWeight:500, position:"sticky", left:0, background:rowBg, zIndex:1,
                      borderLeft:isActiveRow?`3px solid ${accent}`:isToday?`3px solid ${accent}80`:"3px solid transparent" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                        <span style={{ fontSize:13, fontWeight:600, color:day.isSun?"#dc2626":day.dow===6?"#2563eb":"#111827" }}>{String(day.d).padStart(2," ")}</span>
                        <span style={{ fontSize:10, color:"#9ca3af" }}>（{day.dayName}）</span>
                        {isToday&&<span style={{ fontSize:9, fontWeight:700, background:accent, color:"#fff", padding:"1px 5px", borderRadius:3, flexShrink:0 }}>TODAY</span>}
                      </div>
                    </td>
                    {assignedDrivers.map((d,dri)=>
                      rates.map((r,ri)=>{
                        const ci=dri*nR+ri;
                        const isActive=isActiveRow&&focusedCell?.ci===ci;
                        const val=getVal(day.dateStr,d.id,r.label);
                        const numVal=Number(val);
                        const dt2=dailyTargets[r.label];
                        const isAnomaly=!day.isWeekend&&val!==""&&(numVal===0||(dt2>0&&numVal>dt2*3));
                        return (
                          <td key={ci} style={{ padding:0, textAlign:"center", borderRight:"1px solid #eceef0", borderLeft:ri===0&&dri>0?"1px solid #d1d5db":"none" }}>
                            <input
                              ref={el=>inputRefs.current[`${di}-${ci}`]=el}
                              type="number" min="0"
                              autoComplete="off" autoCorrect="off" spellCheck="false"
                              data-1p-ignore="true" data-lpignore="true" data-form-type="other"
                              placeholder={day.isWeekend?"—":""}
                              title={isAnomaly?(numVal===0?"0件？ 空欄にしてください":"通常より大幅に多い件数です"):""}
                              value={val}
                              onChange={e=>setVal(day.dateStr,d.id,r.label,e.target.value)}
                              onFocus={()=>setFocusedCell({di,ci,dri})}
                              onBlur={()=>setFocusedCell(null)}
                              onKeyDown={e=>handleKeyDown(e,di,ci)}
                              style={{
                                width:"100%", boxSizing:"border-box", padding:"6px 2px",
                                border:"none", borderRadius:0, fontSize:13, textAlign:"center",
                                fontFamily:"inherit", outline:"none",
                                background:isAnomaly?"#fee2e2":isActive?accent+"1f":"transparent",
                                boxShadow:isActive?`inset 0 0 0 2px ${accent}`:"none",
                                fontWeight:isActive?700:400,
                                color:day.isWeekend?"#cbd5e1":isAnomaly?"#b91c1c":"inherit",
                                transition:"background .1s, box-shadow .1s",
                              }}
                            />
                          </td>
                        );
                      })
                    )}
                    <td style={{ padding:"4px 10px", textAlign:"right", fontWeight:600, color:dt.sell>0?accent:"#e5e7eb", borderLeft:"2px solid #e5e7eb", borderRight:"1px solid #eceef0", fontSize:12 }}>
                      {dt.sell>0?fmt(dt.sell):"—"}
                    </td>
                    <td style={{ padding:"4px 10px", textAlign:"right", fontSize:12, color:dt.pay>0?"#374151":"#e5e7eb", borderRight:"1px solid #eceef0" }}>
                      {dt.pay>0?fmt(dt.pay):"—"}
                    </td>
                    <td style={{ padding:"4px 10px", textAlign:"right", fontWeight:600, color:dt.profit>0?"#16a34a":"#e5e7eb", fontSize:12 }}>
                      {dt.profit>0?fmt(dt.profit):"—"}
                    </td>
                    <td style={{ padding:"4px 8px", textAlign:"center", borderLeft:"1px solid #e5e7eb", fontSize:13 }}>
                      {rowFilled?<span style={{ color:"#16a34a", fontWeight:700 }}>✓</span>
                       :rowPartial?<span style={{ color:"#d97706" }}>…</span>:null}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ background:"#f9fafb", borderTop:"2px solid #e5e7eb" }}>
                <td style={{ padding:"8px 12px", fontWeight:700, fontSize:12, borderRight:"1px solid #e5e7eb", position:"sticky", left:0, background:"#f9fafb" }}>月次合計</td>
                {colTotals.map((col,ci)=>{
                  const dri=Math.floor(ci/nR), ri=ci%nR;
                  return (
                    <td key={ci} style={{ padding:"7px 6px", textAlign:"center", fontWeight:700, color:col.vol>0?"#111827":"#9ca3af", fontSize:13, borderLeft:ri===0&&dri>0?"1px solid #e8eaed":"none" }}>
                      {col.vol>0?col.vol:"—"}
                    </td>
                  );
                })}
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.sell>0?accent:"#9ca3af", borderLeft:"2px solid #e5e7eb" }}>{monthTotals.sell>0?fmt(monthTotals.sell):"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.pay>0?"#374151":"#9ca3af" }}>{monthTotals.pay>0?fmt(monthTotals.pay):"—"}</td>
                <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:800, color:monthTotals.profit>0?"#16a34a":"#9ca3af" }}>{monthTotals.profit>0?fmt(monthTotals.profit):"—"}</td>
                <td style={{ borderLeft:"1px solid #e5e7eb" }}/>
              </tr>
              <tr style={{ background:"#fafbff", borderTop:"1px solid #e5e7eb" }}>
                <td style={{ padding:"6px 12px", fontSize:10, color:"#9ca3af", borderRight:"1px solid #e5e7eb", position:"sticky", left:0, background:"#fafbff" }}>ドライバー別売上</td>
                {colTotals.map((col,ci)=>{
                  const dri=Math.floor(ci/nR), ri=ci%nR;
                  return (
                    <td key={ci} style={{ padding:"5px 6px", textAlign:"center", fontSize:10, color:"#6b7280", borderLeft:ri===0&&dri>0?"1px solid #e8eaed":"none" }}>
                      {col.sell>0?fmt(col.sell):""}
                    </td>
                  );
                })}
                <td colSpan={3} style={{ borderLeft:"2px solid #e5e7eb" }}/>
                <td style={{ borderLeft:"1px solid #e5e7eb" }}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </Card>

      {/* アクションボタン */}
      <div style={{ display:"flex", gap:10, marginTop:12 }}>
        <div
          style={{ flex:2, padding:"12px", background:saved?"#f0fdf4":"#fffbeb", color:saved?"#15803d":"#b45309", border:`1.5px solid ${saved?"#bbf7d0":"#fde68a"}`, borderRadius:7, fontWeight:600, fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          {saved
            ? <><Ic name="check" size={16} color="#15803d" strokeWidth={2.5}/> 自動保存済み（Supabase）</>
            : <><span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:"#f59e0b" }}/> 保存中…</>
          }
        </div>
        <button onClick={handleCSV}
          style={{ flex:1, padding:"12px 16px", border:"1.5px solid #e5e7eb", background:"#fff", color:"#374151", borderRadius:7, fontWeight:600, fontSize:13, cursor:"pointer" }}>
          CSVエクスポート
        </button>
        {confirmClear ? (
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <span style={{ fontSize:12, color:"#dc2626" }}>クリアしますか？</span>
            <button onClick={()=>{ setEntries({}); setSaved(false); setConfirmClear(false); }}
              style={{ padding:"10px 14px", background:"#dc2626", color:"#fff", border:"none", borderRadius:7, fontWeight:600, fontSize:12, cursor:"pointer" }}>確認</button>
            <button onClick={()=>setConfirmClear(false)}
              style={{ padding:"10px 14px", border:"1.5px solid #e5e7eb", background:"#fff", color:"#374151", borderRadius:7, fontSize:12, cursor:"pointer" }}>キャンセル</button>
          </div>
        ) : (
          <button onClick={()=>setConfirmClear(true)}
            style={{ padding:"12px 16px", border:"1.5px solid #fee2e2", background:"#fff", color:"#dc2626", borderRadius:7, fontWeight:600, fontSize:13, cursor:"pointer" }}>
            クリア
          </button>
        )}
      </div>
    </div>
  );
};

const DriversPage = ({ accent, setPage }) => {
  const [sel, setSel] = React.useState(null);
  const [search, setSearch] = React.useState("");
  const [typeFilter, setTypeFilter] = React.useState("すべて");

  // ドライバー別の今月財務サマリーを計算
  const driverSummary = drivers.map(d => {
    let totalSellD = 0, totalPayD = 0;
    const breakdown = [];
    clients.forEach(c => {
      if (!c.drivers.includes(d.id)) return;
      const act = monthlyActuals.find(r => r.name === c.name);
      if (!act) return;
      const share = 1 / c.drivers.length;
      const s = Math.round(act.sell * share);
      const p = Math.round(act.pay  * share);
      totalSellD += s;
      totalPayD  += p;
      breakdown.push({ client: c.name, sell: s, pay: p });
    });
    return { ...d, totalSell: totalSellD, totalPay: totalPayD, totalProfit: totalSellD - totalPayD, breakdown };
  });

  const list = driverSummary.filter(d => {
    const matchSearch = d.name.includes(search) || d.area.includes(search);
    const matchType = typeFilter === "すべて" || d.type === typeFilter;
    return matchSearch && matchType;
  });

  const selSummary = sel ? driverSummary.find(d => d.id === sel.id) : null;

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>

          ))}
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns: sel?"1fr 320px":"1fr", gap:16 }}>
        <Card>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>

              <tr style={{ background:"#f9fafb", borderBottom:"1px solid #e5e7eb" }}>
                {["氏名","雇用形態","担当エリア","担当荷主数","今月売上按分","今月支払按分","粗利貢献"].map(h=>(
